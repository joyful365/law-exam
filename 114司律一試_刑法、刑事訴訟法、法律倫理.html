<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>114年司律一試 — 綜合法學（一）刑法‧刑事訴訟法‧法律倫理 練習卷</title>
<style>
  :root{
    --paper:#faf8f3;
    --paper-dim:#f3efe6;
    --ink:#2b2b28;
    --ink-soft:#5c5850;
    --rule:#d9d2c2;
    --accent:#8a5a2b;
    --accent-soft:#caa874;
    --flag:#b3422f;
    --flag-bg:#fbe9e5;
    --correct-bg:#dcecd8;
    --correct-border:#5a9456;
    --wrong-bg:#f6d9d4;
    --wrong-border:#b3422f;
    --confuse:#c98a2c;
    --serif: "Noto Serif TC", "Source Han Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-dim);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Sticky Header ---------- */
  header.site-header{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--paper);
    border-bottom:2px solid var(--ink);
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .header-inner{
    max-width:1000px;
    margin:0 auto;
    padding:14px 20px 12px;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .exam-title{
    font-family:var(--serif);
    font-size:1.25rem;
    font-weight:700;
    letter-spacing:0.02em;
    margin:0;
  }
  .exam-sub{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin:2px 0 0;
  }
  .meta-line{
    font-size:0.78rem;
    color:var(--ink-soft);
    margin-top:4px;
  }

  .controls-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
    padding-top:10px;
    border-top:1px solid var(--rule);
  }
  .filter-tabs{
    display:flex;
    gap:6px;
  }
  .filter-tabs button{
    font-family:var(--sans);
    font-size:0.85rem;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid var(--rule);
    background:var(--paper);
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
  }
  .filter-tabs button.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }
  .filter-tabs button:hover:not(.active){
    border-color:var(--accent);
    color:var(--accent);
  }
  .status-cluster{
    display:flex;
    align-items:center;
    gap:14px;
    font-size:0.82rem;
    color:var(--ink-soft);
  }
  .flag-count{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-weight:600;
    color:var(--flag);
  }
  .flag-count svg{width:13px;height:13px;}
  .clear-btn{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:6px 12px;
    border-radius:6px;
    border:1px solid var(--flag);
    background:var(--paper);
    color:var(--flag);
    cursor:pointer;
    transition:all .15s ease;
  }
  .clear-btn:hover{
    background:var(--flag);
    color:#fff;
  }

  .toolbar-row2{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--rule);
  }
  .export-group{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .export-btn{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:6px 12px;
    border-radius:6px;
    border:1px solid var(--accent-soft);
    background:#fff;
    color:var(--accent);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:5px;
  }
  .export-btn:hover{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .export-btn svg{width:13px;height:13px;}

  .submit-btn{
    font-family:var(--sans);
    font-size:0.85rem;
    font-weight:700;
    padding:7px 18px;
    border-radius:6px;
    border:1px solid #3f6b3c;
    background:#4f7d4a;
    color:#fff;
    cursor:pointer;
    transition:all .15s ease;
  }
  .submit-btn:hover{
    background:#3f6b3c;
  }

  /* ---------- Score Banner ---------- */
  .score-banner{
    display:none;
    background:#fdf6ec;
    border:1.5px solid var(--accent-soft);
    border-radius:8px;
    padding:10px 16px;
    margin-top:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .score-banner.show{display:flex;}
  .score-banner .score-text{
    font-size:0.95rem;
    font-weight:700;
    color:var(--accent);
  }
  .score-banner .score-detail{
    font-size:0.78rem;
    color:var(--ink-soft);
    font-weight:400;
  }
  .score-banner .done-tag{
    font-size:0.72rem;
    font-weight:700;
    color:#3f6b3c;
    background:#e3efe1;
    border:1px solid #8fbf89;
    border-radius:4px;
    padding:2px 8px;
  }

  /* ---------- Main content ---------- */
  main{
    max-width:1000px;
    margin:0 auto;
    padding:24px 20px 80px;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-size:0.95rem;
  }

  .q-card{
    background:var(--paper);
    border:1px solid var(--rule);
    border-radius:10px;
    margin-bottom:16px;
    padding:16px 18px 16px 14px;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .q-card.flagged{
    border-color:var(--flag);
    box-shadow:0 0 0 1px var(--flag) inset;
    background:linear-gradient(180deg, var(--flag-bg) 0%, var(--paper) 55px);
  }

  .q-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  .q-leftbar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    flex-shrink:0;
    width:46px;
    padding-top:1px;
  }

  .q-num{
    font-family:var(--serif);
    font-weight:700;
    font-size:1.1rem;
    color:var(--ink);
    line-height:1;
  }

  .flag-btn{
    background:none;
    border:none;
    cursor:pointer;
    padding:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    transition:transform .12s ease, background .15s ease;
  }
  .flag-btn:hover{
    background:var(--flag-bg);
  }
  .flag-btn svg{
    width:18px;
    height:18px;
    stroke:var(--ink-soft);
    fill:none;
    stroke-width:1.8;
    transition:fill .15s ease, stroke .15s ease;
  }
  .flag-btn.active svg{
    fill:var(--flag);
    stroke:var(--flag);
  }
  .flag-btn:active{transform:scale(0.9);}

  .flagged-tag{
    font-size:0.65rem;
    font-weight:700;
    color:var(--flag);
    background:var(--flag-bg);
    border:1px solid var(--flag);
    border-radius:4px;
    padding:1px 5px;
    white-space:nowrap;
    letter-spacing:0.04em;
  }

  .q-body{
    flex:1;
    min-width:0;
  }

  .q-text{
    font-size:0.98rem;
    font-weight:700;
    margin:0 0 12px;
    color:var(--ink);
  }

  .options-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 10px;
  }
  @media (max-width:620px){
    .options-grid{grid-template-columns:1fr;}
  }

  .option{
    display:flex;
    align-items:flex-start;
    gap:8px;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:8px 10px;
    cursor:pointer;
    font-size:0.9rem;
    background:#fff;
    transition:background .15s ease, border-color .15s ease;
    position:relative;
  }
  .option:hover{
    border-color:var(--accent-soft);
  }
  .option .opt-label{
    font-weight:700;
    color:var(--accent);
    flex-shrink:0;
  }
  .option .opt-text{
    flex:1;
  }
  .option .confuse-btn{
    flex-shrink:0;
    background:none;
    border:none;
    cursor:pointer;
    padding:1px 2px;
    margin-left:2px;
    line-height:0;
  }
  .option .confuse-btn svg{
    width:13px;
    height:13px;
    transition:fill .15s ease;
  }
  .option .confuse-btn svg .tri{
    fill:none;
    stroke:#b9b2a0;
    stroke-width:1.4;
  }
  .option .confuse-btn.active svg .tri{
    fill:var(--confuse);
    stroke:var(--confuse);
  }

  .option.selected-wrong{
    background:var(--wrong-bg);
    border-color:var(--wrong-border);
  }
  .option.selected-wrong .opt-text{
    text-decoration:line-through;
    color:#7a3a30;
  }
  .option.selected-correct{
    background:var(--correct-bg);
    border-color:var(--correct-border);
  }
  .option.confused{
    outline:2px dashed var(--confuse);
    outline-offset:1px;
  }

  .answer-inline{
    display:inline-block;
    margin-left:10px;
    font-size:0.8rem;
    font-weight:400;
    padding:2px 9px;
    border-radius:5px;
    background:#fff;
    color:#fff; /* hidden by default: white on white */
    border:1px solid var(--rule);
    transition:color .15s ease, background .15s ease, border-color .15s ease;
    user-select:none;
    vertical-align:middle;
    white-space:nowrap;
  }
  .answer-inline.revealed{
    color:var(--accent);
    background:#fdf6ec;
    border-color:var(--accent-soft);
    font-weight:600;
    user-select:text;
  }
  .answer-inline .ans-key{
    font-weight:700;
  }

  /* ---------- Explanation block ---------- */
  .explain-block{
    margin-top:10px;
  }
  .explain-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid var(--rule);
    background:#fff;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .explain-toggle:hover{
    border-color:var(--accent-soft);
    color:var(--accent);
  }
  .explain-toggle .has-note-tag{
    font-size:0.72rem;
    font-weight:700;
    color:var(--accent);
  }
  .explain-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .explain-toggle.open .chevron{
    transform:rotate(90deg);
  }

  .explain-body{
    display:none;
    margin-top:8px;
  }
  .explain-body.open{
    display:block;
  }
  .explain-textarea{
    width:100%;
    min-height:90px;
    font-family:var(--sans);
    font-size:0.88rem;
    line-height:1.6;
    color:var(--ink);
    background:#fffdf8;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:10px 12px;
    resize:vertical;
    transition:border-color .15s ease;
  }
  .explain-textarea:focus{
    outline:none;
    border-color:var(--accent-soft);
  }
  .explain-status{
    font-size:0.74rem;
    color:#5a9456;
    margin-top:5px;
    height:1em;
    opacity:0;
    transition:opacity .25s ease;
  }
  .explain-status.show{
    opacity:1;
  }

  /* ---------- Official explanation block (built-in, read-only) ---------- */
  .official-block{
    margin-top:8px;
  }
  .official-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid #cfe0d4;
    background:#f3f9f4;
    color:#3f6b3c;
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .official-toggle:hover{
    border-color:#8fbf89;
    background:#e9f4ea;
  }
  .official-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .official-toggle.open .chevron{
    transform:rotate(90deg);
  }
  .official-badge-icon{
    font-size:0.78rem;
  }
  .official-body{
    display:none;
    margin-top:8px;
  }
  .official-body.open{
    display:block;
  }
  .official-content{
    background:#f8fbf8;
    border:1px solid #d9e9da;
    border-left:3px solid #5a9456;
    border-radius:8px;
    padding:14px 16px;
    font-size:0.88rem;
    line-height:1.75;
    color:#2f4a2d;
  }
  .official-content p{
    margin:0 0 8px;
  }
  .official-content p:last-child{
    margin-bottom:0;
  }
  .official-content ul{
    margin:0 0 8px;
    padding-left:1.3em;
  }
  .official-content ul:last-child{
    margin-bottom:0;
  }
  .official-content li{
    margin-bottom:6px;
  }
  .official-content li:last-child{
    margin-bottom:0;
  }
  .official-content strong{
    color:#1f3a1e;
  }
  .official-content em{
    color:#5c6b5a;
  }

  /* modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(30,28,24,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:var(--paper);
    border-radius:10px;
    padding:22px 24px;
    max-width:360px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
    text-align:center;
  }
  .modal-box p{
    font-size:0.92rem;
    margin:0 0 18px;
    color:var(--ink);
  }
  .modal-actions{
    display:flex;
    justify-content:center;
    gap:10px;
  }
  .modal-actions button{
    font-family:var(--sans);
    font-size:0.85rem;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    border:1px solid var(--rule);
    background:#fff;
  }
  .modal-actions button.confirm{
    background:var(--flag);
    border-color:var(--flag);
    color:#fff;
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="title-row">
      <div>
        <h1 class="exam-title">114年公務人員特種考試司法官考試 ‧ 114年專門職業及技術人員高等考試律師考試</h1>
        <p class="exam-sub">綜合法學（一）刑法‧刑事訴訟法‧法律倫理 — 第一試試題（單一選擇題，全75題）</p>
      </div>
    </div>
    <div class="meta-line">考試日期：114年（西元2025年）｜類科：各類科｜每題2分，共75題｜本練習卷供考後自我複習使用</div>

    <div class="controls-row">
      <div class="filter-tabs">
        <button id="tab-all" class="active">全部題目</button>
        <button id="tab-flagged">已標記</button>
      </div>
      <div class="status-cluster">
        <span class="flag-count">
          <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5" fill="currentColor" stroke="none"/></svg>
          <span id="flag-counter">0</span> 題已標記
        </span>
        <button class="clear-btn" id="clear-all-btn">清除全部標記</button>
      </div>
    </div>

    <div class="toolbar-row2">
      <div class="export-group">
        <button class="export-btn" id="export-flagged-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
          匯出已標記
        </button>
        <button class="export-btn" id="export-all-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
          匯出全部
        </button>
      </div>
      <button class="submit-btn" id="submit-btn">交卷算分</button>
    </div>

    <div class="score-banner" id="score-banner">
      <span class="score-text" id="score-text"></span>
      <span class="done-tag">本卷已完成</span>
    </div>
  </div>
</header>

<main id="main-content"></main>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <p>確定要清除「全部」旗標標記、作答紀錄、疑惑標記與交卷成績嗎？<br>（已輸入的詳解內容將會保留；題庫大廳的「已完成」徽章也會一併移除）<br>此操作無法復原。</p>
    <div class="modal-actions">
      <button id="modal-cancel">取消</button>
      <button id="modal-confirm" class="confirm">確定清除</button>
    </div>
  </div>
</div>

<script src="exam-complete.js"></script>
<script>
const QUESTIONS = [
{"n": 1, "ans": 1, "q": "有關刑法上錯誤論敘述，下列何者正確？", "o": ["甲把乙從橋上推到河中，希望乙溺斃，但乙最後頭部撞到橋墩而死，此時應否定甲的殺人故意", "甲以殺人之意思緊勒乙，導致乙昏迷，但甲誤認乙已死，故將其埋入土中，最後乙因被土覆蓋口鼻而窒息死亡，此時依實務見解甲仍應負擔殺人罪責", "甲想要殺乙，所以看準了乙和丙、丁同在一間房間時，用一顆炸彈丟進三人所在的房間，導致在爆炸範圍的乙、丙、丁均因爆炸而死，此時僅能肯定甲對乙有殺人故意，對於丙、丁只能成立過失犯", "甲以殺人的意思，在公眾使用道路放地雷想要炸死乙，偶然經過的丙踏到地雷被炸死，此時應否定甲殺人的故意"]},
{"n": 2, "ans": 2, "q": "甲為17歲之高中生，為博取心怡對象的好感，而願意接受紋身師傅乙於其手臂刺一個十元硬幣大小的愛心圖案。下列敘述何者正確？", "o": ["甲不具民法上之行為能力，故其承諾無效", "未成年人對自己的身體並無處分權，須由其父母代為承諾始可", "乙不得主張推測承諾以阻卻傷害罪之違法性", "手臂刺青難以回復原樣，屬刑法第10條之重傷"]},
{"n": 3, "ans": 0, "q": "有關罪刑法定原則，下列敘述何者正確？", "o": ["原則禁止類推適用，但如有利於行為人者，則例外允許", "習慣法不得作為論罪科刑之依據，縱依習慣法為有利於行為人之認定者，亦同", "要求司法者僅能根據「行為時」之刑法規定論罪科刑，沒收亦同", "罪刑明確性原則不僅要求構成要件必須明確，法律效果亦須明確，但例外時允許絕對不定期刑之規範方式"]},
{"n": 4, "ans": 2, "q": "甲在偏遠山區開雙人座跑車載母親乙兜風回程下山途中，因打滑失控而撞上由丙所騎機車，致乙、丙受傷，但因甲見丙只有手臂擦傷而乙傷勢嚴重有生命危險，故不顧丙的傷勢而將乙載往山下某醫院進行救治。有關甲之行為，下列敘述何者錯誤？", "o": ["不得主張正當防衛", "得主張義務衝突", "欠缺刑法第185條之4發生交通事故逃逸罪之逃逸故意", "甲之行為該當刑法第185條之4發生交通事故逃逸罪之逃逸行為"]},

{"n": 49, "ans": 3, "q": "甲、乙為警當場查獲涉嫌共同販賣毒品予丙，甲、乙於警詢時，一致指稱與丁有販賣毒品予丙之犯意聯絡及行為分擔等情，並經依法調取甲與乙、丁共同販賣毒品予丙過程之行動電話通信（聯）紀錄，甲、乙、丁均經提起公訴。於審判中，甲、乙以證人身分作證時，均否認其等於警詢中所為不利於丁之證述係屬實在，丁則抗辯甲、乙於警詢之陳述，不具證據能力。下列敘述何者正確？", "o": ["甲、乙於警詢中所為陳述，與審判中不符，如為證明犯罪事實所必要者，即得依刑事訴訟法第159條之2之規定，均具有證據能力", "刑事訴訟法第155條第1項前段之規定，證據之證明力，由法院本於確信自由判斷。故法院不違背經驗法則及論理法則，依憑甲、乙所為不利於丁之證述，即據以認定丁共同販賣毒品予丙之犯罪事實，採證合法", "證人即甲之友人戊於審判中具結後證述，甲曾向戊表示其係與乙、丁共同販賣毒品予丙等情，具有證據能力，且可作為判斷甲於警詢中所為不利於丁之陳述係屬真實之補強證據", "甲與乙、丁共同販賣毒品予丙過程之行動電話通信（聯）紀錄，具有證據能力，且可作為判斷甲於警詢中所為不利於丁之陳述係屬真實之補強證據"]},
{"n": 50, "ans": 0, "q": "關於證據法則之敘述，下列何者錯誤？", "o": ["法院於第一次審判期日前，認為檢察官指出之證明方法顯不足認定被告有成立犯罪之可能時，得視情況通知檢察官補正，或直接以裁定駁回起訴", "當事人、代理人、辯護人或輔佐人應就調查證據之範圍、次序及方法提出意見", "法院為發見真實，得依職權調查證據。但於公平正義之維護或對被告之利益有重大關係事項，法院應依職權調查之", "當事人、代理人、辯護人或輔佐人聲請調查之證據，法院認為不必要者，得以裁定駁回之"]},
{"n": 51, "ans": 3, "q": "甲與被害人發生衝突，因而與乙共同持棍毆傷被害人，被害人因不知乙之姓名，僅先對甲提起傷害罪之告訴，甲經檢察官起訴後，第一審審理中，檢察官另案查出乙之姓名，被害人於另案偵查中與乙達成和解，並撤回對乙之告訴後，甲始經法院判處傷害罪刑確定，甲知悉上情後，主張應依非常救濟程序，改諭知不受理判決。依實務見解，其主張有無理由？", "o": ["無理由，因甲是正犯，且被害人未對甲撤回告訴，本應對甲論罪判刑", "無理由，已經判刑確定，不可救濟", "有理由，法院本應諭知公訴不受理，但應由甲聲請再審救濟", "有理由，法院本應諭知公訴不受理，且應以非常上訴救濟"]},

{"n": 55, "ans": 3, "q": "被告涉犯搶奪罪於準備程序中為有罪之陳述，辯護人主張被告因精神障礙有阻卻責任事由之存在，法院一方面同意將被告送精神鑑定，另一方面告知被告簡式審判程序之旨，經詢問後辯護人亦無其他意見，裁定進行簡式審判程序。法院之處理是否合法？", "o": ["合法。法院既已同意送鑑定，已顧及被告之抗辯，辯護人亦無意見，對被告防禦權並無危害。若案件已臻明確，應容許改行簡式審判程序", "合法。實務上之鑑定多半採機關鑑定，即鑑定人不會出庭接受交互詰問，因此認定罪責之精神鑑定與簡式審判程序並無衝突", "不合法。辯護人之抗辯若與被告本人相矛盾，應以被告本人之意思為準，此時法院既裁定行簡式審判程序，即不得再送精神鑑定", "不合法。簡式審判程序以被告為有罪陳述為前提，若被告主張有阻卻罪責事由，即不得改採簡式審判程序"]},

{"n": 59, "ans": 3, "q": "甲涉犯普通竊盜及強制罪嫌之裁判上一罪，經檢察官向臺灣臺北地方法院提起公訴。臺灣臺北地方法院審理結果，就甲被訴強制罪嫌部分判決有罪，被訴普通竊盜罪嫌部分，則於判決理由內說明不另為無罪之諭知。檢察官及甲均不服提起上訴，臺灣高等法院審理結果，認定檢察官之上訴有理由，甲之上訴則無理由，因而撤銷第一審判決，改依想像競合犯之規定，從一重論處甲犯普通竊盜罪刑確定。甲不服欲向法院聲請再審，關於聲請再審程序之敘述，依實務見解，下列何者正確？", "o": ["甲聲請再審，應向臺灣臺北地方法院提起", "甲聲請再審倘經裁定駁回，對於普通竊盜罪部分，得提起抗告，對於強制罪部分，不得提起抗告", "甲聲請再審倘經裁定駁回，對於普通竊盜罪及強制罪部分，均不得提起抗告", "甲聲請再審倘經裁定駁回，對於普通竊盜罪及強制罪部分，均得提起抗告"]},

{"n": 61, "ans": 3, "q": "關於道德、法律及倫理性質之敘述，下列何者正確？", "o": ["道德、法律及倫理，皆應形諸明文規定，才能具有社會行為之拘束力", "甲法官夜間駕車行經鄉村道路，發現陌生機車騎士倒臥路旁，但因擔心誤會被控肇事，因此並未停車救助。甲法官不僅道德有損，倫理有違，如因不作為而導致騎士死亡，即應承擔法律責任", "乙法官與丙律師兩人為大學同學，有感於法學教育與實務應用之落差，共同投資設立「法律實務教育訓練中心」提供課程講授，以合理學費招收有志學習法律以提昇職場競爭力之上班族。上述舉措符合道德標準、法律規定及倫理價值", "道德即是人性尊嚴的本質，但標準及內涵可能因人而異。法律則是最低的道德標準，所有人都必須遵守的義務。倫理乃是社會群體基於某些特殊屬性，共同形成的價值規範"]},

const OFFICIAL_EXPLANATIONS = {
  "1": "<p><strong>【一試詳解】</strong></p><ul><li>本題考點為「刑法上的錯誤論」。</li><li><strong>(A) 錯誤</strong>：甲推乙下河想將其溺斃，但乙卻撞到橋墩而死。此為「因果歷程錯誤」（客觀發生的因果歷程與主觀想像不同）。實務與通說認為，只要結果的發生沒有偏離一般經驗法則（推人下橋本就有撞擊致死的風險），即屬於「非重大偏離」，<strong>不阻卻殺人故意</strong>，仍成立殺人既遂罪。</li><li><strong>(B) 正確（本題正解）</strong>：甲勒昏乙誤以為已死而將其埋入土中致死，此為經典的「概括故意（雙行為之因果歷程錯誤）」案例。實務見解（如最高法院判例）認為，甲的兩個行為（勒頸、掩埋）都是出於單一的殺意，客觀上亦導致乙死亡，故<strong>仍應負殺人既遂罪責</strong>。</li><li><strong>(C) 錯誤</strong>：甲為殺乙而丟炸彈，甲明知房間內有丙、丁，仍執意丟擲。甲對乙有「直接故意」，對丙、丁則具備「預見其發生而其發生並不違背其本意」的「不確定故意（間接故意）」，並非僅成立過失犯。</li><li><strong>(D) 錯誤</strong>：甲放地雷想炸死乙，卻炸死偶然經過的丙。此為「打擊錯誤」或「客體錯誤」，甲主觀上有殺人的故意，客觀上亦侵害了人的生命法益，依法仍會成立殺人罪相關刑責（如對乙為殺人未遂，對丙依具體情境論以不確定故意殺人或過失致死），不能直接「否定其殺人的故意」。</li></ul>",
  "2": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 錯誤</strong>：刑法上的「承諾能力」與民法上的「行為能力」不同。刑法看重的是被害人是否具備「理解該法益處分之意義與後果的自然理解能力」。17歲的高中生通常已具備此等理解能力，故其承諾原則上有效。</li><li><strong>(B) 錯誤</strong>：身體法益屬於一身專屬法益，父母不能代為處分或代為承諾傷害行為。</li><li><strong>(C) 正確（本題正解）</strong>：所謂「推測承諾」，是指在無法取得被害人現實承諾（如當事人昏迷），但依客觀情事可推斷其必定會同意的情況下所適用的阻卻違法事由。本題中，甲已經「明確同意（現實承諾）」刺青，故乙無須、也不得主張「推測承諾」來阻卻違法。</li><li><strong>(D) 錯誤</strong>：依《刑法》第10條第4項規定，重傷是指毀敗或嚴重減損視、聽、語、味、嗅覺、肢體、生殖機能或其他重大不治或難治之傷害。單純的手臂刺青雖難以回復，但並未達到毀敗或嚴重減損生理機能之「重傷」程度。</li></ul>",
  "3": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 正確（本題正解）</strong>：罪刑法定原則派生出「禁止類推適用原則」，旨在限制國家刑罰權的不當擴張以保障人權。但若類推適用是「有利於行為人」（例如擴張阻卻違法事由或減免刑責之要件），則例外被允許。</li><li><strong>(B) 錯誤</strong>：罪刑法定原則禁止以「習慣法」作為「論罪科刑（創設或加重刑罰）」的依據；但若習慣法是<strong>有利於行為人</strong>的認定（例如超法規阻卻違法事由中的習慣上正當行為），則可例外適用。</li><li><strong>(C) 錯誤</strong>：依《刑法》第2條第2項明文規定：「沒收、非拘束人身自由之保安處分適用<strong>裁判時</strong>之法律。」故沒收並非適用行為時法。</li><li><strong>(D) 錯誤</strong>：罪刑明確性原則要求構成要件與法律效果均須明確，因此現行刑法絕對禁止「絕對不定期刑」的規範方式，以免法官裁量權過大侵害人權。</li></ul>",
  "4": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 正確</strong>：正當防衛必須針對「現在不法之侵害」。本題是甲自己打滑撞上丙，丙並未對甲為不法侵害，故甲不得對丙主張正當防衛。</li><li><strong>(B) 正確</strong>：甲身為肇事者，對受傷的丙依法負有救助義務（保證人地位）；同時甲對其母親乙亦負有保護義務。甲為了救傷勢較重的母親而放棄救丙，構成兩個義務的衝突，得主張「義務衝突」來阻卻違法。</li><li><strong>(C) 錯誤（本題正解）</strong>：甲明知發生交通事故且丙受傷，仍決意駛離現場，主觀上已經具備《刑法》第185-4條肇事逃逸罪的「逃逸故意」。他之所以離開是為了救母親，這屬於「阻卻違法事由（義務衝突或緊急避難）」的範疇，<strong>並不會因此抹滅掉他客觀上的逃逸行為與主觀上的逃逸故意</strong>。</li><li><strong>(D) 正確</strong>：客觀上甲確實未留在現場處置而離去，該當逃逸行為。</li></ul>",
  "5": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 正確</strong>：責任能力確實包含「辨識能力（辨識行為違法）」與「控制能力（依其辨識而行為）」兩個要素。</li><li><strong>(B) 正確</strong>：責任能力之有無，是以「行為時」的精神狀態為準。審判時痊癒與否，不影響行為時罪責之判斷。</li><li><strong>(C) 正確</strong>：有責性程度會區分為完全責任能力、限制責任能力等，並導致如「得減輕其刑」的法律效果差異。</li><li><strong>(D) 錯誤（本題正解）</strong>：依實務與學說見解，《刑法》第19條的判斷分為兩階：第一階的「精神障礙或其他心智缺陷」屬於<strong>生理原因</strong>，須由專業醫學專家鑑定；但第二階的「致不能辨識其行為違法或欠缺依其辨識而行為之能力」屬於<strong>心理結果</strong>，牽涉到法律上非難可能性的評價，此部分<strong>最終應由「法院（法官）」綜合判斷</strong>，而非全權交由鑑定人決定。</li></ul>",
  "6": "<p><strong>【一試詳解】</strong></p><ul><li>本題考點為「打擊錯誤」與「毀損罪不罰未遂、過失」。</li><li>案件事實：甲想砸村長的車（主觀故意），卻因為石頭反彈砸中乙的車（客觀結果）。</li><li>法律評價：對「村長的車」：甲主觀上有毀損故意，客觀上已著手丟石頭，但未發生實害結果，成立「毀損未遂」。然而，《刑法》第354條毀損罪<strong>不罰未遂</strong>，故此部分無罪。</li><li>對「乙的車」：甲主觀上沒有毀損乙車的故意（打擊錯誤阻卻對乙車的故意），客觀上導致乙車受損，僅能論以「過失毀損」。然而，<strong>毀損罪亦不罰過失</strong>。</li><li><strong>結論</strong>：甲兩部分皆不成立犯罪，故(D)為正確答案。(A)(B)(C)的論述皆忽略了毀損罪不罰未遂與過失的根本規定。</li></ul>",
  "7": "<p><strong>【一試詳解】</strong></p><ul><li>本題考點為《刑法》第150條聚眾施強暴脅迫罪（妨害秩序罪）。</li><li><strong>(A) 錯誤（本題正解）</strong>：依據2019年修法理由與最高法院近期實務見解，現行法將「公然聚眾」修正為「聚集三人以上」，其概念已不限於過去實務所稱「隨時可以增加之狀況」。<strong>只要客觀上確實有三人以上在公共場所聚集結夥，即便僅是結合特定之人（沒有隨時增加的可能），亦該當「聚集」之要件</strong>。</li><li><strong>(B) 正確</strong>：依《刑法》第150條第2項規定，意圖供行使之用而攜帶兇器或其他危險物品犯之者，得加重其刑至二分之一。</li><li><strong>(C) 正確</strong>：本罪為妨害秩序罪章，實質上仍須考量該聚集與強暴脅迫行為，是否客觀上已達「危害公共秩序、社會安寧」之程度。</li><li><strong>(D) 正確</strong>：主觀上必須具備「妨害秩序」之故意；若純粹只是為了解決私怨而針對特定人施暴（如一般傷害罪），欠缺妨害公眾秩序之意圖，不論以本罪。</li></ul>",
  "8": "<p><strong>【一試詳解】</strong></p><ul><li>本題考點為「無身分者與有身分者之共同正犯（刑法第31條第1項）」。</li><li><strong>(A)、(B)、(C) 錯誤</strong>。</li><li><strong>(D) 正確（本題正解）</strong>：白手套乙雖然自己不具備公務員身分，但其與具有公務員身分的甲，對於收受賄賂具有犯意聯絡及行為分擔。依據《刑法》第31條第1項規定：「因身分或其他特定關係成立之罪，其共同實行、教唆或幫助者，<strong>雖無特定關係，仍以正犯或共犯論</strong>。但得減輕其刑。」因此，乙依法仍會與甲共同構成公務員收受賄賂罪。</li></ul>",
  "9": "<p><strong>【一試詳解】</strong></p><ul><li>本題考點為「數罪併罰之定應執行刑」（刑法第51條）。</li><li><strong>有期徒刑</strong>（15年+15年+2年+3年）：依第51條第5款，宣告多數有期徒刑者，於各刑中之最長期（15年）以上，各刑合併之刑期（35年）以下，定其刑期。但<strong>不得逾三十年</strong>。故選項(A)的35年違法。B、C、D的25年均在合法裁量範圍內。</li><li><strong>褫奪公權</strong>（5年+2年）：依第51條第8款，宣告多數褫奪公權者，<strong>僅就其中最長期間執行之</strong>。故應為「5年」。（選項C為7年，錯誤）</li><li><strong>罰金</strong>（10萬+30萬）：依第51條第7款，於各刑中之最多額（30萬）以上，各刑合併之金額（40萬）以下，定其金額。B、D選項的35萬合法。</li><li><strong>沒收</strong>（50萬+贓物+100萬）：沒收具獨立性，依刑法與沒收新制精神，各罪之沒收應<strong>併執行之</strong>。故總沒收金額為：收受之贓物 + 150萬元犯罪所得。</li><li><strong>結論</strong>：綜合比對，僅有 <strong>(B)</strong> 完全符合上述所有定應執行刑之法定規則。</li></ul>",
  "10": "<p><strong>【一試詳解】</strong></p><ul><li>本題考點為「裁判上一罪之一部發覺與自首效力」。</li><li>案件事實：甲一行為同時觸犯侵占罪與販賣三級毒品罪，在法律評價上屬想像競合（裁判上一罪）。警方先發覺了輕罪（侵占），甲主動供出了尚未被發覺的重罪（販賣毒品）。</li><li><strong>(C) 正確（本題正解）</strong>：依據最高法院實務見解（如108年度台上字第282號判決等意旨），對於裁判上一罪之案件，如果偵查機關僅發覺其中一部較輕之犯罪，而行為人主動供出其他未被發覺且情節較重之犯罪，始讓檢警得以知悉犯罪之全貌。基於鼓勵犯罪者悔過自新及節省司法資源之立法目的，實務例外放寬認定，<strong>此時就該重罪部分，仍認屬「未發覺之犯罪」，得適用刑法第62條之自首規定</strong>減輕其刑。</li></ul>",
  "11": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 錯誤</strong>：緩刑前過失犯他罪，受徒刑宣告者，並非撤銷緩刑之法定事由。</li><li><strong>(B) 正確（本題正解）</strong>：依《刑法》第75條第1項第1款，緩刑期內因「故意」犯他罪，而在緩刑期內受「逾6月有期徒刑」之宣告確定者，為「應撤銷」緩刑之法定事由。</li><li><strong>(C) 錯誤</strong>：緩刑期內因「過失」更犯罪，且受「拘役」宣告，不符合法定撤銷要件。</li><li><strong>(D) 錯誤</strong>：受「無罪」宣告即無罪刑存在，縱使受保護管束，亦非撤銷緩刑之事由。</li></ul>",
  "12": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 正確（本題正解）</strong>：依司法院釋字第799號解釋，刑後強制治療之要件（經鑑定、評估認有再犯危險）並未違反法律明確性原則。</li><li><strong>(B) 錯誤</strong>：未規定最長期間，是為了治療至再犯危險顯著降低為止，解釋上認為並未違反比例原則。</li><li><strong>(C) 錯誤</strong>：對於修正施行前曾犯性侵害犯罪之加害人施以強制治療，解釋上認為並未違反法律不溯及既往原則。</li><li><strong>(D) 錯誤</strong>：大法官於該號解釋中明確指出，強制治療制度長年運作結果趨近於刑罰，「已悖離」與刑罰執行應明顯區隔之憲法要求，宣告此部分違憲並要求有關機關改善。</li></ul>",
  "13": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A)(B)(C) 錯誤</strong>：依大法官釋字第734號解釋及最高法院實務見解，公立醫院醫師單純從事醫療行為（如開刀）時，並非行使國家公權力，故不具備刑法上之「公務員」身分。甲不成立公務員不違背職務受賄罪；乙自然也不構成受賄罪之共犯。</li><li><strong>(D) 正確（本題正解）</strong>：甲、乙均非公務員，不成立受賄罪。乙受家屬委託代轉財物，卻變易持有為所有私吞2萬元，構成普通侵占罪（或背信罪，視具體委任細節而定，但選項中(D)為唯一正確描述）。</li></ul>",
  "14": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 錯誤</strong>：在監獄擔任崗哨及巡邏勤務之替代役男，屬「依法令從事於公共事務，而具有法定職務權限者」，為刑法上的「身分/授權公務員」。</li><li><strong>(B) 正確（本題正解）</strong>：依《刑法》第121條或122條，公務員「要求」賄賂即屬犯罪之著手並已既遂，不論對方是否答應或交付。甲向乙開口要封口費，縱乙拒絕，甲仍成立公務員要求賄賂罪。</li><li><strong>(C) 錯誤</strong>：「要求」階段即成立犯罪，不以實際取得財產利益為必要。</li><li><strong>(D) 錯誤</strong>：甲以不舉發為籌碼勒索，其行為已該當要求賄賂罪，不僅僅是單純的包庇。</li></ul>",
  "15": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 正確（本題正解）</strong>：《刑法》第125條「濫權追訴處罰罪」為主體特定之身分犯，僅限於「有追訴或處罰犯罪職務之公務員」（如檢察官、法官）。司法警察僅為輔助偵查機關，不具本罪之主體適格，故甲不成立本罪。</li><li><strong>(B)(C) 錯誤</strong>：理由同上，司法警察甲不具行為人適格。</li><li><strong>(D) 錯誤</strong>：檢察官乙以謊言騙取供詞雖屬不正訊問，違反《刑事訴訟法》，但「濫用職權」之程度是否直接該當刑法第125條，實務上認定嚴格；且本題核心考點在於選項(A)的主體適格。</li></ul>",
  "16": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 正確</strong>：違背職務受賄罪與圖利罪發生法規競合時，優先適用處罰較重之違背職務受賄罪。</li><li><strong>(B) 錯誤（本題正解）</strong>：《刑法》第134條（公務員犯罪加重）但書明定：「因公務員之身分已特別規定其刑者，不在此限。」《刑法》第213條公務員登載不實罪本身就是針對公務員身分所設的特別規定，故不得再依第134條加重其刑。</li><li><strong>(C) 正確</strong>：妨害公務罪必須以公務員「依法執行職務時」為客觀要件。</li><li><strong>(D) 正確</strong>：第138條妨害職務上掌管之文書物品罪，只要是公務員本於職務關係所掌管之物即可，不論該物品之所有權歸屬。</li></ul>",
  "17": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 錯誤（本題正解）</strong>：依最高法院近期實務見解（如109年度台上字第4864號判決等），無論是事前約定聚集，或是「聚集後」始突發犯意而實施強暴脅迫，只要客觀上達三人以上且主觀上有妨害秩序之共同意思，均可構成本罪。並非一定要在聚集時即有認識。</li><li><strong>(B) 正確</strong>：「聚集」包含自動與被動聚集。</li><li><strong>(C) 正確</strong>：主觀上必須具備「妨害秩序（妨害公眾安寧）」之故意。</li><li><strong>(D) 正確</strong>：本條為抽象危險犯，不以發生實害為必要；若併發傷害結果，則依想像競合或數罪併罰處理。</li></ul>",
  "18": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 錯誤</strong>：甲、乙、丙三人針對特定人（A）與特定攤位洩憤，屬私權糾紛，欠缺「妨害公眾秩序」之意圖，不成立第150條。</li><li><strong>(B) 正確（本題正解）</strong>：甲非警察卻冒充警察盤查民眾，行使警察職權，構成《刑法》第158條冒充公務員行使其職權罪。</li><li><strong>(C) 錯誤</strong>：密室逃脫遊戲屬娛樂性質，無冒用公務員服飾以混淆公眾之意圖，不構成第159條。</li><li><strong>(D) 錯誤</strong>：甲私下傳Line給友人，並非對「公眾」散布，可能不該當第151條「恐嚇公眾罪」之要件。</li></ul>",
  "19": "<p><strong>【一試詳解】</strong></p><ul><li>甲撞倒乙部分：甲不知撞倒乙，欠缺肇事逃逸與遺棄之故意，僅可能成立過失傷害。</li><li>甲撞飛丙部分：甲嚴重酒駕闖紅燈撞死丙，並加速逃逸。成立《刑法》第185-3條第2項「不能安全駕駛致人於死罪」與第185-4條「發生交通事故逃逸罪」。</li><li>競合關係：依實務見解與保護法益之差異（不能安全駕駛致死保護生命/交通安全，肇事逃逸保護肇事後之釐清與救護義務），兩罪行為互異且保護法益不同，應數罪併罰。故(D)正確。</li></ul>",
  "20": "<p><strong>【一試詳解】</strong></p><ul><li><strong>(A) 錯誤</strong>：統一發票性質上屬於一般「私文書」，並非特種文書（實務見解）。</li><li><strong>(B) 錯誤</strong>：偽造私文書處罰的是「無制作權人冒用他人名義」制作文書（有形偽造），若有制作權而內容不實則為虛偽記載（無形偽造），非本罪範疇。</li><li><strong>(C) 正確（本題正解）</strong>：偽造文書後復持以行使，其偽造的「低度行為」會被行使的「高度行為」所吸收，實務上僅論以「行使偽造文書罪」。</li><li><strong>(D) 錯誤</strong>：大學畢業證書屬於《刑法》第212條之「特種文書」，其法定刑（一年以下有期徒刑）較偽造一般私文書（五年以下有期徒刑）為輕。</li></ul>",
  "21": "<p><strong>【解析】</strong></p><p>本題考查刑法各罪間之吸收關係（法規競合）。</p><ul><li><strong>(A) 正確</strong>：實務見解認為，偽造私文書後復持以行使，其偽造之低度行為被行使之高度行為所吸收，僅論以「行使偽造私文書罪」。</li><li><strong>(B) 正確</strong>：偽造貨幣之法定刑較重，實務認為行使偽造貨幣之低度行為，應被偽造貨幣之高度行為所吸收，論以「偽造貨幣罪」。</li><li><strong>(C) 正確</strong>：同上理，行使偽造有價證券之低度行為，被偽造有價證券之高度行為所吸收，論以「偽造有價證券罪」。</li><li><strong>(D) 錯誤</strong>：偽造私文書並持以誣告他人，兩者保護法益不同（公共信用 vs. 國家司法權及個人名譽），並非吸收關係，而係一行為觸犯數罪名之想像競合犯（或實質競合），應從一重處斷或數罪併罰，不能直接說被誣告罪「吸收」。</li></ul>",
  "22": "<p><strong>【解析】</strong></p><p>本題考查妨害性自主罪章與妨害秘密之認定。</p><ul><li><strong>(A) 正確</strong>：在乙熟睡不知抗拒之際觸摸其隱私部位，構成《刑法》第225條乘機猥褻罪。</li><li><strong>(B) 錯誤</strong>：甲以「遭天譴」等怪力亂神之事恐嚇乙，使乙心生畏懼而同意性交，在實務上此種同意係因受精神脅迫而為，屬於「非真意之同意」，其同意<strong>無效</strong>，甲構成強制性交罪。</li><li><strong>(C) 正確</strong>：甲於強制性交過程中，以智慧型手機竊錄性交過程，構成《刑法》第222條第1項第8款之「以錄音、照相、錄影或直播行為犯之」的加重強制性交罪。</li><li><strong>(D) 正確</strong>：甲之行為已該當加重強制性交罪（將竊錄作為加重條件），在法律評價上已完整包含其不法內涵，毋庸另論第315條之1竊錄罪。</li></ul>",
  "23": "<p><strong>【解析】</strong></p><p>本題考點為妨害家庭罪章中「未成年人」之年齡界定。</p><ul><li><strong>(A)(B)(C) 錯誤</strong>：《刑法》第240條（和誘罪）與第241條（略誘罪）之保護客體為「未成年人」。配合《民法》修正，自民國112年1月1日起，成年年齡已下修為<strong>18歲</strong>。</li><li><strong>(D) 正確</strong>：乙女已滿18歲，在法律上屬於具備完全自主決定權的「成年人」，不再受父母親權之限制。甲說服乙女離家同居，既未施用強暴脅迫，亦非針對未成年人，故<strong>不成立犯罪（無罪）</strong>。</li></ul>",
  "24": "<p><strong>【解析】</strong></p><p>本題考查侵害墳墓屍體罪。</p><ul><li><strong>(A) 正確</strong>：依《刑法》第249條第1項規定：「發掘墳墓而損壞、遺棄、侮辱或『盜取屍體』者，處三年以上十年以下有期徒刑。」只要發掘墳墓並盜取屍體，無論是否損壞屍體，皆該當本罪。</li><li><strong>(B) 錯誤</strong>：甲盜取的是墓內財物（非屍體），依實務見解，發掘墳墓盜取財物，構成《刑法》第248條發掘墳墓罪與竊盜罪之想像競合犯。</li><li><strong>(C) 錯誤</strong>：墳墓不論是否有人清理，只要客觀上為掩埋屍體之處所，發掘之即成立發掘墳墓罪。</li><li><strong>(D) 錯誤</strong>：發掘一個墳墓（不論內有幾具棺木），侵害的是單一的社會風俗與敬屍法益，僅成立一罪。</li></ul>",
  "25": "<p><strong>【解析】</strong></p><p>本題考查賭博罪。</p><ul><li><strong>(A) 錯誤</strong>：詐賭（如出老千）是利用詐術控制勝負，欠缺賭博「射倖性（憑機率決定）」之本質，故僅成立「詐欺罪」，不成立賭博罪。</li><li><strong>(B) 錯誤</strong>：賭博罪為「對向犯」，對賭之人彼此間處於對立面，各有其犯罪目的，<strong>不適用</strong>第28條共同正犯之規定。</li><li><strong>(C) 正確</strong>：依實務見解，私人住宅若任由「不特定人」得出入賭博，即具備公開性質，該當《刑法》第266條第1項之「在公眾得出入之場所」賭博罪。</li><li><strong>(D) 錯誤</strong>：依第266條第3項規定，當場賭博之器具與在賭檯上之財物，「不問屬於犯罪行為人與否，沒收之」（採絕對義務沒收）。</li></ul>",
  "26": "<p><strong>【解析】</strong></p><p>本題考查傷害罪、妨害幼童發育罪與過失傷害之認定。</p><ul><li><strong>(A) 錯誤</strong>：單純摔飯菜、禁止吃一頓晚餐，客觀上尚未達到足以妨害幼童身心健全發育之「凌虐」程度，不成立第286條。</li><li><strong>(B) 錯誤</strong>：A女說「有事衝著自己來」係氣話，並非法律上真實、自願的「承諾或囑託」傷害。甲打A耳光仍成立普通傷害罪。</li><li><strong>(C) 錯誤</strong>：C為A之母（即甲之岳母），屬於「直系姻親」，而《刑法》第281條之客體必須是「直系『血親』尊親屬」，故不適用本條。</li><li><strong>(D) 正確</strong>：甲推倒C，主觀上雖無傷害B之故意，但客觀上能預見推人可能導致旁人遭波及跌倒受傷卻未注意，致B受傷，構成《刑法》第284條過失傷害罪。</li></ul>",
  "27": "<p><strong>【解析】</strong></p><p>本題考查遺棄罪與肇事逃逸之構成要件。</p><ul><li><strong>(A) 正確</strong>：第293條為「無義務者之遺棄罪」，實務認為限於以積極之作為將無自救力之人移置他處，始構成本罪。</li><li><strong>(B) 錯誤</strong>：肇事致被害人受「輕傷」而逃逸，雖該當第185-4條肇事逃逸罪；但《刑法》第294條遺棄罪之前提是被害人必須陷於「無自救力」之狀態。若僅受輕傷、尚能自行求救，即不構成遺棄罪。選項逕認「同時該當違背義務遺棄罪」係錯誤的。</li><li><strong>(C) 正確</strong>：用垃圾袋蓋住醉漢，使其更難被發現救援，增加了其生命危險，屬於積極的遺棄行為。</li><li><strong>(D) 正確</strong>：義務人並未拒絕扶養，僅是給付方法（如堅持送安養院）與權利人意願不合，並無遺棄之故意與客觀行為，不成立違背義務遺棄罪。</li></ul>",
  "28": "<p><strong>【解析】</strong></p><p>本題考查私行拘禁罪。</p><ul><li><strong>(A) 正確</strong>：私行拘禁罪（第302條）本質上為「繼續犯」，必須剝奪行動自由達一定時間。若僅為瞬間之拘束（如一把拉住），至多僅構成第304條強制罪。</li><li><strong>(B) 錯誤</strong>：保母將幼童反鎖房間內，剝奪其離開之自由，仍構成私行拘禁罪。</li><li><strong>(C) 錯誤</strong>：本罪不以被害人陷於「不能抗拒」為必要，只要客觀上確實將人拘禁於一定處所、剝奪其行動自由即可。</li><li><strong>(D) 錯誤</strong>：若剝奪行動自由期間，另行起意實施傷害行為，依實務見解，兩罪（私行拘禁與傷害）行為互異、犯意各別，應數罪併罰，不能直接被私行拘禁罪吸收。</li></ul>",
  "29": "<p><strong>【解析】</strong></p><p>本題考查妨害秘密罪。</p><ul><li><strong>(A) 正確</strong>：偷裝GPS監控他人行蹤，屬無故以電磁紀錄竊錄他人非公開活動，成立第315條之1妨害秘密罪。</li><li><strong>(B) 正確</strong>：縱使是配偶之間，亦享有隱私權期待。植入間諜程式竊聽配偶通話，同樣構成妨害秘密罪。</li><li><strong>(C) 錯誤</strong>：KTV包廂內雖然是在營業場所，但包廂屬於「封閉之私人空間」，內部的談話與活動具有「合理的隱私期待（非公開之活動）」。甲在包廂內偷裝竊聽器，絕對構成《刑法》第315條之1妨害秘密罪，並非僅有民事責任。</li><li><strong>(D) 正確</strong>：即使是新聞媒體，若無故取得並刊登他人遭性侵之私密照片，仍可能觸犯妨害秘密罪（第315-2條圖利為妨害秘密罪），不能無限上綱新聞自由。</li></ul>",
  "30": "<p><strong>【解析】</strong></p><p>本題考查侵占罪之認定。</p><ul><li><strong>(A)(C)(D) 錯誤</strong>。</li><li><strong>(B) 正確</strong>：甲身為員工，受主管指示將公款存入銀行，該筆現金在法律上屬於甲「基於業務關係而持有」之物。甲將該款項花光，即是將「業務上持有變易為所有」，構成《刑法》第336條第2項之「業務侵占罪」。至於甲數日後良心不安再匯款回公司，屬於<strong>事後彌補（填補損害）的行為，並不能抹滅其犯罪成立當下已經既遂的侵占罪責</strong>。</li></ul>"
};

</script>
<script>
(function(){
  "use strict";

  const LS_FLAG = "exam114_crimlaw_flags";
  const LS_SELECTED = "exam114_crimlaw_selected";
  const LS_CONFUSE = "exam114_crimlaw_confuse";
  const LS_EXPLAIN = "exam114_crimlaw_explain";   // { qn: "text" }
  const LS_SUBMIT  = "exam114_crimlaw_submit";    // { done:true, score:Number, total:Number, ts:Number }

  const EXAM_TITLE = "114司律一試_刑法、刑事訴訟法、法律倫理";
  const EXAM_SUBJECT = "綜合法學（一）刑法‧刑事訴訟法‧法律倫理";

  function loadJSON(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  function saveJSON(key, val){
    localStorage.setItem(key, JSON.stringify(val));
  }

  let flags = loadJSON(LS_FLAG, {});       // { qn: true }
  let selected = loadJSON(LS_SELECTED, {}); // { qn: optIndex }
  let confused = loadJSON(LS_CONFUSE, {});  // { "qn_optIndex": true }
  let explainText = loadJSON(LS_EXPLAIN, {}); // { qn: "text" }
  let submitState = loadJSON(LS_SUBMIT, null); // null | {done,score,total,ts}

  let currentFilter = "all"; // 'all' | 'flagged'
  let openExplain = new Set(); // qn (string) currently expanded — not persisted
  let openOfficial = new Set(); // qn (string) for built-in official explanation — not persisted

  const main = document.getElementById("main-content");
  const flagCounterEl = document.getElementById("flag-counter");
  const tabAll = document.getElementById("tab-all");
  const tabFlagged = document.getElementById("tab-flagged");
  const scoreBanner = document.getElementById("score-banner");
  const scoreTextEl = document.getElementById("score-text");

  const OPT_LABELS = ["A","B","C","D"];
  const POINTS_PER_Q = 2;

  function updateFlagCounter(){
    const count = Object.keys(flags).filter(k => flags[k]).length;
    flagCounterEl.textContent = count;
  }

  function escapeHTML(str){
    return String(str)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  function buildOptionHTML(qn, idx, text, isCorrect){
    const selKey = String(qn);
    const isSelected = selected[selKey] === idx;
    const confKey = qn + "_" + idx;
    const isConfused = !!confused[confKey];

    let cls = "option";
    if(isSelected){
      cls += isCorrect ? " selected-correct" : " selected-wrong";
    }
    if(isConfused){
      cls += " confused";
    }

    return `
      <div class="${cls}" data-qn="${qn}" data-idx="${idx}" data-correct="${isCorrect ? '1':'0'}">
        <span class="opt-label">${OPT_LABELS[idx]}</span>
        <span class="opt-text">${text}</span>
        <button class="confuse-btn ${isConfused ? 'active':''}" data-qn="${qn}" data-idx="${idx}" title="標記為疑惑選項" aria-label="標記疑惑">
          <svg viewBox="0 0 16 16"><path class="tri" d="M8 3 L13.5 12.5 L2.5 12.5 Z"/></svg>
        </button>
      </div>
    `;
  }

  function buildExplainHTML(qn){
    const key = String(qn);
    const text = explainText[key] || "";
    const hasNote = text.trim().length > 0;
    const isOpen = openExplain.has(key);

    return `
      <div class="explain-block" data-qn="${qn}">
        <button class="explain-toggle ${isOpen ? 'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen ? '收合詳解' : '顯示詳解'}</span>
          ${hasNote ? '<span class="has-note-tag">（已有詳解）</span>' : ''}
        </button>
        <div class="explain-body ${isOpen ? 'open':''}">
          <textarea class="explain-textarea" data-qn="${qn}" placeholder="在此輸入詳解…">${escapeHTML(text)}</textarea>
          <div class="explain-status" data-qn="${qn}">✓ 已自動儲存</div>
        </div>
      </div>
    `;
  }

  function buildOfficialExplainHTML(qn){
    const key = String(qn);
    const content = (typeof OFFICIAL_EXPLANATIONS !== "undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
    if(!content) return "";

    const isOpen = openOfficial.has(key);

    return `
      <div class="official-block" data-qn="${qn}">
        <button class="official-toggle ${isOpen ? 'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen ? '收合參考擬答' : '顯示參考擬答'}</span>
        </button>
        <div class="official-body ${isOpen ? 'open':''}">
          <div class="official-content">${content}</div>
        </div>
      </div>
    `;
  }

  function buildQuestionHTML(item){
    const qn = item.n;
    const isFlagged = !!flags[qn];
    const isRevealed = selected[String(qn)] !== undefined && selected[String(qn)] !== null;
    const correctLabel = OPT_LABELS[item.ans];

    const optionsHTML = item.o.map((text, idx) => buildOptionHTML(qn, idx, text, idx === item.ans)).join("");

    return `
      <article class="q-card ${isFlagged ? 'flagged':''}" id="q-${qn}" data-qn="${qn}">
        <div class="q-row">
          <div class="q-leftbar">
            <span class="q-num">${qn}</span>
            <button class="flag-btn ${isFlagged ? 'active':''}" data-qn="${qn}" title="標記為容易出錯" aria-label="標記旗標">
              <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5"/></svg>
            </button>
            ${isFlagged ? '<span class="flagged-tag">易錯</span>' : ''}
          </div>
          <div class="q-body">
            <p class="q-text">${item.q}<span class="answer-inline ${isRevealed ? 'revealed':''}" data-qn="${qn}">正確答案：<span class="ans-key">(${correctLabel})</span></span></p>
            <div class="options-grid">
              ${optionsHTML}
            </div>
            ${buildOfficialExplainHTML(qn)}
            ${buildExplainHTML(qn)}
          </div>
        </div>
      </article>
    `;
  }

  function render(){
    const list = QUESTIONS.filter(item => {
      if(currentFilter === "flagged") return !!flags[item.n];
      return true;
    });

    if(list.length === 0){
      main.innerHTML = `<div class="empty-state">目前沒有已標記的題目。複習時點擊每題左側的旗幟圖示即可加入標記。</div>`;
      return;
    }

    main.innerHTML = list.map(buildQuestionHTML).join("");
    // Focus restoration is intentionally skipped: textarea edits are saved via
    // input listener without triggering a full render (see delegation below).
  }

  function setFilter(f){
    currentFilter = f;
    tabAll.classList.toggle("active", f === "all");
    tabFlagged.classList.toggle("active", f === "flagged");
    render();
  }

  function renderScoreBanner(){
    if(submitState && submitState.done){
      scoreBanner.classList.add("show");
      const pct = submitState.total > 0 ? Math.round((submitState.score / (submitState.total * POINTS_PER_Q)) * 1000) / 10 : 0;
      scoreTextEl.innerHTML = `本次成績：${submitState.score} 分（共${submitState.correctCount}／${submitState.total}題答對，每題${POINTS_PER_Q}分） <span class="score-detail">交卷時間：${submitState.tsLabel}</span>`;
    }else{
      scoreBanner.classList.remove("show");
    }
  }

  // ---- Event delegation (click) ----
  main.addEventListener("click", function(e){
    // Flag button
    const flagBtn = e.target.closest(".flag-btn");
    if(flagBtn){
      const qn = flagBtn.dataset.qn;
      flags[qn] = !flags[qn];
      if(!flags[qn]) delete flags[qn];
      saveJSON(LS_FLAG, flags);
      updateFlagCounter();
      render();
      return;
    }

    // Confuse triangle button (must check before generic option click)
    const confBtn = e.target.closest(".confuse-btn");
    if(confBtn){
      e.stopPropagation();
      const qn = confBtn.dataset.qn;
      const idx = confBtn.dataset.idx;
      const key = qn + "_" + idx;
      confused[key] = !confused[key];
      if(!confused[key]) delete confused[key];
      saveJSON(LS_CONFUSE, confused);
      render();
      return;
    }

    // Official explanation toggle button (built-in, read-only)
    const officialToggle = e.target.closest(".official-toggle");
    if(officialToggle){
      const qn = officialToggle.dataset.qn;
      if(openOfficial.has(qn)){
        openOfficial.delete(qn);
      }else{
        openOfficial.add(qn);
      }
      render();
      return;
    }

    // Explain toggle button
    const explainToggle = e.target.closest(".explain-toggle");
    if(explainToggle){
      const qn = explainToggle.dataset.qn;
      if(openExplain.has(qn)){
        openExplain.delete(qn);
      }else{
        openExplain.add(qn);
      }
      render();
      // focus the textarea after opening
      if(openExplain.has(qn)){
        const ta = main.querySelector(`.explain-textarea[data-qn="${qn}"]`);
        if(ta) ta.focus();
      }
      return;
    }

    // Option click (toggle selection / reveal answer)
    const optEl = e.target.closest(".option");
    if(optEl){
      const qn = optEl.dataset.qn;
      const idx = parseInt(optEl.dataset.idx, 10);
      const key = String(qn);

      if(selected[key] === idx){
        // toggle off
        delete selected[key];
      }else{
        selected[key] = idx;
      }
      saveJSON(LS_SELECTED, selected);
      render();
      return;
    }
  });

  // ---- Event delegation (textarea input, debounced auto-save) ----
  const debounceTimers = {}; // qn -> timeout id
  main.addEventListener("input", function(e){
    const ta = e.target.closest(".explain-textarea");
    if(!ta) return;
    const qn = ta.dataset.qn;

    if(debounceTimers[qn]) clearTimeout(debounceTimers[qn]);
    debounceTimers[qn] = setTimeout(() => {
      explainText[qn] = ta.value;
      if(!ta.value.trim()) delete explainText[qn];
      saveJSON(LS_EXPLAIN, explainText);

      // show "已自動儲存" status without re-rendering (avoid losing focus)
      const statusEl = main.querySelector(`.explain-status[data-qn="${qn}"]`);
      if(statusEl){
        statusEl.classList.add("show");
        clearTimeout(statusEl._hideTimer);
        statusEl._hideTimer = setTimeout(() => statusEl.classList.remove("show"), 1800);
      }

      // update the "(已有詳解)" tag in place without full re-render
      const toggleBtn = main.querySelector(`.explain-toggle[data-qn="${qn}"]`);
      if(toggleBtn){
        const hasNote = (explainText[qn] || "").trim().length > 0;
        let tagEl = toggleBtn.querySelector(".has-note-tag");
        if(hasNote && !tagEl){
          tagEl = document.createElement("span");
          tagEl.className = "has-note-tag";
          tagEl.textContent = "（已有詳解）";
          toggleBtn.appendChild(tagEl);
        }else if(!hasNote && tagEl){
          tagEl.remove();
        }
      }
    }, 800);
  });

  tabAll.addEventListener("click", () => setFilter("all"));
  tabFlagged.addEventListener("click", () => setFilter("flagged"));

  // ---- Clear all modal ----
  const modal = document.getElementById("confirm-modal");
  document.getElementById("clear-all-btn").addEventListener("click", () => {
    modal.classList.add("show");
  });
  document.getElementById("modal-cancel").addEventListener("click", () => {
    modal.classList.remove("show");
  });
  document.getElementById("modal-confirm").addEventListener("click", () => {
    flags = {};
    selected = {};
    confused = {};
    submitState = null;
    saveJSON(LS_FLAG, flags);
    saveJSON(LS_SELECTED, selected);
    saveJSON(LS_CONFUSE, confused);
    localStorage.removeItem(LS_SUBMIT);

    // 同步移除題庫大廳／分類頁的「已完成」徽章紀錄
    if(typeof clearExamComplete === "function"){
      clearExamComplete();
    }

    updateFlagCounter();
    renderScoreBanner();
    render();
    modal.classList.remove("show");
  });
  modal.addEventListener("click", (e) => {
    if(e.target === modal) modal.classList.remove("show");
  });

  // ---- Submit / scoring ----
  function gradeExam(){
    let correctCount = 0;
    QUESTIONS.forEach(item => {
      const sel = selected[String(item.n)];
      if(sel !== undefined && sel === item.ans) correctCount++;
    });
    const total = QUESTIONS.length;
    const score = correctCount * POINTS_PER_Q;
    const now = new Date();
    const tsLabel = now.getFullYear() + "/" + String(now.getMonth()+1).padStart(2,"0") + "/" + String(now.getDate()).padStart(2,"0") +
      " " + String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");

    submitState = { done:true, score, correctCount, total, ts: now.getTime(), tsLabel };
    saveJSON(LS_SUBMIT, submitState);
    renderScoreBanner();
    window.scrollTo({top:0, behavior:"smooth"});

    // 回報完成狀態給題庫大廳／分類頁顯示「已完成」徽章
    if(typeof reportExamComplete === "function"){
      reportExamComplete({ score, total, correctCount });
    }
  }

  document.getElementById("submit-btn").addEventListener("click", gradeExam);

  // ---- Export ----
  const SYMBOL_LEGEND = "符號圖例：✓ = 我選對的選項｜✗ = 我選錯的選項｜▲ = 標記為疑惑的選項｜▶ 正確答案：括號內為正解代號";

  function pad2(n){ return String(n).padStart(2,"0"); }
  function todayStamp(){
    const d = new Date();
    return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
  }

  function officialHtmlToPlainText(html){
    if(!html) return "";
    let text = html;
    // <li> -> "・" 條列符號 + 換行
    text = text.replace(/<li[^>]*>/gi, "・");
    text = text.replace(/<\/li>/gi, "\n");
    // <p> -> 換行區隔
    text = text.replace(/<p[^>]*>/gi, "");
    text = text.replace(/<\/p>/gi, "\n");
    // <ul>/<em>/<strong> 等標籤直接移除，但保留內容
    text = text.replace(/<\/?(ul|strong|em)[^>]*>/gi, "");
    // 移除其餘未預期的標籤
    text = text.replace(/<[^>]+>/g, "");
    // 還原常見 HTML 實體
    text = text.replace(/&nbsp;/g, " ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');
    // 清理多餘空行
    text = text.split("\n").map(l => l.trim()).filter(l => l.length > 0).join("\n");
    return text;
  }

  function buildExportText(list, scopeLabel){
    const now = new Date();
    const dateLabel = now.getFullYear() + "/" + pad2(now.getMonth()+1) + "/" + pad2(now.getDate());

    let wrongCount = 0, confusedCount = 0, explainedCount = 0, officialCount = 0;

    const lines = [];
    lines.push(`試卷標題：${EXAM_TITLE}`);
    lines.push(`科目：${EXAM_SUBJECT}`);
    lines.push(`匯出範圍：${scopeLabel}`);
    lines.push(`匯出日期：${dateLabel}`);
    lines.push(SYMBOL_LEGEND);
    lines.push("=".repeat(48));
    lines.push("");

    list.forEach(item => {
      const qn = item.n;
      const key = String(qn);
      const selIdx = selected[key];
      const hasSelection = selIdx !== undefined && selIdx !== null;
      const isWrong = hasSelection && selIdx !== item.ans;
      if(isWrong) wrongCount++;

      let qConfused = false;

      lines.push(`第 ${qn} 題`);
      lines.push(item.q);
      item.o.forEach((text, idx) => {
        const isConf = !!confused[qn + "_" + idx];
        if(isConf) qConfused = true;
        let mark = "　"; // default: no symbol, keep alignment
        if(hasSelection && idx === selIdx){
          mark = (idx === item.ans) ? "✓" : "✗";
        }else if(isConf){
          mark = "▲";
        }
        lines.push(`${mark} (${OPT_LABELS[idx]}) ${text}`);
      });
      if(qConfused) confusedCount++;

      lines.push(`▶ 正確答案：(${OPT_LABELS[item.ans]})`);

      const officialHtml = (typeof OFFICIAL_EXPLANATIONS !== "undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
      if(officialHtml){
        officialCount++;
        lines.push(officialHtmlToPlainText(officialHtml));
      }

      const note = (explainText[key] || "").trim();
      if(note){
        explainedCount++;
        lines.push("詳解：");
        lines.push(note);
      }

      lines.push("-".repeat(48));
      lines.push("");
    });

    lines.push("=".repeat(48));
    lines.push(`統計：共 ${list.length} 題｜已標記 ${list.filter(it => !!flags[it.n]).length} 題｜答錯 ${wrongCount} 題｜含疑惑選項 ${confusedCount} 題｜有參考擬答 ${officialCount} 題｜有詳解 ${explainedCount} 題`);

    return lines.join("\n");
  }

  function downloadText(filename, content){
    const blob = new Blob([content], {type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  document.getElementById("export-flagged-btn").addEventListener("click", () => {
    const list = QUESTIONS.filter(item => !!flags[item.n]);
    if(list.length === 0){
      alert("目前沒有已標記的題目可匯出。");
      return;
    }
    const text = buildExportText(list, "已標記弱點題");
    downloadText(`${EXAM_TITLE}_已標記弱點題_${todayStamp()}.txt`, text);
  });

  document.getElementById("export-all-btn").addEventListener("click", () => {
    const text = buildExportText(QUESTIONS, "全部題目");
    downloadText(`${EXAM_TITLE}_全部題目_${todayStamp()}.txt`, text);
  });

  // ---- init ----
  updateFlagCounter();
  renderScoreBanner();
  render();
})();
</script>
</body>
</html>
