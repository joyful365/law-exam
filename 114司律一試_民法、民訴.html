const OFFICIAL_EXPLANATIONS = {
"1": "<p><strong>【解析】</strong>依據《民法》第15條之2第1項規定，受輔助宣告之人為特定重要法律行為時，應經輔助人同意。但<strong>純獲法律上利益</strong>，或依其年齡及身分、日常生活所必需者，不在此限。</p><ul><li><strong>(A) 錯誤</strong>：為獨資、合夥營業或為法人之負責人，屬於應經輔助人同意之行為（民法第15-2條第1項第1款）。</li><li><strong>(B) 錯誤</strong>：向銀行借款屬於消費借貸，應經輔助人同意（民法第15-2條第1項第2款）。</li><li><strong>(C) 正確</strong>：受贈筆記型電腦對受輔助宣告之人而言，屬於「純獲法律上利益」之行為，依但書規定，<strong>無須經輔助人同意</strong>。</li><li><strong>(D) 錯誤</strong>：為訴訟行為，應經輔助人同意（民法第15-2條第1項第3款）。</li></ul>",

"2": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：車子的四個輪胎是車輛能行駛不可或缺的部分，在社會觀念上屬於車子的「重要成分（構成部分）」，不能獨立成為所有權客體，非獨立之物。</li><li><strong>(B) 正確</strong>：備胎並非車輛日常運作不可或缺的成分，而是輔助主物（貨車）效用之物，且具備獨立性，同屬一人所有，因此屬於「從物」（民法第68條第1項）。</li><li><strong>(C) 正確</strong>：依《民法》第68條第2項規定：「主物之處分，及於從物。」除非買賣雙方有特別約定排除，否則買賣貨車（主物）的效力自然及於備胎（從物）。</li><li><strong>(D) 錯誤</strong>：依《民法》第362條規定：「因主物有瑕疵而解除契約者，其效力及於從物。<strong>從物有瑕疵者，買受人僅得就從物之部分為解除。</strong>」備胎（從物）有瑕疵，依法只能單獨就備胎部分解除契約，不能擴大解除整個買賣契約。</li></ul>",

"3": "<p><strong>【解析】</strong>（註：本題依現行《民法》規定，選項(C)的敘述實為正確法理，而選項(A)為錯誤敘述，但因官方公告正解標示為(A)，以下併列剖析供參）</p><ul><li><strong>(A) 依民法應為錯誤敘述</strong>：依《民法》第168條規定：「代理人有數人者，其代理行為<strong>應共同為之</strong>。但法律另有規定或本人另有意思表示者，不在此限。」故原則上應為「共同代理」，例外才允許「各自行使」。選項(A)將原則與例外完全顛倒。</li><li><strong>(B) 錯誤</strong>：代理適用於財產上之法律行為，身分行為（如結婚、離婚、收養等）因具備高度屬人性，不得代理。</li><li><strong>(C) 法理上應為正確</strong>：依《民法》第104條：「代理人所為或所受意思表示之效力，不因其為限制行為能力人而受影響。」反面解釋，無行為能力人欠缺意思能力，不得為代理人；而限制行為能力人具備相當意思能力，且代理行為效果直接歸屬本人，對其並無不利益，故得為代理人。</li><li><strong>(D) 錯誤</strong>：逾越代理權屬於「無權代理」，依《民法》第170條規定，非經本人承認，對本人不生效力（效力未定），而非直接發生效力。</li></ul><p><em>提醒：實務與學說上(C)才是正確論述，惟官方正解為(A)，建議以官方公告為準作答，但理解上務必清楚(C)的法理依據。</em></p>",

"4": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：無權代理行為經本人承認後，即溯及對本人發生效力。限制行為能力人本身既為代理人，代理行為之效果歸屬本人，其無權主張契約不生效力。</li><li><strong>(B) 錯誤</strong>：限制行為能力人未得法定代理人允許所訂立之契約，依《民法》第79條規定為「效力未定」（須經法定代理人承認始生效力），而非「得撤銷」。</li><li><strong>(C) 錯誤</strong>：依《民法》第84條，法定代理人允許其處分之財產（零用錢），限制行為能力人於「該目的內」得自由處分。但買汽車通常逾越了給予零用錢的日常目的與生活所需程度，故仍須父母同意。</li><li><strong>(D) 正確</strong>：依《民法》第83條規定：「限制行為能力人<strong>用詐術</strong>使人信其為有行為能力人或已得法定代理人之允許者，其<strong>法律行為為有效</strong>。」偽造父母同意書即屬使用詐術，故該買賣契約直接有效，以保障交易相對人的信賴。</li></ul>",

"5": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《民法》第311條第2項規定，非有利害關係之第三人仍「得」為清償。只是在「債務人有異議」時，債權人「得拒絕」其清償而已，並非絕對不得為之。</li><li><strong>(B) 錯誤</strong>：依《民法》第310條第2款規定，受領人為債權之準占有人者，以債務人「不知其非債權人者為限」，有清償之效力。實務見解認為此處之「不知」僅須具備<strong>善意</strong>即可，不以無過失為必要。</li><li><strong>(C) 錯誤</strong>：依《民法》第325條第3項規定：「債權證書已返還者，<strong>推定</strong>其債之關係消滅。」是「推定」而非「視為」，若有反證仍可推翻。</li><li><strong>(D) 正確</strong>：依《民法》第323條規定，清償之抵充順序依法為「費用 → 利息 → 原本」。但此規定非強制規定，實務上允許雙方當事人基於契約自由原則，以合意（特約）變更抵充的順序。</li></ul>",

"6": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《民法》第352條規定：「債權之出賣人，對於債務人之支付能力，<strong>除契約另有訂定外，不負擔保責任</strong>。」因此，甲原則上無須擔保乙是否有錢還。</li><li><strong>(B) 正確</strong>：依《民法》第350條規定：「債權之出賣人，<strong>應擔保其債權確係存在</strong>。」乙為受監護宣告之人（無行為能力），甲乙間的買賣契約無效，因此甲對乙的「30萬元價金債權」根本不存在。甲出賣了一個不存在的債權，丙是善意的，故丙得請求甲負權利瑕疵擔保責任。</li><li><strong>(C) 錯誤</strong>：甲僅須擔保債權存在，不負責擔保乙能提出給付（除非另有特約）。</li><li><strong>(D) 錯誤</strong>：依《民法》第297條第1項規定：「債權之讓與，非經讓與人或受讓人通知債務人，對於債務人不生效力。」這指的是對「債務人（乙）」不生效力；至於甲、丙之間的債權讓與契約，於雙方<strong>意思表示合意時即生效力</strong>，不以通知乙為生效要件。</li></ul>",

"7": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《民法》第880條規定，抵押權擔保之債權請求權消滅時效完成後，抵押權人需於 <strong>5年間</strong> 不實行其抵押權，抵押權才會消滅，而非3年。</li><li><strong>(B) 錯誤</strong>：針對留置權與質權，法律並未如抵押權有「除斥期間（5年）」而消滅的規定。</li><li><strong>(C) 錯誤</strong>：依《民法》第295條第1項但書規定：「但與讓與人有<strong>不可分離之關係者</strong>，不在此限。」故並非「一律」隨同移轉。</li><li><strong>(D) 正確</strong>：依《民法》第145條第1項規定：「以抵押權、質權或留置權擔保之請求權，雖經時效消滅，債權人仍得就其抵押物、<strong>質物</strong>或留置物取償。」</li></ul>",

"8": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：居間是指當事人約定，一方為他方報告訂約之機會或為訂約之媒介。居間人不是代理人，不適用隱名代理或雙方代理之規定。</li><li><strong>(B) 錯誤</strong>：依最高法院實務見解（58年台上字第2929號判例等），委託人為了避免支付居間報酬，故意拒絕訂立該媒介就緒之契約，事後卻又自行與相對人訂立同一內容之契約。依誠實信用原則，應類推適用《民法》第101條第1項「<strong>視為條件已成就</strong>」，居間人（乙）仍得向委託人（甲、丙）請求支付報酬。</li><li><strong>(C) 正確</strong>：承上所述，甲、丙二人仍應給付仲介報酬於乙。</li><li><strong>(D) 正確</strong>：甲的行為屬於惡意規避支付報酬的義務，有違誠信原則。</li></ul>",

"9": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：物之瑕疵擔保責任為「無過失責任」，汽車系統程式瑕疵縱使無法即知，只要交付時瑕疵存在，出賣人丙就必須負擔保責任。</li><li><strong>(B) 正確</strong>：汽車系統程式瑕疵（物的瑕疵）導致暴衝，出賣人交付有瑕疵之物，同時構成物之瑕疵擔保與不完全給付。</li><li><strong>(C) 錯誤</strong>：甲與乙因為車子暴衝受傷，其身體健康受損，這屬於原本完好利益的損害（即<strong>固有利益</strong>），甲得依《民法》第227條第2項（加害給付）向丙請求固有利益之損害賠償。</li><li><strong>(D) 正確</strong>：因給付標的物本身瑕疵，進而造成債權人其他財產或人身（固有利益）受損害，學理上稱為「加害給付」或「瑕疵結果損害」，得請求損害賠償。</li></ul>",

"10": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：無主物先占（拾得廢棄物）是一種「事實行為」，不以具備行為能力為要件。受監護宣告的甲雖然無行為能力，仍可取得玩具飛機所有權。</li><li><strong>(B) 錯誤</strong>：甲為受監護宣告之人，依《民法》第15條規定，無行為能力。依第75條前段，無行為能力人之<strong>意思表示無效</strong>。因此，無論對乙而言是否為純獲法律上利益，甲所為的贈與契約及物權移轉行為均屬「無效」。</li><li><strong>(C) 正確</strong>：甲與乙共同不慎讓飛機射傷丙，構成共同侵權行為。</li><li><strong>(D) 正確</strong>：依《民法》第187條規定，無行為能力人（甲）與限制行為能力人（乙）侵害他人權利，其法定代理人（父母）連帶負損害賠償責任。</li></ul>",

"11": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：被詐欺而為的意思表示是「得撤銷」，在撤銷前仍為有效。</li><li><strong>(B) 錯誤</strong>：效力未定通常發生在無權處分或限制行為能力人未得允許的行為。詐欺為得撤銷。</li><li><strong>(C) 正確</strong>：依《民法》第92條第1項規定，因被詐欺或被脅迫而為之意思表示，表意人得撤銷其意思表示。</li><li><strong>(D) 錯誤</strong>：業務員丙是中古車商乙的「履行輔助人（使用人）」，在法律評價上，丙的詐欺視同當事人乙自己的詐欺，<strong>不適用</strong>《民法》第92條第1項但書「第三人詐欺需相對人明知或可得而知」之限制，甲直接得向乙撤銷。</li></ul>",

"12": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：買受人指定A進口傢俱為嫁妝，該傢俱已成為「特定物」。特定物於運送途中滅失，構成給付不能。</li><li><strong>(B) 錯誤</strong>：甲乙雙方本來以「台南市」為清償地，後改以「台北市」為交付處所（買受人請求送交清償地以外之處所，屬「送付買賣」）。依《民法》第374條：「買受人請求將標的物送交清償地以外之處所者，自出賣人交付其標的物於為運送之人或委託物品運送業時起，標的物之危險，由買受人負擔。」因此，<strong>甲交給貨運公司丙時，滅失的危險（風險）就已經移轉給乙</strong>。此外，A傢俱為特定物，滅失即免除給付義務，乙不能請求重交新傢俱。</li><li><strong>(C) 正確</strong>：如前述，交給貨運時危險已移轉由乙負擔，故乙仍有給付價金的義務，不得請求返還價金。</li><li><strong>(D) 正確</strong>：依《民法》第225條第2項（代償請求權），乙可請求甲讓與對肇事者的損害賠償請求權。</li></ul>",

"13": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《民法》第708條第6款規定，隱名合夥人死亡為終止事由，「<strong>但契約另有訂定者，不在此限</strong>。」故非「當然」終止。</li><li><strong>(B) 錯誤</strong>：《民法》第708條所列的隱名合夥終止事由中，包含受「破產宣告」，但<strong>未包含</strong>受「監護宣告」。</li><li><strong>(C) 正確</strong>：依《民法》第709條規定：「隱名合夥契約終止時，出名營業人，應返還隱名合夥人之出資及給與其應得之利益。但出資因損失而減少者，<strong>僅返還其餘存額</strong>。」</li><li><strong>(D) 錯誤</strong>：隱名合夥的終止，僅是「隱名合夥人丙」退出，出名營業人甲、乙之間的合夥關係並不當然解散，可繼續經營。</li></ul>",

"14": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：法律上<strong>並無</strong>「物保絕對優先於人保」的規定。依《民法》第879條規定，除非物保是「第三人」提供才有分擔問題。本題中，甲可以直接選擇向連帶保證人丙請求清償。</li><li><strong>(B) 錯誤</strong>：依《民法》第746條第1款規定，保證人拋棄先訴抗辯權（連帶保證即含有拋棄先訴抗辯權之性質）者，不得主張先訴抗辯權。</li><li><strong>(C) 錯誤</strong>：依《民法》第749條（保證人之代位權），保證人向債權人為清償後，於其清償之限度內，承受債權人對於主債務人之債權。</li><li><strong>(D) 正確</strong>：依《民法》第304條第2項規定：「由第三人就債權所為之擔保，除因債務人變更而有前提者外，<strong>因債務之承擔而消滅</strong>。」丙是為乙作保，丁承擔乙的債務若未經保證人丙同意，丙的保證責任依法消滅。</li></ul>",

"15": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：「丙付款於甲」牽涉到清償期的屆至與否，乙不能無視約定隨時請求付款。</li><li><strong>(B) 錯誤</strong>：甲欠乙貨款是既定的債務（買賣契約已成立），「丙付款」只是約定「什麼時候」還錢，這叫作「不確定期限」，而非決定債務是否生效的「條件」。</li><li><strong>(C) 正確</strong>：依實務見解，當事人將債務的「清償期」繫於某事實之發生時（丙付款），為附「不確定期限」。若該事實<strong>確定不能發生時（丙倒閉無法付款），應視為清償期已屆至</strong>，甲必須向乙付款。</li><li><strong>(D) 錯誤</strong>：因屬「不確定期限」之債務，依《民法》第229條第2項規定，於期限屆至後，<strong>須經債權人（乙）催告</strong>，甲才會開始負遲延責任，而非「應即」負遲延責任。</li></ul>",

"16": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：押租金契約為租賃契約之「從契約」。主契約（租賃契約）消滅時，從契約原則上亦隨同消滅，承租人於返還租賃物後，得請求出租人返還押租金。</li><li><strong>(B) 正確</strong>：押租金契約屬於「要物契約」，必須實際交付金錢始能成立；但「租賃契約」本身是「諾成契約」，雙方就租賃物與租金達成合意即成立，不以交付押租金為租賃契約成立之要件。兩者為獨立之契約。</li><li><strong>(C) 錯誤</strong>：押租金制度雖具有擔保租金支付與損害賠償之功能，但其性質為「金錢所有權之移轉」（債權契約），並非民法物權編中所明定的「法定擔保物權」（如留置權、法定質權等）。</li><li><strong>(D) 錯誤</strong>：如前所述，押租金契約為「要物契約」，以交付金錢為成立要件，而非諾成契約。</li></ul>",

"17": "<p><strong>【解析】</strong></p><ul><li><strong>(A)、(B)、(C) 錯誤</strong>：合夥本身並非法人，無獨立人格，但在訴訟實務上可為當事人。然而，在實體法上，對於合夥債務，必須先就「合夥財產」受清償，不能直接跳過合夥財產而逕向各合夥人請求連帶清償。</li><li><strong>(D) 正確</strong>：依《民法》第681條規定：「合夥財產不足清償合夥之債務時，各合夥人對於不足之額，連帶負其責任。」這被稱為合夥人的「補充性連帶責任」。債權人丁必須先針對合夥A飲料店的財產求償，只有在A之財產不足清償時，才能請求合夥人甲、乙、丙負連帶清償責任。</li></ul>",

"18": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（本題要求選錯誤者）</strong>：物之瑕疵擔保責任屬於「無過失責任」，只要標的物在危險移轉時有瑕疵，出賣人即應負責，不以出賣人有故意或過失為要件。相對地，不完全給付之債務不履行責任，原則上須以債務人（出賣人）有可歸責事由（故意或過失）為成立要件。二者要件並不相同。</li><li><strong>(B) 正確</strong>：瑕疵若可補正，買受人主張不完全給付解除契約時，依《民法》第254條給付遲延之規定，必須先定相當期限催告出賣人補正，若出賣人逾期不補正，始得解除契約。</li><li><strong>(C) 正確</strong>：依《民法》第361條規定：「買受人主張物有瑕疵者，出賣人得定相當期限，催告買受人於其期限內是否解除契約。」</li><li><strong>(D) 正確</strong>：依實務見解（最高法院判例），物之瑕疵擔保與不完全給付為不同的請求權基礎（請求權競合）。若依《民法》第359條但書規定，因瑕疵擔保解除契約「顯失公平」而僅能請求減少價金時，買受人若能證明出賣人有過失，仍得依不完全給付之規定行使解除權。</li></ul>",

"19": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依司法院釋字第107號與第164號解釋，「已登記」不動產所有人之回復請求權（民法第767條第1項前段）與除去妨害請求權（中段），無民法第125條消滅時效規定之適用。A地為已登記之建地，故甲的返還請求權不罹於時效。</li><li><strong>(B) 正確</strong>：依《民法》第772條準用第769條，以行使地上權之意思，二十年間和平、繼續占有他人之不動產者，得請求登記為地上權人。乙占有建屋長達25年，已符合時效取得地上權之要件，得向地政機關請求登記為地上權人。</li><li><strong>(C) 錯誤</strong>：時效取得只是取得「請求登記」的權利，在未完成登記前，乙在法律上仍屬無權占有。既然是無權占有，甲仍得依不當得利或侵權行為向乙請求占有期間相當於租金的損害賠償。</li><li><strong>(D) 錯誤</strong>：時效取得的客體必須是「物權」（如所有權、地上權、不動產役權）。租賃權是「債權」，不得作為時效取得之客體。</li></ul>",

"20": "<p><strong>【解析】</strong></p><ul><li><strong>(A)、(B)、(C) 錯誤，(D) 正確</strong>：A地為合夥財產，依《民法》第668條規定，合夥財產屬於合夥人全體「公同共有」。 甲未經其他共有人（乙、丙）同意，擅自將A地出租並交付給丁，丁對合夥全體而言構成「無權占有」。 對於第三人的無權占有，依《民法》第828條第2項準用第821條規定：「各共有人對於第三人，得就共有物之全部為本於所有權之請求。但回復共有物之請求，僅得為共有人全體之利益為之。」 因此，共有人乙或丙都可以「單獨」起訴，但不能請求丁返還給自己，必須聲明請求丁將A地「返還於共有人全體（即甲、乙、丙）」。</li></ul>",

"21": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：不動產役權為物權，依《民法》第758條規定，非經「書面及登記」不生效力。甲僅單純「同意」乙使用，充其量僅有債權效力（使用借貸），不生不動產役權。</li><li><strong>(B) 錯誤</strong>：依《民法》第787條「袋地通行權」之前提，必須是土地與公路「無適宜之聯絡」致不能為通常之使用。題幹已明示「兩地均與公路有適宜聯絡」，故不符合袋地之要件，乙不得主張鄰地通行權。</li><li><strong>(C) 錯誤</strong>：依司法院釋字第400號解釋意旨，既成道路符合一定條件雖可成立「公用地役關係」，但國家若要取得土地所有權或進行徵收，仍須依法給予「補償」，並無以命令規定繼續使用就「得不予同時徵收補償」之特權。</li><li><strong>(D) 正確</strong>：既然該私設道路尚未符合釋字第400號所稱「既成道路（公用地役關係）」之要件，在未具備其他特別法令依據前，該道路仍屬甲之私有財產。甲基於所有權人之地位，自得依《民法》第767條所有物排除侵害請求權，請求市政府除去其未經同意之道路維護（鋪設柏油）行為。</li></ul>",

"22": "<p><strong>【解析】</strong></p><ul><li>本題考點為「動產附合」與「善意受讓」。</li><li><strong>(A) 正確，(B)(C)(D) 錯誤</strong>：依《民法》第812條與第811條之法理，動產與動產附合，非毀損不能分離，或分離需費過鉅者，由所有人共有或由主物所有人取得所有權。 然而，實務與學說見解咸認，汽車的「引擎」與「車身」結合，並未喪失其獨立性（引擎有獨立之引擎號碼，且拆裝容易，分離不需費過鉅），因此不構成動產附合。引擎仍維持其獨立之物格，所有權仍歸屬於原所有人「乙」。 另外，甲將裝有乙之引擎的車輛出賣並交付給「惡意」的丙。因丙為惡意（明知或因重大過失不知甲無處分權），故丙無法主張《民法》第801條及第948條之「善意受讓」制度。因此，該引擎之所有權依然歸屬於乙。</li></ul>",

"23": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《民法》第823條第1項規定，除因物之使用目的不能分割或契約訂有不分割期限外，各共有人得「隨時」請求分割共有物。因此甲不須經全體同意即可單獨訴請裁判分割。</li><li><strong>(B) 錯誤</strong>：法院之裁判分割為「形成判決」，依《民法》第824條之1第1項及第759條規定，於「判決確定時」即生分割效力，各共有人直接單獨取得分得部分之所有權，不待登記或請求移轉即生效力。</li><li><strong>(C) 錯誤</strong>：依《民法》第824條之1第2項前段，若為變價分配，權利人之抵押權不因拍賣而消滅，而是「移存於得受領之價金上」。</li><li><strong>(D) 正確</strong>：依《民法》第824條之1第2項但書第3款規定，若抵押權人「經共有人告知訴訟而未參加」，其抵押權將移存於該抵押人（甲）所分得之部分。</li></ul>",

"24": "<p><strong>【解析】</strong></p><ul><li>本題考點為「借名登記出名人處分財產之效力」（最高法院106年度第3次民事庭會議決議）。</li><li><strong>(A) 錯誤</strong>：借名登記契約性質上屬於「債權契約」（著重於當事人間之信任關係，類推適用委任契約之規定），而非物權契約。</li><li><strong>(B) 正確，(C) 錯誤</strong>：依最高法院106年第3次民庭決議，借名登記之出名人（乙）雖在內部關係上非真正所有權人，但在外部地政機關之登記上，乙為合法的所有權人。為了保護交易安全及登記之公信力，出名人乙將不動產移轉給第三人丁的處分行為，屬於「有權處分」。無論丁是善意或惡意，皆取得所有權。</li><li><strong>(D) 錯誤</strong>：既然乙的處分行為是「有權處分」，丁已合法取得A地所有權，甲就無法主張無效並代位請求丁塗銷登記。甲只能依債務不履行或侵權行為之規定向乙請求損害賠償。</li></ul>",

"25": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民法》第832條及第841條規定，地上權之設定不以建築物或其他工作物等之存在為必要；且地上權不因建築物或其他工作物之滅失而消滅。</li><li><strong>(B) 錯誤</strong>：依《民法》第835條規定，未定期限而有支付地租約定之地上權，地上權人應於「一年前」通知土地所有人，或支付未到期之「一年分（而非三年分）」地租後，得拋棄其權利。</li><li><strong>(C) 錯誤</strong>：依《民法》第837條規定：「地上權人，因不可抗力，妨礙其土地之使用時，不得請求免除或減少租金。」（註：得請求減免租金的是「農育權」，見民法第850-4條）。</li><li><strong>(D) 錯誤</strong>：因不可歸責於地上權人之事由致土地不能達原來使用之目的時，地上權「並非當然消滅」，而是地上權人或土地所有人「得終止」地上權（《民法》第835-1條）。</li></ul>",

"26": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：在他人土地上「種植竹木」而使用其土地，屬於《民法》第850條之1所定之「農育權」，而非普通地上權（普通地上權以有建築物或其他工作物為目的）。</li><li><strong>(B) 錯誤</strong>：普通地上權沒有最長期限30年的限制。現行法有期限上限的是「租賃契約（20年）」及「典權（30年）」。</li><li><strong>(C) 正確</strong>：依《民法》第836條之3規定：「地上權人就土地之使用、收益，與土地所有人約定使用方法者，其約定非經登記，不得對抗第三人。」</li><li><strong>(D) 錯誤</strong>：依《民法》第841條之5規定，區分地上權人間約定相互使用收益之限制，若未得土地所有人同意，「其約定非經登記，不得對抗第三人」，並非直接無效。</li></ul>",

"27": "<p><strong>【解析】</strong></p><ul><li>本題考點為「權利質權」之客體。依《民法》第900條規定，可讓與之債權及其他財產權，得為質權之標的物（此即權利質權）。</li><li>(A) 股票、(B) 抵押權所擔保之債權、(D) 著作財產權，均為「權利」，故均得作為「權利質權」之標的。</li><li><strong>(C) 正確（非屬權利質權）</strong>：「大清銀幣」屬於具體的、有形體的動產，以大清銀幣設定質權屬於「動產質權」，而非無形的「權利質權」。</li></ul>",

"28": "<p><strong>【解析】</strong></p><ul><li>本題考點為「營業質（當舖）」之特性（依《民法》第899-2條及當舖業法相關規定）。</li><li><strong>(A) 正確</strong>：營業質的最大特色在於「認物不認人」。若質定人（借款人乙）屆期不取贖（不還錢），當舖（甲）只能就該質物（項鍊）取償，不得請求質定人清償債務（無債權請求權）。</li><li><strong>(B) 錯誤</strong>：營業質屆滿一定期間未取贖，即成為「流當物」，當舖直接取得所有權並得自行處分，不需要事前通知乙。</li><li><strong>(C) 錯誤</strong>：承(A)，營業質無債權請求權，既然不能向債務人追討，自然就沒有「未受清償部分仍未消滅」或繼續求償的問題。</li><li><strong>(D) 錯誤</strong>：依當舖業法規定，滿當期日五日不取贖，當舖「即取得該流當物之所有權」，無須履行民法一般動產質權拍賣多退少補的清算義務。</li></ul>",

"29": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《民法》第866條規定，不動產所有人於設定抵押權後，仍得於同一不動產上設定地上權等權利，故甲不需乙之同意即可設定地上權。</li><li><strong>(B) 錯誤</strong>：若因可歸責於甲致土地價值減少，乙得請求甲「回復原狀或提出擔保」（民法第871、872條），但不能因此直接主張實行抵押權拍賣。</li><li><strong>(C) 正確</strong>：依《民法》第877條第2項規定（或第1項準用法理），土地設定抵押權後，土地所有人設定地上權讓第三人（丙）建屋。若屆期無人應買或影響抵押權實行，抵押權人（乙）得聲請將該房屋與土地「併付拍賣」。但因為房屋本身不是抵押物，所以乙對房屋賣得之價金「無優先受清償權」。</li><li><strong>(D) 錯誤</strong>：抵押權的效力不及於其後設定的地上權與房屋，故無從對房屋價金主張優先受償。</li></ul>",

"30": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民法》第913條，附有絕賣條款者，典期屆滿不贖即作絕賣，典權人取得典物所有權。不負找貼或清算義務。</li><li><strong>(B) 錯誤（本題要求選錯誤者）</strong>：依《民法》第924條之1規定：「土地及其土地上之建築物，同屬一人所有，而僅以土地或僅以建築物設定典權者，典權人取得典物所有權時，視為已有地上權之設定。」因此，當乙依絕賣條款取得B屋所有權時，與土地受讓人丙之間，是「視為有法定地上權」，而非「推定有租賃關係」。</li><li><strong>(C) 正確</strong>：絕賣條款未經登記「不得對抗第三人」。但此處的第三人是指對「房屋（典物）」有利害關係之第三人。丙是土地受讓人，甲乙間關於房屋的絕賣條款對甲乙仍生拘束力，乙仍取得房屋所有權。</li><li><strong>(D) 正確</strong>：承(B)所述，乙取得房屋所有權後，對丙之土地依法享有「法定地上權」，屬於有權占有，故丙無權訴請乙拆屋還地。</li></ul>",

"31": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：乙竊取甲的車，屬於惡意占有人。依《民法》第958條規定，惡意占有人負返還孳息之義務，或依不當得利之規定，甲有權請求乙返還其於占有期間使用A車的利益（即相當於租金之利益）。</li><li><strong>(B) 正確</strong>：乙竊車又因酒駕致A車毀損，構成對甲所有權的侵權行為（第184條）。且依《民法》第956條規定，惡意占有人因可歸責於自己之事由致占有物滅失或毀損者，對回復請求人（甲）應負損害賠償責任。</li><li><strong>(C) 錯誤（本題要求選錯誤者）</strong>：依《民法》第957條規定：「惡意占有人，因保存占有物所支出之必要費用，對於回復請求人，得依關於無因管理之規定，請求償還。」車體鍍金屬於「有益費用」甚至奢侈費用，並非維持物之存在的「必要費用」。惡意占有人對有益費用不得請求償還。</li><li><strong>(D) 正確</strong>：乙將竊得之贓車賣給善意之丙，丙因車輛已報廢而適用動產善意受讓。乙的無權處分行為導致甲喪失所有權（或造成追及困難），甲自得依侵權行為或不當得利之規定，向乙請求賠償因此所受之損害。</li></ul>",

"32": "<p><strong>【解析】</strong>因應成年年齡下修至18歲（於民國112年1月1日施行），相關身分法條文亦有修正：</p><ul><li><strong>(A) 正確</strong>：依《民法》第1073條第2項規定：「夫妻之一方收養他方之子女時，應長於被收養者十六歲以上。」此規定未因成年年齡下修而改變。</li><li><strong>(B) 錯誤</strong>：配合成年年齡下修為18歲，《民法》第980條將男女結婚年齡一律修正為「18歲」。既然滿18歲即為成年人，因此原《民法》第981條「未成年人結婚應得法定代理人同意」之規定已遭刪除。</li><li><strong>(C) 錯誤</strong>：依《民法》第1073條第1項規定，收養者之年齡應長於被收養者二十歲以上（非18歲）。</li><li><strong>(D) 錯誤</strong>：依修正後之《民法》第973條規定：「男女未滿十七歲者，不得訂定婚約。」男女之訂婚年齡一律改為17歲。</li></ul>",

"33": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：甲、乙雙方皆有外遇，皆構成《民法》第1052條第1項第2款（與配偶以外之人合意性交）的裁判離婚事由。當雙方均有責且責任相當（或依第2項重大事由），雙方皆得向法院請求離婚。</li><li><strong>(B) 錯誤（本題要求選錯誤者）</strong>：依現行《民法》第1057條規定：「夫妻無過失之一方，因判決離婚而陷於生活困難者，他方縱無過失，亦應給與相當之贍養費。」請求贍養費的要件之一是請求權人必須「無過失」。乙女亦有外遇，為「有過失」之一方，故不得請求贍養費。</li><li><strong>(C) 正確</strong>：依《民法》第1056條第2項規定，請求離婚之非財產上損害賠償（精神慰撫金），同樣以受害人「無過失」為限。乙有過失，故不得請求。</li><li><strong>(D) 正確</strong>：贍養費的法定請求權專屬於「判決離婚」（第1057條）。若為「協議離婚」，除非雙方有特別約定贍養費，否則事後不得再依民法第1057條向法院請求。</li></ul>",

"34": "<p><strong>【解析】</strong></p><ul><li>本題考點為「撤銷死亡宣告對婚姻關係的影響」。</li><li>依《家事事件法》第163條第2項規定：「撤銷或變更宣告死亡裁定之裁定，不問對於何人均有效力。但裁定確定前之善意行為，不受影響。」</li><li>另依司法院釋字第552號解釋意旨，前婚配偶因死亡宣告而消滅，生存配偶若再婚，為保護後婚之信賴與婚姻安定，只要後婚雙方（乙與丙）締結婚姻時均屬善意（即皆不知甲尚生存），則撤銷死亡宣告之裁定，不影響後婚之效力。此時「後婚有效，前婚不生回復效力（即前婚消滅）」。若僅有一方善意，則後婚構成重婚，得予撤銷。</li><li>故僅選項 (A) 雙方均善意時，後婚有效、前婚消滅，論述最為正確。</li></ul>",

"35": "<p><strong>【解析】</strong></p><ul><li><strong>(A)、(C) 正確</strong>：丁贈送給未成年人丙的腳踏車，屬於丙「無償取得之財產」，依《民法》第1087條規定為丙的「特有財產」。依第1088條第1項與第2項前段規定，未成年子女之特有財產，由父母（此處為單獨行使親權之甲）管理，並有使用、收益之權。</li><li><strong>(B) 錯誤（本題要求選錯誤者）</strong>：依《民法》第1088條第2項後段規定：「父母對於未成年子女之特有財產，非為子女之利益，不得處分之。」因此，甲並不能「自由」處分該腳踏車，處分行為必須符合子女丙的利益。</li><li><strong>(D) 正確</strong>：甲乙離婚時已約定由甲單獨行使未成年子女之權利義務，故甲行使管理權時，無需再取得乙之同意。</li></ul>",

"36": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 不得請求法院酌定（本題要求選此項）</strong>：依《民法》第1059條第1項規定：「父母於子女出生登記前，應以書面約定子女從父姓或母姓。未約定或約定不成者，於戶政事務所抽籤決定之。」從姓問題若約定不成，是直接由戶政事務所抽籤，不歸法院管轄。</li><li>(B) 得請求：依《民法》第1089條第2項規定，父母對於未成年子女重大事項權利行使意思不一致時，得請求法院依子女之最佳利益酌定之。</li><li>(C) 得請求：依《民法》第1002條第1項規定，夫妻之住所協議不成時，得聲請法院定之。</li><li>(D) 得請求：依《民法》第1055條第1項規定，離婚對於未成年子女親權行使協議不成者，法院得依請求或依職權酌定之。</li></ul>",

"37": "<p><strong>【解析】</strong></p><ul><li>依《民法》第1030條之1第1項，法定財產制消滅時，應就雙方「現存之婚後財產」進行剩餘財產分配。</li><li>(A) 屬分配範圍：依《民法》第1017條第2項規定：「夫或妻婚前財產，於婚姻關係存續中所生之孳息，視為婚後財產。」既然是婚後財產，就必須列入分配。</li><li>(B) 屬分配範圍：婚後無償取得之財產（如受贈物、遺產）本身雖不列入分配，但該無償取得之財產於婚後所生之「孳息」（如把遺產拿去收租），實務見解認為該孳息應視為「婚後有償取得之財產」，須列入分配。</li><li><strong>(C) 非屬分配範圍（本題要求選此項）</strong>：「改用法定財產制前」所得之薪資，等同於該次法定財產制計算基準上的「婚前財產」。剩餘財產分配只計算「該法定財產制關係存續中」所增加的財產，改用前的財產不列入分配。</li><li>(D) 屬分配範圍：夫或妻於婚後因有償行為對他方產生的一般債權，屬於現存之婚後財產，自然在分配範圍內。</li></ul>",

"38": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民法》第1052條之1規定：「離婚經法院調解或法院和解成立者，婚姻關係消滅。法院應依職權通知該管戶政機關。」</li><li>補充說明：法院調解或和解成立時，與確定判決有同一之效力，此時婚姻關係立即向將來消滅。後續向戶政機關的通知或登記，僅屬於戶籍行政上的「報告」或「宣示性登記」，不影響離婚已於法庭上調解成立那一刻生效的事實。</li></ul>",

"39": "<p><strong>【解析】</strong></p><ul><li>收養契約效力：收養行為具備高度屬人性與身分關係，且依《民法》規定需經法院考量未成年人最佳利益後認可。胎兒尚未出生，無從建立實質親子關係與評估利益，故實務與學理均認為「胎兒不得為收養之客體」，代為訂立的收養契約無效。</li><li>胎兒的損害賠償請求權：依《民法》第7條規定：「胎兒以將來非死產者為限，關於其個人利益之保護，視為既已出生。」 針對此條，最高法院實務採取「解除條件說」，即胎兒的權利能力（包含侵權行為損害賠償請求權）在「受侵害的當下就已經發生」，法定代理人可以直接代為起訴請求（只是如果將來不幸死產，該權利溯及失效）。因此，不需要等到丙完全出生，在出生前即得向戊醫師請求損害賠償。</li><li>結論為：收養契約無效；出生前即得請求損害賠償，故選 (C)。</li></ul>",

"40": "<p><strong>【解析】</strong></p><ul><li>依《民法》第1059條第5項規定：「有下列各款情形之一，法院得依父母之一方或子女之請求，為子女之利益，宣告變更子女之姓氏為父姓或母姓： 一、父母離婚者。 二、父母之一方或雙方死亡者。 三、父母之一方或雙方生死不明滿三年者。 四、父母之一方顯有未盡保護或教養義務之情事者。」</li><li><strong>(A) 不得聲請（本題要求選此項）</strong>：選項(A)為「未滿三年」，不符合法條明定之「滿三年」要件，故不得聲請。</li><li>其他選項 (B) 雙方死亡、(C) 父母離婚、(D) 遺棄子女（顯未盡保護教養義務），皆符合法條規定得聲請之要件。</li></ul>",

"41": "<p><strong>【解析】</strong></p><ul><li>本題考點為「近親禁婚限制於收養關係終止後之適用」。</li><li>依《民法》第983條第1項第2款規定，直系姻親不得結婚。同條第3項明定：「第一項直系姻親結婚之限制，於姻親關係消滅後，亦適用之。」</li><li>案件事實釐清： 1. 甲（女）收養乙（男），甲為養母、乙為養子。 2. 甲與丙（男）結婚後，丙成為乙的養父（直系血親）。 3. 乙成年後與丁（女）結婚，丁女即為丙男的「養媳」（直系姻親）。</li><li>後來收養關係終止且乙死亡，雖然丙與丁之間的「姻親關係」依法已消滅，但基於倫常觀念與優生學（優生學在此處較無關，主要是倫常），《民法》第983條第3項明定禁婚限制繼續存在。</li><li>違反第983條近親結婚限制之效力，依《民法》第988條規定，該婚姻無效。曾為公公的丙與曾為媳婦的丁結婚，無效。</li></ul>",

"42": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民法》第1150條規定，關於遺產管理、分割及執行遺囑之費用，由遺產中支付之。</li><li><strong>(B) 正確</strong>：依《民法》第1179條第1項規定，遺產管理人之職務包含編製遺產清冊及為保存遺產必要之處置。</li><li><strong>(C) 錯誤（本題要求選錯誤者）</strong>：依《民法》第1149條規定：「被繼承人生前繼續扶養之人，應由親屬會議依其所受扶養之程度及其他關係，酌給遺產。」遺產酌給的決定權在「親屬會議」，而非遺產管理人。</li><li><strong>(D) 正確</strong>：依《民法》第1183條規定，遺產管理人得請求報酬，其數額由親屬會議按其勞力及其與被繼承人之關係酌定之，並由遺產中支付。</li></ul>",

"43": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：甲受監護宣告（無行為能力），依《民法》第1096條規定，不得為監護人；且依第1089條，父母之一方不能行使親權時，由他方行使。</li><li><strong>(B) 正確</strong>：依《民法》第1093條第1項規定：「最後行使、負擔對於未成年子女之權利、義務之父或母，得以遺囑指定監護人。」因甲受監護宣告無法行使親權，乙即為「最後行使親權之人」。乙以遺囑指定丁為監護人，於乙死亡時發生效力，故丁為合法監護人。</li><li><strong>(C) 錯誤</strong>：雖然戊是甲的監護人，但未成年人丙的監護人應優先依「最後行使親權者之遺囑指定」（第1093條），若無指定，才依法定順序（第1094條）由同居之祖父母等定之。</li><li><strong>(D) 錯誤</strong>：社會福利機構是在無法定監護人、無遺囑指定，且親屬無法擔任時，經法院選定才會成為監護人。</li></ul>",

"44": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《民法》第1186條第1項規定，無行為能力人（包括精神錯亂中）不得為遺囑。違反者，其遺囑自始「無效」，而非「得撤銷」。</li><li><strong>(B) 錯誤</strong>：遺囑具有高度的身分屬人性，絕對禁止代理（包含法定代理），必須由遺囑人親自為之。</li><li><strong>(C) 正確</strong>：依《民法》第1219條規定：「遺囑人得隨時依遺囑之方式，撤回遺囑之全部或一部。」滿16歲之人具備遺囑能力（第1186條第2項），其既能立遺囑，嗣後當然能獨立依遺囑方式撤回，不受其後是否成年影響。</li><li><strong>(D) 錯誤</strong>：依《民法》第1186條第2項但書規定，未滿16歲者，絕對不得為遺囑，縱使得到法定代理人允許，所立遺囑亦屬無效。</li></ul>",

"45": "<p><strong>【解析】</strong></p><ul><li>本題考查《民法》修正後「限定繼承原則」下，繼承人「未開具遺產清冊」時的清算責任（第1162-1、1162-2條）。</li><li><strong>(A) 正確</strong>：依第1162-1條，即使未開具清冊，繼承人仍負有按債權數額比例計算，以遺產分別償還之義務。</li><li><strong>(B) 錯誤（本題要求選錯誤者）</strong>：依《民法》第1162-2條第2項規定：「...繼承人對於不當受領之債權人或受遺贈人，不得請求返還其不當受領之數額。」（因為違法清償是繼承人自己造成的，法律上剝奪其不當得利返還請求權，改由受損害的其他債權人去向不當受領人追討）。</li><li><strong>(C) 正確</strong>：依第1162-2條第5項規定，若繼承人為無行為能力人或限制行為能力人，不負前幾項的違反清算賠償責任（法律特別保護未成年或受宣告之人）。</li><li><strong>(D) 正確</strong>：依第1156-1條第2項，債權人得向法院聲請命繼承人於三個月內提出遺產清冊。</li></ul>",

"46": "<p><strong>【解析】</strong></p><ul><li>代位繼承的前提是第一順位繼承人（直系血親卑親屬）於「繼承開始前死亡」或「喪失繼承權」（《民法》第1140條）。</li><li><strong>(A) 正確</strong>：實務與學界通說認為，繼承人與被繼承人「同時死亡」，不符同時存在原則，繼承人無法繼承，此情形類推適用或視為「繼承開始前死亡」，己得代位繼承乙。</li><li><strong>(B) 正確</strong>：丙故意殺害同順位之丁未遂被判刑，依第1145條第1項第1款，屬絕對喪失繼承權。喪失繼承權者，由其直系血親卑親屬（庚）代位繼承。</li><li><strong>(C) 正確</strong>：丁湮滅遺囑依第1145條第1項第4款，喪失繼承權。由辛代位繼承。</li><li><strong>(D) 錯誤（本題要求選錯誤者）</strong>：依《民法》第1176條第7項與實務見解，拋棄繼承者不適用代位繼承之規定。戊若合法拋棄繼承，其應繼分歸屬於其他同順位繼承人，其子壬「不得」代位繼承。</li></ul>",

"47": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 無法請求（本題要求選此項）</strong>：《民法》第820條關於共有物之管理（多數決）並未賦予法院在「無法達成協議或決議時，可直接代替共有人決定管理方法」的權力（僅能在決議顯失公平時聲請「裁定變更」）。若遺產管理無法達成共識，當事人只能直接訴請「分割遺產」，無法要求法院代為決定分割前的「管理方法」。</li><li>(B) 得請求：依第1055條第1項，離婚對於未成年子女親權行使協議不成者，得請求法院酌定之。</li><li>(C) 得請求：依第1120條，扶養之方法或扶養費之數額無法協議時，由親屬會議定之；若親屬會議不能定，得聲請法院定之。</li><li>(D) 得請求：依第1211條，遺囑執行人之報酬，若無遺囑決定且無法協議時，得聲請法院定之。</li></ul>",

"48": "<p><strong>【解析】</strong></p><ul><li>依《民法》第1145條第1項第1款規定：「故意致被繼承人或應繼承人於死或雖未致死因而受刑之宣告者。」喪失繼承權。這裡的「應繼承人」，指的是在繼承發生時，依法有繼承權之人。</li><li>甲的法定繼承人為：配偶（乙）、第一順位直系血親卑親屬（子丙）。母親戊為第二順位。因為第一順位的丙尚存，故戊在此時並非應繼承人。</li><li>(A) 乙殺丙：丙為第一順位應繼承人，乙喪失繼承權。</li><li>(B) 丁殺戊（非屬）：戊此時並非應繼承人，故丁殺害戊不構成「殺害應繼承人」之喪失繼承權事由。</li><li>(C) 丙殺乙：乙為配偶（當然應繼承人），丙喪失繼承權。</li><li>(D) 丁殺丙：丙為第一順位應繼承人，構成喪失事由。</li></ul>",

"49": "<p><strong>【解析】</strong></p><ul><li>案件事實：遺產 100 萬，負債 200 萬（丙 100 萬、丁 100 萬）。</li><li>若依法按比例清償（《民法》第1162-1條），遺產僅能償還負債的 1/2。因此，丙應分得 50 萬，丁應分得 50 萬。</li><li>乙未開具清冊，將 100 萬全給了丙，導致丁受損害。</li><li>依《民法》第1162-2條第3項規定：「繼承人非因重大過失而不知有債權人之存在，致違反第1162-1條規定者，對於受害之債權人，僅就其客觀上應受報償而未受報償之比例，為其財產之限度內負賠償之責。」</li><li>丁「客觀上應受報償」的數額是 50 萬。因為乙並非故意或重大過失（題目說「毫無所知」），法律減輕其賠償責任，乙只需以自己的財產賠償丁 50 萬元即可。故(D)正確。</li><li>（至於多給丙的 50 萬，依同條第2項規定，乙「不得」向丙請求返還，這也是乙未依法清算必須承擔的風險。）</li></ul>",

"50": "<p><strong>【解析】</strong></p><ul><li>本題考查「遺產分割之瑕疵擔保責任與無資力分擔」。</li><li>依《民法》第1169條第1項規定：「第一項擔保責任（瑕疵擔保），應由共同繼承人，按其應繼分之比例負擔之。」同條第2項：「共同繼承人中有一人無支付能力時，其不能償還之分擔額，由有請求權之繼承人與他繼承人，按其應繼分之比例分擔之。」</li><li>計算步驟： 1. 應繼分比例：配偶乙（1/2）、兄妹丙（1/4）、丁（1/4）。符合遺產總值1200萬（乙分600，丙丁各300）。 2. 瑕疵總額：古董原值300萬，現值180萬，減損 120萬元。 3. 初步分擔額（按應繼分比例）：</li><li>乙（1/2）分擔：120萬 × 1/2 = 60萬。</li><li>丙（1/4）分擔：120萬 × 1/4 = 30萬。</li><li>丁（1/4）分擔：120萬 × 1/4 = 30萬。 4. 無支付能力之再分擔：丁無支付能力，其 30萬 的分擔額，由「有請求權之丙」與「其他繼承人乙」，依兩人的應繼分比例（乙1/2：丙1/4，即 2:1）分擔。</li><li>乙需代丁負擔：30萬 × (2/3) = 20萬。 5. 乙的總分擔額：原分擔 60萬 + 代負擔 20萬 = 80萬元。</li></ul>",

"51": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依最高法院 108 年度台抗大字第 953 號裁定（大法庭見解），刑事庭移送民事庭之附帶民事訴訟，若原告並非「因犯罪而受損害之人」，本應由刑事庭以裁定駁回，但若刑事庭誤為移送至民事庭，基於保障當事人之訴訟權與程序利益，民事庭不得逕以原告當事人適格欠缺為由駁回，而應裁定命原告補繳民事訴訟裁判費，使其轉換為一般獨立的民事訴訟程序繼續審理。</li><li><strong>(B) 錯誤</strong>：交付法庭錄音光碟之聲請，依《法庭錄音錄影及其利用保存辦法》等規定，法院仍應審酌是否有妨害他人隱私或其他不應准許之法定事由，且若逾越保存期限，法院亦無從准許，並非「縱逾法定期限亦一律准許」。</li><li><strong>(C) 錯誤</strong>：依《民事訴訟法》第196條第2項規定，當事人因重大過失逾時提出攻擊或防禦方法，有礙訴訟之終結者，法院得駁回之。此為「失權效」之規定，法院並非必須允許其提出。</li><li><strong>(D) 錯誤</strong>：依實務見解與《民事訴訟法》第444條第1項但書精神之反面解釋（或第三審相關規定第481條準用等），上訴第三審若有律師為訴訟代理人卻未預納裁判費，實務上通常認為律師具備專業知識，法院得不命補正，逕以裁定駁回之。（註：未表明上訴理由亦同此理）。</li></ul>",

"52": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：分割共有物之訴，依《民事訴訟法》第10條第1項規定，專屬「不動產所在地」之法院管轄。A地在台南市，故應由台南地方法院專屬管轄，台中地院無管轄權。</li><li><strong>(B) 錯誤</strong>：所有物返還訴訟（物上請求權）同屬因不動產物權涉訟，專屬「不動產所在地（苗栗）」管轄。專屬管轄案件不適用第26條的「應訴管轄（擬制合意管轄）」，新竹地院不會因為乙到庭應訴就取得管轄權。</li><li><strong>(C) 正確</strong>：基於買賣契約請求移轉土地所有權，屬於「債權請求權」，並非專屬管轄。既然非專屬管轄，雙方又以書面約定合意由新竹地院管轄，符合《民事訴訟法》第24條「合意管轄」之規定，新竹地院有管轄權。</li><li><strong>(D) 錯誤</strong>：請求塗銷抵押權登記之訴，屬於因不動產物權涉訟，專屬「不動產所在地（苗栗）」管轄，新竹地院無管轄權。</li></ul>",

"53": "<p><strong>【解析】</strong>本題測驗《法院組織法》關於審判權衝突之解決機制（第7-3、7-4條）：</p><ul><li><strong>(A) 正確</strong>：依《法院組織法》第7-3條第1項，受移送之法院認其亦無審判權者，應以裁定停止訴訟程序，並聲請最高法院指定有審判權之管轄法院。</li><li><strong>(B) 正確</strong>：依《法院組織法》第7-3條第2項，當事人合意由受移送法院裁判者，受移送法院應為裁判（不得裁定停止並聲請指定）。</li><li><strong>(C) 正確</strong>：依《法院組織法》第7-4條第1項，最高法院為指定前，應予當事人陳述意見之機會。</li><li><strong>(D) 錯誤（本題要求選錯誤者）</strong>：依《法院組織法》第7-3條第4項明文規定：「受移送法院為裁判後，上級法院不得以其無審判權為由廢棄裁判。」此規定是為了避免案件在各審判系統間被當成皮球踢，導致訴訟程序過度延宕。</li></ul>",

"54": "<p><strong>【解析】</strong></p><ul><li>乙列法定代理人丙1與丙2為共同被告，基於《民法》第185條與第187條，丙1與丙2對乙負「連帶損害賠償責任」。在民事訴訟法上，連帶債務人之共同訴訟屬於「普通共同訴訟」。</li><li><strong>(A) 正確</strong>：普通共同訴訟中，依《民事訴訟法》第55條規定，一人之行為或他造對於共同訴訟人中一人之行為及關於其一人所生之事項，其利害不及於他共同訴訟人。故僅丙1上訴時，丙2部分之判決先行確定。</li><li><strong>(B) 錯誤（本題要求選錯誤者）</strong>：依《民法》第276條第2項，連帶債務人中之一人消滅時效已完成者，僅該債務人應分擔之部分，他債務人同免其責任。若丙1抗辯時效完成有理由，法院只能駁回乙對丙1之請求，並扣除丙1應分擔之部分後，判決丙2仍須給付剩餘部分。法院絕對「不得」據此駁回乙所提之「全部」訴訟。</li><li><strong>(C) 正確</strong>：普通共同訴訟人間具備獨立性，乙得單獨與丙2和解，並續行對丙1之訴訟。</li><li><strong>(D) 正確</strong>：普通共同訴訟中，丙1之自認僅對丙1發生拘束力，效力不及於丙2。</li></ul>",

"55": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《民事訴訟法》第66條第1項，告知訴訟應以「書狀」表明理由及訴訟程度，提出於法院。不得僅以言詞為之。</li><li><strong>(B) 正確</strong>：依《民事訴訟法》第66條第1項、第2項規定，告知書狀由法院送達於第三人（受告知人乙），且該書狀「並應送達於他造（對造丙）」。故由法院負責送達給乙與丙是正確的程序。</li><li><strong>(C) 錯誤</strong>：依《民事訴訟法》第65條規定，受告知人得「自由決定」是否參加訴訟，並無「必須參加」之義務。若其不參加，僅生「視為已參加（受參加效力拘束）」之失權效果。</li><li><strong>(D) 錯誤</strong>：告知訴訟並不構成法定裁定停止訴訟程序之事由，法院不須（亦不得）為等候乙參加而裁定停止訴訟。</li></ul>",

"56": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民事訴訟法》第41條第1項，多數有共同利益之人，得由其中選定一人或數人，為全體起訴或被訴。</li><li><strong>(B) 正確</strong>：依《民事訴訟法》第41條第2項，訴訟繫屬後經選定被選定人者，其他當事人脫離訴訟。</li><li><strong>(C) 正確</strong>：依《民事訴訟法》第42條，選定當事人及其更換、增減，應以文書證之。</li><li><strong>(D) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第44條第2項規定：「選定人得限制其為捨棄、認諾、撤回或和解。前項限制，應以文書證之。」選定人依法是有權利限制被選定人為重大處分行為的。</li></ul>",

"57": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依最高法院實務見解，撤銷詐害債權之訴，其訴訟標的價額以債權人主張之債權額為準；但被撤銷之標的物價額較低者，則以該標的物之價額為準（取其低者）。</li><li><strong>(B) 正確</strong>：代位訴訟之訴訟標的價額，依實務見解，以債務人與第三人間之權利義務關係（即代位客體）的價額為準（或與保全之債權額取其低者）。</li><li><strong>(C) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第77條之11規定：「分割共有物涉訟，以原告因分割所受利益之客觀價額為準。」分割遺產訴訟屬之，並非以「全部遺產之總價值」計算。</li><li><strong>(D) 正確</strong>：依《民事訴訟法》第77條之12規定，訴訟標的之價額不能核定者，以第466條所定不得上訴第三審之最高利益額數（新台幣150萬）加十分之一（即165萬元）定之。</li></ul>",

"58": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民事訴訟法》第205條第3項規定，法院命合併辯論時，得命合併裁判。當事人不完全相同者（如甲與乙、甲與丙），合併後依共同訴訟之規定辦理。</li><li><strong>(B) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第205條第2項規定：「前項情形，其當事人俱不相同者，法院不得命合併裁判。」反面解釋，只要「有一造相同」（例如原告均為甲，被告分別為乙、丙），法院就可以命合併裁判。</li><li><strong>(C) 正確</strong>：訴訟標的對於共同訴訟人必須合一確定者（必要共同訴訟），若分別辯論將導致裁判歧異的矛盾，故法院不得命分別辯論。</li><li><strong>(D) 正確</strong>：預備合併之訴（先位有理由則不審理備位），兩者存在排斥關係，若分別辯論將破壞預備合併的制度目的，故不得分別辯論。</li></ul>",

"59": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民事訴訟法》第385條第1項前段，言詞辯論期日，當事人之一造不到場者，得依到場當事人之聲請，由其一造辯論而為判決。</li><li><strong>(B) 正確</strong>：依《民事訴訟法》第191條第1項，兩造無正當理由遲誤言詞辯論期日者，視為合意停止訴訟程序。而同法第387條規定：「當事人於辯論期日到場不為辯論者，視為不到場。」故被告拒絕辯論視為不到場，加上原告未到場，即視為合意停止。</li><li><strong>(C) 正確</strong>：依《民事訴訟法》第191條第1項，兩造均不到場，除別有規定外，視為合意停止訴訟程序。</li><li><strong>(D) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第385條第1項，原告未到場、被告到場時，被告依法「得」聲請一造辯論判決。若被告不聲請，法院亦得依職權宣告一造辯論（同條第1項後段）。選項稱被告「不能聲請」為完全錯誤之論述。</li></ul>",

"60": "<p><strong>【解析】</strong></p><ul><li>(A) 屬突襲性裁判：未給予被告對新追加之請求權基礎進行防禦與陳述的機會，即剝奪其聽審權，構成程序上之突襲。</li><li>(B) 非突襲性裁判（本題錯誤選項，實為構成突襲）：依《民事訴訟法》第296條之1規定及闡明義務法理，法官固然知法（不受當事人法律主張拘束），但法院若欲採用當事人未曾主張之法律見解作為裁判基礎，必須先向當事人「闡明」並給予辯論之機會。若法院逕行將兩造從未論及之法律關係採為判決基礎，即構成「法律觀點之突襲」，有違聽審請求權之保障。選項(B)稱「無突襲性裁判可言」是錯誤的。</li><li>(C) 屬突襲性裁判：法院以當事人未提出（非辯論主義範圍內）之事實作為判決基礎，構成「事實之突襲」。</li><li>(D) 不屬突襲性裁判：基於「處分權主義」，原告已明示不主張乙請求權，法院僅就甲請求權審理並判決敗訴，完全符合當事人之程序處分權，無突襲可言。此為正確之法律論述。</li></ul>",

"61": "<p><strong>【解析】</strong></p><ul><li>本題考點為「判決履行期間之起算點」。</li><li><strong>(A) 正確</strong>：依《民事訴訟法》第396條第2項規定，法院定履行期間或命分期給付時，應令當事人有辯論之機會。</li><li><strong>(B) 正確</strong>：依《民事訴訟法》第396條第1項規定，履行期間原則上不得逾六個月，但「經原告同意者，不在此限」。故若甲同意，給予1年之履行期間是合法的。</li><li><strong>(C) 正確</strong>：若無原告同意，法院依職權定履行期間最高為六個月；但若有特別事由（如被告孤身一人生活困難等），法院得予延長，延長期間亦不得逾六個月（總計最長1年）。不過本選項中寫到「酌定給予2年」，這在實務上如果沒有原告同意是有爭議的，但本題的 (D) 是絕對錯誤的法理敘述，故 (D) 為正解。</li><li><strong>(D) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第396條第3項明文規定：「履行期間，自判決確定或宣告假執行之判決送達時起算。」只要判決主文有「宣告假執行」，無論原告事後是否真的去提存擔保金，履行期間都是從判決送達乙時（即3月16日）起算，而非從判決確定之日（4月30日）起算。</li></ul>",

"62": "<p><strong>【解析】</strong></p><ul><li>本題考點為「票款請求權與原因關係（買賣價金）請求權之訴之合併」。</li><li><strong>(A) 錯誤</strong>：基於民事訴訟的「處分權主義」，原告不主張的事項，法院不得審理。法官雖然知法，但仍必須經由「闡明權」讓原告選擇是否追加主張；若原告不表明追加，法院不能擅自針對買賣關係進行審理與判決。</li><li><strong>(B) 正確</strong>：依最高法院實務見解（如90年台上字第12號判例意旨），原告同時主張票款請求權與買賣價金請求權，其目的在於取得單一的經濟利益。為了保障原告的權益（避免法院只判買賣勝訴，卻導致原告喪失票據法上較便利的執行優勢），這兩個請求權應屬於「重疊的合併」，法院必須依序審理，若皆有理由，應於判決主文宣告「被告給付其中一項，另一項義務即消滅」。原告「不得」請求依「選擇合併」審理，因為選擇合併允許法院任意挑一個判，這會損害原告的實體利益。</li><li><strong>(C) 錯誤</strong>：依《民事訴訟法》第427條第2項第6款，本於票據有所請求屬「簡易程序」。若與買賣關係（200萬，超過500萬才屬通常程序，但此處200萬屬通常程序）合併，依第427條第3項，除當事人合意適用簡易程序外，應適用通常程序？不對，實務上因為票據是法定的簡易程序，追加通常程序的買賣關係時，原告可以聲請由普通庭審理，但不必然「強制」適用通常程序，需視雙方合意與法院裁定。</li><li><strong>(D) 錯誤</strong>：若為重疊合併或預備合併，原告「得」排定審理順序（例如先審票款，再審價金）。</li></ul>",

"63": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民事訴訟法》第377條之1第1項，第三人（丙）經法院許可，得參加和解。</li><li><strong>(B) 正確</strong>：依《民事訴訟法》第377條之2第1項，當事人及參加和解之第三人，得共同聲請法院定和解方案。</li><li><strong>(C) 正確</strong>：依《民事訴訟法》第380條之1，當事人與第三人成立之和解，得為執行名義。</li><li><strong>(D) 錯誤（本題要求選錯誤者）</strong>： 1. 程序面錯誤：依《民事訴訟法》第377條之2第2項，和解方案必須送達於「聲請人（即甲、乙、丙全體）」時起，才視為和解成立。僅送達給丙不生和解成立之效力。 2. 實體面錯誤：和解成立後與確定判決有同一效力。若甲事後又對丙就該200萬元主債務提起訴訟，因為已經有了「執行名義與既判力」，該後訴訟違反了「一事不再理」原則，法院應該依《民事訴訟法》第249條第1項第7款裁定駁回起訴（訴之不合法），而不是進入實體審理去讓雙方「不得再爭執存否」。</li></ul>",

"64": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民事訴訟法》第367條之1第1項，法院認有必要時，得依職權命當事人本人到場接受訊問，無須對造同意。</li><li><strong>(B) 錯誤（本題要求選錯誤者）</strong>：對於「證人」不到場，法院得命拘提（第303條）；但對於「當事人本人」拒不到場，基於當事人的程序主體地位，法院「不得」命拘提。其法律制裁是：法院得審酌情形，認他造關於該受訊問事項之主張為真實（第367條之3）。</li><li><strong>(C) 正確</strong>：依第367條之1第3項準用證人拒絕證言之規定，當事人涉及業務機密時得拒絕陳述。</li><li><strong>(D) 正確</strong>：依第367條之3規定，當事人到場拒不陳述，法院得依自由心證認定應證事實之存否。</li></ul>",

"65": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民事訴訟法》第289條，法院得囑託機關、學校或團體為調查。</li><li><strong>(B) 正確</strong>：依第300條，法院得囑託受訴法院以外之法院訊問證人。</li><li><strong>(C) 正確</strong>：依第364條與第289條，勘驗與囑託測量皆為合法之證據調查方法。</li><li><strong>(D) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第340條規定，法院得囑託機關、學校或團體為鑑定。但同條第二項明文規定：「第三百三十四條（鑑定人具結）之規定，於前項情形不適用之。」 機關或公會身為法人團體，無從具結；即使公會指派技師辦理，該技師是代表公會執行職務，並非法院直接選任的自然人鑑定人，因此依法不適用具結程序，也無需命其簽署結文。</li></ul>",

"66": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民事訴訟法》第416條第1項，調解經當事人合意而成立，與訴訟上和解有同一之效力（即與確定判決有同一效力）。</li><li><strong>(B) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第420條之1第1項與第2項規定：「第一審受訴法院得依職權，將訴訟事件移付調解。前項規定，於第二審及第三審亦適用之。」因此，第二審與第三審同樣可以移付調解。</li><li><strong>(C) 正確</strong>：依第416條第2項，調解有無效或得撤銷之原因者，當事人得向原法院提起宣告調解無效或撤銷調解之訴。</li><li><strong>(D) 正確</strong>：依第403條第2項，應強制調解之事件，原告逕行起訴時，若被告已經為本案之言詞辯論，則視為自願接受訴訟程序，不得再抗辯應先經調解。</li></ul>",

"67": "<p><strong>【解析】</strong></p><ul><li>本題考點為「簡易與通常程序轉換之管轄與上訴」。</li><li><strong>(A) 正確</strong>：請求金額從40萬擴張到60萬（超過簡易程序50萬上限），原告變更訴之聲明後，應由簡易庭法官依職權裁定改用通常訴訟程序（第435條）。</li><li><strong>(B) 正確</strong>：若乙不抗辯而逕為本案言詞辯論，依第435條第2項視為已有適用簡易程序之合意，繼續由簡易庭審理。</li><li><strong>(C) 正確</strong>：60萬減縮為40萬，已落入簡易程序之強制適用範圍，法院應裁定改用簡易程序。</li><li><strong>(D) 錯誤（本題要求選錯誤者）</strong>：請求金額減縮為40萬後，該案件性質上已屬於「簡易訴訟事件」。若第一審法院（普通庭）未依法裁定改用簡易程序，而誤用通常程序審理並判決，當事人不服提起上訴時，依《民事訴訟法》第436條之1及實務見解，該案仍屬簡易事件之第二審，其上訴管轄法院為「地方法院合議庭」，而非「高等法院」。高等法院若受理，應裁定移送管轄至地方法院合議庭。</li></ul>",

"68": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《民事訴訟法》第436條之8第2項，法院認適用小額程序為不適當者，得依職權以裁定改用簡易程序。</li><li><strong>(B) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第436條之8第4項規定：「當事人為適用小額程序而為一部請求者，法院得依職權以裁定改用簡易程序。」法條並未明文「絕對禁止（不得）」為一部請求，原告基於處分權主義仍可為之，只是法院有權視情況依職權將其改為簡易程序審理，避免原告惡意規避較嚴格的程序。故稱「均不得」為法理描述錯誤。</li><li><strong>(C) 正確</strong>：依第436條之14，小額程序中，若調查證據所需時間、費用與請求顯不相當，法院得不調查證據，依自由心證公平裁判。</li><li><strong>(D) 正確</strong>：依第436條之15，當事人變更、追加或反訴致超過10萬元者，除雙方合意且法院認適當外，不得為之。</li></ul>",

"69": "<p><strong>【解析】</strong></p><ul><li>本題考點為「固有必要共同訴訟（分割共有物）」及「訴訟參加」。</li><li><strong>(A) 錯誤</strong>：分割共有物之訴屬「固有必要共同訴訟」。依《民事訴訟法》第56條第1款規定，共同訴訟人中一人之行為有利益於共同訴訟人者，其效力及於全體。乙提起上訴為有利行為，故上訴之效力及於未上訴之丙、丁，全體皆成為上訴人。</li><li><strong>(B) 錯誤</strong>：同理，撤回上訴為「不利益」之行為。依實務見解，必要共同訴訟人中一人撤回上訴，必須取得其他視為上訴人之共同訴訟人的同意，否則不生撤回之效力。</li><li><strong>(C) 錯誤</strong>：依《民事訴訟法》第254條第1項「當事人恆定原則」，訴訟繫屬中將權利移轉於第三人（戊），不影響訴訟之進行。第三人戊需經兩造同意始得代當事人承當訴訟，法院不會單純因為移轉就「依職權命」戊承受訴訟（除非符合特定法定要件）。</li><li><strong>(D) 正確</strong>：訴外人己對丁之應有部分擁有實體法上的返還請求權（且已有確定判決）。該共有土地若被分割，將直接影響己未來能請求返還之標的物與權利狀態。因此，己對該訴訟具備「法律上利害關係」，依《民事訴訟法》第58條，己得聲請參加訴訟以輔助丁或保障自身權益。</li></ul>",

"70": "<p><strong>【解析】</strong></p><ul><li>本題考點為「通常訴訟程序之第三審上訴門檻」。</li><li>請求金額為180萬元，超過《民事訴訟法》第466條第1項規定的不得上訴第三審之利益額（現行門檻為150萬元）。因此，本案屬於「通常訴訟程序」且「得上訴第三審之事件」。</li><li><strong>(A) 正確</strong>：「從事法之續造、確保裁判之一致性或其他所涉及之法律見解具有原則上重要性」，這是《民事訴訟法》第436條之3針對「簡易訴訟程序」上訴第三審，以及第466條之4針對「小額訴訟程序」所設的「許可上訴」特有門檻。本件為通常程序，甲之律師若依第469條第6款（判決不備理由）提起第三審上訴，屬於法律明定的絕對違背法令事由，不必敘述前述專屬於簡易/小額程序的許可上訴理由。</li><li><strong>(B) 錯誤</strong>：若甲之上訴理由並非第469條第1款至第5款之絕對違背法令，而是依第469條之1（其他違背法令事由），實務上仍設有相當之審查標準，不能說「不論上訴理由為何均毋庸審查/許可」（且本法雖未全面採行許可制，但對上訴理由的合法性仍有嚴格要求）。</li><li><strong>(C) 錯誤</strong>：第三審之「強制律師代理」規定（第466條之1），係要求「上訴人（甲）」必須委任律師為訴訟代理人。被上訴人（乙）若不進行任何積極訴訟行為，法院不會強制命其委任律師補正。</li><li><strong>(D) 錯誤</strong>：180萬元已逾150萬之門檻，依法得提起第三審上訴。</li></ul>",

"71": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：第二審法院命乙給付 1000 萬元（超過原告甲請求的 900 萬元），超過的 100 萬元部分構成「訴外裁判」。但第三審法院只需將該「超過原請求部分（訴外裁判部分）」廢棄即可，無須將原判決「全部」發回更審。</li><li><strong>(B) 錯誤</strong>：第三審法院發回更審時，其廢棄理由之「法律上判斷」，對受發回之更審法院有拘束力；但關於「事實之調查」，更審法院仍得依職權或當事人之主張進行其他相關事實之調查，並不受發回意旨的絕對限制。</li><li><strong>(C) 錯誤</strong>：訴外裁判屬於「違背法令」之瑕疵，當事人仍須透過上訴或再審途徑予以撤銷或廢棄，該判決並非「當然無效」（在未經依法廢棄前，仍具有形式上之效力）。</li><li><strong>(D) 正確</strong>：消費借貸為「要物契約」，以金錢之交付及借貸意思表示合致為成立要件。「簽發本票」之原因有很多（如清償貨款、贈與、保證等），單憑一張本票無法直接推論出雙方有「消費借貸」的合意與交付事實。第二審法院僅憑本票即認定借貸關係存在，違反了證據法則與經驗法則，構成判決違背法令，第三審法院得據此廢棄原判決。</li></ul>",

"72": "<p><strong>【解析】</strong></p><ul><li>本題考點為「簡易訴訟程序之第三審上訴門檻與程序」。</li><li><strong>(A) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第471條第1項規定：「上訴狀內未表明上訴理由者，上訴人應於提起上訴後二十日內，提出理由書於原第二審法院；未提出者，毋庸命其補正，由原第二審法院以裁定駁回之。」簡易程序之第三審上訴準用之（第436條之2）。因此，未提理由書，法院「不用命補正」直接駁回。</li><li><strong>(B) 正確</strong>：依第436條之3第2項及第3項，提起簡易程序之第三審上訴，須經原裁判法院之「許可」，且該許可必須以訴訟事件所涉及之法律見解具有「原則上重要性」為限。若不具備，原法院應駁回。</li><li><strong>(C) 正確</strong>：依第436條之2第1項，上訴利益必須超過第466條之上訴限額，且必須以「適用法規顯有錯誤」為理由。</li><li><strong>(D) 正確</strong>：承(B)所述，須經原第二審法院之許可。</li></ul>",

"73": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：本件甲起訴請求 100 萬元（超過 50 萬元上限），且法院依「通常訴訟程序」審理。通常訴訟程序的第一審為地方法院（獨任或合議），其「第二審」管轄法院應為高等法院，而非地方法院合議庭。</li><li><strong>(B) 錯誤</strong>：逾法定上訴期間之上訴，為上訴不合法，依《民事訴訟法》第442條第1項規定，原第一審法院（台北地院）應以裁定駁回之。</li><li><strong>(C) 錯誤</strong>：依《民事訴訟法》第444條之1第1項規定，上訴狀內未表明上訴理由者，審判長應定期間命其提出；但若當事人「逾期未補正」，第二審法院不得以此為由裁定駁回上訴，而必須繼續審理（因第二審為事實審，當事人仍得於言詞辯論終結前提出防禦方法）。</li><li><strong>(D) 正確</strong>：依《民事訴訟法》第444條第1項但書規定，上訴不合法之情形（如未繳裁判費），若「其情形可補正者，審判長應定期間命其補正」，但「第一審法院已命其補正而未補正者，得不行命補正之程序」，第二審法院可逕予裁定駁回。</li></ul>",

"74": "<p><strong>【解析】</strong></p><ul><li>本題考點為「民事再審程序之構造」。</li><li><strong>(A) 正確</strong>：依《民事訴訟法》第502條第1項，再審之訴不合法（例如逾30日之不變期間），法院應以裁定駁回之。</li><li><strong>(B) 正確</strong>：依《民事訴訟法》第504條，再審之訴雖合法，但經實體審理後認「無再審理由」者，應以判決駁回之。</li><li><strong>(C) 錯誤（本題要求選錯誤者）</strong>：我國「民事訴訟」的再審程序，並沒有所謂的「開始再審之裁定」。當法院審理認定有再審理由時，會直接進入本案的實體審理，最後將「廢棄原判決並為新的本案判決」合併於同一個終局判決中宣告（或是為一部判決）。（註：「裁定開始再審」是《刑事訴訟法》的獨有制度，民事訴訟不採此制）。</li><li><strong>(D) 正確</strong>：依《民事訴訟法》第504條後段規定，再審之訴雖有再審理由，但法院經本案審理後，認「原確定判決為正當者」，仍應以判決駁回再審之訴。</li></ul>",

"75": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（本題要求選錯誤者）</strong>：依《民事訴訟法》第544條第1項規定：「法院就除權判決之聲請為裁判前，應得聲請人到場為言詞辯論。」因此，除權判決絕對不可以僅做「書面審理」，必須開庭讓聲請人言詞辯論。</li><li><strong>(B) 正確</strong>：依第545條第1項規定，聲請除權判決，應於申報權利期間已滿後「三個月內」為之。</li><li><strong>(C) 正確</strong>：依第541條規定，法院准許公示催告之聲請者，應為公示催告之裁定。</li><li><strong>(D) 正確</strong>：依第557條規定，宣告證券無效之公示催告，由證券所載「履行地」之法院管轄。支票之履行地即付款銀行所在地。</li></ul>",

"76": "<p><strong>【解析】</strong></p><ul><li><strong>(A)、(B) 正確</strong>：本件訴訟標的為 200 萬元，超過得上訴第三審之門檻（150萬元）。針對抗告法院（第二審）所為之裁定再為抗告（即提起第三審抗告），依《民事訴訟法》第486條第4項規定，必須以「適用法規顯有錯誤」為理由，始得為之。</li><li><strong>(C) 錯誤（本題要求選錯誤者）</strong>：提起第三審抗告，依《民事訴訟法》第495條之1第2項準用第466條之1規定，實行「強制律師代理制」。若抗告權人未委任律師為訴訟代理人，經法院命補正而未補正者，其抗告即屬「不合法」，應以裁定駁回。選項稱「抗告不因此而不合法」是錯的。</li><li><strong>(D) 正確</strong>：若抗告法院認抗告不合法而依第444條準用規定駁回，受裁定人依法得於十日內提出異議（第486條第2項、第444條第2項之法理適用或視具體裁定主體而定，實務上對受命/受託法官之裁定得提異議）。</li></ul>",

"77": "<p><strong>【解析】</strong></p><ul><li>本題考點為「家事訴訟之承受訴訟」。 A訴訟（認領子女）為家事身分訴訟（第2類）。B訴訟（不當得利返還扶養費）為家事財產訴訟。</li><li><strong>(A) 錯誤</strong>：乙為生母，依法享有認領之訴的起訴權。若乙死亡，依《家事事件法》第66條第1項，可由子女丁接續或承受訴訟。而B訴訟為一般財產請求權（債權），生母死亡後，該不當得利債權作為遺產，由乙之繼承人承受訴訟，並不會「視為終結」。</li><li><strong>(B) 正確</strong>：依《家事事件法》第66條第2項規定：「就前項（認領之訴）以外事件，為被告之生父死亡者，由生父之繼承人承受訴訟...」。甲為被告生父，甲死亡時，由其法定繼承人丙承受 A訴訟。至於 B訴訟（債務），理所當然由繼承人丙繼承並承受訴訟。</li><li><strong>(C) 錯誤</strong>：認領之訴涉及血統真實與身分公益，屬於「限制處分權主義」之範疇，當事人不得為訴訟上和解（家事事件法第45條反面解釋）。</li><li><strong>(D) 錯誤</strong>：同上，因涉及身分關係之公益，家事身分訴訟不適用《民事訴訟法》關於「認諾」而為敗訴判決之規定（家事事件法第67條）。</li></ul>",

"78": "<p><strong>【解析】</strong></p><ul><li>依《家事事件法》第3條，家事事件分為甲、乙、丙、丁、戊等五類。前三類為非訟事件，後兩類為訴訟事件。</li><li><strong>(A) 正確</strong>：宣告停止親權事件，屬家事非訟事件（丙類）。</li><li><strong>(B) 正確</strong>：宣告終止收養事件，屬家事非訟事件（丙類）。</li><li><strong>(C) 錯誤（本題要求選錯誤者）</strong>：朋友代墊父母之生活費，依《民法》第179條向其他子女請求不當得利返還。這屬於純粹的一般民事財產債權糾紛，既非親屬間的扶養費請求，也不屬於《家事事件法》第3條明定的任何一類家事事件，因此非屬家事非訟事件，應循一般民事訴訟途徑解決。</li><li><strong>(D) 正確</strong>：核發通常保護令事件，屬家事非訟事件（戊類第1款）。</li></ul>",

"79": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《家事事件法》第45條（或《民法》第1052條之1），離婚訴訟當事人得成立訴訟上和解或調解。</li><li><strong>(B) 正確</strong>：撤銷婚姻訴訟涉及身分關係與公益，依《家事事件法》第10條及第67條第1項規定，採取「限制辯論主義（或職權探知主義）」，法院不受當事人自認之拘束，自認「不生效力」。</li><li><strong>(C) 錯誤</strong>：依《家事事件法》第9條，家事事件之處理原則上不公開，但「經法律上利害關係人聲請，法院認為適當者，得許其旁聽」。故並非「絕對不許旁聽」。</li><li><strong>(D) 錯誤</strong>：認領之訴屬於家事「訴訟」事件，本質為訴訟，必須經「言詞辯論」始得為判決。</li></ul>",

"80": "<p><strong>【解析】</strong></p><ul><li>本題考點為「遺產分割與夫妻剩餘財產之合併與和解」。</li><li><strong>(A) 錯誤（本題要求選錯誤者）</strong>：夫妻剩餘財產分配請求權及遺產分割請求權，兩者皆屬於「財產權」之糾紛，當事人擁有完全的處分權。因此，乙、丙、丁絕對可以成立訴訟上和解或調解，毋須強迫由法院裁判。</li><li><strong>(B) 正確</strong>：在分割遺產訴訟中，遺囑是否有效是決定分配比例的前提（先決問題）。當事人得於同一程序中提起「反訴」，請求確認遺囑無效，以達紛爭一次解決之目的。</li><li><strong>(C) 正確</strong>：遺產分割之訴屬於「固有必要共同訴訟」，必須由同意分割之共有人為原告，將其餘全體不同意之共有人列為「共同被告」，當事人適格始無欠缺。故丁起訴，必須列乙、丙為共同被告。</li><li><strong>(D) 正確</strong>：依《家事事件法》第41條第1項規定，夫妻剩餘財產分配事件與遺產分割事件基礎相牽連，法院得將剩餘財產分配訴訟移送至分割遺產訴訟之法院「合併審理」，以避免裁判矛盾並促進訴訟經濟。</li></ul>"
};

</script>
<script>
(function(){
  "use strict";

  const LS_FLAG = "exam114_flags";
  const LS_SELECTED = "exam114_selected";
  const LS_CONFUSE = "exam114_confuse";
  const LS_EXPLAIN = "exam114_explain";   // { qn: "text" }
  const LS_SUBMIT  = "exam114_submit";    // { done:true, score:Number, total:Number, ts:Number }

  const EXAM_TITLE = "114司律一試_民法、民訴";
  const EXAM_SUBJECT = "綜合法學（二）民法‧民事訴訟法";

  function loadJSON(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  function saveJSON(key, val){
    localStorage.setItem(key, JSON.stringify(val));
  }

  let flags = loadJSON(LS_FLAG, {});       // { qn: true }
  let selected = loadJSON(LS_SELECTED, {}); // { qn: optIndex }
  let confused = loadJSON(LS_CONFUSE, {});  // { "qn_optIndex": true }
  let explainText = loadJSON(LS_EXPLAIN, {}); // { qn: "text" }
  let submitState = loadJSON(LS_SUBMIT, null); // null | {done,score,total,ts}

  let currentFilter = "all"; // 'all' | 'flagged'
  let openExplain = new Set(); // qn (string) currently expanded — not persisted
  let openOfficial = new Set(); // qn (string) for built-in official explanation — not persisted

  const main = document.getElementById("main-content");
  const flagCounterEl = document.getElementById("flag-counter");
  const tabAll = document.getElementById("tab-all");
  const tabFlagged = document.getElementById("tab-flagged");
  const scoreBanner = document.getElementById("score-banner");
  const scoreTextEl = document.getElementById("score-text");

  const OPT_LABELS = ["A","B","C","D"];
  const POINTS_PER_Q = 2;

  function updateFlagCounter(){
    const count = Object.keys(flags).filter(k => flags[k]).length;
    flagCounterEl.textContent = count;
  }

  function escapeHTML(str){
    return String(str)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  function buildOptionHTML(qn, idx, text, isCorrect){
    const selKey = String(qn);
    const isSelected = selected[selKey] === idx;
    const confKey = qn + "_" + idx;
    const isConfused = !!confused[confKey];

    let cls = "option";
    if(isSelected){
      cls += isCorrect ? " selected-correct" : " selected-wrong";
    }
    if(isConfused){
      cls += " confused";
    }

    return `
      <div class="${cls}" data-qn="${qn}" data-idx="${idx}" data-correct="${isCorrect ? '1':'0'}">
        <span class="opt-label">${OPT_LABELS[idx]}</span>
        <span class="opt-text">${text}</span>
        <button class="confuse-btn ${isConfused ? 'active':''}" data-qn="${qn}" data-idx="${idx}" title="標記為疑惑選項" aria-label="標記疑惑">
          <svg viewBox="0 0 16 16"><path class="tri" d="M8 3 L13.5 12.5 L2.5 12.5 Z"/></svg>
        </button>
      </div>
    `;
  }

  function buildExplainHTML(qn){
    const key = String(qn);
    const text = explainText[key] || "";
    const hasNote = text.trim().length > 0;
    const isOpen = openExplain.has(key);

    return `
      <div class="explain-block" data-qn="${qn}">
        <button class="explain-toggle ${isOpen ? 'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen ? '收合詳解' : '顯示詳解'}</span>
          ${hasNote ? '<span class="has-note-tag">（已有詳解）</span>' : ''}
        </button>
        <div class="explain-body ${isOpen ? 'open':''}">
          <textarea class="explain-textarea" data-qn="${qn}" placeholder="在此輸入詳解…">${escapeHTML(text)}</textarea>
          <div class="explain-status" data-qn="${qn}">✓ 已自動儲存</div>
        </div>
      </div>
    `;
  }

  function buildOfficialExplainHTML(qn){
    const key = String(qn);
    const content = (typeof OFFICIAL_EXPLANATIONS !== "undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
    if(!content) return "";

    const isOpen = openOfficial.has(key);

    return `
      <div class="official-block" data-qn="${qn}">
        <button class="official-toggle ${isOpen ? 'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen ? '收合參考擬答' : '顯示參考擬答'}</span>
        </button>
        <div class="official-body ${isOpen ? 'open':''}">
          <div class="official-content">${content}</div>
        </div>
      </div>
    `;
  }

  function buildQuestionHTML(item){
    const qn = item.n;
    const isFlagged = !!flags[qn];
    const isRevealed = selected[String(qn)] !== undefined && selected[String(qn)] !== null;
    const correctLabel = OPT_LABELS[item.ans];

    const optionsHTML = item.o.map((text, idx) => buildOptionHTML(qn, idx, text, idx === item.ans)).join("");

    return `
      <article class="q-card ${isFlagged ? 'flagged':''}" id="q-${qn}" data-qn="${qn}">
        <div class="q-row">
          <div class="q-leftbar">
            <span class="q-num">${qn}</span>
            <button class="flag-btn ${isFlagged ? 'active':''}" data-qn="${qn}" title="標記為容易出錯" aria-label="標記旗標">
              <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5"/></svg>
            </button>
            ${isFlagged ? '<span class="flagged-tag">易錯</span>' : ''}
          </div>
          <div class="q-body">
            <p class="q-text">${item.q}<span class="answer-inline ${isRevealed ? 'revealed':''}" data-qn="${qn}">正確答案：<span class="ans-key">(${correctLabel})</span></span></p>
            <div class="options-grid">
              ${optionsHTML}
            </div>
            ${buildOfficialExplainHTML(qn)}
            ${buildExplainHTML(qn)}
          </div>
        </div>
      </article>
    `;
  }

  function render(){
    const list = QUESTIONS.filter(item => {
      if(currentFilter === "flagged") return !!flags[item.n];
      return true;
    });

    if(list.length === 0){
      main.innerHTML = `<div class="empty-state">目前沒有已標記的題目。複習時點擊每題左側的旗幟圖示即可加入標記。</div>`;
      return;
    }

    main.innerHTML = list.map(buildQuestionHTML).join("");
    // Focus restoration is intentionally skipped: textarea edits are saved via
    // input listener without triggering a full render (see delegation below).
  }

  function setFilter(f){
    currentFilter = f;
    tabAll.classList.toggle("active", f === "all");
    tabFlagged.classList.toggle("active", f === "flagged");
    render();
  }

  function renderScoreBanner(){
    if(submitState && submitState.done){
      scoreBanner.classList.add("show");
      const pct = submitState.total > 0 ? Math.round((submitState.score / (submitState.total * POINTS_PER_Q)) * 1000) / 10 : 0;
      scoreTextEl.innerHTML = `本次成績：${submitState.score} 分（共${submitState.correctCount}／${submitState.total}題答對，每題${POINTS_PER_Q}分） <span class="score-detail">交卷時間：${submitState.tsLabel}</span>`;
    }else{
      scoreBanner.classList.remove("show");
    }
  }

  // ---- Event delegation (click) ----
  main.addEventListener("click", function(e){
    // Flag button
    const flagBtn = e.target.closest(".flag-btn");
    if(flagBtn){
      const qn = flagBtn.dataset.qn;
      flags[qn] = !flags[qn];
      if(!flags[qn]) delete flags[qn];
      saveJSON(LS_FLAG, flags);
      updateFlagCounter();
      render();
      return;
    }

    // Confuse triangle button (must check before generic option click)
    const confBtn = e.target.closest(".confuse-btn");
    if(confBtn){
      e.stopPropagation();
      const qn = confBtn.dataset.qn;
      const idx = confBtn.dataset.idx;
      const key = qn + "_" + idx;
      confused[key] = !confused[key];
      if(!confused[key]) delete confused[key];
      saveJSON(LS_CONFUSE, confused);
      render();
      return;
    }

    // Official explanation toggle button (built-in, read-only)
    const officialToggle = e.target.closest(".official-toggle");
    if(officialToggle){
      const qn = officialToggle.dataset.qn;
      if(openOfficial.has(qn)){
        openOfficial.delete(qn);
      }else{
        openOfficial.add(qn);
      }
      render();
      return;
    }

    // Explain toggle button
    const explainToggle = e.target.closest(".explain-toggle");
    if(explainToggle){
      const qn = explainToggle.dataset.qn;
      if(openExplain.has(qn)){
        openExplain.delete(qn);
      }else{
        openExplain.add(qn);
      }
      render();
      // focus the textarea after opening
      if(openExplain.has(qn)){
        const ta = main.querySelector(`.explain-textarea[data-qn="${qn}"]`);
        if(ta) ta.focus();
      }
      return;
    }

    // Option click (toggle selection / reveal answer)
    const optEl = e.target.closest(".option");
    if(optEl){
      const qn = optEl.dataset.qn;
      const idx = parseInt(optEl.dataset.idx, 10);
      const key = String(qn);

      if(selected[key] === idx){
        // toggle off
        delete selected[key];
      }else{
        selected[key] = idx;
      }
      saveJSON(LS_SELECTED, selected);
      render();
      return;
    }
  });

  // ---- Event delegation (textarea input, debounced auto-save) ----
  const debounceTimers = {}; // qn -> timeout id
  main.addEventListener("input", function(e){
    const ta = e.target.closest(".explain-textarea");
    if(!ta) return;
    const qn = ta.dataset.qn;

    if(debounceTimers[qn]) clearTimeout(debounceTimers[qn]);
    debounceTimers[qn] = setTimeout(() => {
      explainText[qn] = ta.value;
      if(!ta.value.trim()) delete explainText[qn];
      saveJSON(LS_EXPLAIN, explainText);

      // show "已自動儲存" status without re-rendering (avoid losing focus)
      const statusEl = main.querySelector(`.explain-status[data-qn="${qn}"]`);
      if(statusEl){
        statusEl.classList.add("show");
        clearTimeout(statusEl._hideTimer);
        statusEl._hideTimer = setTimeout(() => statusEl.classList.remove("show"), 1800);
      }

      // update the "(已有詳解)" tag in place without full re-render
      const toggleBtn = main.querySelector(`.explain-toggle[data-qn="${qn}"]`);
      if(toggleBtn){
        const hasNote = (explainText[qn] || "").trim().length > 0;
        let tagEl = toggleBtn.querySelector(".has-note-tag");
        if(hasNote && !tagEl){
          tagEl = document.createElement("span");
          tagEl.className = "has-note-tag";
          tagEl.textContent = "（已有詳解）";
          toggleBtn.appendChild(tagEl);
        }else if(!hasNote && tagEl){
          tagEl.remove();
        }
      }
    }, 800);
  });

  tabAll.addEventListener("click", () => setFilter("all"));
  tabFlagged.addEventListener("click", () => setFilter("flagged"));

  // ---- Clear all modal ----
  const modal = document.getElementById("confirm-modal");
  document.getElementById("clear-all-btn").addEventListener("click", () => {
    modal.classList.add("show");
  });
  document.getElementById("modal-cancel").addEventListener("click", () => {
    modal.classList.remove("show");
  });
  document.getElementById("modal-confirm").addEventListener("click", () => {
    flags = {};
    selected = {};
    confused = {};
    submitState = null;
    saveJSON(LS_FLAG, flags);
    saveJSON(LS_SELECTED, selected);
    saveJSON(LS_CONFUSE, confused);
    localStorage.removeItem(LS_SUBMIT);

    // 同步移除題庫大廳／分類頁的「已完成」徽章紀錄
    if(typeof clearExamComplete === "function"){
      clearExamComplete();
    }

    updateFlagCounter();
    renderScoreBanner();
    render();
    modal.classList.remove("show");
  });
  modal.addEventListener("click", (e) => {
    if(e.target === modal) modal.classList.remove("show");
  });

  // ---- Submit / scoring ----
  function gradeExam(){
    let correctCount = 0;
    QUESTIONS.forEach(item => {
      const sel = selected[String(item.n)];
      if(sel !== undefined && sel === item.ans) correctCount++;
    });
    const total = QUESTIONS.length;
    const score = correctCount * POINTS_PER_Q;
    const now = new Date();
    const tsLabel = now.getFullYear() + "/" + String(now.getMonth()+1).padStart(2,"0") + "/" + String(now.getDate()).padStart(2,"0") +
      " " + String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");

    submitState = { done:true, score, correctCount, total, ts: now.getTime(), tsLabel };
    saveJSON(LS_SUBMIT, submitState);
    renderScoreBanner();
    window.scrollTo({top:0, behavior:"smooth"});

    // 回報完成狀態給題庫大廳／分類頁顯示「已完成」徽章
    if(typeof reportExamComplete === "function"){
      reportExamComplete({ score, total, correctCount });
    }
  }

  document.getElementById("submit-btn").addEventListener("click", gradeExam);

  // ---- Export ----
  const SYMBOL_LEGEND = "符號圖例：✓ = 我選對的選項｜✗ = 我選錯的選項｜▲ = 標記為疑惑的選項｜▶ 正確答案：括號內為正解代號";

  function pad2(n){ return String(n).padStart(2,"0"); }
  function todayStamp(){
    const d = new Date();
    return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
  }

  function officialHtmlToPlainText(html){
    if(!html) return "";
    let text = html;
    // <li> -> "・" 條列符號 + 換行
    text = text.replace(/<li[^>]*>/gi, "・");
    text = text.replace(/<\/li>/gi, "\n");
    // <p> -> 換行區隔
    text = text.replace(/<p[^>]*>/gi, "");
    text = text.replace(/<\/p>/gi, "\n");
    // <ul>/<em>/<strong> 等標籤直接移除，但保留內容
    text = text.replace(/<\/?(ul|strong|em)[^>]*>/gi, "");
    // 移除其餘未預期的標籤
    text = text.replace(/<[^>]+>/g, "");
    // 還原常見 HTML 實體
    text = text.replace(/&nbsp;/g, " ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');
    // 清理多餘空行
    text = text.split("\n").map(l => l.trim()).filter(l => l.length > 0).join("\n");
    return text;
  }

  function buildExportText(list, scopeLabel){
    const now = new Date();
    const dateLabel = now.getFullYear() + "/" + pad2(now.getMonth()+1) + "/" + pad2(now.getDate());

    let wrongCount = 0, confusedCount = 0, explainedCount = 0, officialCount = 0;

    const lines = [];
    lines.push(`試卷標題：${EXAM_TITLE}`);
    lines.push(`科目：${EXAM_SUBJECT}`);
    lines.push(`匯出範圍：${scopeLabel}`);
    lines.push(`匯出日期：${dateLabel}`);
    lines.push(SYMBOL_LEGEND);
    lines.push("=".repeat(48));
    lines.push("");

    list.forEach(item => {
      const qn = item.n;
      const key = String(qn);
      const selIdx = selected[key];
      const hasSelection = selIdx !== undefined && selIdx !== null;
      const isWrong = hasSelection && selIdx !== item.ans;
      if(isWrong) wrongCount++;

      let qConfused = false;

      lines.push(`第 ${qn} 題`);
      lines.push(item.q);
      item.o.forEach((text, idx) => {
        const isConf = !!confused[qn + "_" + idx];
        if(isConf) qConfused = true;
        let mark = "　"; // default: no symbol, keep alignment
        if(hasSelection && idx === selIdx){
          mark = (idx === item.ans) ? "✓" : "✗";
        }else if(isConf){
          mark = "▲";
        }
        lines.push(`${mark} (${OPT_LABELS[idx]}) ${text}`);
      });
      if(qConfused) confusedCount++;

      lines.push(`▶ 正確答案：(${OPT_LABELS[item.ans]})`);

      const officialHtml = (typeof OFFICIAL_EXPLANATIONS !== "undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
      if(officialHtml){
        officialCount++;
        lines.push(officialHtmlToPlainText(officialHtml));
      }

      const note = (explainText[key] || "").trim();
      if(note){
        explainedCount++;
        lines.push("詳解：");
        lines.push(note);
      }

      lines.push("-".repeat(48));
      lines.push("");
    });

    lines.push("=".repeat(48));
    lines.push(`統計：共 ${list.length} 題｜已標記 ${list.filter(it => !!flags[it.n]).length} 題｜答錯 ${wrongCount} 題｜含疑惑選項 ${confusedCount} 題｜有參考擬答 ${officialCount} 題｜有詳解 ${explainedCount} 題`);

    return lines.join("\n");
  }

  function downloadText(filename, content){
    const blob = new Blob([content], {type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  document.getElementById("export-flagged-btn").addEventListener("click", () => {
    const list = QUESTIONS.filter(item => !!flags[item.n]);
    if(list.length === 0){
      alert("目前沒有已標記的題目可匯出。");
      return;
    }
    const text = buildExportText(list, "已標記弱點題");
    downloadText(`${EXAM_TITLE}_已標記弱點題_${todayStamp()}.txt`, text);
  });

  document.getElementById("export-all-btn").addEventListener("click", () => {
    const text = buildExportText(QUESTIONS, "全部題目");
    downloadText(`${EXAM_TITLE}_全部題目_${todayStamp()}.txt`, text);
  });

  // ---- init ----
  updateFlagCounter();
  renderScoreBanner();
  render();
})();
</script>
</body>
</html>
