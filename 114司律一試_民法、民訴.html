<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>114年司律一試 — 綜合法學（二）民法‧民事訴訟法 練習卷</title>
<style>
  :root{
    --paper:#faf8f3;
    --paper-dim:#f3efe6;
    --ink:#2b2b28;
    --ink-soft:#5c5850;
    --rule:#d9d2c2;
    --accent:#8a5a2b;
    --accent-soft:#caa874;
    --flag:#b3422f;
    --flag-bg:#fbe9e5;
    --correct-bg:#dcecd8;
    --correct-border:#5a9456;
    --wrong-bg:#f6d9d4;
    --wrong-border:#b3422f;
    --confuse:#c98a2c;
    --serif: "Noto Serif TC", "Source Han Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-dim);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Sticky Header ---------- */
  header.site-header{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--paper);
    border-bottom:2px solid var(--ink);
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .header-inner{
    max-width:1000px;
    margin:0 auto;
    padding:14px 20px 12px;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .exam-title{
    font-family:var(--serif);
    font-size:1.25rem;
    font-weight:700;
    letter-spacing:0.02em;
    margin:0;
  }
  .exam-sub{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin:2px 0 0;
  }
  .meta-line{
    font-size:0.78rem;
    color:var(--ink-soft);
    margin-top:4px;
  }

  .controls-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
    padding-top:10px;
    border-top:1px solid var(--rule);
  }
  .filter-tabs{
    display:flex;
    gap:6px;
  }
  .filter-tabs button{
    font-family:var(--sans);
    font-size:0.85rem;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid var(--rule);
    background:var(--paper);
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
  }
  .filter-tabs button.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }
  .filter-tabs button:hover:not(.active){
    border-color:var(--accent);
    color:var(--accent);
  }
  .status-cluster{
    display:flex;
    align-items:center;
    gap:14px;
    font-size:0.82rem;
    color:var(--ink-soft);
  }
  .flag-count{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-weight:600;
    color:var(--flag);
  }
  .flag-count svg{width:13px;height:13px;}
  .clear-btn{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:6px 12px;
    border-radius:6px;
    border:1px solid var(--flag);
    background:var(--paper);
    color:var(--flag);
    cursor:pointer;
    transition:all .15s ease;
  }
  .clear-btn:hover{
    background:var(--flag);
    color:#fff;
  }

  .toolbar-row2{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--rule);
  }
  .export-group{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .export-btn{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:6px 12px;
    border-radius:6px;
    border:1px solid var(--accent-soft);
    background:#fff;
    color:var(--accent);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:5px;
  }
  .export-btn:hover{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .export-btn svg{width:13px;height:13px;}

  .submit-btn{
    font-family:var(--sans);
    font-size:0.85rem;
    font-weight:700;
    padding:7px 18px;
    border-radius:6px;
    border:1px solid #3f6b3c;
    background:#4f7d4a;
    color:#fff;
    cursor:pointer;
    transition:all .15s ease;
  }
  .submit-btn:hover{
    background:#3f6b3c;
  }

  /* ---------- Score Banner ---------- */
  .score-banner{
    display:none;
    background:#fdf6ec;
    border:1.5px solid var(--accent-soft);
    border-radius:8px;
    padding:10px 16px;
    margin-top:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .score-banner.show{display:flex;}
  .score-banner .score-text{
    font-size:0.95rem;
    font-weight:700;
    color:var(--accent);
  }
  .score-banner .score-detail{
    font-size:0.78rem;
    color:var(--ink-soft);
    font-weight:400;
  }
  .score-banner .done-tag{
    font-size:0.72rem;
    font-weight:700;
    color:#3f6b3c;
    background:#e3efe1;
    border:1px solid #8fbf89;
    border-radius:4px;
    padding:2px 8px;
  }

  /* ---------- Main content ---------- */
  main{
    max-width:1000px;
    margin:0 auto;
    padding:24px 20px 80px;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-size:0.95rem;
  }

  .q-card{
    background:var(--paper);
    border:1px solid var(--rule);
    border-radius:10px;
    margin-bottom:16px;
    padding:16px 18px 16px 14px;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .q-card.flagged{
    border-color:var(--flag);
    box-shadow:0 0 0 1px var(--flag) inset;
    background:linear-gradient(180deg, var(--flag-bg) 0%, var(--paper) 55px);
  }

  .q-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  .q-leftbar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    flex-shrink:0;
    width:46px;
    padding-top:1px;
  }

  .q-num{
    font-family:var(--serif);
    font-weight:700;
    font-size:1.1rem;
    color:var(--ink);
    line-height:1;
  }

  .flag-btn{
    background:none;
    border:none;
    cursor:pointer;
    padding:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    transition:transform .12s ease, background .15s ease;
  }
  .flag-btn:hover{
    background:var(--flag-bg);
  }
  .flag-btn svg{
    width:18px;
    height:18px;
    stroke:var(--ink-soft);
    fill:none;
    stroke-width:1.8;
    transition:fill .15s ease, stroke .15s ease;
  }
  .flag-btn.active svg{
    fill:var(--flag);
    stroke:var(--flag);
  }
  .flag-btn:active{transform:scale(0.9);}

  .flagged-tag{
    font-size:0.65rem;
    font-weight:700;
    color:var(--flag);
    background:var(--flag-bg);
    border:1px solid var(--flag);
    border-radius:4px;
    padding:1px 5px;
    white-space:nowrap;
    letter-spacing:0.04em;
  }

  .q-body{
    flex:1;
    min-width:0;
  }

  .q-text{
    font-size:0.98rem;
    font-weight:700;
    margin:0 0 12px;
    color:var(--ink);
  }

  .options-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 10px;
  }
  @media (max-width:620px){
    .options-grid{grid-template-columns:1fr;}
  }

  .option{
    display:flex;
    align-items:flex-start;
    gap:8px;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:8px 10px;
    cursor:pointer;
    font-size:0.9rem;
    background:#fff;
    transition:background .15s ease, border-color .15s ease;
    position:relative;
  }
  .option:hover{
    border-color:var(--accent-soft);
  }
  .option .opt-label{
    font-weight:700;
    color:var(--accent);
    flex-shrink:0;
  }
  .option .opt-text{
    flex:1;
  }
  .option .confuse-btn{
    flex-shrink:0;
    background:none;
    border:none;
    cursor:pointer;
    padding:1px 2px;
    margin-left:2px;
    line-height:0;
  }
  .option .confuse-btn svg{
    width:13px;
    height:13px;
    transition:fill .15s ease;
  }
  .option .confuse-btn svg .tri{
    fill:none;
    stroke:#b9b2a0;
    stroke-width:1.4;
  }
  .option .confuse-btn.active svg .tri{
    fill:var(--confuse);
    stroke:var(--confuse);
  }

  .option.selected-wrong{
    background:var(--wrong-bg);
    border-color:var(--wrong-border);
  }
  .option.selected-wrong .opt-text{
    text-decoration:line-through;
    color:#7a3a30;
  }
  .option.selected-correct{
    background:var(--correct-bg);
    border-color:var(--correct-border);
  }
  .option.confused{
    outline:2px dashed var(--confuse);
    outline-offset:1px;
  }

  .answer-inline{
    display:inline-block;
    margin-left:10px;
    font-size:0.8rem;
    font-weight:400;
    padding:2px 9px;
    border-radius:5px;
    background:#fff;
    color:#fff; /* hidden by default: white on white */
    border:1px solid var(--rule);
    transition:color .15s ease, background .15s ease, border-color .15s ease;
    user-select:none;
    vertical-align:middle;
    white-space:nowrap;
  }
  .answer-inline.revealed{
    color:var(--accent);
    background:#fdf6ec;
    border-color:var(--accent-soft);
    font-weight:600;
    user-select:text;
  }
  .answer-inline .ans-key{
    font-weight:700;
  }

  /* ---------- Explanation block ---------- */
  .explain-block{
    margin-top:10px;
  }
  .explain-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid var(--rule);
    background:#fff;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .explain-toggle:hover{
    border-color:var(--accent-soft);
    color:var(--accent);
  }
  .explain-toggle .has-note-tag{
    font-size:0.72rem;
    font-weight:700;
    color:var(--accent);
  }
  .explain-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .explain-toggle.open .chevron{
    transform:rotate(90deg);
  }

  .explain-body{
    display:none;
    margin-top:8px;
  }
  .explain-body.open{
    display:block;
  }
  .explain-textarea{
    width:100%;
    min-height:90px;
    font-family:var(--sans);
    font-size:0.88rem;
    line-height:1.6;
    color:var(--ink);
    background:#fffdf8;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:10px 12px;
    resize:vertical;
    transition:border-color .15s ease;
  }
  .explain-textarea:focus{
    outline:none;
    border-color:var(--accent-soft);
  }
  .explain-status{
    font-size:0.74rem;
    color:#5a9456;
    margin-top:5px;
    height:1em;
    opacity:0;
    transition:opacity .25s ease;
  }
  .explain-status.show{
    opacity:1;
  }

  /* ---------- Official explanation block (built-in, read-only) ---------- */
  .official-block{
    margin-top:8px;
  }
  .official-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid #cfe0d4;
    background:#f3f9f4;
    color:#3f6b3c;
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .official-toggle:hover{
    border-color:#8fbf89;
    background:#e9f4ea;
  }
  .official-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .official-toggle.open .chevron{
    transform:rotate(90deg);
  }
  .official-badge-icon{
    font-size:0.78rem;
  }
  .official-body{
    display:none;
    margin-top:8px;
  }
  .official-body.open{
    display:block;
  }
  .official-content{
    background:#f8fbf8;
    border:1px solid #d9e9da;
    border-left:3px solid #5a9456;
    border-radius:8px;
    padding:14px 16px;
    font-size:0.88rem;
    line-height:1.75;
    color:#2f4a2d;
  }
  .official-content p{
    margin:0 0 8px;
  }
  .official-content p:last-child{
    margin-bottom:0;
  }
  .official-content ul{
    margin:0 0 8px;
    padding-left:1.3em;
  }
  .official-content ul:last-child{
    margin-bottom:0;
  }
  .official-content li{
    margin-bottom:6px;
  }
  .official-content li:last-child{
    margin-bottom:0;
  }
  .official-content strong{
    color:#1f3a1e;
  }
  .official-content em{
    color:#5c6b5a;
  }

  /* modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(30,28,24,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:var(--paper);
    border-radius:10px;
    padding:22px 24px;
    max-width:360px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
    text-align:center;
  }
  .modal-box p{
    font-size:0.92rem;
    margin:0 0 18px;
    color:var(--ink);
  }
  .modal-actions{
    display:flex;
    justify-content:center;
    gap:10px;
  }
  .modal-actions button{
    font-family:var(--sans);
    font-size:0.85rem;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    border:1px solid var(--rule);
    background:#fff;
  }
  .modal-actions button.confirm{
    background:var(--flag);
    border-color:var(--flag);
    color:#fff;
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="title-row">
      <div>
        <h1 class="exam-title">114年公務人員特種考試司法官考試 ‧ 114年專門職業及技術人員高等考試律師考試</h1>
        <p class="exam-sub">綜合法學（二）民法‧民事訴訟法 — 第一試試題（單一選擇題，全80題）</p>
      </div>
    </div>
    <div class="meta-line">考試日期：114年（西元2025年）｜類科：各類科｜每題2分，共80題｜本練習卷供考後自我複習使用</div>

    <div class="controls-row">
      <div class="filter-tabs">
        <button id="tab-all" class="active">全部題目</button>
        <button id="tab-flagged">已標記</button>
      </div>
      <div class="status-cluster">
        <span class="flag-count">
          <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5" fill="currentColor" stroke="none"/></svg>
          <span id="flag-counter">0</span> 題已標記
        </span>
        <button class="clear-btn" id="clear-all-btn">清除全部標記</button>
      </div>
    </div>

    <div class="toolbar-row2">
      <div class="export-group">
        <button class="export-btn" id="export-flagged-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
          匯出已標記
        </button>
        <button class="export-btn" id="export-all-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
          匯出全部
        </button>
      </div>
      <button class="submit-btn" id="submit-btn">交卷算分</button>
    </div>

    <div class="score-banner" id="score-banner">
      <span class="score-text" id="score-text"></span>
      <span class="done-tag">本卷已完成</span>
    </div>
  </div>
</header>

<main id="main-content"></main>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <p>確定要清除「全部」旗標標記、作答紀錄、疑惑標記與交卷成績嗎？<br>（已輸入的詳解內容將會保留；題庫大廳的「已完成」徽章也會一併移除）<br>此操作無法復原。</p>
    <div class="modal-actions">
      <button id="modal-cancel">取消</button>
      <button id="modal-confirm" class="confirm">確定清除</button>
    </div>
  </div>
</div>

<script src="exam-complete.js"></script>
<script>
const QUESTIONS = [
{"n":1,"ans":2,"q":"甲受輔助宣告，下列何項行為，無須經其輔助人同意？","o":["為獨資之負責人","向銀行借款新臺幣10萬元","受贈一台筆記型電腦","對車禍肇事者提起侵權訴訟"]},
{"n":2,"ans":3,"q":"甲將附有備胎之貨車以新臺幣150萬元出賣於乙。下列敘述，何者錯誤？","o":["關於車子上之四個輪胎為買賣標的物之構成部分，非獨立之物","車子之備胎是從物，為獨立之物","除非甲、乙有約定買賣標的物不及於備胎，否則買賣契約之效力及於備胎","備胎有瑕疵而解除契約者，效力及於買賣契約之全部"]},
{"n":3,"ans":0,"q":"依民法代理之規定，下列敘述，何者正確？","o":["意定代理之代理人有數人者，除法律另有規定或本人另有意思表示外，各代理人均得各自行使之","代理適用於法律行為，包括一切身分行為","無行為能力人不得為代理人，限制行為能力人得為代理人","代理人逾越代理權，以本人名義所為之意思表示，直接對本人發生效力"]},
{"n":4,"ans":3,"q":"下列關於限制行為能力人之敘述，何者正確？","o":["限制行為能力人為無權代理，經本人承認後，得主張契約不生效力","限制行為能力人未得法定代理人之允許所訂立之契約，得撤銷","限制行為能力人將父母歷年所給之零用錢購買汽車，毋須父母同意","限制行為能力人偽造父母同意書所訂立之契約，該契約有效"]},
{"n":5,"ans":3,"q":"下列關於清償之敘述，何者正確？","o":["非與債務之清償有利害關係之第三人，不得為第三人清償","債務人對非債權人之債權準占有人為清償時，依法院實務見解，須以其善意且無過失者，始生效力","債權證書已返還者，視為其債之關係消滅","清償人所提出之給付，得以雙方合意變更應先抵充費用、利息、原本之次序"]},
{"n":6,"ans":1,"q":"甲基於買賣契約，得請求乙支付價金，共新臺幣（下同）30萬元。若甲將對乙之30萬元價金債權出賣於丙，下列敘述，何者正確？","o":["甲原則上應對丙擔保乙之支付能力","若乙於訂立買賣契約時，已為受監護宣告者，善意之丙得請求甲負擔權利瑕疵擔保責任","若乙無法對丙提出給付，甲應負擔代為履行之責","甲將對乙之債權出賣於丙，應於甲通知丙後，始生效力"]},
{"n":7,"ans":3,"q":"民法關於主權利與從權利之規定，下列敘述，何者正確？","o":["以抵押權擔保之債權，其請求權已因時效而消滅，如抵押權人，於消滅時效完成後，3年間不實行其抵押權者，其抵押權消滅","以留置權擔保之債權，其請求權已因時效而消滅，如留置權人，於消滅時效完成後，5年間不實行其留置權者，其留置權消滅","讓與債權時，該債權之擔保及其他從屬之權利，一律隨同移轉於受讓人","以質權擔保之債權，其請求權雖經時效消滅，質權人仍得就其質物取償"]},
{"n":8,"ans":1,"q":"甲欲出售其所有之A屋，遂委託房屋仲介商乙代為銷售。某日，乙帶領丙前來賞屋完畢後，丙甚為喜歡，表示願以新臺幣（下同）1500萬元購屋之意願；離去之際，適逢甲前來查看售屋狀況，甲、乙、丙三人簡單寒暄後，便各自離開。嗣後，甲透過友人得知丙之聯絡方式，遂聯繫丙向其表示願意減價50萬，直接出售A屋於丙，以避免雙方支付高額仲介費。下列敘述，何者錯誤？","o":["甲委託仲介銷售之契約，性質上乃屬於居間，係為他方報告訂約之機會或為訂約之媒介，故其既不屬隱名代理，亦不屬雙方代理","乙為媒介居間人，僅以契約因其媒介而成立時，始得請求報酬，故若甲、丙自行訂立買賣契約時，乙無從請求甲、丙支付仲介報酬","甲自行聯繫丙並與其訂立買賣契約，該當於民法第101條第1項視為條件已成就之情形，故甲、丙二人仍應給付仲介報酬於乙","甲故意拒絕因乙媒介而成立之契約，而自行與丙訂立同一內容之契約者，應認為違反誠信原則"]},
{"n":9,"ans":2,"q":"甲於2024年6月6日向丙汽車商購買一款新車。不料於2025年1月1日元旦與好友乙出遊時，新車突然發生暴衝，甲雖及時緊踩煞車，仍發生車禍意外，造成甲與乙皆因衝撞而受傷。事故後，新車嚴重撞毀已不值得修繕，甲乙受傷住院。經事故鑑定報告，汽車暴衝係因該款汽車系統程式瑕疵問題所致，而甲於汽車暴衝時之處置，並無過失。下列敘述，何者錯誤？","o":["因汽車系統程式瑕疵導致汽車暴衝，屬無法即知之瑕疵問題，丙汽車商仍負物之瑕疵擔保責任","汽車暴衝係因其系統程式瑕疵問題，汽車商丙對甲可能同時負有不完全給付責任與物之瑕疵擔保責任","甲、乙所受之身體傷害，皆不得依民法規定請求固有利益之損害賠償","甲、乙所受之身體傷害，屬瑕疵結果損害，得依民法規定，請求損害賠償"]},
{"n":10,"ans":1,"q":"受監護宣告之甲，由其父母任監護人。某日，甲於公園中遊玩，在垃圾桶中發現一台無人所有之玩具飛機，遂拾起把玩許久。嗣後，就讀國小三年級之乙見狀，便央求甲將該玩具飛機贈送於己，甲便欣然同意。甲隔日再於公園遇見乙，兩人便共同玩著射飛機，遊玩間，孰料玩具飛機不慎飛射撞上坐在公園休息之遊民丙，丙頭部因此受傷，而向兩人之父母求償醫療費及精神慰撫金。下列敘述，何者錯誤？","o":["甲拾得玩具飛機據為己有，屬一事實行為，故甲取得該玩具飛機之所有權","甲贈與乙玩具飛機之行為，對乙而言，屬純獲法律上利益，故該贈與契約有效","甲、乙二人遊玩間因飛機誤射而令丙頭部受傷，原則上屬甲、乙兩人共同侵害丙之身體健康權","甲、乙與其二人之父母原則上對丙負損害賠償責任"]},
{"n":11,"ans":2,"q":"甲與中古車商乙訂立買賣契約，向乙購買A車。乙之業務員丙明知該車曾經發生車禍，卻向甲偽稱該車未遭車禍，致甲決定訂約。關於買賣契約之效力，下列敘述，何者正確？","o":["買賣契約無效","買賣契約效力未定","甲得撤銷購買A車之意思表示","以乙明知其事實或可得而知者為限，甲始得撤銷"]},
{"n":12,"ans":1,"q":"甲為臺南市某歐洲進口傢俱公司，乙之女兒即將結婚，婚後住在臺北市，乙到甲公司門市部購買並指定A進口傢俱為其女兒嫁妝，甲公司表明該公司在臺南市是免費送到府，並以臺南市為清償地，無送外縣市之服務。經甲與乙雙方討論後，改以臺北市作為交付處所，由甲委託並交付A傢俱於丙貨運公司運送。運送途中，因為高速公路連環車禍，該批傢俱因此滅失，對此連環車禍，丙貨運公司之駕駛並無過失。下列敘述，何者錯誤？","o":["該進口傢俱於運送途中車禍，致A傢俱滅失，屬給付不能","依民法第373條有關危險負擔之規定，A傢俱滅失之風險尚未移轉於乙，乙得請求甲重新交付新傢俱","在甲將傢俱交付於丙貨運公司運送時，A傢俱滅失之風險已移轉於乙，乙不得請求返還價金","乙得請求甲讓與其對車禍肇事者之損害賠償請求權"]},
{"n":13,"ans":2,"q":"甲、乙、丙合夥成立一家民宿，甲、乙為出名營業人，丙為隱名合夥人，下列關於甲、乙、丙間合夥契約終止之敘述，何者正確？","o":["丙死亡時，丙之隱名合夥契約當然終止","丙受監護宣告時，丙與甲、乙間之隱名合夥契約當然終止","隱名合夥契約終止時，丙之出資因損失而減少者，僅返還其餘存額","隱名合夥契約終止後，甲、乙、丙間之合夥關係，即生解散之效力"]},
{"n":14,"ans":3,"q":"乙經營A餐廳，受新冠疫情衝擊，該餐廳生意受到嚴重影響，於是與甲訂立消費借貸契約。為確保乙對甲新臺幣（下同）2000萬元債務之清償，甲要求乙提供擔保，乙提供自己所有A餐廳之不動產所有權，為甲之債權設定普通抵押權，並委任其好友丙，提供連帶保證。但乙最終仍因經營不善，將其所經營之A餐廳全部（包含乙對甲之債務）轉讓於丁。嗣後，丁因投資股票不利而破產，甲直接向丙請求3000萬債務之履行，但甲拋棄對A餐廳之抵押權。下列敘述，何者正確？","o":["基於物保優先原則，丙得向甲主張，甲應先就乙自己所提供之A餐廳物權擔保行使抵押權","甲雖得向丙請求債務之清償，但丙得對甲行使先訴抗辯權","連帶保證人對債權人清償後，不得承受債權人對主債務人之債權","丙得主張，丁承擔乙之債務時，並未事先經其同意，其保證債務已因債務之承擔而消滅"]},
{"n":15,"ans":2,"q":"甲向乙購買商品一批轉賣於丙，甲、乙雙方約定付款之期限為：「丙付款於甲後，甲應立即支付貨款於乙」。嗣後，丙因經營不善倒閉而未能支付貨款於甲。下列敘述，何者正確？","o":["甲、乙之約定，不影響雙方之買賣契約之效力，乙仍得隨時請求甲付款","丙之付款為甲付款於乙之條件，因丙倒閉致條件不成就，乙不得請求甲付款","丙之付款為甲付款於乙之不確定期限，於丙倒閉時，甲應付款於乙之清償期屆至","丙之付款為甲付款於乙之不確定期限，於丙倒閉時，甲應即對乙負給付遲延責任"]},
{"n":16,"ans":1,"q":"甲將A屋出租於乙，每月租金新臺幣（下同）4萬元，並由乙交付5萬元押租金於甲。下列敘述，何者正確？","o":["押租金與租賃契約為個別獨立之契約，租賃契約消滅，押租金契約原則上不隨同消滅","押租金與租賃契約為個別獨立之契約，租賃契約之成立，不以押租金之交付為要件","押租金具有擔保租賃債務之功能，屬於民法上法定擔保物權","押租金契約原則上為諾成契約"]},
{"n":17,"ans":3,"q":"甲、乙、丙共同出資合夥經營A飲料店，因購買原料積欠丁債務。下列敘述，何者正確？","o":["丁得逕請求甲、乙、丙、A負連帶清償責任","丁得逕請求甲、乙、丙負連帶清償責任","丁僅得向A請求清償債務","A之財產不足清償對丁之債務時，丁始得請求甲、乙、丙負連帶清償責任"]},
{"n":18,"ans":0,"q":"買受人就買賣標的物之瑕疵，主張基於物之瑕疵擔保責任與不完全給付之債務不履行責任而解除契約。下列敘述，何者錯誤？","o":["二者均以出賣人就物之瑕疵有故意或過失者，買受人始得解除契約","瑕疵可補正者，主張不完全給付之買受人，須於催告出賣人補正而其不補正時，始得解除契約","買受人向出賣人主張物有瑕疵者，出賣人得定相當期限，催告買受人於其期限內是否解除契約","依物之瑕疵擔保責任而解除契約顯失公平之情形，買受人仍得依不完全給付之規定而解除契約"]},
{"n":19,"ans":1,"q":"甲有A建地，並登記為A地所有人。乙未經甲之同意，無權占有A地建屋居住長達25年之久。甲移居海外，不知乙無權占用A地一事，未曾請求乙返還A地。下列敘述，何者正確？","o":["關於消滅時效之規定，適用於A地返還請求權","乙得因時效取得，請求登記為A地之地上權人","乙因時效取得A地所有權而免除占用A地之損害賠償責任","乙得時效取得A地租賃權"]},
{"n":20,"ans":3,"q":"甲、乙與丙合夥經營事業，A地乃合夥財產，合夥股份各三分之一。甲未經乙與丙同意，將A地出租且交付於丁占有。下列敘述，何者正確？","o":["乙與丙均得單獨請求丁返還A地於自己","乙與丙均僅得共同請求丁返還A地於甲","乙與丙均得共同請求丁返還A地於乙與丙","乙與丙均得單獨請求丁返還A地於甲、乙與丙全體"]},
{"n":21,"ans":3,"q":"甲之A地與乙之B地相鄰，兩地均與公路有適宜聯絡，甲於民國80年起，於A地設置道路供自己快速直接通行至公路，並同意乙使用該道路通行。因該道路未設柵欄，雖甲已在路口設置私人道路告示，惟仍有不少民眾為方便而通行該道路。丙市府為維公眾通行安全，在該道路舖設柏油路面，並劃設交通標線。下列敘述，何者正確？","o":["乙得甲同意通行使用該道路，即成立不動產役權，乙亦得於該道路上設置廣告看板","乙得依鄰地通行權之相鄰關係，通行使用系爭道路","丙若在系爭道路範圍內之私有土地均辦理徵收，但因認定該道路已成為既成道路有公用地役關係，而以命令規定繼續使用，得不予同時徵收補償","如無特別法令依據，於該私設道路已符合司法院釋字第400號解釋意旨所稱既成道路前，甲非不得請求予以除去丙之道路維護行為"]},
{"n":22,"ans":0,"q":"甲有A轎車，乙有B轎車，二車同廠牌同類型。A轎車之引擎故障，甲取B轎車之引擎，裝在A轎車上。甲與丙訂立買賣契約，將A轎車（裝有B轎車之引擎）出賣於惡意之丙，並以移轉所有權之意思交付於丙。關於B轎車引擎之所有權歸屬，下列敘述，何者正確？","o":["歸屬於乙所有","歸屬於甲所有","歸屬甲、丙共有","歸屬乙、丙共有"]},
{"n":23,"ans":3,"q":"甲與乙分別共有A地，應有部分各二分之一，並登記於土地登記簿。甲與乙就共有之A地並未成立分管契約。甲以其應有部分設定普通抵押權於丙。嗣後乙向法院提起裁判分割共有物之訴。下列敘述，何者正確？","o":["甲與乙應經共有人全體之同意，始得訴請分割A地","自共有物分割效力發生時起，各共有人得請求其他共有人移轉其分得部分之所有權","若法院之確定分割判決，變價分配於甲，則丙之抵押權因抵押物滅失而消滅","若丙經訴訟告知，則其抵押權移存於甲分得之部分"]},
{"n":24,"ans":1,"q":"甲與乙訂立A地之借名登記契約，由甲將自丙所購買之A地所有權直接移轉登記於乙，以節省稅賦。乙未經甲同意，竟將A地出賣於善意不知該借名登記情事之丁，並已完成所有權移轉登記。依法院實務見解，下列敘述，何者正確？","o":["不動產借名登記契約為借名人甲與出名人乙間之物權契約","乙將A地移轉登記於丁之處分行為，為有權處分","乙將A地移轉登記於丁之處分行為，因係無權處分，其效力未定","甲若不欲承認乙之處分行為，得起訴主張乙違反委任契約，並代位乙請求丁塗銷A地登記返還於乙"]},
{"n":25,"ans":0,"q":"下列關於普通地上權之敘述，何者正確？","o":["地上權設定時，不以地上建築物或工作物之存在為必要，設定後亦不因建築物或工作物之滅失而消滅","未定期限而有支付地租約定之地上權，地上權人依法應於支付未到期之3年分地租後，始得拋棄其權利","地上權設定後，因不可抗力妨礙其土地之使用，依原定地租給付顯失公平者，地上權人得請求法院減免之","因不可歸責於地上權人之事由，致土地不能達原來使用之目的時，地上權當然消滅"]},
{"n":26,"ans":2,"q":"依現行民法規定，下列關於地上權之敘述，何者正確？","o":["在他人土地上種植竹木而使用其土地者，得設定普通地上權","普通地上權不得約定超過30年，超過者縮短為30年","普通地上權人就土地之使用收益有約定使用方法者，關於該方法之約定，非經登記，不得對抗第三人","區分地上權人與其設定之土地上下有使用、收益權利之人，約定相互間使用收益之限制時，如未得土地所有人同意者，該約定無效"]},
{"n":27,"ans":2,"q":"下列何者非屬權利質權設定之標的？","o":["股份有限公司股票","普通抵押權所擔保之債權","清光緒年間所製造發行之大清銀幣","著作財產權"]},
{"n":28,"ans":0,"q":"甲係經許可以受質為營業者，乙為借錢而移轉占有其首飾項鍊於甲，俾擔保甲之債權受償。乙屆期無力償債，未於取贖期間屆滿後5日內，取贖其首飾項鍊。下列敘述，何者正確？","o":["甲不得請求乙清償債務","甲應於拍賣該首飾項鍊前通知乙","甲得就首飾項鍊行使其權利，但所擔保之債權，若未全額受償，不足清償部分之債權，仍未消滅","甲對乙負有清算義務，甲須經清算，始取得首飾項鍊之所有權"]},
{"n":29,"ans":2,"q":"甲將其土地設定普通抵押權於乙，嗣後甲將該土地設定普通地上權於丙建築房屋。屆期甲未清償債務，乙實行抵押權而無人應買。關於丙房屋之處置，下列敘述，何者正確？","o":["甲非經抵押權人乙之同意，不得設定地上權於丙建築房屋，故乙得請求丙拆屋還地","因可歸責於甲之事由致土地價值減少時，乙得因此主張實行抵押權，拍賣抵押物","乙於必要時，得聲請法院將房屋與土地併付拍賣，但對房屋賣得價金不得主張優先受清償","乙得主張基於物權優先效力，先設定之抵押權效力及於地上權及地上房屋，一併拍賣而優先受清償"]},
{"n":30,"ans":1,"q":"甲有登記其名下之A地及A地上之B屋，甲僅以B屋設定典權於乙，約定期限20年，並附有到期不贖即作絕賣之條款，但該條款未經登記。嗣後，甲將A地讓售於丙，並完成所有權移轉登記。甲於典期屆滿後，不以原典價回贖。下列敘述，何者錯誤？","o":["甲於典期屆滿後，不以原典價回贖，乙不負清算義務，即取得B屋所有權","甲於典期屆滿後，不以原典價回贖，乙、丙間推定有租賃關係","甲於典期屆滿後，不以原典價回贖，縱使絕賣條款未經登記，乙仍取得B屋所有權","甲於典期屆滿後，不以原典價回贖，丙訴請乙拆除B屋返還土地，並無理由"]},
{"n":31,"ans":2,"q":"甲為A車所有人，A車乃古董車，全車原廠維修，且已報廢登記車籍。乙竊得A車，半年後，乙因酒駕致A車毀損。下列敘述，何者錯誤？","o":["甲請求乙返還占有A車之使用利益，有理由","甲請求乙賠償因A車毀損所受之損害，有理由","若乙於占有期間為A車整車之車體鍍金，則其請求該筆費用，有理由","若乙竊得A車後，隨即出賣且交付A車於丙。丙不知A車乃贓車，且就其不知無過失，則甲請求乙賠償因此所受之損害，有理由"]},
{"n":32,"ans":0,"q":"成年年齡由20歲下降至18歲，影響有關未成年人所為或所受身分行為之規定。下列關於民法規定之敘述，何者正確？","o":["夫妻之一方收養他方子女時，應長於被收養者16歲以上","未成年人結婚，應得法定代理人之同意","收養者之年齡，應長於被收養者18歲以上","男未滿17歲，女未滿15歲者，不得訂定婚約"]},
{"n":33,"ans":1,"q":"甲男與乙女為夫妻，於婚姻期間，甲與丙女外遇，乙亦與丁男外遇。下列敘述，何者錯誤？","o":["乙得向法院請求與甲離婚","乙因判決離婚生活陷於困難，得向法院請求甲給付相當之贍養費","乙不得因判決離婚請求所受之非財產上之損害賠償","若甲、乙為協議離婚，並未為贍養費之約定，雙方亦不得再向法院請求贍養費之給付"]},
{"n":34,"ans":0,"q":"甲男與乙女結婚後，因甲登山失蹤滿7年，法院依聲請為甲死亡宣告之裁定。嗣後，乙女與丙男結婚，而甲卻在乙、丙婚後生存歸來，法院為撤銷甲死亡宣告之裁定。關於乙之婚姻關係，下列敘述，何者正確？","o":["乙、丙雙方均善意時，乙、丙之後婚有效，甲、乙之前婚消滅","乙、丙中一人善意時，乙、丙之後婚有效，甲、乙之前婚消滅","不論乙、丙是否善意，乙、丙之後婚有效，甲、乙之前婚消滅","由乙決定甲、乙前婚或乙、丙後婚有效"]},
{"n":35,"ans":1,"q":"甲男乙女原為夫妻，於協議離婚時，約定由甲單獨行使或負擔未成年子女丙之權利、義務。嗣後，因丙考上知名高中，甲之父親丁贈送名牌A腳踏車一輛於丙。下列敘述，何者錯誤？","o":["甲依法有權管理丙之A腳踏車","甲依法得自由處分丙之A腳踏車","甲依法有權使用丙之A腳踏車","甲依法不須取得乙之同意，即得單獨管理丙之A腳踏車"]},
{"n":36,"ans":0,"q":"下列何種情事，依民法規定，不得請求法院酌定之？","o":["父母於子女出生登記前，就子女從父姓或母姓約定不成","父母對於未成年子女重大事項權利之行使意思不一致","夫妻之住所協議不成","夫妻離婚時，對於未成年子女權利義務之行使或負擔協議不成"]},
{"n":37,"ans":2,"q":"下列何者非屬剩餘財產分配之範圍？","o":["夫或妻婚前財產，於婚姻關係存續中所生之孳息","夫或妻婚後無償取得之財產，於婚姻關係存續中所生之孳息","夫或妻於婚姻關係存續中，改用法定財產制前所得之薪資","夫或妻於婚姻關係存續中，對他方所生之一般債權"]},
{"n":38,"ans":0,"q":"依民法規定，關於法院成立之調解離婚，婚姻關係於何時消滅？","o":["法院調解離婚成立時消滅","法院向戶政機關為調解離婚成立通知時消滅","一方當事人向戶政機關為離婚登記時消滅","雙方當事人向戶政機關為離婚登記時消滅"]},
{"n":39,"ans":2,"q":"甲女之胎兒丙，在丙出生前，即由甲及丙之生父乙代丙與丁訂立收養契約，作為丁之養子女。嗣後，戊醫師在甲懷孕丙期間為甲輸血，因戊之過失致甲感染病毒，並傳染於丙，而侵害丙之身體健康。下列敘述，何者正確？","o":["丙與丁之收養契約有效；在丙出生前，丙即得向戊請求損害賠償","丙與丁收養契約得撤銷；須於丙完全出生（非死產）時，丙始得向戊請求損害賠償","丙與丁收養契約無效；在丙出生前，丙即得向戊請求損害賠償","丙與丁之收養契約效力未定；須於丙完全出生（非死產）時，丙始得向戊請求損害賠償"]},
{"n":40,"ans":0,"q":"依民法規定，下列何者不得向法院聲請宣告變更為父姓或母姓？","o":["父母一方生死不明未滿三年者","父母雙方死亡者","父母離婚但約定共同行使權利者","父母一方遺棄子女多年者"]},
{"n":41,"ans":1,"q":"甲女單身收養乙男，經過5年，甲女與丙男結婚。乙男成年後，與丁女結婚。又經過多年，甲女死亡，法院許可乙男聲請終止甲、乙之收養關係。若乙男死亡，丁女與丙男結婚時，其效力如何？","o":["有效","無效","效力未定","得撤銷"]},
{"n":42,"ans":2,"q":"關於遺產酌給之請求及遺產管理，下列敘述，何者錯誤？","o":["遺產分割之費用，由遺產中支付之","遺產管理人應編製遺產清冊及為保存遺產必要之處置","被繼承人生前繼續扶養之人，應由遺產管理人決定酌給遺產","遺產管理人得請求報酬，由遺產中支付之"]},
{"n":43,"ans":1,"q":"甲男乙女為夫妻，有一未成年子丙。甲受監護宣告，法院指定甲之父戊為甲之監護人。乙立遺囑指定丁為丙之監護人。乙死亡後，下列何者為丙之監護人？","o":["甲","丁","戊","社會福利機構"]},
{"n":44,"ans":2,"q":"下列關於遺囑能力之敘述，何者正確？","o":["無意識或精神錯亂中所為之遺囑，得於回復常態後撤銷之","無行為能力人不得自為遺囑，須由其法定代理人代為之","滿16歲之限制行為能力人所為之遺囑，爾後不論成年與否，均得依遺囑方式撤回","未滿16歲之限制行為能力人，須得法定代理人允許，所為之遺囑方為有效"]},
{"n":45,"ans":1,"q":"繼承人未開具遺產清冊時，關於清償被繼承人之債務，下列敘述，何者錯誤？","o":["繼承人對於被繼承人債權人之無擔保債權，仍應按其數額，比例計算，以遺產分別償還","繼承人在違法清償後，得對不當受領之債權人，請求返還其不當受領之數額","繼承人按其行為能力，於違法清償被繼承人之債務時，異其責任","債權人得向法院聲請命繼承人於三個月內提出遺產清冊"]},
{"n":46,"ans":3,"q":"單親父親甲有子女乙、丙、丁、戊四人，其中乙育有一女己，丙育有一女庚，丁育有一子辛，戊育有一子壬。甲死亡時，下列關於代位繼承之敘述，何者錯誤？","o":["若乙與甲飛機失事同時死亡，己得代位繼承乙之應繼分","若丙於甲生前故意殺丁未遂但被判刑確定者，甲死亡時，由庚代位繼承丙之應繼分","若丁於甲死後首先發現其遺囑，但立即將其燒燬湮滅時，由辛代位繼承丁之應繼分","若戊於甲死後，依法辦理拋棄繼承時，由壬代位繼承戊之應繼分"]},
{"n":47,"ans":0,"q":"下列何種紛爭，當事人無法請求法院定之？","o":["繼承人就遺產之管理方法，既無法達成協議，亦無法達成民法第828條第2項準用第820條第1項有關共有物管理規定之決定","夫妻離婚時，就未成年子女權利義務之行使或負擔，無法協議達成由一方或雙方共同任之","扶養義務人與扶養權利人，就扶養費之金額，無法達成協議","繼承人與遺囑執行人，就遺囑執行之報酬，無法達成協議"]},
{"n":48,"ans":1,"q":"被繼承人甲有妻乙、子丙、孫丁與母戊，下列何者非屬民法第1145條所謂故意致應繼承人於死之情形？","o":["乙殺害丙","丁殺害戊","丙殺害乙","丁殺害丙"]},
{"n":49,"ans":3,"q":"甲有一子乙已成年。甲生前對丙、丁各負有債務新臺幣（下同）100萬元。甲死亡時，僅有遺產100萬元。乙未開具遺產清冊陳報法院，因此僅知甲對丙負有債務，對丁之部分，則毫無所知。乙將甲之遺產全部對丙清償。下列敘述，何者正確？","o":["乙依法負有限責任，對丁之部分，無須償還","乙得對丙請求返還50萬元","乙應以自己之財產，對丁償還100萬元","乙應以自己之財產，對丁償還50萬元"]},
{"n":50,"ans":0,"q":"甲、乙為夫妻，甲死亡時，乙與甲之兄妹丙、丁二人共同繼承。乙分得市價新臺幣（下同）600萬元之房屋。丙、丁各分得300萬元之古董、土地。丙分得之古董有瑕疵，經重新鑑價結果，僅價值180萬元。丙向乙、丁請求損害賠償時，丁已無支付能力，不能償還其分擔額。乙應分擔多少金額之損害？","o":["80萬元","75萬元","60萬元","90萬元"]},
{"n":51,"ans":0,"q":"關於民事訴訟上之訴訟權保障，下列敘述，何者正確？","o":["基於有權利即有救濟之憲法原則，非因犯罪而受損害之人，於刑事訴訟程序附帶提起民事訴訟者，如經刑事庭移送至民事庭，應許原告補繳裁判費，以補正起訴程式之欠缺","為保障當事人之聽審請求權，交付法庭錄音光碟之聲請，縱已逾越法定期限，亦應准許之","當事人因重大過失，逾時始行提出攻擊或防禦方法，有礙訴訟之終結者，法院仍應許其提出，以保障聽審請求權","基於當事人訴訟權之保障，上訴人有律師為訴訟代理人者，如未依規定預納上訴審之裁判費，法院亦應給予補正之機會，不得逕認上訴不合法"]},
{"n":52,"ans":2,"q":"下列何種情形，受訴法院有管轄權？","o":["甲住臺南市，乙住臺中市，甲、乙共有坐落臺南市之A地，甲向乙住所所在之臺灣臺中地方法院起訴，請求分割A地","甲住新竹市，乙住新竹縣，甲所有坐落苗栗縣之A建物遭乙無權占有，甲向臺灣新竹地方法院（下稱新竹地院）提起所有物返還訴訟，請求乙騰空返還A建物，乙已到庭應訴為本案之言詞辯論","甲住新竹市，乙住桃園市，甲向乙購買坐落桃園市之A地，雙方簽訂不動產買賣契約書之書面，契約書載有如因該買賣契約爭議而涉訟，以新竹地院為第一審管轄法院，嗣乙拒絕履行該買賣契約，甲向新竹地院起訴請求乙履行契約移轉A地","甲住新竹市，乙住新竹縣，甲所有坐落苗栗縣之A地遭人冒名設定抵押權予乙，甲乃以該抵押權不存在為由，向新竹地院起訴，請求乙塗銷該抵押權登記"]},
{"n":53,"ans":3,"q":"甲列乙為被告向行政法院起訴，經行政法院移送到民事法院，民事法院認為無審判權，下列敘述，何者錯誤？","o":["原則上民事法院應裁定停止訴訟程序，請求最高法院指定有審判權之管轄法院","甲、乙均具狀或記明筆錄表示合意由民事法院裁判，則民事法院不得裁定停止訴訟程序","於指定有審判權之管轄法院前，甲和乙應有陳述意見之機會","民事法院就行政法院移送之訴訟為裁判，上級法院仍可以無審判權為由廢棄裁判"]},
{"n":54,"ans":1,"q":"未成年人甲1、甲2共同毆打乙致傷，乙乃列甲1之法定代理人丙1、甲2之法定代理人丙2為共同被告，均依民法第187條第1項規定起訴請求賠償。下列敘述，何者錯誤？","o":["第一審法院判決乙全部勝訴者，如僅丙1提起上訴，有關丙2部分之判決即先行確定","丙1為時效完成得拒絕給付之抗辯者，縱丙2未援用該抗辯，法院仍得據以駁回乙所提全部之訴","乙得僅與丙2成立訴訟上和解，並續行對於丙1部分之訴訟","乙主張其受有肢體傷害之事實經丙1自認者，如丙2並未自認，有關丙2部分之訴訟，法院不受丙1之自認所拘束"]},
{"n":55,"ans":1,"q":"甲為投資客，向乙買受A屋後又轉賣予丙，丙嗣後主張A屋有漏水情事，起訴請求甲減少價金。甲表示其持有A屋時間不到1個月，對A屋實際上狀況不清楚，應該是乙比較清楚實際上屋況，遂請求法院對乙為訴訟告知。下列敘述，何者正確？","o":["甲於言詞辯論期日得以言詞為訴訟告知之表示，並由書記官記明筆錄，再將筆錄送達予乙即可","訴訟告知之目的在使受告知人得準備為訴訟行為，故如甲提出告知書狀時，非由甲逕自送達乙，而應由法院將書狀送達給乙及丙","乙受訴訟告知後，因有利害關係，故必須參加訴訟，但對於參加於甲或丙之訴訟，有其自由","告知訴訟後，為確保乙權益，法院應於乙參加前裁定停止訴訟程序"]},
{"n":56,"ans":3,"q":"同日在A公司經營之樂園遊玩，因設備故障受有損害之甲、乙、丙等共30人，擬起訴向A公司請求損害賠償。關於選定當事人制度，下列敘述，何者錯誤？","o":["甲、乙、丙等共30人得在30人中選定甲1個人或同時選定甲、乙、丙，為30人全體起訴","訴訟繫屬後，甲、乙、丙等共30人選定甲1個人為被選定人，則其他29人脫離訴訟","選定乙為被選定人及其更換、增減，均應以文書證之","選定人不得在文書上載明或以書狀提出於法院限制被選定人丙捨棄、認諾、撤回、和解之權限"]},
{"n":57,"ans":2,"q":"關於訴訟標的價額之計算，下列敘述，何者錯誤？","o":["因撤銷詐害債權涉訟，以債權人主張之債權額為準；但被撤銷法律行為標的之價額低於債權人所主張之債權額時，以該被撤銷之標的價額為準","債權人代位債務人向第三人提起訴訟者，以債務人與第三人間之權利義務關係為準","因分割遺產涉訟，以全部遺產於起訴時之總價值為準","訴訟標的之價額不能核定者，以民事訴訟法所定不得上訴第三審之最高利益額數加十分之一定之"]},
{"n":58,"ans":1,"q":"關於民事訴訟上法院命合併或分別辯論之職權，下列敘述，何者錯誤？","o":["甲、乙分別對丙提起之訴訟，經法院命合併辯論者，應依共同訴訟之規定辦理之","經合併辯論之數宗訴訟，其當事人俱不相同或僅有一造相同者，法院不得合併裁判","甲合併對乙、丙提起之訴訟，其訴訟標的對於乙、丙必須合一確定者，法院不得命分別辯論","甲對乙提起預備合併之訴，其先、備位之訴不能同時併存者，法院不得命分別辯論"]},
{"n":59,"ans":3,"q":"當事人經合法送達，關於其無正當理由而未於期日到場之效力，下列敘述，何者錯誤？","o":["言詞辯論期日原告到場、被告未到場時，原告得聲請一造辯論判決","言詞辯論期日原告未到場、被告到場時，如被告拒絕辯論，則視為合意停止訴訟程序","言詞辯論期日，兩造均未到場時，除別有規定外，視為合意停止訴訟程序","言詞辯論期日原告未到場時，被告不能聲請一造辯論判決，僅能由法院依職權判定是否宜一造辯論而為判決"]},
{"n":60,"ans":1,"q":"關於民事訴訟上之突襲性裁判，下列敘述，何者錯誤？","o":["原告於言詞辯論期日當庭追加某請求權基礎，此前被告就該請求權基礎未有主張聲明或陳述之機會者，如法院逕諭知辯論終結，並依該請求權基礎判決原告勝訴，應屬突襲性裁判","當事人主張之事實，究竟該當於發生何項法律關係，乃屬法官依職權所為之法律適用問題，不受當事人主張或陳述之拘束，是法院所認當事人間之法律關係，與當事人所陳述或表明者，縱有不同，逕採為判決之基礎，亦無突襲性裁判可言","當事人所未提出之事實，係法院於審理過程中知悉其存在者，如法院遽行以之為判決之基礎，即生突襲性裁判","原告已陳明僅主張甲請求權基礎，沒有要主張乙請求權基礎者，如法院認甲請求權基礎不存在，即行判決原告敗訴，尚非突襲性裁判"]},
{"n":61,"ans":3,"q":"甲機關起訴主張乙於任職期間，借用A宿舍，現乙已退休，使用借貸之目的完畢，請求乙返還A宿舍。乙則抗辯使用借貸之目的尚未完畢，如法院認其仍應返還宿舍，因其每月之退休金僅新臺幣（下同）2萬元，生活困難，聲請法院酌給適當履行期間，利其謀得棲身之所。第一審法院審理結果，認為乙應返還A宿舍予甲，並定履行期間。關於履行期間部分，下列敘述，何者錯誤？","o":["就應否給予履行期間，法院應令甲、乙進行辯論","訴訟中經甲同意，法院得給予乙1年之履行期間","甲、乙未能達成合意，第一審法院審理後發現乙確實生活困難，孤身一人，並無親友，得酌定給予2年之履行期間","第一審於民國111年3月13日宣示判決乙應返還宿舍，但履行期間2年。甲得提供150萬元為乙擔保後得假執行。該判決於111年3月16日送達乙，於同年4月30日確定。甲未供擔保聲請假執行，乙之履行期間應自判決確定之日起算"]},
{"n":62,"ans":1,"q":"原告甲列乙為被告，向該管法院起訴，訴之聲明為：乙應給付甲新臺幣（下同）200萬元。其事實主張略以：乙於民國110年1月10日向甲購買貨品一批，價金為200萬元，乙為支付該價金，乃簽發同額支票交付予甲，經提示後竟遭退票，爰依票據關係，求為判決如訴之聲明等語。經受訴法院向甲闡明，依其聲明及事實上之陳述，尚得主張買賣價金給付請求權。下列敘述，何者正確？","o":["經闡明後，不問甲有無表明要主張價金給付請求權，依法官知法原則，應就甲之票款給付請求權及買賣價金給付請求權是否有理由均逐一為本案審理，並為本案判決","經闡明後，如甲表明要合併主張依買賣關係請求乙給付價金時，甲不得請求依選擇合併之方式為本案審理","經闡明後，甲表明在本件訴訟亦要一併主張依買賣關係請求時，則受訴法院應適用通常訴訟程序為本案審判","經闡明後，甲表明在本件訴訟亦要一併主張依買賣關係請求，而乙抗辯甲之票款請求已經罹於消滅時效時，甲不得請求受訴法院先就價金債權存否為本案審判"]},
{"n":63,"ans":3,"q":"原告甲列乙為被告，向管轄法院起訴請求判決命乙給付新臺幣（下同）200萬元，主張：丙於某日向甲借用200萬元，由乙為其保證人，未依約定期限償還借款，為此提起本訴訟等語。對此，乙聲明求為判決駁回甲之請求，辯稱：丙對甲不負有借款債務，所以乙無須負保證責任云云。下列敘述，何者錯誤？","o":["丙經法院許可後，得參加本訴訟之和解","丙於參加本訴訟之和解後，得與甲、乙一同提出書狀向本訴訟之受訴法院表明在甲請求金額之150萬元以內，三人均願意照法院所定方案來解決紛爭","在本訴訟之和解程序上，甲與丙同意由丙償還系爭借款200萬元經記明和解筆錄後，甲得據此為執行名義","法院將和解方案送達於聲請定和解方案之丙時，視為和解成立，與確定判決有同一之效力，此後在甲訴請丙償還系爭借款債務（主債務）之後訴訟，該2人均不得再爭執該主債務存否"]},
{"n":64,"ans":1,"q":"關於判決基礎資料之蒐集，得否將當事人本人作為證據方法加以調查，下列敘述，何者錯誤？","o":["在受訴法院認為當事人本人所親身經歷之事實可資以推定應證事實存否時，法院得命該當事人本人到庭為陳述，無須先經他造當事人之同意","法院為了蒐集證據資料以形成心證認為有需通知某一造當事人本人在言詞辯論期日到庭陳述時，如該本人不從法院之命而無正當理由不到場，法院於必要時，尚得命將該本人拘提到庭","受訴法院認為當事人本人所親身經歷之事實可資以推定應證事實存否，乃命該本人到庭，此時如受訊問事項涉及其職務上或業務上應遵守秘密義務者，該本人得拒絕陳述","法院為了蒐集證據資料以形成心證認為有需通知某一造當事人本人在言詞辯論期日到庭陳述時，如該本人到庭而拒不陳述，經法院闡明後亦不說明具體之理由，則法院得予以審酌並依自由心證認定應證事實之存否"]},
{"n":65,"ans":3,"q":"下列何者，不符合民事訴訟法規定之證據調查方法？","o":["囑託臺灣證券交易所調查被告在集中交易市場之證券交易明細","囑託他法院詢問住在當地之證人","前往法院轄區外勘驗房屋狀態、利用狀況，並囑託內政部國土測繪中心測量該房屋坐落位置及面積","囑託臺北市結構工程工業技師公會鑑定房屋結構安全，並命該公會指派之主辦鑑定技師在結文具結後，作成鑑定報告送交法院"]},
{"n":66,"ans":1,"q":"關於法院進行之調解，下列敘述，何者錯誤？","o":["當事人成立之調解，與確定判決具有相同之效力","移付調解限於第一審程序，第二審程序不得為之","起訴前之調解成立後，當事人得提起宣告調解無效或撤銷調解之訴","當事人合意起訴前應先行調解者，一方逕行起訴，經他方為本案之言詞辯論後，不得再抗辯調解先行"]},
{"n":67,"ans":3,"q":"關於簡易訴訟程序與通常訴訟程序之轉換，下列敘述，何者錯誤？","o":["甲訴請乙返還借款新臺幣（下同）40萬元，嗣於訴訟中擴張為60萬元，除甲、乙合意繼續適用簡易訴訟程序外，應由簡易庭法官裁定改用通常訴訟程序並繼續審理","甲訴請乙返還借款40萬元，嗣於訴訟中擴張為60萬元，如乙逕為本案言詞辯論，應視為已有適用簡易訴訟程序之合意，並繼續適用簡易訴訟程序審理","甲訴請乙返還借款60萬元，嗣於訴訟中減縮為40萬元，應由普通庭法官裁定改用簡易訴訟程序並繼續審理","甲訴請乙返還借款60萬元，嗣於訴訟中減縮為40萬元，然法院仍繼續適用通常訴訟程序審理並判決，經乙向高等法院提起上訴，高等法院應適用通常訴訟事件第二審程序審理"]},
{"n":68,"ans":1,"q":"關於小額訴訟之審理程序，下列敘述，何者錯誤？","o":["法院認為適用小額程序不適當，得依職權以裁定改用簡易程序，並由原法官繼續審理","當事人均不得為適用小額程序而為一部請求","調查證據所需時間、費用與當事人請求顯不相當時，法院得不調查證據，審酌一切情況，認定事實，為公平之裁判","當事人為訴之變更、追加或提起反訴，致請求給付超過新臺幣10萬元，除兩造合意繼續適用小額程序並經法院認為適當外，不得為之"]},
{"n":69,"ans":3,"q":"甲以其他全部共有人乙、丙、丁為被告，起訴請求分割共有土地，經一審法院判決後，乙對一審判決聲明不服，合法提起上訴。下列敘述，何者正確？","o":["若丙、丁對一審判決並未聲明不服，乙上訴效力即不及於丙、丁2人","乙於二審法院審理中，向法院具狀撤回上訴，無待通知其他當事人，即生撤回上訴之效力","丙於二審法院審理中，將其應有部分移轉予戊，法院應依聲請或依職權命戊承受訴訟","訴外人己主張丁之應有部分實為其借名登記，己已取得確定判決命丁返還該借名登記之應有部分，惟尚未依確定判決辦理登記，己可聲請參加訴訟"]},
{"n":70,"ans":0,"q":"甲主張乙侵害其名譽權，依民法第184條第1項前段、第195條第1項規定，起訴請求乙賠償非財產上損害新臺幣180萬元。經第一審法院判決甲全部敗訴，甲提起第二審上訴，仍遭第二審法院駁回上訴。下列敘述，何者正確？","o":["甲所委任之律師，以第二審判決有不備理由之違法，提起第三審上訴，不必於上訴理由狀中具體敘述為從事法之續造，確保裁判之一致性或其他所涉及之法律見解具有原則上重要性之理由","甲就第二審判決，委任律師提起第三審上訴，不論上訴理由為何，均毋庸經第三審法院許可","甲委任律師為訴訟代理人提起第三審上訴，如被上訴人乙未委任律師為訴訟代理人，法院應速命其補正","甲不得提起第三審上訴"]},
{"n":71,"ans":3,"q":"原告甲起訴請求判決命被告乙返還借款新臺幣（下同）900萬元，主張：乙向甲借款900萬元，於民國113年6月6日簽發面額1,000萬元、到期日為同年10月6日之本票一紙交予甲作為清償方法，屆期經提示未獲兌現，為此請求乙返還借款等語。第一審經本案審理後判決駁回原告之訴，甲上訴後，第二審改判命乙償還借款1,000萬元，乙上訴於第三審。下列敘述，何者正確？","o":["第二審法院為訴外裁判，屬違背法令，第三審法院應將第二審判決廢棄，全部發回更審","第三審法院發回更審時，指出乙有無向甲借款900萬元之事實尚待查明，第二審更審法院須受該發回意旨之拘束，僅得調查該事實","第二審判決命乙給付超過甲請求金額100萬元之部分，既為訴外裁判，當然無效，乙不須上訴，第三審法院亦不須將該部分廢棄","乙在事實審始終否認借款之事實，第二審法院僅以乙有簽發本票之事實為憑，別無其他佐證，即認定兩造間因訂立消費借貸契約而有借貸關係，第三審法院得以第二審法院之事實認定違背經驗法則及證據法則為由，廢棄原判決"]},
{"n":72,"ans":0,"q":"關於簡易訴訟程序之第二審判決提起第三審上訴者，下列敘述，何者錯誤？","o":["當事人於判決送達後提起第三審上訴，但未同時表明上訴理由者，法院應命其補正之","當事人提起第三審上訴，惟該事件所涉之法律見解如不具有原則上重要性者，原法院應駁回其上訴","若其上訴利益額已逾上訴第三審之上訴利益額者，當事人應以其適用法規顯有錯誤為理由，向最高法院提起上訴","當事人提起第三審上訴時，應經原裁判法院之許可"]},

{"n":75,"ans":0,"q":"甲持有付款人為乙銀行之系爭支票1張，因故不慎遺失，經辦理票據掛失止付後，擬向法院聲請公示催告及除權判決。下列敘述，何者錯誤？","o":["法院依書面審理，審查聲請人所提出之事證，如認符合法律規定，即得以除權判決宣告系爭支票無效","甲得於公示催告裁定所定申報權利之期間已滿後3個月內，聲請除權判決","甲具狀向法院聲請公示催告後，法院應就該聲請為裁定；法院准許聲請者，應為公示催告","應由證券所載履行地之法院，即付款人乙銀行所在地之法院管轄"]},
