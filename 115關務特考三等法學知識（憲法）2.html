<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115年關務特考三等法學知識</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --border: #e2e6ea;
    --text: #2d3748;
    --muted: #718096;
    --accent: #4a6cf7;
    --accent-light: #eef1fe;
    --flag-default: #cbd5e0;
    --flag-on: #f6ad55;
    --flag-border: #f6ad55;
    --flag-bg: #fffaf0;
    --answer-hidden: #ffffff;
    --answer-text: #1a202c;
    --radius: 10px;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--accent);
    color: #fff;
    padding: 28px 24px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(74,108,247,0.25);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
  }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .header-meta { font-size: 13px; opacity: 0.88; margin-bottom: 14px; }
  .header-meta span { margin-right: 18px; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.5);
    color: #fff;
    padding: 6px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.15s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: #fff;
    color: var(--accent);
    border-color: #fff;
  }
  .flag-count {
    margin-left: auto;
    background: var(--flag-on);
    color: #7b3f00;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }

  .export-group {
    display: flex;
    gap: 8px;
  }
  .export-btn {
    background: rgba(255,255,255,0.13);
    border: 1.5px solid rgba(255,255,255,0.45);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .export-btn:hover { background: rgba(255,255,255,0.28); }

  .sync-btn {
    background: #fff;
    color: var(--accent);
    border: 1.5px solid #fff;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .sync-btn:hover { background: #eef1fe; }
  .sync-btn:disabled { opacity: 0.6; cursor: default; }
  .sync-status {
    font-size: 12px;
    opacity: 0.85;
    white-space: nowrap;
  }

  /* ── Main ── */
  .main {
    max-width: 900px;
    margin: 24px auto;
    padding: 0 16px 60px;
  }

  /* ── Question Card ── */
  .q-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, background 0.2s;
  }
  .q-card.flagged {
    border-color: var(--flag-border);
    background: var(--flag-bg);
  }
  .q-card.hidden-by-filter { display: none; }

  /* ── Card header row ── */
  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 14px 16px 0;
  }

  .q-num {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .q-card.flagged .q-num {
    background: var(--flag-on);
    color: #7b3f00;
  }

  /* Answer cell — hidden by default, shown on hover */
  .q-answer {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--answer-hidden);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: var(--answer-hidden); /* invisible */
    user-select: text;
    cursor: default;
    transition: color 0.15s;
  }
  .q-card:hover .q-answer {
    color: var(--accent);
    border-color: var(--accent);
  }

  .flag-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 6px;
    border: 1.5px solid var(--flag-default);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: border-color 0.15s, background 0.15s;
    color: var(--flag-default);
  }
  .flag-btn:hover, .q-card.flagged .flag-btn {
    border-color: var(--flag-on);
    background: #fff3e0;
    color: var(--flag-on);
  }

  .flagged-badge {
    display: none;
    background: var(--flag-on);
    color: #7b3f00;
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    padding: 2px 7px;
    align-self: center;
  }
  .q-card.flagged .flagged-badge { display: inline-block; }

  .q-text {
    flex: 1;
    font-weight: 500;
    font-size: 15px;
    padding-top: 6px;
  }

  /* ── Options ── */
  .q-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 20px;
    padding: 10px 16px 14px 98px;
  }
  .option-row {
    display: flex;
    align-items: flex-start;
    gap: 4px;
  }
  .uncertain-btn {
    flex-shrink: 0;
    width: 22px;
    height: 28px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 14px;
    color: var(--flag-default);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.12s, transform 0.12s;
    margin-top: 6px;
  }
  .uncertain-btn:hover { color: #d97706; transform: scale(1.15); }
  .uncertain-btn.active { color: #d97706; }
  .option {
    flex: 1;
    font-size: 14px;
    color: var(--muted);
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: background 0.12s, border-color 0.12s;
    user-select: none;
  }
  .option:hover { background: #f1f5f9; border-color: #e2e8f0; }
  .option .opt-label {
    font-weight: 600;
    color: var(--text);
    margin-right: 4px;
  }
  /* 答錯：紅色 + 刪除線 */
  .option.picked-wrong {
    background: #fff1f1;
    border-color: #fca5a5;
    color: #b91c1c;
    text-decoration: line-through;
  }
  .option.picked-wrong .opt-label { color: #b91c1c; }
  /* 答對：綠色 */
  .option.picked-correct {
    background: #f0fdf4;
    border-color: #86efac;
    color: #15803d;
  }
  .option.picked-correct .opt-label { color: #15803d; }
  /* 疑惑：橘色虛線框 */
  .option-row.is-uncertain .option {
    border-color: #fcd34d;
    border-style: dashed;
    background: #fffbeb;
  }

  @media (max-width: 560px) {
    .q-options { grid-template-columns: 1fr; padding-left: 62px; }
    .header h1 { font-size: 17px; }
  }

  /* ── Explanation ── */
  .q-explain-bar {
    padding: 0 16px 12px 98px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .explain-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    border: 1.5px solid #c7d2fe;
    border-radius: 20px;
    padding: 5px 14px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .explain-btn:hover { background: #dde4ff; }
  .explain-btn .icon { font-size: 15px; }

  .explain-box {
    display: none;
    margin: 0 16px 14px 98px;
    background: #f8faff;
    border: 1.5px solid #c7d2fe;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }
  .explain-box.open { display: block; }
  .explain-box .explain-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .explain-textarea {
    width: 100%;
    min-height: 100px;
    border: 1.5px solid #c7d2fe;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.8;
    color: var(--text);
    background: #fff;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  .explain-textarea:focus { border-color: var(--accent); }
  .explain-saved-hint {
    font-size: 11px;
    color: #6b7280;
    margin-top: 6px;
    min-height: 16px;
    transition: opacity 0.3s;
  }

  .q-divider {
    height: 1px;
    background: var(--border);
    margin: 0 16px;
  }

  @media (max-width: 560px) {
    .q-explain-bar { padding-left: 16px; }
    .explain-box { margin-left: 16px; }
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 15px;
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>115 年公務人員特種考試關務人員考試試題</h1>
    <div class="header-meta">
      <span>考試別：關務人員考試</span>
      <span>等別：三等考試</span>
      <span>科目：法學知識（含憲法、法學緒論）</span>
      <span>共 50 題，每題 2 分</span>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">全部題目</button>
      <button class="filter-btn" id="btn-flagged" onclick="setFilter('flagged')">已標記</button>
      <div class="flag-count" id="flag-count">🚩 已標記 0 題</div>
      <div class="export-group">
        <button class="export-btn" onclick="exportNotes('flagged')" title="匯出已標記題目筆記">📥 匯出已標記</button>
        <button class="export-btn" onclick="exportNotes('all')" title="匯出全部題目筆記">📄 匯出全部</button>
      </div>
      <button class="sync-btn" id="sync-btn" onclick="syncData()" title="與雲端同步作答進度">☁️ 同步</button>
      <span class="sync-status" id="sync-status"></span>
    </div>
  </div>
</div>

<div class="main" id="main">
  <!-- Questions injected by JS -->
</div>

<div class="empty-state" id="empty-state" style="display:none">
  <div class="icon">🚩</div>
  <div>尚未標記任何題目<br>點擊題目左側旗幟按鈕，即可標記容易出錯的題目</div>
</div>

<script>
const QUESTIONS = [
  {
    n: 1,
    q: "憲法第 154 條規定，勞資糾紛之調解與仲裁，以法律定之，其性質為何？",
    a: "B",
    opts: ["方針條款，不具效力", "憲法委託，具有拘束力", "制度性保障，不具效力", "公法權利，具有拘束力"]
  },
  {
    n: 2,
    q: "依憲法增修條文規定，立法院得對行政院院長提出不信任案，下列敘述何者錯誤？",
    a: "C",
    opts: ["其提出須經全體立法委員三分之一以上連署", "其通過須經全體立法委員二分之一以上贊成", "若不信任案未獲通過，對同一行政院院長任期內不得再提不信任案", "不信任案通過，行政院院長應提出辭職"]
  },
  {
    n: 3,
    q: "依司法院大法官解釋，關於憲法上人民之被選舉權，下列敘述何者錯誤？",
    a: "A",
    opts: ["於選舉辦理完畢後，始就候選人資格之准駁處分提起救濟，因無實益，法院無須受理", "就總統副總統之參選，以連署及保證金之規定防止人民任意參選，係屬合憲規定", "法律就各級民意代表候選人之學經歷加以限制，並未違憲", "依有無政黨推薦而對參選人收取不等額之登記保證金，違反平等保障"]
  },
  {
    n: 4,
    q: "法官於審理案件時，對於應適用之法律，依其合理之確信，認為有牴觸憲法之疑義者，各級法院得以之為先決問題，裁定停止訴訟程序。得裁定停止之「程序」，包括下列何者？",
    a: "C",
    opts: ["僅指各該事件或案件之民刑事訴訟，但不包括非訟程序", "係指各該事件或案件之所有訴訟程序，但不包括非訟程序", "係指各該事件或案件之所有訴訟或非訟程序", "僅指各該事件或案件之民刑事訴訟與非訟程序"]
  },
  {
    n: 5,
    q: "權力分立之主要目的在於透過下列何者之適當分工，以確保人民之自由與權利？",
    a: "C",
    opts: ["資本市場", "政黨權力", "國家權力", "國防安全"]
  },
  {
    n: 6,
    q: "依司法院釋字第 803 號解釋意旨，關於原住民受憲法所保障從事狩獵活動之文化權利，下列敘述何者錯誤？",
    a: "C",
    opts: ["包括精神性思想、價值、信仰、禮俗規範等", "包括傳承已久之食物取得方式、日常飲食習慣與物質生活方式等", "包含原住民因營利目的所從事之狩獵活動", "除有特殊例外，原住民得獵捕、宰殺或利用之野生動物，不包括保育類野生動物"]
  },
  {
    n: 7,
    q: "憲法第 10 條規定人民有居住及遷徙之自由，係指人民有選擇其居住處所，以及下列何種之自由？",
    a: "D",
    opts: ["財務自主", "選擇工作", "與任何人來往", "營私人生活"]
  },
  {
    n: 8,
    q: "關於憲法第 13 條宗教信仰自由對於佛教徒之保障，下列敘述何者正確？",
    a: "C",
    opts: ["僅保障內心信仰佛教之自由，不保障參加佛教法會之自由", "僅保障內心信仰佛教以及參加佛教法會之自由，不保障組成佛教團體之自由", "保障內心信仰佛教之自由、參加佛教法會之自由，以及組成佛教團體之自由", "不保障佛教徒不信仰基督教之自由"]
  },
  {
    n: 9,
    q: "依司法院大法官解釋，下列何者違反平等原則？",
    a: "D",
    opts: ["中央主管機關依廢棄物清理法第15條公告以容器商品製造業者，而非容器之製造業者，負回收清除等責任", "菸害防制法第9條第8款限制菸品業者以公司名義贊助任何形式之活動", "依毒品危害防制條例第12條第2項規定，意圖供製造毒品之用而種大麻者，不適用同法第17條第2項之減刑規定", "非都市土地之交通用地且依法核定為公共設施用地者，不適用免除增值稅之規定"]
  },
  {
    n: 10,
    q: "依司法院大法官解釋意旨，有關徵收程序之憲法要求，下列敘述何者錯誤？",
    a: "D",
    opts: ["徵收計畫確定前，應聽取土地所有權人及利害關係人之意見", "徵收之補償不僅需相當，更應儘速發給", "區段徵收申請發給抵價地之申請期限規定，應確保利害關係人及時獲知相關資訊", "國家所負之程序保障義務，不僅及於徵收前，並及於徵收時；惟並不及於徵收完成後"]
  },
  {
    n: 11,
    q: "甲為公立大學學生，因與老師乙發生爭辯，因此指責乙有理解障礙。乙認為受到甲之羞辱，要求學校依據校規對甲記警告一次。甲對此一警告不服，下列敘述何者正確？",
    a: "D",
    opts: ["警告未影響甲之學生身分，甲僅得循校內學生申訴管道救濟", "警告影響甲之名譽，甲應提起民事訴訟，請求學校撤銷警告處分，回復原狀", "警告屬教育管理措施，甲得提起訴願，但不得提起行政訴訟", "警告有侵害甲之權利之可能，甲得提起相應之行政救濟"]
  },
  {
    n: 12,
    q: "在1997年修憲前，依司法院釋字第387及419號解釋，立法院或總統改選後，行政院院長是否應辭職？",
    a: "A",
    opts: ["新國會第一次集會前，行政院院長有辭職之義務，但新總統就職時，行政院院長只是禮貌性辭職，並無辭職之憲法義務", "新國會第一次集會前，行政院院長只是禮貌性辭職，但新總統就職時，行政院院長有辭職之憲法義務", "無論是新國會第一次集會時，或新總統就職時，行政院院長均有率內閣總辭之憲法義務", "無論是新國會第一次集會時，或新總統就職時，行政院院長均無率內閣總辭之憲法義務"]
  },
  {
    n: 13,
    q: "依憲法增修條文及立法院職權行使法，關於行政院向立法院提出報告之規定，下列敘述何者錯誤？",
    a: "D",
    opts: ["新任行政院院長應於就職後2週內，向立法院提出施政方針之報告", "行政院院長或有關部會首長遇有重要事項發生或施政方針變更時，應主動提出報告", "所謂施政方針主要是施政前之說明，施政報告則是施政後之說明", "施政方針或施政報告乃專屬行政院之權責，立法院並無請求報告或對於報告為諮詢之權利"]
  },
  {
    n: 14,
    q: "依憲法增修條文規定，政黨之目的或行為危害自由民主憲政秩序者，得予以解散。下列敘述何者正確？",
    a: "D",
    opts: ["主管機關得聲請最高行政法院為宣告政黨解散之判決", "監察院得聲請憲法法庭為宣告政黨解散之判決", "監察院得聲請最高行政法院為宣告政黨解散之判決", "主管機關得聲請憲法法庭為宣告政黨解散之判決"]
  },

    opts: ["勞工於職業災害醫療期間不堪勝任工作者，雇主得強制該勞工退休", "勞工年滿65歲者，雇主即不得僱用", "工作規則中規定強制退休年齡為67歲，雇主仍得於勞工年滿65歲時，強制勞工退休", "勞工身心障礙不堪勝任工作者，雇主得強制該勞工退休"]
  },
  {
    n: 48,
    q: "依勞工保險條例規定，因被保險人故意犯罪行為，以致發生保險事故者，關於保險給付，下列敘述何者正確？",
    a: "C",
    opts: ["於被保險人假釋期間始發給保險給付", "於被保險人受有期徒刑以上刑之宣告，執行完畢或赦免後，始發給保險給付", "概不給與保險給付", "以退保論，繳納之保險費則予退還"]
  },
  {
    n: 49,
    q: "為保障工作權之性別平等，性別平等工作法訂有各項相關措施，下列何者錯誤？",
    a: "D",
    opts: ["主管機關辦理之職業訓練，訓練期間應提供婦女托兒設施", "性騷擾防治措施應納入勞動檢查項目", "女性受僱者每月得請生理假1日，薪資減半發給", "受僱者如於休息時間外哺乳1小時，得請求彈性延長工時以補足工作時間"]
  },
  {
    n: 50,
    q: "有關家庭暴力防治法民事保護令，下列敘述何者正確？",
    a: "C",
    opts: ["被害人得向法院聲請緊急保護令", "通常保護令之聲請，得以任何形式為之，不以書面為限", "民事保護令有效期間之延長，每次為2年以下，無次數之限制", "民事保護令事件之審理應公開之"]
  }
];

const LABELS = ['A','B','C','D'];
const STORAGE_KEY     = 'exam_flags_115_customs_3';
const EXPLAIN_KEY     = 'exam_explains_115_customs_3';
const ANSWER_KEY      = 'exam_myanswers_115_customs_3';
const UNCERTAIN_KEY   = 'exam_uncertain_115_customs_3';
const CLOUD_KEY       = 'exam_115_customs_3_progress';  // shared cloud key (single-user mode)
let currentFilter = 'all';
let isSyncing = false;

function loadFlags()      { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))    || {}; } catch { return {}; } }
function loadExplains()   { try { return JSON.parse(localStorage.getItem(EXPLAIN_KEY))    || {}; } catch { return {}; } }
function loadMyAnswers()  { try { return JSON.parse(localStorage.getItem(ANSWER_KEY))     || {}; } catch { return {}; } }
function loadUncertain()  { try { return JSON.parse(localStorage.getItem(UNCERTAIN_KEY))  || {}; } catch { return {}; } }
function saveFlags(f)      { localStorage.setItem(STORAGE_KEY,    JSON.stringify(f)); }
function saveExplains(e)   { localStorage.setItem(EXPLAIN_KEY,    JSON.stringify(e)); }
function saveMyAnswers(m)  { localStorage.setItem(ANSWER_KEY,     JSON.stringify(m)); }
function saveUncertain(u)  { localStorage.setItem(UNCERTAIN_KEY,  JSON.stringify(u)); }

let flags      = loadFlags();
let explains   = loadExplains();
let myAnswers  = loadMyAnswers();
let uncertain  = loadUncertain();

/* ── Flag ── */
function toggleFlag(n) {
  if (flags[n]) delete flags[n]; else flags[n] = true;
  saveFlags(flags);
  renderAll();
}

/* ── Filter ── */
function setFilter(f) {
  currentFilter = f;
  document.getElementById('btn-all').classList.toggle('active', f === 'all');
  document.getElementById('btn-flagged').classList.toggle('active', f === 'flagged');
  renderAll();
}

/* ── Pick option (my answer) ── */
function pickOption(n, label) {
  if (myAnswers[n] === label) {
    delete myAnswers[n];
  } else {
    myAnswers[n] = label;
  }
  saveMyAnswers(myAnswers);
  refreshOptionVisuals(n);
}

/* ── Toggle uncertain marker (triangle) on an option ── */
function toggleUncertain(n, label, evt) {
  evt.stopPropagation(); // 不要連動觸發 pickOption
  if (!uncertain[n]) uncertain[n] = {};
  if (uncertain[n][label]) {
    delete uncertain[n][label];
    if (Object.keys(uncertain[n]).length === 0) delete uncertain[n];
  } else {
    uncertain[n][label] = true;
  }
  saveUncertain(uncertain);
  refreshOptionVisuals(n);
}

/* ── Re-render visuals for a single question without full re-render ── */
function refreshOptionVisuals(n) {
  const q = QUESTIONS.find(x => x.n === n);
  if (!q) return;
  LABELS.forEach((l, i) => {
    const row = document.getElementById(`opt-row-${n}-${i}`);
    const el  = document.getElementById(`opt-${n}-${i}`);
    const tri = document.getElementById(`uncertain-${n}-${i}`);
    if (!row || !el || !tri) return;

    el.classList.remove('picked-wrong', 'picked-correct');
    if (myAnswers[n] === l) {
      el.classList.add(l === q.a ? 'picked-correct' : 'picked-wrong');
    }

    const isUncertain = !!(uncertain[n] && uncertain[n][l]);
    row.classList.toggle('is-uncertain', isUncertain);
    tri.classList.toggle('active', isUncertain);
  });
}

/* ── Explain toggle ── */
function toggleExplain(n) {
  const box = document.getElementById(`explain-box-${n}`);
  const btn = document.getElementById(`explain-btn-${n}`);
  if (!box || !btn) return;
  const isOpen = box.classList.toggle('open');
  btn.innerHTML = isOpen ? `<span class="icon">🔼</span> 收合詳解` : `<span class="icon">💡</span> 顯示詳解`;
  if (isOpen) document.getElementById(`explain-ta-${n}`)?.focus();
}

/* ── Explain autosave ── */
const saveTimers = {};
function onExplainInput(n) {
  const ta   = document.getElementById(`explain-ta-${n}`);
  const hint = document.getElementById(`explain-hint-${n}`);
  if (!ta || !hint) return;
  hint.textContent = '輸入中…';
  clearTimeout(saveTimers[n]);
  saveTimers[n] = setTimeout(() => {
    explains[n] = ta.value;
    saveExplains(explains);
    hint.textContent = '✓ 已自動儲存';
    setTimeout(() => { if (hint) hint.textContent = ''; }, 2000);
  }, 800);
}

/* ── Cloud Sync (shared single-user storage via window.storage) ── */
function setSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}

async function syncData() {
  if (isSyncing) return;
  if (!window.storage) {
    setSyncStatus('⚠️ 此環境不支援雲端同步');
    return;
  }
  isSyncing = true;
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  setSyncStatus('同步中…');

  try {
    const localPayload = {
      flags, explains, myAnswers, uncertain,
      updatedAt: Date.now()
    };

    let remote = null;
    try {
      const res = await window.storage.get(CLOUD_KEY, true);
      remote = res ? JSON.parse(res.value) : null;
    } catch (e) {
      remote = null; // key 不存在
    }

    if (!remote || (localPayload.updatedAt >= (remote.updatedAt || 0))) {
      // 本機較新或雲端無資料 → 上傳
      await window.storage.set(CLOUD_KEY, JSON.stringify(localPayload), true);
      setSyncStatus('✓ 已上傳至雲端');
    } else {
      // 雲端較新 → 下載覆蓋本機
      flags     = remote.flags     || {};
      explains  = remote.explains  || {};
      myAnswers = remote.myAnswers || {};
      uncertain = remote.uncertain || {};
      saveFlags(flags);
      saveExplains(explains);
      saveMyAnswers(myAnswers);
      saveUncertain(uncertain);
      renderAll();
      setSyncStatus('✓ 已從雲端下載最新進度');
    }
  } catch (err) {
    setSyncStatus(`同步失敗：${err.message}`);
  } finally {
    isSyncing = false;
    btn.disabled = false;
    setTimeout(() => setSyncStatus(''), 4000);
  }
}

/* ── Render ── */
function renderAll() {
  const main = document.getElementById('main');
  const flagCount = Object.keys(flags).length;
  document.getElementById('flag-count').textContent = `🚩 已標記 ${flagCount} 題`;

  let html = '';
  let visibleCount = 0;

  for (const q of QUESTIONS) {
    const isFlagged = !!flags[q.n];
    const hide = (currentFilter === 'flagged' && !isFlagged);
    if (!hide) visibleCount++;

    const saved  = explains[q.n] || '';
    const myPick = myAnswers[q.n] || null;
    const unc    = uncertain[q.n] || {};

    const opts = q.opts.map((o, i) => {
      const l = LABELS[i];
      let optCls = 'option';
      if (myPick === l) optCls += l === q.a ? ' picked-correct' : ' picked-wrong';
      const rowCls = 'option-row' + (unc[l] ? ' is-uncertain' : '');
      const triCls = 'uncertain-btn' + (unc[l] ? ' active' : '');
      return `
      <div class="${rowCls}" id="opt-row-${q.n}-${i}">
        <button class="${triCls}" id="uncertain-${q.n}-${i}" onclick="toggleUncertain(${q.n},'${l}',event)" title="標記此選項為疑惑">▲</button>
        <div class="${optCls}" id="opt-${q.n}-${i}" onclick="pickOption(${q.n},'${l}')">
          <span class="opt-label">(${l})</span>${o}
        </div>
      </div>`;
    }).join('');

    html += `
    <div class="q-card${isFlagged ? ' flagged' : ''}${hide ? ' hidden-by-filter' : ''}" id="q${q.n}">
      <div class="q-header">
        <div class="q-num">${q.n}</div>
        <div class="q-answer">${q.a}</div>
        <button class="flag-btn" onclick="toggleFlag(${q.n})" title="標記為容易出錯">🚩</button>
        <span class="flagged-badge">容易出錯</span>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="q-options">${opts}</div>
      <div class="q-divider"></div>
      <div class="q-explain-bar">
        <button class="explain-btn" id="explain-btn-${q.n}" onclick="toggleExplain(${q.n})">
          <span class="icon">💡</span> 顯示詳解
        </button>
        ${saved ? '<span style="font-size:12px;color:#6b7280;">（已有詳解）</span>' : ''}
      </div>
      <div class="explain-box" id="explain-box-${q.n}">
        <div class="explain-label">📋 詳解</div>
        <textarea
          class="explain-textarea"
          id="explain-ta-${q.n}"
          placeholder="在此輸入詳解…"
          oninput="onExplainInput(${q.n})"
        >${saved}</textarea>
        <div class="explain-saved-hint" id="explain-hint-${q.n}"></div>
      </div>
    </div>`;
  }

  main.innerHTML = html;

  const emptyState = document.getElementById('empty-state');
  if (visibleCount === 0 && currentFilter === 'flagged') {
    emptyState.style.display = 'block';
    main.style.display = 'none';
  } else {
    emptyState.style.display = 'none';
    main.style.display = 'block';
  }
}

/* ── Export ── */
function exportNotes(mode) {
  const now   = new Date();
  const ymd   = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  const label = mode === 'flagged' ? '已標記弱點題' : '全部題目';
  const fname = `115關務特考三等法學知識_${label}_${ymd}.txt`;

  const DIVIDER = '═'.repeat(60);
  const SEP     = '─'.repeat(60);

  const header = [
    DIVIDER,
    '  115 年公務人員特種考試關務人員考試試題',
    '  科目：法學知識（含中華民國憲法、法學緒論）',
    `  匯出範圍：${label}`,
    `  匯出日期：${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`,
    '  圖例：✗ 答錯選項　✓ 答對選項　▲ 標記為疑惑選項',
    DIVIDER,
    '',
  ].join('\n');

  const targets = mode === 'flagged'
    ? QUESTIONS.filter(q => flags[q.n])
    : QUESTIONS;

  if (mode === 'flagged' && targets.length === 0) {
    alert('尚未標記任何題目，請先點擊旗幟按鈕標記題目。');
    return;
  }

  const blocks = targets.map(q => {
    const myPick   = myAnswers[q.n];
    const isWrong  = myPick && myPick !== q.a;
    const isRight  = myPick && myPick === q.a;
    const unc      = uncertain[q.n] || {};

    const optLines = q.opts.map((o, i) => {
      const l = LABELS[i];
      let marks = '';
      if (l === myPick && isWrong) marks += '✗';
      if (l === myPick && isRight) marks += '✓';
      if (unc[l]) marks += '▲';
      const prefix = marks ? marks.padEnd(2, ' ') + ' ' : '   ';
      return `${prefix}(${l}) ${o}`;
    }).join('\n');

    const explain  = (explains[q.n] || '').trim() || '尚無詳解';
    const flagMark = flags[q.n] ? '  🚩 已標記為容易出錯' : '';

    return [
      `【第 ${q.n} 題】${flagMark}`,
      '',
      q.q,
      '',
      optLines,
      '',
      `▶ 正確答案：(${q.a})`,
      '',
      '【詳解】',
      explain,
      '',
      SEP,
    ].join('\n');
  });

  const flaggedCount   = Object.keys(flags).length;
  const withExplain    = targets.filter(q => (explains[q.n] || '').trim()).length;
  const wrongCount     = targets.filter(q => myAnswers[q.n] && myAnswers[q.n] !== q.a).length;
  const uncertainCount = targets.filter(q => uncertain[q.n] && Object.keys(uncertain[q.n]).length > 0).length;
  const footer = [
    '',
    `統計：共 ${targets.length} 題 ／ 已標記 ${flaggedCount} 題 ／ 答錯 ${wrongCount} 題 ／ 含疑惑選項 ${uncertainCount} 題 ／ 有詳解 ${withExplain} 題`,
    DIVIDER,
  ].join('\n');

  const content = header + blocks.join('\n') + footer;
  const blob    = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url     = URL.createObjectURL(blob);
  const a       = document.createElement('a');
  a.href        = url;
  a.download    = fname;
  a.click();
  URL.revokeObjectURL(url);
}

renderAll();
</script>
