  .option{display:flex;align-items:flex-start;gap:8px;border:1.5px solid var(--rule);border-radius:8px;padding:8px 10px;cursor:pointer;font-size:0.9rem;background:#fff;transition:background .15s ease,border-color .15s ease;position:relative;}

  .option .opt-label{font-weight:700;color:var(--accent);flex-shrink:0;}

  .option .confuse-btn{flex-shrink:0;background:none;border:none;cursor:pointer;padding:1px 2px;margin-left:2px;line-height:0;}
  .option .confuse-btn svg{width:13px;height:13px;transition:fill .15s ease;}
  .option .confuse-btn svg .tri{fill:none;stroke:#b9b2a0;stroke-width:1.4;}

  .option.selected-wrong{background:var(--wrong-bg);border-color:var(--wrong-border);}
  .option.selected-wrong .opt-text{text-decoration:line-through;color:#7a3a30;}
  .option.selected-correct{background:var(--correct-bg);border-color:var(--correct-border);}
  .option.confused{outline:2px dashed var(--confuse);outline-offset:1px;}

  .official-body{display:none;margin-top:8px;}

  .official-content ul{margin:6px 0 8px 16px;padding:0;}
  .official-content li{margin-bottom:4px;}
  .official-content strong{color:var(--ink);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--paper);border-radius:12px;padding:24px 28px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.18);}
  .modal-box h3{margin:0 0 10px;font-size:1rem;font-family:var(--serif);}
  .modal-box p{font-size:0.88rem;color:var(--ink-soft);margin:0 0 18px;line-height:1.6;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  .modal-actions button{font-family:var(--sans);font-size:0.85rem;padding:7px 18px;border-radius:7px;border:none;cursor:pointer;transition:all .15s ease;}
  #modal-cancel{background:var(--paper-dim);color:var(--ink);border:1px solid var(--rule);}
  #modal-cancel:hover{border-color:var(--ink-soft);}
  #modal-confirm{background:var(--flag);color:#fff;}
  #modal-confirm:hover{background:#922e1f;}
</style>

{"n":12,"ans":1,"q":"甫上高中16歲之甲，為上學之便，逕以父母給予之壓歲錢向自行車行老闆乙購買新臺幣8,000元之自行車一台。雙方達成合意後，乙為製作售後服務卡，並登錄消費者資料時，始發現甲原來尚未成年。下列敘述，何者正確？","o":["甲未得法定代理人同意，故甲、乙間之買賣契約無效","甲係以允許處分之財產購買自行車，故甲、乙間之買賣契約有效","甲購買自行車上學，非屬依其年齡及身分之日常生活所必需，故甲、乙間之買賣契約無效","若甲之法定代理人知悉後，認以自行車上學過於危險，為保護未成年人之利益，得撤銷甲、乙間之買賣契約"]},
{"n":13,"ans":2,"q":"甲向乙表示願以新臺幣（下同）50萬元購買其所有之A車，並支付乙10萬元定金，但乙隔日卻後悔不賣了。依民法規定，下列敘述，何者正確？","o":["因乙已收受定金，視為雙方買賣契約成立","定金為不要物之從契約，雙方約定即可成立","因乙之反悔不賣，甲得請求乙給付20萬元","乙僅須返還甲10萬元，即可後悔不賣"]},
{"n":14,"ans":0,"q":"下列關於民法第425條之1租賃關係推定之敘述，何者錯誤？","o":["土地及其土地上之房屋不同屬於一人所有，而將土地所有權讓與他人時，推定在土地受讓人與房屋所有權人間，有租賃關係存在","該條規定於移轉之房屋為「未辦保存登記之違章建築」，亦有其適用","該條規定之土地上之房屋，須有相當之價值","該條規定，適用於其增訂前發生之事實"]},
{"n":15,"ans":2,"q":"甲居住於臺南市，向高雄市之乙購買乙所有之A車，約定於5月5日交付，但乙因事未於當日依約交付。嗣後發現A車於5月6日毀於高雄市發生之火災。下列敘述，何者正確？","o":["火災為通常事變，甲不得請求損害賠償","不可歸責於乙，乙依民法第225條規定免除責任","甲得依民法第226條有關給付不能規定，請求損害賠償","乙不負遲延給付之損害賠償責任"]},
{"n":16,"ans":0,"q":"下列關於要約與要約引誘之敘述，何者錯誤？","o":["要約僅得向特定人為之，要約引誘，則得對不特定人為之","甲建商在報上刊登廣告宣傳將在臺北車站附近推出新建案，此則廣告屬要約引誘","設置自動販賣機陳列商品標價販售，係為要約","要約引誘是一種意思通知"]},

{"n":18,"ans":1,"q":"甲將自己所有之A牌機車贈與乙，乙表示同意。下列敘述，何者正確？","o":["贈與為單獨行為","甲於贈與成立後，若事後反悔，在贈與物之權利未移轉前，原則上得撤銷甲與乙間之贈與","甲與乙之贈與經公證後，在贈與物之權利未移轉前，甲得撤銷贈與","贈與之物如有瑕疵，贈與人原則上應負擔瑕疵擔保責任"]},
{"n":19,"ans":2,"q":"甲為古畫修復師，承接乙博物館古畫修復工程。由於古畫修復需要特殊材料，因此，雙方約定，由甲提供材料協助古畫修復，並於工作完成時給付報酬。下列敘述，何者錯誤？","o":["古畫修復師承接古畫修復工程，屬承攬契約","甲縱使提供材料致古畫價值提升，依約乙仍保有其所有權","由於甲以自己材料修復古畫，該材料已與古畫附合，且經甲之加工，致古畫價值倍增，則甲取得古畫之所有權","如甲乙間之修復契約不成立時，因甲提供材料修復古畫，該材料與古畫附合，故古畫可視為主物，古畫所有權屬於乙"]},
{"n":20,"ans":2,"q":"甲男與乙女結婚，育有二子丙、丁，皆未成年。甲因車禍死亡，甲生前是家中唯一經濟來源，甲之父母戊、己同住。甲還有從小感情就很好未婚同住但已有固定工作之妹妹庚。下列關於肇事者侵權責任之敘述，何者錯誤？","o":["乙女對肇事者得請求精神慰撫金","丙與丁得對肇事者請求扶養費用之賠償","庚因甲之過世對肇事者請求精神慰撫金損害賠償","戊、己得向肇事者請求餘命期間之扶養費損害賠償"]},
{"n":21,"ans":1,"q":"甲乙丙丁四人與A約定負連帶責任，向A借用新臺幣（下同）500萬元，其內部分擔比例為2：2：5：1。嗣後，A免除甲分擔部分之債務後，對乙之財產聲請強制執行並全部獲償。乙向其他連帶債務人求償時，因丙破產毫無財產可為清償時，乙得向何人分別求償多少金額？","o":["對甲求償160萬元、對丁求償80萬元","對甲求償100萬元、對丁求償100萬元","對丁求償133萬元（四捨五入）","對丁求償50萬元"]},
{"n":22,"ans":1,"q":"2024年3月1日，甲於報紙上刊登一則廣告，表示在同年3月10日前能答出其所出之數學難題，將給付新臺幣（下同）2萬元報酬作為獎勵。乙、丙、丁先後在不同地方解出正確答案。乙最先完成解答，但丙最先通知甲完成解答，甲檢視答案為正確後，立即匯出報酬於丙。下列敘述，何者正確？","o":["若甲於刊登廣告之翌日，未有人提出解答前，得無條件撤回廣告","乙有報酬請求權，得向丙主張不當得利，請求交付所受領之2萬元報酬","乙、丙、丁得向甲請求平分報酬","甲必須再對乙支付報酬，不得拒絕。惟甲得事後對丙主張不當得利，請求返還報酬"]},
{"n":23,"ans":2,"q":"甲向乙借款新臺幣10萬元，丙與乙訂立保證契約，擔保該借款債務之履行。下列關於保證契約之敘述，何者正確？","o":["甲對乙因借款契約所生之抗辯，丙不得主張之","丙不得以甲對乙之債權主張抵銷","若乙對甲起訴請求返還借款，其對丙基於保證契約所生之債權，發生中斷時效之效力","縱丙拋棄先訴抗辯權，仍得於乙就甲之財產強制執行而無效果前，對於乙拒絕清償"]},
{"n":24,"ans":3,"q":"甲向乙購買乙使用2年之A手錶，該錶之表面有輕微刮傷，惟乙於締約時故意不告知甲，雖甲於締約時已檢查看過，但於交付後始發現該瑕疵。下列敘述，何者正確？","o":["甲得對乙主張權利瑕疵擔保責任","甲得請求乙另行交付無瑕疵之手錶","如甲因重大過失未發現手錶瑕疵，甲僅得對乙行使契約解除權","如甲因重大過失未發現手錶瑕疵，甲仍得對乙請求減少價金"]},
{"n":25,"ans":3,"q":"甲向乙購買一批貨物，該貨物之貨款為新臺幣（下同）1萬元，於清償期屆至後1年，甲仍未清償。下列敘述，何者錯誤？","o":["乙得請求依法定利率計算該貨款1萬元之遲延利息。但約定利率較高者，仍從其約定利率","若甲乙間無債權不得讓與之特約時，乙得將該1萬元買賣價金請求權讓與於第三人丙。但非經乙或丙通知甲，對於甲不生效力","若甲乙間無債權不得讓與之特約，乙將該1萬元買賣價金請求權讓與於第三人丙時，丙將乙所立之讓與字據提示於甲者，對於甲即生效力","若第三人丁與甲訂立契約承擔該1萬元買賣價金債務，於契約成立時，該債務即由丁承擔"]},
{"n":26,"ans":0,"q":"甲向乙無息借款新臺幣（下同）500萬元，並將其名下市值700萬元之A地，設定第一順位普通抵押權於乙。嗣後，甲向丙無息借款600萬元，遂就A地設定第二順位普通抵押權於丙。乙死亡時，甲為乙之唯一繼承人。下列敘述，何者正確？","o":["第一順位抵押權為甲之利益，仍為存續","A地之所有權與第一順位抵押權均歸屬於甲，甲之A地所有權因混同而消滅","丙得受完全之清償","丙從第二順位抵押權人，升進為第一順位抵押權人"]},
{"n":27,"ans":0,"q":"甲乃A地所有人與A地上之B屋所有人，並登記為A地所有人與B屋所有人。B屋左側有車庫。該車庫獨立於B屋，但可由B屋直通車庫。甲於民國113年間，僅以B屋設定普通抵押權於乙，用以擔保其對乙所負新臺幣（下同）5,000萬元借款債務與因該筆借款所生之100萬元利息債務。甲屆期遲未清償5,000萬元借款及100萬元利息。下列何者不為乙之B屋抵押權之效力所及？","o":["A地","B屋之車庫","100萬元利息債務","甲對乙所負之遲延利息債務"]},
{"n":28,"ans":1,"q":"甲名下有一間公寓，該公寓之專有部分包括A騎樓。詎該公寓所屬管理委員會乙未經甲之同意，擅自將A騎樓出租並交付於善意之丙，丙搭建衣物網架，供夜市擺攤使用。下列敘述，何者錯誤？","o":["甲得依所有權妨害除去與所有物返還請求權，訴請丙拆除衣物網架並交還A騎樓","雖乙、丙間之租約有效，但甲得向丙請求返還相當於租金之不當得利","對甲而言，丙占用A騎樓乃善意之無權占有人","甲得向乙請求返還其出租A騎樓所收取租金之不當得利"]},
{"n":29,"ans":1,"q":"甲、乙、丙、丁共有市價新臺幣（下同）300萬元之A地，應有部分均等，約定A地由丙管理。嗣後，丙對甲、乙、丁表示變為以行使地上權之意思而占有，復和平、公然、繼續占有A地達20年。之後，甲因需錢孔急，各向乙、丁借款50萬元，甲並就其應有部分設定同額之第一次序普通抵押權（下同）於乙、第二次序抵押權於丁。乙死亡時，甲為乙之唯一繼承人。下列敘述，何者正確？","o":["乙之抵押權因混同而消滅，丁則遞升為第一次序抵押權人","丙得請求登記為A地之地上權人","甲得僅以其應有部分已達半數為由，主張A地由其管理","甲應按其對於乙所負債務數額，由甲之應繼分內扣還"]},
{"n":30,"ans":2,"q":"甲好意順道駕車載送其同事乙返家，途中不慎與對向由丙駕駛之車輛互撞。經鑑定結果，就此交通事故之發生，甲之過失比例為30%、丙之過失比例為70%。因該事故而受傷住院治療月餘之乙，於請求甲、丙賠償其因此所受損害時，下列敘述，何者錯誤？","o":["乙得對丙請求賠償全部損害","乙得對甲請求賠償全部損害","乙僅得對甲、丙分別請求賠償按其過失比例之損害","乙請求丙賠償全部損害時，丙得主張乙應承擔甲之過失，故僅賠償乙所受損害之70%"]},
{"n":31,"ans":0,"q":"甲、乙、丙、丁、戊公同共有A車，並分別共有B地與未辦保存登記之C屋，應有部分均等。除契約另有約定者外，下列敘述，何者錯誤？","o":["處分A車共有物，得經甲、乙、丙三人同意行之","B地設定農育權，得經甲、丙、丁三人同意行之","改良B地，得經丙、丁、戊三人同意行之","簡易修繕C屋，得由乙單獨為之"]},
{"n":32,"ans":2,"q":"甲為A地所有人，乙為B地所有人，並登記於土地登記簿，A地與B地相鄰。甲於A地上建築C屋，因測量有誤，致C屋有部分位於B地之上。下列敘述，何者正確？","o":["若乙於C屋建築時明知該屋越界，則乙於C屋建成1年後，請求甲拆除C屋越界建築之部分，有理由","若乙知甲越界建築時即向甲提出異議，則法院不得斟酌公共利益與當事人利益，命甲免為全部或一部之移除","若乙於C屋建成之時，方知甲越界建築且即時提出異議，則乙得請求甲拆除越界建築","若甲故意越界建築，乙於C屋建築時明知此事，但並未即向甲提出異議，則乙請求甲拆除C屋越界建築之部分，無理由"]},
{"n":33,"ans":0,"q":"甲名下有A地及A地上之B屋，甲於民國113年2月僅以A地設定典權於乙，詎B屋於同年7月因豪雨土石流致全部滅失。下列敘述，何者正確？","o":["甲乙間原本推定之租賃關係，於B屋滅失後歸於消滅","甲乙間原本視為已有地上權之設定，於B屋滅失後歸於消滅","B屋因土石流而滅失後，乙之典權即歸於消滅","甲乙間原本視為已有地上權之設定，於B屋滅失後並未消滅"]},
{"n":34,"ans":2,"q":"甲將其名下之A地，設定普通地上權於乙建築房屋，約定每年地租新臺幣（下同）30萬元，存續期間20年。乙於A地上建築B屋後，為週轉資金，將該地上權與B屋同時設定普通抵押權於丙，均已辦畢登記。丁擅自占用A地與B屋放置廢棄物，致抵押標的價值減少，乙屢次勸阻無效，擬請求排除侵害，或拋棄其地上權。下列敘述，何者錯誤？","o":["丙得請求乙於所受利益之限度內，提出與減少價值相當之擔保","乙拋棄其地上權，非經丙之同意，不得為之","乙得向甲支付未到期之地租30萬元後，拋棄其地上權","乙得訴請丁清空廢棄物、遷出B屋並交還A地"]},
{"n":35,"ans":2,"q":"甲乃A汽車所有人，乙經營貨運行。甲請求乙答應出借新臺幣（下同）10萬元於自己。乙告知：甲應以A車，作為該筆10萬元借款債務之擔保，乙始可能出借10萬元於甲。下列關於A汽車之可能擔保型態，何者錯誤？","o":["甲將A汽車所有權讓與擔保於乙","甲得以A汽車設定抵押權於乙","甲得以A汽車設定留置權於乙","甲得以A汽車設定質權於乙"]},
{"n":36,"ans":3,"q":"甲男與乙女結婚後，生子丙。丁男與戊女結婚後，生女庚。於甲過世，且丁、戊離婚之後，乙與丁再婚。丙與庚成年後，他們是否可以結婚？","o":["不可以，因為丙與庚為旁系血親二親等之親屬","不可以，因為丙與庚為旁系姻親二親等之親屬","可以，因為丙與庚為旁系姻親二親等之親屬","可以，因為丙與庚既不是血親也不是姻親"]},
{"n":37,"ans":0,"q":"甲男與乙女為夫妻，甲婚後與乙之姪女丙發生外遇，乙忿而與甲離婚，甲於離婚後與丙結婚，甲丙婚姻效力為何？","o":["有效","無效","得撤銷","效力未定"]},
{"n":38,"ans":2,"q":"甲男、乙女婚後生下丙男、丁男。丙男成年後與戊女結婚，生下己男。在己八歲時，某日，丙男不幸死亡，留下戊、己孤兒寡母，生活艱難。丁男經常予以關懷，遂與戊女日久生情，也與己男有良好互動。丁男得否與戊女結婚？若戊同意，丁得否收養己？","o":["丁不得與戊結婚，亦不得收養己","丁不得與戊結婚，但得收養己","丁得與戊結婚，亦得收養己","丁得與戊結婚，但不得收養己"]},
{"n":39,"ans":2,"q":"甲男乙女結婚後，未約定夫妻財產制。甲婚前有X屋一棟，價值新臺幣（下同）1,500萬元，但貸款300萬元。婚後，甲將該房屋出租，每月租金5萬元，並以之償還貸款，五年後清償完畢。婚後甲又以其營業所得1,000萬元購買價值2,500萬元之Y屋，先向銀行貸款1,500萬元。嗣後，甲將X屋出賣，得款1,500萬元，並償還銀行貸款。甲乙離婚時，乙無任何財產。乙得向甲請求多少金額剩餘財產分配？","o":["550萬元","600萬元","650萬元","700萬元"]},
{"n":40,"ans":1,"q":"夫妻離婚時，關於擔任未成年子女親權人之規定，下列敘述，何者錯誤？","o":["夫妻為兩願離婚時，得協議何者擔任親權人，一方或雙方共同擔任均可","夫妻於判決離婚時，不得協議何者擔任親權人，應由法院依子女最佳利益酌定之","關於親權人之協議不利於子女時，法院得依職權為子女之利益改定之","法院得依職權，為未擔任親權人之一方酌定其與未成年子女會面交往之方式及期間"]},
{"n":41,"ans":3,"q":"甲男與乙女結婚後，與甲之寡母同住並生有二女。乙自懷孕生子後即辭職在家照顧女兒，操持家務，孝敬婆婆。婚後十年，甲有外遇，與丙女同居長達五年而不返家，丙為甲生下一子。下列敘述，何者錯誤？","o":["乙得向甲請求分居五年期間之家庭生活費用","甲為唯一有責者，但依其情形，仍有可能得向乙女提起裁判離婚之訴訟","乙女得依民法第1052條第1項規定，以絕對裁判離婚事由向法院請求離婚","甲乙依法為兩願離婚登記後，乙因無過失尚得向甲請求給付贍養費"]},
{"n":42,"ans":1,"q":"甲男與乙女結婚後，甲罹患重大不治之精神疾病。乙訴請法院裁判離婚獲准。嗣後，甲欲主張裁判離婚後陷於生活困難，請求乙給付贍養費，是否有理由？","o":["甲罹患精神疾病，係因己方之事由導致裁判離婚，屬於有過失之一方，故甲請求乙給付贍養費無理由","甲罹患精神疾病，並無過失，故甲請求乙給付贍養費有理由","乙對於離婚事由並無可歸責之處，屬於無過失之一方，故甲請求乙給付贍養費無理由","甲罹患精神病之過失，較諸乙主動請求離婚之過失為輕，故甲請求乙給付贍養費有理由"]},
{"n":43,"ans":2,"q":"甲男與乙女為夫妻，育有5歲之子丙。嗣後，甲乙離婚，約定由乙獨立擔任丙之親權人。下列敘述，何者正確？","o":["甲對丙之親權未停止","甲因未擔任丙之親權人，故得停止支付對丙之扶養費","經甲同意時，乙得代理丙將丙出養於丁","若甲反對，乙不得代理丙出賣丙之A屋"]},
{"n":44,"ans":0,"q":"60歲之甲受輔助宣告，甲有配偶乙、子女丙。下列何種情形符合民法之規定？","o":["以遺囑指定乙之應繼分為三分之二，丙之應繼分為三分之一","乙受監護宣告，甲擔任乙之監護人","朋友丁作成代筆遺囑時，甲擔任遺囑見證人","乙留有遺囑後死亡，甲擔任乙之遺囑執行人"]},
{"n":45,"ans":0,"q":"甲中年喪妻，有乙丙丁三子。某日，甲無權代理乙，將乙之A車出賣於善意之戊。隔日，甲因故死亡。下列敘述，何者錯誤？","o":["甲之無權代理行為，因乙之繼承甲而有效","乙得拒絕承認甲之無權代理行為","戊在乙未承認或拒絕甲之無權代理行為前，得撤回之","若甲之無權代理行為不生效力，乙丙丁因繼承甲而對戊，負損害賠償責任"]},
{"n":46,"ans":1,"q":"有關民法第1149條規定之遺產酌給請求權，下列敘述，何者正確？","o":["遺產酌給權人之子女得因酌給權人之死亡，而繼承請求酌給權利","受酌給人原則上應為不能維持生活而無謀生能力之人","就遺產酌給之數額，僅得由法院酌給於權利人","民法明定酌給之數額，不得侵害特留分"]},
{"n":47,"ans":1,"q":"甲有乙丙丁戊四子，民國111年1月1日甲死亡後，乙隱匿甲遺產中之一幅名畫，且丙詐害債權人己之權利而將甲之遺產毀損。假設甲之遺產不足清償己之全部債務，依民法規定，己就不足清償之部分，不得從下列繼承人之固有財產中清償？","o":["丙與戊","丁與戊","乙與丁","丙與丁"]},
{"n":48,"ans":1,"q":"甲得知妻乙懷孕，喜出望外，卻不幸執勤時因公殉職。甲之父丙因悲哀過度亦隨即病歿。丙遺有房屋一棟，其配偶已死亡，其子女除甲外，尚有甲之姐丁。丁主張應由其單獨繼承丙之房屋，有無理由？","o":["有理由。因甲已死亡，應由丁繼承","無理由。因胎兒有代位繼承權","有理由。因丙死亡時，胎兒仍未出生","無理由。因胎兒未出生前，應由乙繼承"]},
{"n":49,"ans":3,"q":"甲父母雙亡，有一子丙已成年。乙有一子丁，丁有一子戊已成年，長年住在國外。其後，甲與乙結婚，並收養丁為養子，但戊並不知情。乙與丙感情不睦，某日二人激烈衝突，丙竟持刀殺乙既遂，而受刑之宣告。丙服刑期間，甲丁因事故同時死亡。甲之遺產應由何人繼承？","o":["丙單獨繼承","丁單獨繼承","戊單獨繼承","無人可繼承"]},
{"n":50,"ans":0,"q":"甲有乙丙丁三子，乙有一子戊。甲因乙分居而給與新臺幣（下同）150萬元，因丙出國而給與150萬元，因丁結婚而給與150萬元。乙先甲死亡。甲死亡時，留有300萬元遺產。甲之遺產應如何分配？","o":["戊50萬元、丙200萬元、丁50萬元","戊100萬元、丙100萬元、丁100萬元","戊150萬元、丙150萬元、丁0元","戊200萬元、丙50萬元、丁50萬元"]},
{"n":51,"ans":2,"q":"關於民事訴訟法與憲法之關係，下列敘述，何者錯誤？","o":["民事訴訟制度應避免突襲裁判，並確立當事人之程序主體地位","法官迴避制度具有確保當事人公正程序請求權之意義","三級三審制度係憲法上司法救濟請求權之要素，不容當事人處分或立法簡化","法律安定性及個案正義，均為民事訴訟法建構制度時之基本信念，但因二者偶而會發生衝突，故有權衡之必要"]},
{"n":52,"ans":1,"q":"甲居住於臺中，乙居住於臺北，甲向臺灣臺中地方法院（下稱臺中地院）起訴，請求被告乙返還借款。甲乙間之借貸契約並無合意管轄法院之約款。乙於接獲法院通知後，前往臺中地院開庭，並提出清償抗辯。下列敘述，何者錯誤？","o":["臺中地院因被告乙為本案言詞辯論，已取得管轄權","乙於辯論終結前，聲請臺中地院移轉管轄至臺灣臺北地方法院（下稱臺北地院），臺中地院於尚未辯論終結前，應移轉至臺北地院","如經臺中地院判決後，敗訴之當事人提起上訴，第二審法院不得以管轄錯誤為理由，廢棄原判決","如經臺中地院判決後，當事人均未上訴而確定時，敗訴之一造不得以本件確定判決無管轄權為由，提起再審之訴"]},
{"n":53,"ans":0,"q":"關於普通法院之審判權，下列敘述，何者錯誤？","o":["當事人未於事實審爭執普通法院欠缺審判權者，仍得據以為上訴第三審法院之理由","普通法院就行政法院移送之訴訟認無審判權者，如當事人合意願由普通法院審判，即應審判之","普通法院認受理之事件為行政爭訟事件而無審判權者，應依職權將訴訟移送至該管行政法院","普通法院就私法關係所生之爭議，有審判權"]},
{"n":54,"ans":3,"q":"原告甲列乙、丙、丁、戊等四人為被告，起訴聲明求為判決乙應將A地中A1部分、丙應將A2部分、丁應將A3部分、戊應將A4部分分別返還予甲，主張事實及理由略為：A地為甲所有，其中A1部分遭乙、A2部分遭丙、A3部分遭丁、A4部分遭戊分別無權占有，均拒不返還，為此，本於所有物返還請求權起訴等旨。此訴訟經第一審判決甲全部勝訴，下列敘述，何者正確？","o":["乙提起上訴，主張：甲曾同意將A地之A1、A2、A3、A4分別出租予乙、丙、丁、戊等四人，故有使用土地之正當權利等語。受理乙上訴之上級審法院應將未曾提起上訴之丙、丁及戊等人均列為上訴人進行本案審理","乙提起上訴後，丙受原判決之送達而逾上訴期間未表明上訴時，其尚得向受理乙上訴之第二審法院追加為上訴人（當事人）","乙及丙均提起上訴，丙於上訴審程序承認甲就A地有所有權之事實後，乙不得再就此事實加以爭執","乙及丙均提起上訴，各主張自己基於租賃權使用系爭地，為此乙聲請訊問證人X，法院就訊問X之結果，經兩造辯論後，得作為認定丙有租賃權之基礎"]},
{"n":55,"ans":2,"q":"甲為英屬開曼群島之外國法人，主張乙侵害其商標權，於臺灣臺北地方法院提起侵權行為損害賠償訴訟，請求乙賠償新臺幣500萬元。於第一次言詞辯論期日，乙抗辯甲應提供訴訟費用之擔保。下列敘述，何者錯誤？","o":["法院應先調查甲在我國境內有無事務所及營業所，或有無足以賠償訴訟費用之資產","於法院尚未對訴訟費用擔保為裁定或准訴訟費用擔保而原告未提供擔保前，被告得拒絕本案辯論","法院定擔保額時，應將第一、二、三審之裁判費及各審之律師費計入","法院命供訴訟費用擔保之裁定，得為抗告"]},
{"n":56,"ans":2,"q":"關於一造辯論判決，下列敘述，何者正確？","o":["得聲請一造辯論而為判決者，以原告為限，被告不得為之","法院不得依職權由一造辯論而為判決","當事人有正當理由不到場時，法院不得依他造聲請由其一造辯論而為判決","於訴訟標的須合一確定之共同訴訟，言詞辯論期日共同訴訟中一人到場，他造全體不到場時，雖經到場者聲請，法院不得為一造辯論之判決"]},
{"n":57,"ans":3,"q":"甲、乙、丙三人共有A地，甲列乙、丙為被告，起訴請求法院裁判分割該地。下列敘述，何者錯誤？","o":["法院裁判准分割A地時，不受原告訴之聲明就如何分割A地所表明之分割方法所拘束，但此項表明可資以促使本案審理集中化","在乙抗辯共有人間已有分割之協議時，甲得追加請求判決命乙及丙履行該協議","如乙之應有部分於訴訟繫屬前已讓與丁，則甲之起訴欠缺被告適格","如乙之應有部分於其收受甲之起訴狀後讓與丙，則自丙受讓之時起，乙喪失被告適格"]},
{"n":58,"ans":2,"q":"下列所示證人之證言或提出之書狀，何者屬於法院不得逕採為認定事實之證據？","o":["以元首為證人，在其所在地經命其具結後詢問所錄取之證言","經兩造同意，證人於法院外以書狀為陳述並將具結結文附於書狀，經公證人認證後，向法院提出","法院通知證人到庭作證，證人因故無法出席，獨自前往公證人面前作成陳述書狀及具結結文向法院提出","法院於命證人具結後，運用聲音及影像相互傳送之科技設備直接訊問證人所錄取之證言"]},
{"n":59,"ans":1,"q":"甲列乙為被告，訴請給付租賃A屋之租金新臺幣（下同）100萬元，於訴狀送達後，甲擬追加請求法院判命乙給付買賣B貨物之價金200萬元。下列敘述，何者正確？","o":["如甲於第一審程序中追加，兩項請求之基礎事實同一，法院應准許追加","如甲於第一審程序中追加，兩項請求之基礎事實不同一，乙不同意且無擬制同意存在，有礙訴訟終結時，法院應不許追加","如甲係於第二審程序中追加，兩項請求之基礎事實同一，無須乙同意，法院應准許追加","如甲係於第二審程序中追加，兩項請求之基礎事實不同一，即使乙不同意，法院得以不甚礙乙之防禦及訴訟終結准許追加"]},
{"n":60,"ans":3,"q":"甲與乙於某日訂立買賣契約，以甲所有之A地為標的物，約定以價金新臺幣（下同）200萬元出賣予乙，嗣後雙方就該契約已否因一方行使解除權而消滅發生爭執，有意循訴訟程序解決紛爭。關於程序之選擇，下列敘述，何者錯誤？","o":["甲為原告訴請確認系爭買賣契約所生買賣關係不存在時，得與被告乙合意請求受訴法院適用簡易訴訟程序為審判","甲起訴請求被告乙給付價金200萬元時，不得與乙合意請求受訴法院適用小額訴訟程序為審判","乙起訴請求判決命被告甲將A地所有權移轉登記予乙，經第一審法院以乙之請求無理由判決其敗訴後，在上訴期間內，如兩造間已合意承認該第一審判決所為事實認定無誤，得合意逕向第三審上訴","甲與乙得合意由甲起訴請求法院判決確認解除權不存在，並於其裁判後逕向第三審上訴"]},
{"n":61,"ans":0,"q":"關於訴訟上和解，下列敘述，何者錯誤？","o":["原告欲使被告以外之第三人參與和解，應先將其追加為被告","成立訴訟上和解後，當事人得聲請退還該審級裁判費三分之二","因試行和解或定和解方案，法院得命當事人或法定代理人本人到場","當事人間所成立之訴訟上和解，與確定判決有同一之效力"]},
{"n":62,"ans":2,"q":"乙本於A地所有權，訴請甲塗銷A地所有權移轉登記，主張其與甲訂有買賣A地契約，並辦畢所有權移轉登記予甲，惟該買賣契約與物權契約有無效之事由。下列敘述，何者正確？","o":["乙向法院聲請裁定許可為訴訟繫屬事實登記，法院不得准許","如乙起訴合法，法院應依其聲請，裁定許可為訴訟繫屬事實之登記","乙聲請裁定許可訴訟繫屬事實登記時，就本案請求釋明如有不足，法院得命其供相當之擔保後准許之","乙聲請裁定許可訴訟繫屬事實登記時，為避免甲脫產，法院為裁定前，不得使甲有陳述意見之機會"]},
{"n":63,"ans":0,"q":"當事人於法院通知期日未到場者，下列敘述，何者錯誤？","o":["原告於準備程序期日未到場，而被告拒絕陳述時，視為合意停止訴訟","當事人均未到場，依法視為合意停止訴訟後，法院得依職權續行訴訟","當事人一造未到場時，法院仍得調查證據","小額事件依法進行調解程序者，被告經合法通知無正當理由未到場時，原告得聲請即為訴訟之辯論，而為一造辯論判決"]},
{"n":64,"ans":3,"q":"原告甲為被告乙公司之股東，提起確認之訴，請求確認乙公司於民國110年12月10日所召開之董事會（下稱系爭董事會）確有通過A決議，並請求確認乙公司於另案刑事訴訟中所提出系爭董事會會議紀錄遭變造。乙公司於訴訟中就系爭董事會確有通過A決議一事並不爭執，惟否認有變造系爭董事會會議紀錄。下列敘述，何者錯誤？","o":["甲請求確認系爭董事會有通過A決議部分，無確認利益","甲請求確認系爭董事會會議紀錄遭變造部分，非屬確認證書真偽之訴","確認法律關係基礎事實存否之訴，不限於確認現在之法律關係基礎事實存否","如A決議係解任乙公司之總經理丙，甲不得於訴訟中變更為請求確認乙、丙間之委任關係不存在"]},
{"n":65,"ans":0,"q":"甲列乙、丙為被告，起訴請求確認乙、丙間買賣關係不存在，關於訴訟中之證據方法，下列敘述，何者錯誤？","o":["法院得依職權訊問乙、丙，但不得命其具結","甲得聲請法院裁定命乙、丙提出系爭買賣契約原本","甲得聲請法院裁定命第三人仲介公司提出其所保管之系爭買賣契約原本，如仲介公司拒絕，法院得以裁定命為強制處分","如關於買賣契約條款之解釋有爭執，乙、丙於訴訟中已自行提出買賣契約影本，而拒絕依法院之命提出原本，法院得依自由心證斷定該影本之證據力"]},
{"n":66,"ans":3,"q":"甲對乙提起訴訟後，受訴法院詢問兩造有無調解意願，經兩造陳明願意進行調解程序後，將本件訴訟移付調解。關於調解程序，下列敘述，何者錯誤？","o":["經移付調解後，訴訟程序停止進行，應待調解之結果而決定有無繼續進行訴訟程序之必要","兩造於調解期間均不到場，如法院認有調解成立之可能，仍得另定調解期日","關於財產權爭議之調解，如經兩造同意，得由調解委員酌定解決事件之調解條款","關於財產權爭議之調解，法院依職權提出解決事件之方案後，須經當事人明示同意，方得認為調解成立"]},
{"n":67,"ans":3,"q":"關於簡易訴訟程序，下列敘述，何者錯誤？","o":["原告提起財產權之訴訟，其標的金額為新臺幣（下同）50萬元者，亦屬於50萬元以下之財產權訴訟，法院應適用簡易訴訟程序審理","原告起訴請求確認與被告間就某一面額100萬元之本票債權不存在之訴，係屬本於票據有所請求而涉訟，法院應適用簡易訴訟程序審理","產物保險公司代位道路交通事故被害人向加害者請求交通事故損害賠償80萬元事件，屬於本於道路交通事故有所請求而涉訟，法院應適用簡易訴訟程序審理","原告於刑事簡易程序第二審提起附帶民事訴訟，刑事庭判決刑事被告有罪後，將附帶民事訴訟移送同法院民事庭，為適用刑事簡易訴訟程序案件之附帶民事訴訟，經裁定移送民事庭者，民事庭應適用簡易訴訟程序之第一審程序審理"]},
{"n":68,"ans":2,"q":"甲、乙分別為經營成衣買賣之供貨、銷售公司，甲起訴請求乙給付貨款新臺幣（下同）5萬元。下列敘述，何者錯誤？","o":["法院應先行調解程序，如調解不成立，即適用小額訴訟程序審理","乙於調解期日7日前經合法通知，無正當理由而未到場，法院得依到場甲之聲請，命即為訴訟之辯論，並依職權由甲一造辯論而為判決","甲依定型化契約約款向合意管轄法院起訴時，乙得抗辯小額訴訟程序無合意管轄規定之適用","乙對甲反訴請求債務不履行之損害賠償60萬元，法院應以其反訴不合法，裁定駁回"]},
{"n":69,"ans":1,"q":"關於在第二審為訴之變更或追加，下列敘述，何者正確？","o":["一律均須得他造之同意，始得為之","將離婚之訴變更為撤銷婚姻之訴，不須經他造同意","追加必須合一確定之原非當事人之人為他造當事人，須得原為他造當事人之人同意，始屬合法","因訴之變更為以新訴取代舊訴，舊訴視為撤回，第二審法院專就新訴為審判，故訴之變更倘不合法，即應駁回該新訴，無須就舊訴續為審理"]},
{"n":70,"ans":1,"q":"甲起訴請求法院判命乙給付新臺幣（下同）300萬元，第一審法院判決命乙給付甲200萬元，並駁回甲其餘之訴。甲就其敗訴全部合法提起第二審上訴，乙於第二審程序就其敗訴全部為附帶上訴。下列敘述，何者錯誤？","o":["甲在第二審程序聲明撤回上訴，若乙不同意，就不生撤回上訴之效力","乙就其敗訴全部曾提起上訴並經撤回後，見甲提起上訴，始在程序進行中，再提附帶上訴，則其上訴權已因撤回上訴而消滅，附帶上訴不合法，第二審法院應以裁定駁回附帶上訴","乙於逾上訴期間後始在第二審程序提附帶上訴，附帶上訴雖非不合法，惟若甲之上訴經第二審法院以不合法為由而駁回者，該附帶上訴即失其效力，第二審法院無須為任何裁判","乙於提起附帶上訴後撤回附帶上訴，第二審法院審理後為駁回甲上訴之判決，甲不服上訴，第三審法院將原判決廢棄發回，乙在第二審更審程序，不得再提起附帶上訴"]},
{"n":71,"ans":0,"q":"下列敘述之情形，何者不屬當事人得在第二審法院提出之新攻擊或防禦方法？","o":["在第一審請求承租人給付積欠租金之原告，追加請求自租期屆滿日起至返還租賃物之日止相當於租金額之損害金","請求履行債務事件之被告於第一審受敗訴判決後，為部分清償，因而抗辯原告之請求在該清償範圍內為無理由","請求返還借款事件之原告，就曾交付借款一事提出支票乙紙為證，被告否認受借款之交付。第一審法院未經整理證據上爭點即以原告不能證明有交付借款之事實為由，駁回原告之請求。原告上訴後，為證明該借款已交付之事實，聲請訊問證人某甲","被告於第一審言詞辯論終結後向原告表明就原告主張之債權為抵銷，並於第二審提出該抵銷之抗辯"]},
{"n":72,"ans":0,"q":"下列何者之原告，得提起第三審上訴？","o":["原告就第二審駁回其請求離婚及贍養費新臺幣（下同）50萬元之判決提起上訴","原告就其敗訴之100萬元部分上訴，被告就其敗訴之200萬元部分上訴","原告起訴請求拆屋還地時之土地價值經法院核定為90萬元，並據此繳納一、二審裁判費。於原告提起第三審上訴日該地價值已升值為180萬元","原告就敗訴之140萬元聲明不服，並於上訴第三審之同時擴張請求30萬元"]},
{"n":73,"ans":1,"q":"關於第三審上訴之審理，下列敘述，何者正確？","o":["第三審原則上應經言詞辯論，故無關本案請求有無理由之攻擊防禦方法，無須記載於答辯狀","第三審法院在行言詞辯論程序時，宜先曉諭法律上爭點","第三審行言詞辯論時雖得試行和解，但不得使兩造成立訴訟上和解","第二審法院判決廢棄家事法院所為確認收養關係存在之第一審本案判決後，當事人不得對此第二審判決提起第三審上訴"]},
{"n":74,"ans":2,"q":"關於再審管轄權，下列敘述，何者正確？","o":["經第二審法院判決確定之事件，當事人對於同一事件之第一審及第二審判決同時聲明不服，提起再審之訴，專屬原第一審法院管轄","當事人對第二審判決提起上訴，經第三審法院以上訴不合法裁定駁回。當事人以適用法規顯有錯誤為由，對於第二審判決提起再審之訴，並對第三審裁定聲請再審，專屬原第二審法院合併管轄","當事人對第三審判決以適用法規顯有錯誤為理由，提起再審之訴，專屬該第三審法院管轄","經第三審法院判決確定之事件，當事人對該第二審、第三審判決提起再審之訴，專屬第三審法院合併管轄"]},
{"n":75,"ans":2,"q":"甲基於侵權行為之損害賠償請求權，向某地方法院起訴請求判命被告乙賠償新臺幣800萬元，並向受訴法院聲請訴訟救助。受訴法院就訴訟救助聲請部分，裁定予以准許後，乙不服提起抗告。下列敘述，何者錯誤？","o":["乙於收受准予訴訟救助之裁定後，得於法定期間內提起抗告。但乙如在裁定送達前提起抗告，亦有效力","乙提起抗告，若未依法繳納抗告裁判費，經原受訴法院定期命其補正而未補正者，原受訴法院得以裁定駁回其抗告","准予訴訟救助之裁定經宣示後，為裁定之法院應受其羈束，故縱原審法院認為乙之抗告為有理由，亦不得自行撤銷或變更原裁定","抗告法院認為乙之抗告有理由者，應以裁定廢棄或變更原裁定"]},
{"n":76,"ans":0,"q":"甲對乙有新臺幣500萬元之本票債權，乙拒不清償，下列敘述，何者錯誤？","o":["因請求金額過大，甲不得向法院聲請發支付命令","甲提起給付票款訴訟時，應適用簡易訴訟程序","甲聲請法院調解時，法院得逕以裁定駁回","甲得聲請法院裁定本票准予強制執行"]},
{"n":77,"ans":3,"q":"甲、乙婚姻關係存續中，甲與丙通姦，乙對甲、丙起訴主張甲、丙通姦而請求侵權行為損害賠償。嗣乙另對甲起訴，以不堪甲同居之虐待及甲通姦為由，請求裁判離婚，並酌定對於甲、乙所生未成年子女A之權利義務之行使負擔。下列敘述，何者錯誤？","o":["離婚訴訟應先行家事調解程序，並得經甲、乙、丙合意，將乙對甲、丙之損害賠償訴訟合併於離婚事件調解","甲、乙若於離婚訴訟中本人親自到場同意離婚，並合意對於A權利義務之行使負擔由乙任之，且符合A之最佳利益，即可以該合意內容成立和解，並載明於和解筆錄","甲在調解程序中自承有通姦的事實，於調解不成立後，法院不得採為離婚訴訟裁判之基礎","乙雖於調解程序中放棄「甲通姦」離婚事由之主張，並就此成立書面協議，於調解不成立後，仍得於裁判離婚訴訟中主張該離婚事由"]},
{"n":78,"ans":2,"q":"關於家事事件之審理原則，下列敘述，何者錯誤？","o":["在改定監護人事件，法院不受聲請人表明之監護人選所拘束，此乃職權主義（公權主義）之展現","在確認婚姻無效事件，法院不受當事人自認關於婚姻有效或無效之事實所拘束，此乃職權探知主義之展現","在認可收養事件，當事人於請求法院裁判前，應經法院調解，此乃調解前置及促成合意原則之展現","離婚事件與酌定未成年子女親權事件合併請求，此乃統合處理原則之展現"]},
{"n":79,"ans":1,"q":"印度籍之甲夫與臺灣籍之乙妻結婚，婚後生有未成年子丙，全家居住於甲夫之工作地點新竹，後甲、乙不合，甲離開臺灣前往菲律賓工作，之後失去連絡，乙攜丙回娘家屏東居住。關於審理程序，下列敘述，何者錯誤？","o":["乙以甲離家失聯，長期未同居，有重大事由請求裁判離婚，有關我國法院程序之規定，應適用中華民國法律","乙請求甲償還先前代甲墊付丙之扶養費事件，應另行起訴，不得與乙對甲之離婚事件合併請求","丙請求甲給付扶養費事件，屏東地方法院有管轄權","在乙對甲請求裁判離婚之訴訟繫屬中，乙得合併請求對丙權利義務之行使負擔由乙任之"]},
{"n":80,"ans":1,"q":"甲夫、乙妻有未成年之婚生子丙，乙婚前另與丁男交往，甲死亡後，其母戊認為丙非甲之子，提起確認親子關係不存在訴訟。下列敘述，何者正確？","o":["戊應以乙、丙、丁為共同被告，當事人始適格","如丙受婚生子女推定，則戊所提訴訟為無理由","為監督法官之審理，此類訴訟所有民眾皆可旁聽","受訴法院得命被告乙本人到場，如乙無正當理由不到場，法院得裁罰，並命拘提"]},

  function loadJSON(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb;}catch(e){return fb;}}
  function saveJSON(k,v){localStorage.setItem(k,JSON.stringify(v));}

  let flags=loadJSON(LS_FLAG,{}),selected=loadJSON(LS_SELECTED,{}),confused=loadJSON(LS_CONFUSE,{}),explainText=loadJSON(LS_EXPLAIN,{}),submitState=loadJSON(LS_SUBMIT,null);
  let currentFilter="all",openExplain=new Set(),openOfficial=new Set();

  const main=document.getElementById("main-content"),tabAll=document.getElementById("tab-all"),tabFlagged=document.getElementById("tab-flagged"),scoreBanner=document.getElementById("score-banner"),scoreTextEl=document.getElementById("score-text");

  function updateFlagCounter(){document.getElementById("flag-num").textContent=Object.values(flags).filter(Boolean).length;}

  function escapeHTML(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

  function buildOptionHTML(qn,idx,text,isCorrect){
    const sk=String(qn),isSel=selected[sk]===idx,ck=qn+"_"+idx,isCon=!!confused[ck];
    let cls="option";
    if(isSel)cls+=isCorrect?" selected-correct":" selected-wrong";
    if(isCon)cls+=" confused";
    return `<div class="${cls}" data-qn="${qn}" data-idx="${idx}"><span class="opt-label">${OPT_LABELS[idx]}</span><span class="opt-text">${text}</span><button class="confuse-btn ${isCon?'active':''}" data-qn="${qn}" data-idx="${idx}" title="標記疑惑"><svg viewBox="0 0 16 16"><path class="tri" d="M8 3 L13.5 12.5 L2.5 12.5 Z"/></svg></button></div>`;
  }

  function buildExplainHTML(qn){
    const k=String(qn),text=explainText[k]||"",hasNote=text.trim().length>0,isOpen=openExplain.has(k);
    return `<div class="explain-block" data-qn="${qn}"><button class="explain-toggle ${isOpen?'open':''}" data-qn="${qn}"><span class="chevron">▶</span><span class="toggle-label">${isOpen?'收合詳解':'顯示詳解'}</span>${hasNote?'<span class="has-note-tag">（已有詳解）</span>':''}</button><div class="explain-body ${isOpen?'open':''}"><textarea class="explain-textarea" data-qn="${qn}" placeholder="在此輸入詳解…">${escapeHTML(text)}</textarea><div class="explain-status" data-qn="${qn}">✓ 已自動儲存</div></div></div>`;
  }

  function buildOfficialExplainHTML(qn){
    const k=String(qn),content=(typeof OFFICIAL_EXPLANATIONS!=="undefined")?OFFICIAL_EXPLANATIONS[k]:null;
    if(!content)return "";
    const isOpen=openOfficial.has(k);
    return `<div class="official-block" data-qn="${qn}"><button class="official-toggle ${isOpen?'open':''}" data-qn="${qn}"><span class="chevron">▶</span><span class="toggle-label">${isOpen?'收合參考擬答':'顯示參考擬答'}</span></button><div class="official-body ${isOpen?'open':''}"><div class="official-content">${content}</div></div></div>`;
  }

  function buildQuestionHTML(item){
    const qn=item.n,isFlagged=!!flags[qn],isRevealed=selected[String(qn)]!==undefined&&selected[String(qn)]!==null,correctLabel=OPT_LABELS[item.ans];
    const optionsHTML=item.o.map((t,i)=>buildOptionHTML(qn,i,t,i===item.ans)).join("");
    return `<article class="q-card ${isFlagged?'flagged':''}" id="q-${qn}" data-qn="${qn}"><div class="q-row"><div class="q-leftbar"><span class="q-num">${qn}</span><button class="flag-btn ${isFlagged?'active':''}" data-qn="${qn}" title="標記容易出錯"><svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5"/></svg></button>${isFlagged?'<span class="flagged-tag">易錯</span>':''}</div><div class="q-body"><p class="q-text">${item.q}<span class="answer-inline ${isRevealed?'revealed':''}" data-qn="${qn}">正確答案：<span class="ans-key">(${correctLabel})</span></span></p><div class="options-grid">${optionsHTML}</div>${buildOfficialExplainHTML(qn)}${buildExplainHTML(qn)}</div></div></article>`;
  }

  function render(){
    const list=QUESTIONS.filter(it=>currentFilter==="flagged"?!!flags[it.n]:true);
    if(!list.length){main.innerHTML=`<div class="empty-state">目前沒有已標記的題目。複習時點擊每題左側的旗幟圖示即可加入標記。</div>`;return;}
    main.innerHTML=list.map(buildQuestionHTML).join("");
  }

  function setFilter(f){currentFilter=f;tabAll.classList.toggle("active",f==="all");tabFlagged.classList.toggle("active",f==="flagged");render();}

  function renderScoreBanner(){
    if(submitState&&submitState.done){scoreBanner.classList.add("show");scoreTextEl.innerHTML=`本次成績：${submitState.score} 分（共${submitState.correctCount}／${submitState.total}題答對，每題${POINTS_PER_Q}分） <span class="score-detail">交卷時間：${submitState.tsLabel}</span>`;}
    else scoreBanner.classList.remove("show");
  }

  main.addEventListener("click",function(e){
    const fb=e.target.closest(".flag-btn");
    if(fb){const qn=fb.dataset.qn;flags[qn]=!flags[qn];if(!flags[qn])delete flags[qn];saveJSON(LS_FLAG,flags);updateFlagCounter();render();return;}
    const cb=e.target.closest(".confuse-btn");
    if(cb){e.stopPropagation();const k=cb.dataset.qn+"_"+cb.dataset.idx;confused[k]=!confused[k];if(!confused[k])delete confused[k];saveJSON(LS_CONFUSE,confused);render();return;}
    const ot=e.target.closest(".official-toggle");
    if(ot){const qn=ot.dataset.qn;openOfficial.has(qn)?openOfficial.delete(qn):openOfficial.add(qn);render();return;}
    const et=e.target.closest(".explain-toggle");
    if(et){const qn=et.dataset.qn;openExplain.has(qn)?openExplain.delete(qn):openExplain.add(qn);render();if(openExplain.has(qn)){const ta=main.querySelector(`.explain-textarea[data-qn="${qn}"]`);if(ta)ta.focus();}return;}
    const op=e.target.closest(".option");
    if(op){const qn=op.dataset.qn,idx=parseInt(op.dataset.idx,10),k=String(qn);selected[k]===idx?delete selected[k]:selected[k]=idx;saveJSON(LS_SELECTED,selected);render();return;}
  });

  const debounceTimers={};
  main.addEventListener("input",function(e){
    const ta=e.target.closest(".explain-textarea");if(!ta)return;
    const qn=ta.dataset.qn;
    if(debounceTimers[qn])clearTimeout(debounceTimers[qn]);
    debounceTimers[qn]=setTimeout(()=>{
      explainText[qn]=ta.value;if(!ta.value.trim())delete explainText[qn];saveJSON(LS_EXPLAIN,explainText);
      const st=main.querySelector(`.explain-status[data-qn="${qn}"]`);
      if(st){st.classList.add("show");clearTimeout(st._t);st._t=setTimeout(()=>st.classList.remove("show"),1800);}
      const tg=main.querySelector(`.explain-toggle[data-qn="${qn}"]`);
      if(tg){const has=(explainText[qn]||"").trim().length>0,tag=tg.querySelector(".has-note-tag");if(has&&!tag){const t=document.createElement("span");t.className="has-note-tag";t.textContent="（已有詳解）";tg.appendChild(t);}else if(!has&&tag)tag.remove();}
    },800);
  });

  tabAll.addEventListener("click",()=>setFilter("all"));
  tabFlagged.addEventListener("click",()=>setFilter("flagged"));

  const modal=document.getElementById("confirm-modal");
  document.getElementById("clear-all-btn").addEventListener("click",()=>modal.classList.add("show"));
  document.getElementById("modal-cancel").addEventListener("click",()=>modal.classList.remove("show"));
  document.getElementById("modal-confirm").addEventListener("click",()=>{
    flags={};selected={};confused={};submitState=null;
    saveJSON(LS_FLAG,flags);saveJSON(LS_SELECTED,selected);saveJSON(LS_CONFUSE,confused);localStorage.removeItem(LS_SUBMIT);
    if(typeof clearExamComplete==="function")clearExamComplete();
    updateFlagCounter();renderScoreBanner();render();modal.classList.remove("show");
  });
  modal.addEventListener("click",e=>{if(e.target===modal)modal.classList.remove("show");});

  document.getElementById("submit-btn").addEventListener("click",()=>{
    let correctCount=0;QUESTIONS.forEach(it=>{const s=selected[String(it.n)];if(s!==undefined&&s===it.ans)correctCount++;});
    const total=QUESTIONS.length,score=correctCount*POINTS_PER_Q,now=new Date();
    const tsLabel=now.getFullYear()+"/"+String(now.getMonth()+1).padStart(2,"0")+"/"+String(now.getDate()).padStart(2,"0")+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    submitState={done:true,score,correctCount,total,ts:now.getTime(),tsLabel};saveJSON(LS_SUBMIT,submitState);renderScoreBanner();window.scrollTo({top:0,behavior:"smooth"});
    if(typeof reportExamComplete==="function")reportExamComplete({score,total,correctCount});
  });

  const SYM="符號圖例：✓ = 我選對的選項｜✗ = 我選錯的選項｜▲ = 標記為疑惑的選項｜▶ 正確答案：括號內為正解代號";
  function pad2(n){return String(n).padStart(2,"0");}
  function todayStamp(){const d=new Date();return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate());}
  function html2text(html){if(!html)return "";let t=html;t=t.replace(/<li[^>]*>/gi,"・").replace(/<\/li>/gi,"\n").replace(/<p[^>]*>/gi,"").replace(/<\/p>/gi,"\n").replace(/<\/?(ul|strong|em)[^>]*>/gi,"").replace(/<[^>]+>/g,"").replace(/&nbsp;/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"');return t.split("\n").map(l=>l.trim()).filter(l=>l.length>0).join("\n");}

  function buildExportText(list,scope){
    const now=new Date(),dl=now.getFullYear()+"/"+pad2(now.getMonth()+1)+"/"+pad2(now.getDate());
    let wc=0,cc=0,ec=0,oc=0;const lines=[];
    lines.push(`試卷標題：${EXAM_TITLE}`);lines.push(`科目：${EXAM_SUBJECT}`);lines.push(`匯出範圍：${scope}`);lines.push(`匯出日期：${dl}`);lines.push(SYM);lines.push("=".repeat(48));lines.push("");
    list.forEach(item=>{
      const qn=item.n,k=String(qn),si=selected[k],hasSel=si!==undefined&&si!==null,isWrong=hasSel&&si!==item.ans;if(isWrong)wc++;
      let qCon=false;lines.push(`第 ${qn} 題`);lines.push(item.q);
      item.o.forEach((t,i)=>{const ic=!!confused[qn+"_"+i];if(ic)qCon=true;let m="　";if(hasSel&&i===si)m=(i===item.ans)?"✓":"✗";else if(ic)m="▲";lines.push(`${m} (${OPT_LABELS[i]}) ${t}`);});
      if(qCon)cc++;lines.push(`▶ 正確答案：(${OPT_LABELS[item.ans]})`);
      const oh=(typeof OFFICIAL_EXPLANATIONS!=="undefined")?OFFICIAL_EXPLANATIONS[k]:null;if(oh){oc++;lines.push(html2text(oh));}
      const note=(explainText[k]||"").trim();if(note){ec++;lines.push("詳解：");lines.push(note);}
      lines.push("-".repeat(48));lines.push("");
    });
    lines.push("=".repeat(48));
    lines.push(`統計：共 ${list.length} 題｜已標記 ${list.filter(it=>!!flags[it.n]).length} 題｜答錯 ${wc} 題｜含疑惑選項 ${cc} 題｜有參考擬答 ${oc} 題｜有詳解 ${ec} 題`);
    return lines.join("\n");
  }

  function downloadText(name,content){const b=new Blob([content],{type:"text/plain;charset=utf-8"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}

  document.getElementById("export-flagged-btn").addEventListener("click",()=>{
    const list=QUESTIONS.filter(it=>!!flags[it.n]);if(!list.length){alert("目前沒有已標記的題目可匯出。");return;}
    downloadText(`${EXAM_TITLE}_已標記弱點題_${todayStamp()}.txt`,buildExportText(list,"已標記弱點題"));
  });
  document.getElementById("export-all-btn").addEventListener("click",()=>downloadText(`${EXAM_TITLE}_全部題目_${todayStamp()}.txt`,buildExportText(QUESTIONS,"全部題目")));

  updateFlagCounter();renderScoreBanner();render();
})();
</script>
</body>
</html>
