<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>113年司律一試 — 綜合法學（一）憲法‧行政法‧國際公法‧國際私法 練習卷</title>
<script src="exam-complete.js"></script>
<style>
  :root{
    --paper:#faf8f3;
    --paper-dim:#f3efe6;
    --ink:#2b2b28;
    --ink-soft:#5c5850;
    --rule:#d9d2c2;
    --accent:#8a5a2b;
    --accent-soft:#caa874;
    --flag:#b3422f;
    --flag-bg:#fbe9e5;
    --correct-bg:#dcecd8;
    --correct-border:#5a9456;
    --wrong-bg:#f6d9d4;
    --wrong-border:#b3422f;
    --confuse:#c98a2c;
    --serif: "Noto Serif TC", "Source Han Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-dim);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Sticky Header ---------- */
  header.site-header{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--paper);
    border-bottom:2px solid var(--ink);
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .header-inner{
    max-width:1000px;
    margin:0 auto;
    padding:14px 20px 12px;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .exam-title{
    font-family:var(--serif);
    font-size:1.25rem;
    font-weight:700;
    letter-spacing:0.02em;
    margin:0;
  }
  .exam-sub{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin:2px 0 0;
  }
  .meta-line{
    font-size:0.78rem;
    color:var(--ink-soft);
    margin-top:4px;
  }

  .controls-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--rule);
  }
  .filter-tabs{
    display:flex;
    gap:4px;
    margin-right:4px;
  }
  .filter-tabs button{
    font-family:var(--sans);
    font-size:0.82rem;
    padding:5px 12px;
    border-radius:999px;
    border:1px solid var(--rule);
    background:var(--paper);
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
  }
  .filter-tabs button.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }
  .filter-tabs button:hover:not(.active){
    border-color:var(--accent);
    color:var(--accent);
  }
  .flag-count{
    display:inline-flex;
    align-items:center;
    gap:4px;
    font-size:0.8rem;
    font-weight:600;
    color:var(--flag);
    padding:0 4px;
  }
  .flag-count svg{width:12px;height:12px;}
  .clear-btn{
    font-family:var(--sans);
    font-size:0.78rem;
    padding:5px 10px;
    border-radius:6px;
    border:1px solid var(--flag);
    background:var(--paper);
    color:var(--flag);
    cursor:pointer;
    transition:all .15s ease;
  }
  .clear-btn:hover{
    background:var(--flag);
    color:#fff;
  }
  .export-btn{
    font-family:var(--sans);
    font-size:0.78rem;
    padding:5px 10px;
    border-radius:6px;
    border:1px solid var(--accent-soft);
    background:#fff;
    color:var(--accent);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }
  .export-btn:hover{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .export-btn svg{width:12px;height:12px;}
  .submit-btn{
    font-family:var(--sans);
    font-size:0.82rem;
    font-weight:700;
    padding:5px 14px;
    border-radius:6px;
    border:1px solid #3f6b3c;
    background:#4f7d4a;
    color:#fff;
    cursor:pointer;
    transition:all .15s ease;
    margin-left:auto;
  }
  .submit-btn:hover{
    background:#3f6b3c;
  }

  /* ---------- Score Banner ---------- */
  .score-banner{
    display:none;
    background:#fdf6ec;
    border:1.5px solid var(--accent-soft);
    border-radius:8px;
    padding:10px 16px;
    margin-top:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .score-banner.show{display:flex;}
  .score-banner .score-text{
    font-size:0.95rem;
    font-weight:700;
    color:var(--accent);
  }
  .score-banner .score-detail{
    font-size:0.78rem;
    color:var(--ink-soft);
    font-weight:400;
  }
  .score-banner .done-tag{
    font-size:0.72rem;
    font-weight:700;
    color:#3f6b3c;
    background:#e3efe1;
    border:1px solid #8fbf89;
    border-radius:4px;
    padding:2px 8px;
  }

  /* ---------- Main content ---------- */
  main{
    max-width:1000px;
    margin:0 auto;
    padding:24px 20px 80px;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-size:0.95rem;
  }

  .q-card{
    background:var(--paper);
    border:1px solid var(--rule);
    border-radius:10px;
    margin-bottom:16px;
    padding:16px 18px 16px 14px;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .q-card.flagged{
    border-color:var(--flag);
    box-shadow:0 0 0 1px var(--flag) inset;
    background:linear-gradient(180deg, var(--flag-bg) 0%, var(--paper) 55px);
  }

  .q-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  .q-leftbar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    flex-shrink:0;
    width:46px;
    padding-top:1px;
  }

  .q-num{
    font-family:var(--serif);
    font-weight:700;
    font-size:1.1rem;
    color:var(--ink);
    line-height:1;
  }

  .flag-btn{
    background:none;
    border:none;
    cursor:pointer;
    padding:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    transition:transform .12s ease, background .15s ease;
  }
  .flag-btn:hover{
    background:var(--flag-bg);
  }
  .flag-btn svg{
    width:18px;
    height:18px;
    stroke:var(--ink-soft);
    fill:none;
    stroke-width:1.8;
    transition:fill .15s ease, stroke .15s ease;
  }
  .flag-btn.active svg{
    fill:var(--flag);
    stroke:var(--flag);
  }
  .flag-btn:active{transform:scale(0.9);}

  .flagged-tag{
    font-size:0.65rem;
    font-weight:700;
    color:var(--flag);
    background:var(--flag-bg);
    border:1px solid var(--flag);
    border-radius:4px;
    padding:1px 5px;
    white-space:nowrap;
    letter-spacing:0.04em;
  }

  .q-body{
    flex:1;
    min-width:0;
  }

  .q-text{
    font-size:0.98rem;
    font-weight:700;
    margin:0 0 12px;
    color:var(--ink);
  }

  .options-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 10px;
  }
  @media (max-width:620px){
    .options-grid{grid-template-columns:1fr;}
  }

  .option{
    display:flex;
    align-items:flex-start;
    gap:8px;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:8px 10px;
    cursor:pointer;
    font-size:0.9rem;
    background:#fff;
    transition:background .15s ease, border-color .15s ease;
    position:relative;
  }
  .option:hover{
    border-color:var(--accent-soft);
  }
  .option .opt-label{
    font-weight:700;
    color:var(--accent);
    flex-shrink:0;
  }
  .option .opt-text{
    flex:1;
  }
  .option .confuse-btn{
    flex-shrink:0;
    background:none;
    border:none;
    cursor:pointer;
    padding:1px 2px;
    margin-left:2px;
    line-height:0;
  }
  .option .confuse-btn svg{
    width:13px;
    height:13px;
    transition:fill .15s ease;
  }
  .option .confuse-btn svg .tri{
    fill:none;
    stroke:#b9b2a0;
    stroke-width:1.4;
  }
  .option .confuse-btn.active svg .tri{
    fill:var(--confuse);
    stroke:var(--confuse);
  }

  .option.selected-wrong{
    background:var(--wrong-bg);
    border-color:var(--wrong-border);
  }
  .option.selected-wrong .opt-text{
    text-decoration:line-through;
    color:#7a3a30;
  }
  .option.selected-correct{
    background:var(--correct-bg);
    border-color:var(--correct-border);
  }
  .option.confused{
    outline:2px dashed var(--confuse);
    outline-offset:1px;
  }

  .answer-inline{
    display:inline-block;
    margin-left:10px;
    font-size:0.8rem;
    font-weight:400;
    padding:2px 9px;
    border-radius:5px;
    background:#fff;
    color:#fff; /* hidden by default: white on white */
    border:1px solid var(--rule);
    transition:color .15s ease, background .15s ease, border-color .15s ease;
    user-select:none;
    vertical-align:middle;
    white-space:nowrap;
  }
  .answer-inline.revealed{
    color:var(--accent);
    background:#fdf6ec;
    border-color:var(--accent-soft);
    font-weight:600;
    user-select:text;
  }
  .answer-inline .ans-key{
    font-weight:700;
  }

  /* ---------- Explanation block ---------- */
  .explain-block{
    margin-top:10px;
  }
  .explain-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid var(--rule);
    background:#fff;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .explain-toggle:hover{
    border-color:var(--accent-soft);
    color:var(--accent);
  }
  .explain-toggle .has-note-tag{
    font-size:0.72rem;
    font-weight:700;
    color:var(--accent);
  }
  .explain-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .explain-toggle.open .chevron{
    transform:rotate(90deg);
  }

  .explain-body{
    display:none;
    margin-top:8px;
  }
  .explain-body.open{
    display:block;
  }
  .explain-textarea{
    width:100%;
    min-height:90px;
    font-family:var(--sans);
    font-size:0.88rem;
    line-height:1.6;
    color:var(--ink);
    background:#fffdf8;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:10px 12px;
    resize:vertical;
    transition:border-color .15s ease;
  }
  .explain-textarea:focus{
    outline:none;
    border-color:var(--accent-soft);
  }
  .explain-status{
    font-size:0.74rem;
    color:#5a9456;
    margin-top:5px;
    height:1em;
    opacity:0;
    transition:opacity .25s ease;
  }
  .explain-status.show{
    opacity:1;
  }

  /* ---------- Official explanation block (built-in, read-only) ---------- */
  .official-block{
    margin-top:8px;
  }
  .official-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid #cfe0d4;
    background:#f3f9f4;
    color:#3f6b3c;
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .official-toggle:hover{
    border-color:#8fbf89;
    background:#e9f4ea;
  }
  .official-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .official-toggle.open .chevron{
    transform:rotate(90deg);
  }
  .official-badge-icon{
    font-size:0.78rem;
  }
  .official-body{
    display:none;
    margin-top:8px;
  }
  .official-body.open{
    display:block;
  }
  .official-content{
    background:#f8fbf8;
    border:1px solid #d9e9da;
    border-left:3px solid #5a9456;
    border-radius:8px;
    padding:14px 16px;
    font-size:0.88rem;
    line-height:1.75;
    color:#2f4a2d;
  }
  .official-content p{
    margin:0 0 8px;
  }
  .official-content p:last-child{
    margin-bottom:0;
  }
  .official-content ul{
    margin:0 0 8px;
    padding-left:1.3em;
  }
  .official-content ul:last-child{
    margin-bottom:0;
  }
  .official-content li{
    margin-bottom:6px;
  }
  .official-content li:last-child{
    margin-bottom:0;
  }
  .official-content strong{
    color:#1f3a1e;
  }
  .official-content em{
    color:#5c6b5a;
  }

  /* modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(30,28,24,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:var(--paper);
    border-radius:10px;
    padding:22px 24px;
    max-width:360px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
    text-align:center;
  }
  .modal-box p{
    font-size:0.92rem;
    margin:0 0 18px;
    color:var(--ink);
  }
  .modal-actions{
    display:flex;
    justify-content:center;
    gap:10px;
  }
  .modal-actions button{
    font-family:var(--sans);
    font-size:0.85rem;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    border:1px solid var(--rule);
    background:#fff;
  }
  .modal-actions button.confirm{
    background:var(--flag);
    border-color:var(--flag);
    color:#fff;
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="title-row">
      <div>
        <h1 class="exam-title">113年公務人員特種考試司法官考試 ‧ 113年專門職業及技術人員高等考試律師考試</h1>
      </div>
    </div>
    <div class="meta-line">綜合法學（一）憲法‧行政法‧國際公法‧國際私法｜共75題｜每題2分｜考試時間：1小時30分</div>

    <div class="controls-row">
      <div class="filter-tabs">
        <button id="tab-all" class="active">全部題目</button>
        <button id="tab-flagged">已標記</button>
      </div>
      <span class="flag-count">
        <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5" fill="currentColor" stroke="none"/></svg>
        <span id="flag-counter">0</span> 題已標記
      </span>
      <button class="clear-btn" id="clear-all-btn">清除標記</button>
      <button class="export-btn" id="export-flagged-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
        匯出已標記
      </button>
      <button class="export-btn" id="export-all-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
        匯出全部
      </button>
      <button class="submit-btn" id="submit-btn">交卷算分</button>
    </div>

    <div class="score-banner" id="score-banner">

      <span class="done-tag">本卷已完成</span>

</header>

<main id="main-content"></main>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <p>確定要清除「全部」旗標標記、作答紀錄、疑惑標記與交卷成績嗎？<br>（已輸入的詳解內容將會保留；題庫大廳的「已完成」徽章也會一併移除）<br>此操作無法復原。</p>
    <div class="modal-actions">
      <button id="modal-cancel">取消</button>
      <button id="modal-confirm" class="confirm">確定清除</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
{"n":1,"ans":3,"q":"關於貨物應許自由流通之憲法規定，下列敘述何者錯誤？","o":["體系上屬基本國策章之規定，並非全無規範效力","為確保該規定目標得以實現，國家公權力之行使至少不應與其背道而馳","本條規定係以全國為空間範圍，故跨地方轄區間之貨物自由流通應受到保障","地方自治立法禁止特定之合法商品於轄內進行交易，屬地方自治權之行使，應優先於本條適用"]},
{"n":2,"ans":0,"q":"關於憲法人身自由之規定，依司法院解釋意旨，下列敘述何者正確？","o":["憲法第8條第1項所稱之法院，指有審判權之法官所構成之獨任或合議之法院","憲法第8條第1項所稱之司法機關，並不包括檢察機關","憲法第8條有關提審之規定，以非法逮捕拘禁為要件","憲法第8條第1項所稱之審問機關，包含法院以外之機關"]},
{"n":3,"ans":3,"q":"有關遷徙自由，下列敘述何者錯誤？","o":["於臺灣地區設有住所而有戶籍之國民得隨時返回我國，無待許可","僑居國外具有中華民國國籍之國民若非於臺灣地區設有住所而有戶籍，仍應適用相關法律之規定，始得返國","大陸地區人民進入臺灣地區設有限制，係法律特別規定，應符合憲法增修條文第11條之意旨","香港澳門地區人民進入臺灣地區之限制，係比照外國人，適用入出國及移民法"]},
{"n":4,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，關於政黨之敘述，下列何者錯誤？","o":["政黨為人民之政治性結社團體，受憲法結社自由之保障","政黨之目的，危害自由民主之憲政秩序者，得由憲法法庭宣告解散之","政黨在民主競爭下，享有公平參與選舉及平等接近使用各種公共資源之機會","政黨經營營利事業，受憲法保障，法律不得限制之"]},
{"n":5,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，關於法規範差別待遇之合憲性審查標準，下列敘述何者正確？","o":["法規範採取性別分類而形成差別待遇者，因係以難以改變之個人特徵、歷史性或系統性之刻板印象為差別待遇之標準，應採嚴格審查","法規範就僅父或母為原住民者，附加「從具原住民身分之父或母之姓或原住民傳統名字」之要求，因未涉及原住民身分認同之重要基本權利，應採中度審查","法規範以媒合是否涉及跨國（境）婚姻為分類，而對跨國（境）婚姻媒合給予相對不利之差別待遇，未涉及可疑分類，亦未涉及攸關個人人格發展及人性尊嚴之重要基本權利，應採中度審查","法規範將特定犯罪規定為告訴乃論之罪，係屬刑事立法政策之選擇，其因此與其他非告訴乃論之罪形成之差別待遇，應採寬鬆審查"]},
{"n":6,"ans":0,"q":"依司法院解釋意旨及憲法法庭裁判，關於財產權之社會義務性，下列敘述何者錯誤？","o":["行使財產權應依法受社會責任及環境生態責任之限制，形成個人利益之特別犧牲時，既係因社會責任所生，當無補償之必要","法律限制對土地之利用至為輕微，則屬人民享受財產權同時所應負擔之社會義務，騎樓即為適例","財產權人之財產已由過去不受限制支配之絕對性，轉變成並非聽由財產權人任意為之，而須注意到公共利益","基於增進公共利益之必要，對人民依法取得之土地所有權，國家並非不得以法律為合理之限制"]},
{"n":7,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，關於憲法上工作權之保障及其限制，下列敘述何者錯誤？","o":["職業自由為人民充實生活內涵及自由發展人格所必要，不因職業之性質為公益或私益、營利或非營利而有異","人民之工作權保障，包括選擇職業之自由","憲法工作權保障人民有開業、停業與否及從事營業之時間、地點、對象及方式之自由","營業場所之選定亦受營業自由保障，僅得以法律為必要之限制，不得授權主管機關發布法規命令為規範"]},
{"n":8,"ans":3,"q":"憲法上人民權利救濟請求權，下列敘述何者正確？","o":["訴願作為行政訴訟之先行程序，係對人民訴訟權施予不必要之限制","訴願審理之範圍必須與法院審理之範圍相同","人民請願未獲得行政機關積極處理時，得提起訴願","憲法並未規定訴願審議委員會之具體組成方式"]},
{"n":9,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，有關人民之受教育權，下列敘述何者錯誤？","o":["國民受教育之機會，一律平等。對於原住民族、身心障礙者之教育，考慮其自主性及特殊性，應依法令予以特別保障","已逾學齡未受基本教育之國民，有受補習教育之權利","憲法所稱6歲至12歲之學齡兒童，一律受基本教育，係屬最低標準","受國民教育以外教育者，尚包括賦予人民請求給予入學許可、提供特定教育給付之權利"]},
{"n":10,"ans":0,"q":"依司法院解釋意旨及憲法法庭裁判，有關法律保留原則，下列敘述何者錯誤？","o":["凡是限制人民自由權利之事項，概應由立法者以法律直接規定之","屬於執行法律之技術性或細節性之事項，法律得交由主管機關發布命令為必要之規範","法律授權行政機關以命令補充規定者，母法之授權必須明確","基於法律授權而訂定法規命令，不得逾越授權範圍"]},
{"n":11,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，關於未成年人之人格權，下列敘述何者錯誤？","o":["受概括基本權之保障，屬具憲法位階之權利","公權力措施涉及未成年人之人格權時，應以維護未成年人之最佳利益為依歸","家事非訟程序中，為尊重未成年人之人格獨立與主體性，法院應踐行給予陳述意見機會之正當法律程序","公權力措施涉及未成年人與父母意見不一致時，本於人格權之保障，概以未成年人意願為優先"]},
{"n":12,"ans":1,"q":"依司法院解釋意旨及憲法法庭裁判，關於基本權之保障，下列敘述何者錯誤？","o":["公立大學就各科系學生畢業條件之規定，受憲法大學自治之保障","中央與地方合資經營之公營公司，概不受憲法財產權之保障","少年若涉及少年保護事件處理程序，其到庭陳述意見，應受正當法律程序之保障","街頭藝人之藝文活動受憲法藝術表現自由之保障"]},
{"n":13,"ans":2,"q":"依司法院解釋意旨及憲法法庭裁判，關於總統之權力，下列敘述何者錯誤？","o":["總統於憲法及憲法增修條文所賦予之行政權範圍內，為最高行政首長","總統得經由其任命之行政院院長，變更先前存在，與其政見未洽之施政方針或政策","總統之刑事豁免權不得事前、概括拋棄，但於個案中仍得拋棄，而使檢察官以總統為被告提起公訴","總統就有關國家安全、國防及外交資訊之公開與否，享有國家機密特權"]},
{"n":14,"ans":0,"q":"依憲法及司法院解釋意旨與憲法法庭裁判，下列何者有至立法院委員會，就相關法律案及預算案備詢之義務？","o":["司法院秘書長","監察院院長","臺北市市長","考試委員"]},
{"n":15,"ans":3,"q":"依憲法、司法院解釋意旨及憲法法庭裁判，下列何者非屬監察院之職權？","o":["向行政院及其各部會調閱其所發布之命令及各種有關文件","為行使職權，按行政院及其各部會之工作，分設若干委員會","彈劾、糾舉及審計權為憲法明定之職權","對於所有中央民選公職人員提出彈劾案"]},
{"n":16,"ans":0,"q":"依司法院解釋意旨及憲法法庭裁判，下列何者就法官審理程序有關之技術性事項有規則制定權？","o":["司法院","法務部","立法院","審判長"]},
{"n":17,"ans":0,"q":"依憲法訴訟法規定，有關立法委員聲請憲法法庭為法規範憲法審查之敘述，下列何者正確？","o":["若緊急命令有違憲之疑慮，符合法定人數之立法委員得提出聲請","須由現有總額至少五分之一以上之立法委員提出聲請","若少數立法委員認為多數立法委員於法律議案表決時侵害其受憲法保障之權力，即得提出聲請","須於違憲爭議事件發生後6個月內提出聲請"]},
{"n":18,"ans":0,"q":"關於憲法訴訟法規定之機關爭議案件，下列敘述何者錯誤？","o":["此一訴訟種類為憲法訴訟法新增，以往並無類此之案件類型","限於國家最高機關之間憲法上權限之爭議","應先由爭議之機關進行協商","應於法定之6個月不變期間內提出聲請"]},
{"n":19,"ans":2,"q":"甲縣主管機關所為之下列行為，何者中央主管機關僅得為合法性監督，而不得為合目的性監督？","o":["依道路交通管理處罰條例所為之行為","依公職人員選舉罷免法辦理立法委員之選舉","依該縣自治條例所為之行為","依該縣委辦規則所為之行為"]},
{"n":20,"ans":1,"q":"有關憲法保障之基本權利，下列敘述何者錯誤？","o":["基本權利之限制適用法律保留原則","法人作為基本權利主體，僅限於私法人","保障基本權利是自由民主憲政秩序之基礎","基本權利之保障規定，其拘束對象，原則上為公權力"]},
{"n":21,"ans":0,"q":"依我國司法實務之見解，下列何者非屬私法性質之爭議？","o":["台灣電力公司關於發電機組採購案之決標爭議","台灣自來水公司與用戶間關於水費之爭議","臺灣銀行股份有限公司與退休公務人員間關於優惠存款契約之爭議","既成道路之土地所有權人依民法物上請求權請求市政府刨除柏油路面並返還土地"]},
{"n":22,"ans":3,"q":"依司法院解釋意旨，關於權利救濟途徑之敘述，下列何者正確？","o":["政府依實施耕者有其田條例所為之耕地徵收，耕地所有權人得以權利受損為理由，提起民事訴訟，請求返還土地","政府機關與承租人就國民住宅租賃契約所生之爭議，應循行政爭訟程序解決之","人民依國有財產法第52條之2規定申請讓售國有非公用財產之不動產所生之爭議，應循民事訴訟程序解決之","人民依國有林地濫墾地補辦清理作業要點申請訂立租地契約遭否准時，可提起行政爭訟以為救濟"]},
{"n":23,"ans":2,"q":"有關行政之敘述，下列何者錯誤？","o":["行政不同於司法，具有主動性，行政機關得本於職權依法排除並裁罰人民之違章行為","行政具有手段多樣性，除法規另有規定外，享有法律形式與行為形式之選擇自由","行政首重層級指揮體系，任何下級機關事務之執行，皆應受上級機關之合法性及合目的性監督","行政雖具有個案性，但並不排除得依法律授權訂定法規命令及本於職權訂定行政規則"]},
{"n":24,"ans":2,"q":"依司法實務見解，關於法律保留原則，下列敘述何者錯誤？","o":["行政機關限制人民基本權利，單有組織法上之依據，並不足以符合法律保留原則之要求","地方自治團體在自治事項範圍內，原則上得以自治條例限制居民之基本權利","行政機關訂定行政規則，須有法律之授權","法律授權行政機關訂定法規命令，若無轉委任之授權，行政機關不得再委由其所屬機關訂定"]},
{"n":25,"ans":2,"q":"行政機關依其自行訂定的裁量基準作成裁罰處分，受理訴願機關或行政法院對於該裁罰處分之審查，下列敘述何者正確？","o":["基於行政規則之間接對外效力，受理訴願機關或行政法院應受裁罰基準之拘束","裁量基準為行政規則，具內部拘束力，原處分符合裁量基準即無違法或不當可言","原處分機關依裁量基準作成之裁罰處分，如違反比例原則，受理訴願機關或行政法院仍得予以撤銷","裁量基準為法規命令，如侵害人民權利，受理訴願機關或行政法院應聲請法規範憲法審查"]},
{"n":26,"ans":0,"q":"有關設置中央行政機關之權限，下列敘述何者錯誤？","o":["行政院經行政院會議及立法院之決議，得增設、裁併各部各委員會，或其他所屬機關","四級機關之組織得以行政命令定之","行政院為因應突發或新興之重大事務，得設臨時性之機關","行政機關內部單位之分工職掌，得以處務規程或辦事細則定之"]},
{"n":27,"ans":1,"q":"關於行政機關管轄權之敘述，依法律規定及司法實務見解，下列何者錯誤？","o":["管轄權非依法律或依法律授權所訂定之法規命令，不得設定或變更","管轄權移轉未為公告，並不影響其效力","地方政府於必要之情形下，不排除得依法規將自治事項委託由中央行政機關執行之","授權行政機關得為管轄權移轉之法規，原則上應與設定該機關管轄權之法規相同位階"]},
{"n":28,"ans":3,"q":"依現行規定，關於鄉自治條例之敘述，下列何者正確？","o":["就違反地方自治事項之行政業務者，得規定處以最高新臺幣20萬元以下之罰鍰或其他種類之行政罰","規定處以其他種類行政罰之鄉自治條例，不以於一定期限內限制或禁止為一定行為之不利處分為限","規定有罰則之鄉自治條例，經鄉民代表會議決後，應報中央各該主管機關核定後發布","鄉自治條例經監督機關函告無效時，鄉依法定程序用盡審級救濟後受不利確定終局裁判者，得聲請憲法法庭為違憲宣告之判決"]},
{"n":29,"ans":3,"q":"依現行法規及司法院解釋意旨，關於公務（人）員之敘述，下列何者正確？","o":["現行與公務員有關之法規，凡使用公務人員名稱者，除常任文官外，亦可適用於武職人員","凡依法令受有俸給之文武職公務員，均為公務人員保障法之適用對象而受其規範","公務員之任命程序與其職務有必然之關聯性，凡經總統提名，立法院同意任命者，其職務性質即為相同","直轄市長、縣（市）長、鄉（鎮、市）長亦適用公務員服務法"]},
{"n":30,"ans":3,"q":"關於公務員懲戒制度，下列敘述何者正確？","o":["公務員有懲戒事由，得逕由其服務機關之首長移送懲戒法庭審理","公務員懲戒程序以書面審理為原則","公務員懲戒事件採一審終結，並無上訴制度","政務人員與地方民選首長得受懲戒處分之種類相同"]},
{"n":31,"ans":0,"q":"下列何種爭議事件，不適用公務人員保障法之救濟程序？","o":["行政機關依事務管理規則僱用之工友遭檢察官起訴而被停職，於無罪判決確定後，請求補發薪資遭拒絕","公立學校兼任行政職之教師請求增加主管加給金額遭拒絕","公務人員因執行職務發生意外，申請受傷慰問金遭拒絕","公務人員依法執行職務涉訟，向服務機關申請為其延聘律師遭拒絕"]},
{"n":32,"ans":2,"q":"下列何者非屬行政機關訂定之法規？","o":["職權命令","委辦規則","職務命令","行政規則"]},
{"n":33,"ans":0,"q":"A公司獲B市政府經濟發展局（下稱經發局）核定補助新臺幣200萬元，限定用於產品創新研發（但附加僅限定用於產品創新研發之附款）。A公司獲補助後將補助款挪作他用，經發局欲命A公司返還補助款。依司法實務見解，下列敘述何者正確？","o":["經發局未廢棄該補助處分前，該補助處分仍有存續力，該金錢給與仍有法律上原因","為使該補助處分溯及既往失其效力，經發局應撤銷該補助處分","A公司受領補助逾5年，經發局即不得再為請求","經發局廢棄該補助處分後得作成行政處分限期命A公司返還補助款，縱使A公司提起訴願，仍得移送行政執行"]},
{"n":34,"ans":3,"q":"下列何者非屬行政程序法所規定行政處分之附款？","o":["主管機關核准甲於人行道上擺攤，但要求甲於收攤時應清理周邊垃圾","主管機關核定甲留學獎金資格時，一併要求甲應於1年內出國，否則喪失資格","主管機關核給公務員甲出國進修津貼，要求甲回國後應繳交特定領域相關之研究報告","主管機關核准甲之遊行申請，但於其申請範圍內限制遊行路線"]},
{"n":35,"ans":2,"q":"依法規及司法院解釋意旨，關於行政契約，下列敘述何者正確？","o":["行政契約之締結，應以書面為之，所謂書面係指雙方的意思須共同記載於同一份文書","限制人民權利之契約內容，必須符合法律保留原則","甲與機關A締結行政契約後，若該行政契約之內容對公益造成重大危害，A得不經甲之同意，於必要範圍內調整契約內容","機關A作成行政處分，依法應經機關B同意，若A欲締結行政契約代替行政處分之作成，則此時A無須經B之同意"]},
{"n":36,"ans":3,"q":"依司法實務見解，下列何者非屬行政契約？","o":["衛生福利部中央健康保險署與特約醫院約定提供被保險人醫療服務之契約","某國立醫學院學生與主管機關協議，學生領取公費補助，畢業後則願接受分發至公立衛生醫療機構服務","地方政府將其所設立之實驗小學委託民間經營所簽訂之委託經營契約","台灣電力公司與民間水力發電業者所簽訂之購售電契約"]},
{"n":37,"ans":3,"q":"依司法實務見解，下列何者有行政罰法之適用？","o":["主管機關命違法採取土石之甲回復土地原狀","主管機關限制欠稅之營利事業負責人乙出境","主管機關命逾期不自行拆除違章建築之丙繳納新臺幣100萬元代履行費用","主管機關通知借用他人名義投標之廠商丁，將刊登政府採購公報停權3年"]},
{"n":38,"ans":1,"q":"關於行政罰法第14條所定之共同違反行政法上義務行為，下列敘述何者正確？","o":["共同實施違法行為之情況包含共同行為人之直接故意、間接故意及過失參與之情況","對於共同行為人分別處罰之，並依個別行為情節之輕重審酌其罰鍰之金額","因身分關係成立違反行政法上義務行為時，共同行為人中無該身分者，減輕或免除處罰","對於共同行為人之處罰，罰鍰合計之總額不得逾法定罰鍰額之上限"]},
{"n":39,"ans":3,"q":"甲公司僱用乙負責機器設備檢查及維護工作，因乙施作不慎引發火警，造成空氣污染，主管機關乃對甲公司裁處新臺幣6萬元罰鍰。甲公司主張係乙施作不慎引發火警，非其故意過失導致空氣污染，提起訴願。訴願機關應為下列何項判定？","o":["行政罰不以故意、過失為要件，甲公司仍應受罰","行政罰以故意過失為要件，甲公司並無故意過失，不得對之裁處罰鍰","行政罰以故意過失為要件，乙之故意過失，視為甲公司之故意過失，甲公司仍應受罰","行政罰以故意過失為要件，乙之故意過失，推定甲公司有故意過失，甲公司仍應受罰"]},
{"n":40,"ans":1,"q":"關於公物，下列敘述何者錯誤？","o":["未經徵收之既成道路雖為私有，但仍屬公物","公物一律不得為設定目的外之使用","行政機關設定某物為公物的行為，性質上為行政處分","除了由行政機關主動設定，公物亦得於符合事實上一定要件而成立"]},
{"n":41,"ans":0,"q":"下列何者非屬行政事實行為？","o":["行政機關以暴雨即將來襲為由，依法要求在河邊露營之民眾立即撤離","行政機關依法對某批已核定之低收入戶實際發放補貼金","行政機關出於錯誤認知，向某尋求諮商之市民提供不正確資訊","行政機關依法對某鼓吹極端言論之遊行錄影蒐證"]},
{"n":42,"ans":2,"q":"下列何者非屬行政執行法上之直接強制措施？","o":["命廠商停止營業未果後，主管機關之執法公務員逕自斷絕營業場所之水電","命建築物所有人自行拆除違章建築未果後，市政府拆除大隊強制拆除違章建築","消防隊基於救火需要，緊急將合法停放於路邊停車格之汽車拖離現場","主管機關裁處沒入乙之汽車，乙拒絕交付該車，經主管機關查獲該車停放路邊，強制將該車移至保管處所"]},
{"n":43,"ans":2,"q":"甲市政府工務局以A函通知乙所有之某房屋為違建，請乙於文到後1個月內補辦執照，逾期依違章建築處理辦法辦理。乙逾期未補辦執照，工務局以B函通知乙應限期自行執行拆除，逾期將依行政執行法強制執行。乙逾期未自行拆除，工務局遂以C函通知乙，拆除大隊「將於X年X月X日前往拆除，事先請自行遷移室內一切存放物品，未遷移者，視同廢棄物」。執行完畢後，工務局以D函通知乙繳納新臺幣200萬元拆除費用。依司法實務見解及相關法理，下列何者非屬行政處分？","o":["A函","B函","C函","D函"]},
{"n":44,"ans":1,"q":"下列何者非屬適用或準用行政執行法之執行行為？","o":["甲公務員受懲戒法庭判決新臺幣90萬元罰款確定後，因逾期未繳納，而遭到拘提","乙喝酒駕車，經員警酒測，其酒測值已達不能安全駕駛之程度，遭主管機關當場吊扣駕照","丙因滯欠稅款，經查其財產不足清償債務，卻生活奢華，被禁止進入特定之高消費場所消費","丁消防人員強行破壞並進入火災處所周邊之建築物，以有效撲滅火源，搶救受困民眾"]},
{"n":45,"ans":2,"q":"下列何者非屬行政程序法所規定應自行迴避之人？","o":["公務員處理其配偶申請之建築案件","公務員處理其前配偶申請之補助案件","公務員處理其任職大學教授時指導之博士生所提出之申請案件","公務員處理其擔任律師時曾代理之案件"]},
{"n":46,"ans":0,"q":"主管機關A對甲公司為停止營業1年之處分（下稱原處分），6個月後甲公司以事實或法律有變更為由，依行政程序法第128條向A申請廢棄原處分，A函覆甲。該函覆依其記載內容，下列敘述何者錯誤？","o":["若僅重申原處分內容，其法律性質為重覆處置，甲不得對之提起行政爭訟","若表示甲之申請不合法而駁回之，甲得對之提起行政爭訟","若表示甲之申請符合法定要件，惟原處分為正當而駁回之，甲得對之提起行政爭訟","若表示甲之申請有理由而廢止原處分，法律上利害關係人乙若不服，得提起行政爭訟"]},
{"n":47,"ans":0,"q":"關於政府資訊公開之敘述，下列何者正確？","o":["刑事判決確定且再審期間經過後，申請閱覽訴訟卷宗，應適用政府資訊公開法相關規定","人民申請閱覽業經歸檔管理之檔案，行政機關應適用政府資訊公開法之規定拒絕其申請","依政府資訊公開法應限制公開或不予提供之政府資訊，若因情事變更已無限制公開或拒絕提供之必要時，政府機關應一律主動公開","政府資訊中如部分含有限制公開或不予提供之事項，就該其他部分之資訊，仍不得公開或提供之"]},
{"n":48,"ans":3,"q":"下列何種行為不相當於訴願之決定？","o":["公務人員保障暨培訓委員會之復審決定","政府採購申訴審議委員會審議判斷","犯罪被害人補償覆審會之覆議決定","律師懲戒覆審委員會之覆審決定"]},
{"n":49,"ans":3,"q":"關於行政訴訟暫時權利保護制度之敘述，下列何者錯誤？","o":["當事人不服罰鍰處分，提起撤銷訴訟，應適用停止執行程序","當事人依法申請行政機關許可遭否准，提起課予義務訴訟，應適用假處分程序","當事人請求行政機關返還已繳納之罰鍰，提起給付訴訟，應適用假處分程序","當事人提起確認行政處分無效訴訟，應適用假處分程序"]},
{"n":50,"ans":1,"q":"甲與A市政府簽訂契約，因履約紛爭以A市政府為被告，向臺北地方法院（下稱臺北地院）提起民事訴訟，但臺北地院認為本案涉及行政契約之履約爭議，性質上為公法事件，應由行政法院審理，下列敘述何者錯誤？","o":["臺北地院應將本案以裁定移送管轄之行政法院審理","若受移送之行政法院亦認為對本案無審判權，應裁定停止審理，並聲請司法院解釋","若當事人對移送裁定不服提起救濟，最高法院認民事法院就本案無審判權，受移送之行政法院即應受理本案","若受移送之行政法院對該移送裁定不爭執而為本案審理並為裁判，上級審之行政法院不得以行政法院無審判權為由而撤銷或廢棄裁判"]},
{"n":51,"ans":3,"q":"依行政訴訟法規定，關於收容聲請事件之敘述，下列何者錯誤？","o":["依臺灣地區與大陸地區人民關係條例提起之收容異議事件，屬收容聲請事件","收容聲請事件，以受收容人所在地之地方行政法院為第一審管轄法院","行政法院得以有聲音及影像相互傳送之科技設備審理收容聲請事件","對於收容處分不服者，除得依收容異議程序救濟，亦得提起撤銷訴訟"]},
{"n":52,"ans":3,"q":"甲有土地一筆遭到徵收，惟土地徵收機關違反土地法規定，未於公告期滿15日內給付徵收補償款。甲若欲主張徵收處分失其效力而提起行政訴訟時，依司法實務見解，下列敘述何者正確？","o":["甲應經訴願程序後提起撤銷訴訟","甲應提起確認行政處分違法訴訟","甲應提起確認行政處分無效訴訟","甲應提起確認徵收法律關係不存在訴訟"]},
{"n":53,"ans":3,"q":"下列何種起訴不合法之情形，行政法院於裁定駁回前應先定期命補正？","o":["訴訟事件不屬行政訴訟審判之權限者","當事人就已起訴之事件，於訴訟繫屬中更行起訴者","訴訟事件不屬受訴行政法院管轄而不能請求指定管轄，亦不能為移送訴訟之裁定者","由訴訟代理人起訴，而其代理權有欠缺者"]},
{"n":54,"ans":1,"q":"關於國家賠償責任，下列敘述何者正確？","o":["欲成立怠於執行職務國家賠償請求權，須法律明文規定，人民對於該項職務之執行擁有請求權","若行政機關對於是否執行職務有裁量權時，原則上不因該職務之未執行而成立怠於執行職務國家賠償責任，除非裁量空間已收縮至零","公共設施委託民間團體或個人管理時，因管理欠缺導致人民死亡時，由受託之私人負民法上的賠償責任，不成立國家賠償責任","公共設施瑕疵國家賠償責任之成立，需主管機關在設置上或管理上有故意或重大過失方可"]},
{"n":55,"ans":1,"q":"有關國家賠償義務機關之敘述，下列何者錯誤？","o":["行政委託事件中，受託之私人團體執行職務侵害人民權利，由委託機關負國家賠償責任","公共設施瑕疵所引起之國家賠償責任，一律由該設施管理機關承擔國家賠償責任","賠償義務機關有爭議時，當事人得請求上級機關確定之。該上級機關逾20日不為確定時，得以該上級機關為賠償義務機關","賠償義務機關被裁撤，且引發國家賠償責任之職務領域並未安排承接機關，則以賠償義務機關裁撤前之上級機關為賠償義務機關"]},
{"n":56,"ans":0,"q":"關於習慣國際法，下列敘述何者錯誤？","o":["習慣國際法必須經多國普遍且重複實踐，不能僅存於兩國之間","一國自始持續反對他國之慣行，可以阻止習慣國際法之形成","一國對他國行為的聲明、抗議、發布的新聞稿，都可能被當成是否對習慣國際法具有法之確信的證據","習慣國際法也可能被成文化為條約之內容"]},
{"n":57,"ans":1,"q":"日內瓦公約規定對非國際戰爭戰俘亦應提供最低程度待遇，在國際法上被認為具有習慣國際法之性質。若甲國為日內瓦公約之締約國，乙國不是締約國，丙國曾是締約國但之後退出。下列敘述何者錯誤？","o":["乙國對於非國際戰爭戰俘，有義務提供最低程度待遇","丙國主張退出日內瓦公約後即欠缺法之確信，毋須對非國際戰爭戰俘提供最低程度待遇","丙國退出日內瓦公約後，該公約對丙國無條約之拘束力","日內瓦公約對乙國無條約之拘束力"]},
{"n":58,"ans":3,"q":"關於國際法上非國家政治實體，下列敘述何者錯誤？","o":["二戰後之託管地在完成獨立或與他國結合之前，得被歸類為非國家政治實體","有效控制特定領土而被承認之交戰團體，得被歸類為非國家政治實體","非國家政治實體之流亡政府，指對其領土喪失有效統治而迫遷他國的政府","非國家政治實體之民族解放團體，在未完成獨立並獲承認前，不得參與聯合國或其專門機構舉行之會議"]},
{"n":59,"ans":2,"q":"關於國際法中之國家承認，下列敘述何者錯誤？","o":["對於交戰團體之承認，可能違反不干涉（預）原則","國家承認亦得藉由默示方式為之","對一國家之承認，不得附加任何條件","既存國家無國際法上之義務承認新國家"]},
{"n":60,"ans":2,"q":"關於國際組織，下列敘述何者錯誤？","o":["國際組織之權能，必須受其所由創設之法律文件規定之限制","為了實現其設立之目的與宗旨，即使章程未明文規定，國際組織也可能擁有某些隱有的權能","因維也納條約法公約之除外規定，國際組織無法成為締結條約之主體","國際組織得自設行政法庭處理其與雇員間之勞資爭議，並依條約豁免駐在地法院之管轄"]},
{"n":61,"ans":2,"q":"依二次大戰後之國際法原則，關於國家取得領土主權之方式，下列敘述何者錯誤？","o":["國家得以合意交換方式取得領土主權","對於公海上因自然力形成之島嶼，國家得先占取得其領土主權","國家得藉由人工方式改造領海外之專屬經濟海域中低潮高地為島嶼，從而取得其領土主權","國家不得以合法行使武力之方式取得他國領土主權"]},
{"n":62,"ans":1,"q":"關於海域執法，下列敘述何者錯誤？","o":["除非條約另有約定，否則一國海巡船舶不得於公海對他國船舶之毒品運送行為進行登檢","B國籍船舶與C國籍船舶在A國鄰接區內準備共同走私毒品至D國，A國對該二船不得行使管轄權","發動緊追之政府船舶，如不在被緊追之外國船舶目視範圍內，即不得發動緊追","用於航行之國際海峽沿海國，有權制定與執行該海峽分道航行之規則"]},
{"n":63,"ans":1,"q":"關於國家管轄之豁免，下列敘述何者錯誤？","o":["一國元首於他國出訪時為子女購物所生之消費糾紛，得主張豁免該國法院之管轄","一國之國營銀行就出具之信用狀於他國所生之爭執，得主張豁免該國法院之管轄","一國依科學合作條約於他國領海探勘之公務船舶所致之損害，得主張豁免該國法院之管轄","一國卸任元首對其在任期間之職務行為，得主張豁免他國法院之管轄"]},
{"n":64,"ans":0,"q":"個人向國際人權條約監督機構提起訴訟或申訴前，應「窮盡當地救濟」。設定該尋求國際人權機構救濟條件之理由，下列敘述何者錯誤？","o":["尊重國際人權條約所載不干涉（預）原則條款","允許被告國有機會修正錯誤或賠償損失","內國程序訴訟效率較高且有利判決執行","推定國家法體系正常運作以尊重管轄權"]},

const OFFICIAL_EXPLANATIONS = {};
</script>
<script>
(function(){
  "use strict";

  const LS_FLAG    = "exam113_constlaw_flags";
  const LS_SELECTED= "exam113_constlaw_selected";
  const LS_CONFUSE = "exam113_constlaw_confuse";
  const LS_EXPLAIN = "exam113_constlaw_explain";
  const LS_SUBMIT  = "exam113_constlaw_submit";

  const EXAM_TITLE   = "113司律一試_綜合法學一_憲法行政法國際公法國際私法";
  const EXAM_SUBJECT = "綜合法學（一）憲法‧行政法‧國際公法‧國際私法";

  function loadJSON(key, fallback){
    try{ const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
    catch(e){ return fallback; }
  }
  function saveJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

  let flags       = loadJSON(LS_FLAG, {});
  let selected    = loadJSON(LS_SELECTED, {});
  let confused    = loadJSON(LS_CONFUSE, {});
  let explainText = loadJSON(LS_EXPLAIN, {});
  let submitState = loadJSON(LS_SUBMIT, null);

  let currentFilter = "all";
  let openExplain  = new Set();
  let openOfficial = new Set();

  const main         = document.getElementById("main-content");
  const flagCounterEl= document.getElementById("flag-counter");
  const tabAll       = document.getElementById("tab-all");
  const tabFlagged   = document.getElementById("tab-flagged");
  const scoreBanner  = document.getElementById("score-banner");
  const scoreTextEl  = document.getElementById("score-text");

  const OPT_LABELS  = ["A","B","C","D"];
  const POINTS_PER_Q= 2;

  function updateFlagCounter(){
    flagCounterEl.textContent = Object.keys(flags).filter(k=>flags[k]).length;
  }

  function escapeHTML(str){
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function buildOptionHTML(qn, idx, text, isCorrect){
    const isSelected = selected[String(qn)] === idx;
    const isConfused = !!confused[qn+"_"+idx];
    let cls = "option";
    if(isSelected) cls += isCorrect ? " selected-correct" : " selected-wrong";
    if(isConfused)  cls += " confused";
    return `
      <div class="${cls}" data-qn="${qn}" data-idx="${idx}" data-correct="${isCorrect?'1':'0'}">
        <span class="opt-label">${OPT_LABELS[idx]}</span>
        <span class="opt-text">${text}</span>
        <button class="confuse-btn ${isConfused?'active':''}" data-qn="${qn}" data-idx="${idx}" title="標記為疑惑選項" aria-label="標記疑惑">
          <svg viewBox="0 0 16 16"><path class="tri" d="M8 3 L13.5 12.5 L2.5 12.5 Z"/></svg>
        </button>
      </div>`;
  }

  function buildExplainHTML(qn){
    const key    = String(qn);
    const text   = explainText[key] || "";
    const hasNote= text.trim().length > 0;
    const isOpen = openExplain.has(key);
    return `
      <div class="explain-block" data-qn="${qn}">
        <button class="explain-toggle ${isOpen?'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen?'收合詳解':'顯示詳解'}</span>
          ${hasNote ? '<span class="has-note-tag">（已有詳解）</span>' : ''}
        </button>
        <div class="explain-body ${isOpen?'open':''}">
          <textarea class="explain-textarea" data-qn="${qn}" placeholder="在此輸入詳解…">${escapeHTML(text)}</textarea>
          <div class="explain-status" data-qn="${qn}">✓ 已自動儲存</div>
        </div>
      </div>`;
  }

  function buildOfficialExplainHTML(qn){
    const key     = String(qn);
    const content = (typeof OFFICIAL_EXPLANATIONS !== "undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
    if(!content) return "";
    const isOpen  = openOfficial.has(key);
    return `
      <div class="official-block" data-qn="${qn}">
        <button class="official-toggle ${isOpen?'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen?'收合參考擬答':'顯示參考擬答'}</span>
        </button>
        <div class="official-body ${isOpen?'open':''}">
          <div class="official-content">${content}</div>
        </div>
      </div>`;
  }

  function buildQuestionHTML(item){
    const qn = item.n;
    const isFlagged  = !!flags[qn];
    const isRevealed = selected[String(qn)] !== undefined && selected[String(qn)] !== null;
    const correctLabel = OPT_LABELS[item.ans];
    const optionsHTML  = item.o.map((text,idx) => buildOptionHTML(qn,idx,text,idx===item.ans)).join("");
    return `
      <article class="q-card ${isFlagged?'flagged':''}" id="q-${qn}" data-qn="${qn}">
        <div class="q-row">
          <div class="q-leftbar">
            <span class="q-num">${qn}</span>
            <button class="flag-btn ${isFlagged?'active':''}" data-qn="${qn}" title="標記為容易出錯" aria-label="標記旗標">
              <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5"/></svg>
            </button>
            ${isFlagged ? '<span class="flagged-tag">易錯</span>' : ''}
          </div>
          <div class="q-body">
            <p class="q-text">${item.q}<span class="answer-inline ${isRevealed?'revealed':''}" data-qn="${qn}">正確答案：<span class="ans-key">(${correctLabel})</span></span></p>
            <div class="options-grid">${optionsHTML}</div>
            ${buildOfficialExplainHTML(qn)}
            ${buildExplainHTML(qn)}
          </div>
        </div>
      </article>`;
  }

  function render(){
    const list = QUESTIONS.filter(item => currentFilter==="flagged" ? !!flags[item.n] : true);
    if(list.length === 0){
      main.innerHTML = `<div class="empty-state">目前沒有已標記的題目。複習時點擊每題左側的旗幟圖示即可加入標記。</div>`;
      return;
    }
    main.innerHTML = list.map(buildQuestionHTML).join("");
  }

  function setFilter(f){
    currentFilter = f;
    tabAll.classList.toggle("active", f==="all");
    tabFlagged.classList.toggle("active", f==="flagged");
    render();
  }

  function renderScoreBanner(){
    if(submitState && submitState.done){
      scoreBanner.classList.add("show");
      scoreTextEl.innerHTML = `本次成績：${submitState.score} 分（共${submitState.correctCount}／${submitState.total}題答對，每題${POINTS_PER_Q}分） <span class="score-detail">交卷時間：${submitState.tsLabel}</span>`;
    }else{
      scoreBanner.classList.remove("show");
    }
  }

  // ---- Event delegation (click) ----
  main.addEventListener("click", function(e){
    const flagBtn = e.target.closest(".flag-btn");
    if(flagBtn){
      const qn = flagBtn.dataset.qn;
      flags[qn] = !flags[qn];
      if(!flags[qn]) delete flags[qn];
      saveJSON(LS_FLAG, flags);
      updateFlagCounter();
      render();
      return;
    }

    const confBtn = e.target.closest(".confuse-btn");
    if(confBtn){
      e.stopPropagation();
      const qn  = confBtn.dataset.qn;
      const idx = confBtn.dataset.idx;
      const key = qn+"_"+idx;
      confused[key] = !confused[key];
      if(!confused[key]) delete confused[key];
      saveJSON(LS_CONFUSE, confused);
      render();
      return;
    }

    const officialToggle = e.target.closest(".official-toggle");
    if(officialToggle){
      const qn = officialToggle.dataset.qn;
      openOfficial.has(qn) ? openOfficial.delete(qn) : openOfficial.add(qn);
      render();
      return;
    }

    const explainToggle = e.target.closest(".explain-toggle");
    if(explainToggle){
      const qn = explainToggle.dataset.qn;
      openExplain.has(qn) ? openExplain.delete(qn) : openExplain.add(qn);
      render();
      if(openExplain.has(qn)){
        const ta = main.querySelector(`.explain-textarea[data-qn="${qn}"]`);
        if(ta) ta.focus();
      }
      return;
    }

    const optEl = e.target.closest(".option");
    if(optEl){
      const qn  = optEl.dataset.qn;
      const idx = parseInt(optEl.dataset.idx, 10);
      const key = String(qn);
      if(selected[key] === idx){ delete selected[key]; }
      else { selected[key] = idx; }
      saveJSON(LS_SELECTED, selected);
      render();
      return;
    }
  });

  // ---- Textarea auto-save ----
  const debounceTimers = {};
  main.addEventListener("input", function(e){
    const ta = e.target.closest(".explain-textarea");
    if(!ta) return;
    const qn = ta.dataset.qn;
    if(debounceTimers[qn]) clearTimeout(debounceTimers[qn]);
    debounceTimers[qn] = setTimeout(() => {
      explainText[qn] = ta.value;
      if(!ta.value.trim()) delete explainText[qn];
      saveJSON(LS_EXPLAIN, explainText);
      const statusEl = main.querySelector(`.explain-status[data-qn="${qn}"]`);
      if(statusEl){
        statusEl.classList.add("show");
        clearTimeout(statusEl._hideTimer);
        statusEl._hideTimer = setTimeout(() => statusEl.classList.remove("show"), 1800);
      }
      const toggleBtn = main.querySelector(`.explain-toggle[data-qn="${qn}"]`);
      if(toggleBtn){
        const hasNote = (explainText[qn]||"").trim().length > 0;
        let tagEl = toggleBtn.querySelector(".has-note-tag");
        if(hasNote && !tagEl){
          tagEl = document.createElement("span");
          tagEl.className = "has-note-tag";
          tagEl.textContent = "（已有詳解）";
          toggleBtn.appendChild(tagEl);
        }else if(!hasNote && tagEl){ tagEl.remove(); }
      }
    }, 800);
  });

  tabAll.addEventListener("click", () => setFilter("all"));
  tabFlagged.addEventListener("click", () => setFilter("flagged"));

  // ---- Clear all modal ----
  const modal = document.getElementById("confirm-modal");
  document.getElementById("clear-all-btn").addEventListener("click", () => modal.classList.add("show"));
  document.getElementById("modal-cancel").addEventListener("click", () => modal.classList.remove("show"));
  document.getElementById("modal-confirm").addEventListener("click", () => {
    flags={};selected={};confused={};submitState=null;
    saveJSON(LS_FLAG,flags);saveJSON(LS_SELECTED,selected);saveJSON(LS_CONFUSE,confused);
    localStorage.removeItem(LS_SUBMIT);
    if(typeof clearExamComplete==="function") clearExamComplete();
    updateFlagCounter();
    renderScoreBanner();
    render();
    modal.classList.remove("show");
  });
  modal.addEventListener("click", e => { if(e.target===modal) modal.classList.remove("show"); });

  // ---- Submit / scoring ----
  function gradeExam(){
    let correctCount = 0;
    QUESTIONS.forEach(item => {
      const sel = selected[String(item.n)];
      if(sel !== undefined && sel === item.ans) correctCount++;
    });
    const total = QUESTIONS.length;
    const score = correctCount * POINTS_PER_Q;
    const now   = new Date();
    const tsLabel = now.getFullYear()+"/"+String(now.getMonth()+1).padStart(2,"0")+"/"+String(now.getDate()).padStart(2,"0")
      +" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    submitState = {done:true, score, correctCount, total, ts:now.getTime(), tsLabel};
    saveJSON(LS_SUBMIT, submitState);
    renderScoreBanner();
    window.scrollTo({top:0, behavior:"smooth"});
    if(typeof reportExamComplete==="function") reportExamComplete({score, total, correctCount});
  }
  document.getElementById("submit-btn").addEventListener("click", gradeExam);

  // ---- Export ----
  const SYMBOL_LEGEND = "符號圖例：✓ = 我選對的選項｜✗ = 我選錯的選項｜▲ = 標記為疑惑的選項｜▶ 正確答案：括號內為正解代號";

  function pad2(n){ return String(n).padStart(2,"0"); }
  function todayStamp(){
    const d=new Date();
    return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate());
  }

  function officialHtmlToPlainText(html){
    if(!html) return "";
    let text = html;
    text = text.replace(/<li[^>]*>/gi,"・").replace(/<\/li>/gi,"\n");
    text = text.replace(/<p[^>]*>/gi,"").replace(/<\/p>/gi,"\n");
    text = text.replace(/<\/?(ul|strong|em)[^>]*>/gi,"");
    text = text.replace(/<[^>]+>/g,"");
    text = text.replace(/&nbsp;/g," ").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"');
    text = text.split("\n").map(l=>l.trim()).filter(l=>l.length>0).join("\n");
    return text;
  }

  function buildExportText(list, scopeLabel){
    const now = new Date();
    const dateLabel = now.getFullYear()+"/"+pad2(now.getMonth()+1)+"/"+pad2(now.getDate());
    let wrongCount=0, confusedCount=0, explainedCount=0, officialCount=0;
    const lines = [];
    lines.push(`試卷標題：${EXAM_TITLE}`);
    lines.push(`科目：${EXAM_SUBJECT}`);
    lines.push(`匯出範圍：${scopeLabel}`);
    lines.push(`匯出日期：${dateLabel}`);
    lines.push(SYMBOL_LEGEND);
    lines.push("=".repeat(48));
    lines.push("");

    list.forEach(item => {
      const qn = item.n;
      const key = String(qn);
      const selIdx = selected[key];
      const hasSelection = selIdx !== undefined && selIdx !== null;
      const isWrong = hasSelection && selIdx !== item.ans;
      if(isWrong) wrongCount++;
      let qConfused = false;
      lines.push(`第 ${qn} 題`);
      lines.push(item.q);
      item.o.forEach((text,idx) => {
        const isConf = !!confused[qn+"_"+idx];
        if(isConf) qConfused = true;
        let mark = "　";
        if(hasSelection && idx===selIdx){ mark = (idx===item.ans) ? "✓" : "✗"; }
        else if(isConf){ mark = "▲"; }
        lines.push(`${mark} (${OPT_LABELS[idx]}) ${text}`);
      });
      if(qConfused) confusedCount++;
      lines.push(`▶ 正確答案：(${OPT_LABELS[item.ans]})`);
      const officialHtml = (typeof OFFICIAL_EXPLANATIONS!=="undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
      if(officialHtml){ officialCount++; lines.push(officialHtmlToPlainText(officialHtml)); }
      const note = (explainText[key]||"").trim();
      if(note){ explainedCount++; lines.push("詳解："); lines.push(note); }
      lines.push("-".repeat(48));
      lines.push("");
    });

    lines.push("=".repeat(48));
    lines.push(`統計：共 ${list.length} 題｜已標記 ${list.filter(it=>!!flags[it.n]).length} 題｜答錯 ${wrongCount} 題｜含疑惑選項 ${confusedCount} 題｜有參考擬答 ${officialCount} 題｜有詳解 ${explainedCount} 題`);
    return lines.join("\n");
  }

  function downloadText(filename, content){
    const blob = new Blob([content],{type:"text/plain;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  document.getElementById("export-flagged-btn").addEventListener("click", () => {
    const list = QUESTIONS.filter(item=>!!flags[item.n]);
    if(list.length===0){ alert("目前沒有已標記的題目可匯出。"); return; }
    downloadText(`${EXAM_TITLE}_已標記弱點題_${todayStamp()}.txt`, buildExportText(list,"已標記弱點題"));
  });
  document.getElementById("export-all-btn").addEventListener("click", () => {
    downloadText(`${EXAM_TITLE}_全部題目_${todayStamp()}.txt`, buildExportText(QUESTIONS,"全部題目"));
  });

  // ---- init ----
  updateFlagCounter();
  renderScoreBanner();
  render();
})();
</script>
</body>
</html>
