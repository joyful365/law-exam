<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallmeHappyfish 法學測驗總整理</title>
<style>
        /* 基礎設定 - 頂級深色模式 */
        body {
            /* 混搭優雅的襯線字體與現代無襯線體 */
            font-family: 'Optima', 'Baskerville', 'Times New Roman', 'PingFang TC', 'Heiti TC', serif;
            background-color: #0d0f12; /* 極深的午夜黑背景 */
            color: #d1d5db; /* 銀灰色的內文，避免純白過於刺眼 */
            line-height: 1.8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 主要內容區塊 - 毛玻璃與深邃感 */
        .container {
            background-color: #16191e; /* 比背景稍微亮一點的深灰色 */
            width: 90%;
            max-width: 600px;
            padding: 45px 35px;
            border-radius: 16px; /* 現代感的圓角 */
            border: 1px solid #2a2e39; /* 極細的暗色金屬邊框 */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); /* 深邃的陰影營造懸浮感 */
            text-align: center;
        }

        /* 標題與副標題 - 香檳金點綴 */
        h1 {
            color: #d4af37; /* 經典香檳金 */
            margin-bottom: 15px;
            font-size: 26px;
            font-weight: 300; /* 極細的字重展現優雅 */
            letter-spacing: 3px;
        }

        p {
            color: #8b92a5;
            margin-bottom: 35px;
            font-size: 15px;
            letter-spacing: 1px;
        }

        /* 測驗清單設定 */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 16px;
        }

        /* 超連結按鈕設計 - 隱形邊框與細緻互動 */
        a {
            display: block;
            padding: 18px 20px;
            background-color: transparent; /* 透明背景 */
            color: #e5e7eb;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #3f4452; /* 靜態時是低調的灰邊框 */
            font-size: 16px;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); /* 非常平滑的高級動畫效果 */
        }

        /* 滑鼠游標移過去時的效果 - 金色微光 */
        a:hover {
            border-color: #d4af37; /* 邊框亮起金色 */
            color: #d4af37; /* 字體變成金色 */
            background: rgba(212, 175, 55, 0.05); /* 極淡的金色背景光暈 */
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); /* 金色發光效果 */
            transform: translateY(-2px); /* 按鈕微微向上浮起 */
        }

        /* 點擊下去瞬間的效果 */
        a:active {
            transform: translateY(0);
        }

        /* 回首頁等次要按鈕的樣式 */
        a.back-btn {
            background-color: transparent;
            border: none;
            color: #8b92a5;
            margin-bottom: 25px;
            font-size: 13px;
            display: inline-block;
            padding: 8px 15px;
        }
        
        a.back-btn:hover {
            color: #d1d5db;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: none;
            transform: none;
        }

        /* 底部裝飾文字 */
        .footer-note {
            margin-top: 45px;
            font-size: 12px;
            color: #4b5263;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 國考題庫大廳 </h1>
        <p>點擊下方按鈕，選擇今天要練習的題庫</p>

        <ul>
            <ul>
            <li><a href="category_const.html">⚖️ 憲法 </a></li>
            <li><a href="category_admin.html">⚖️ 行政法 </a></li>
            <li><a href="category_Bar.html">🏛️ 司律題庫 </a></li>
        </ul>
            
            </ul>

        <div class="footer-note">
            祝 考試順利！加油！💪
        </div>
    </div>

</body>
</html>
