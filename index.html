<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallmeHappyfish 法學測驗總整理</title>
    <style>
        /* 基礎設定 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 主要內容區塊 */
        .container {
            background-color: #ffffff;
            width: 90%;
            max-width: 600px; /* 限制電腦版寬度，讓排版不跑掉 */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* 標題與副標題 */
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 15px;
        }

        /* 測驗清單 (移除預設的點點) */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        /* 清單項目 (每一個按鈕的外框) */
        li {
            margin-bottom: 15px;
        }

        /* 超連結按鈕設計 */
        a {
            display: block;
            padding: 15px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        /* 滑鼠游標移過去時的效果 */
        a:hover {
            background-color: #2980b9;
        }

        /* 點擊下去瞬間的效果 */
        a:active {
            transform: scale(0.98);
        }

        /* 底部裝飾文字 */
        .footer-note {
            margin-top: 30px;
            font-size: 13px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 CallmeHappyfish 法學測驗總整理</h1>
        <p>點擊下方按鈕，選擇今天要練習的題庫</p>

        <ul>
            <ul>
            <li><a href="category_const.html">⚖️ 憲法 </a></li>
            <li><a href="category_admin.html">⚖️ 行政法 </a></li>
            <li><a href="category_Bar.html">🏛️ 司律題庫 </a></li>
        </ul>
            
            </ul>

        <div class="footer-note">
            祝 考試順利！加油！💪
        </div>
    </div>

</body>
</html>
