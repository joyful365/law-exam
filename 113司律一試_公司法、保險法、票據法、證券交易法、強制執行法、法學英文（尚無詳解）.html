<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>113年司律一試 — 綜合法學（公司法、保險法、票據法、證券交易法、強制執行法、法學英文）練習卷</title>
<style>
  :root{
    --paper:#faf8f3;
    --paper-dim:#f3efe6;
    --ink:#2b2b28;
    --ink-soft:#5c5850;
    --rule:#d9d2c2;
    --accent:#8a5a2b;
    --accent-soft:#caa874;
    --flag:#b3422f;
    --flag-bg:#fbe9e5;
    --correct-bg:#dcecd8;
    --correct-border:#5a9456;
    --wrong-bg:#f6d9d4;
    --wrong-border:#b3422f;
    --confuse:#c98a2c;
    --serif: "Noto Serif TC", "Source Han Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-dim);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Sticky Header ---------- */
  header.site-header{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--paper);
    border-bottom:2px solid var(--ink);
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .header-inner{
    max-width:1000px;
    margin:0 auto;
    padding:14px 20px 12px;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .exam-title{
    font-family:var(--serif);
    font-size:1.25rem;
    font-weight:700;
    letter-spacing:0.02em;
    margin:0;
  }
  .exam-sub{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin:2px 0 0;
  }
  .meta-line{
    font-size:0.78rem;
    color:var(--ink-soft);
    margin-top:4px;
  }

  /* ---------- Single toolbar row ---------- */
  .controls-row{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:8px;
    margin-top:12px;
    padding-top:10px;
    border-top:1px solid var(--rule);
  }
  .filter-tabs{
    display:flex;
    gap:6px;
    flex-shrink:0;
  }
  .filter-tabs button{
    font-family:var(--sans);
    font-size:0.82rem;
    padding:5px 13px;
    border-radius:999px;
    border:1px solid var(--rule);
    background:var(--paper);
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
  }
  .filter-tabs button.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }
  .filter-tabs button:hover:not(.active){
    border-color:var(--accent);
    color:var(--accent);
  }
  .flag-count{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:0.82rem;
    font-weight:600;
    color:var(--flag);
    flex-shrink:0;
  }
  .flag-count svg{width:13px;height:13px;}
  .clear-btn{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 11px;
    border-radius:6px;
    border:1px solid var(--flag);
    background:var(--paper);
    color:var(--flag);
    cursor:pointer;
    transition:all .15s ease;
    flex-shrink:0;
  }
  .clear-btn:hover{
    background:var(--flag);
    color:#fff;
  }
  .export-btn{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 11px;
    border-radius:6px;
    border:1px solid var(--accent-soft);
    background:#fff;
    color:var(--accent);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:5px;
    flex-shrink:0;
  }
  .export-btn:hover{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .export-btn svg{width:13px;height:13px;}
  .submit-btn{
    font-family:var(--sans);
    font-size:0.82rem;
    font-weight:700;
    padding:5px 15px;
    border-radius:6px;
    border:1px solid #3f6b3c;
    background:#4f7d4a;
    color:#fff;
    cursor:pointer;
    transition:all .15s ease;
    flex-shrink:0;
    margin-left:auto;
  }
  .submit-btn:hover{
    background:#3f6b3c;
  }

  /* ---------- Score Banner ---------- */
  .score-banner{
    display:none;
    background:#fdf6ec;
    border:1.5px solid var(--accent-soft);
    border-radius:8px;
    padding:10px 16px;
    margin-top:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .score-banner.show{display:flex;}
  .score-banner .score-text{
    font-size:0.95rem;
    font-weight:700;
    color:var(--accent);
  }
  .score-banner .score-detail{
    font-size:0.78rem;
    color:var(--ink-soft);
    font-weight:400;
  }
  .score-banner .done-tag{
    font-size:0.72rem;
    font-weight:700;
    color:#3f6b3c;
    background:#e3efe1;
    border:1px solid #8fbf89;
    border-radius:4px;
    padding:2px 8px;
  }

  /* ---------- Main content ---------- */
  main{
    max-width:1000px;
    margin:0 auto;
    padding:24px 20px 80px;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-size:0.95rem;
  }

  .q-card{
    background:var(--paper);
    border:1px solid var(--rule);
    border-radius:10px;
    margin-bottom:16px;
    padding:16px 18px 16px 14px;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .q-card.flagged{
    border-color:var(--flag);
    box-shadow:0 0 0 1px var(--flag) inset;
    background:linear-gradient(180deg, var(--flag-bg) 0%, var(--paper) 55px);
  }

  .q-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  .q-leftbar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    flex-shrink:0;
    width:46px;
    padding-top:1px;
  }

  .q-num{
    font-family:var(--serif);
    font-weight:700;
    font-size:1.1rem;
    color:var(--ink);
    line-height:1;
  }

  .flag-btn{
    background:none;
    border:none;
    cursor:pointer;
    padding:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    transition:transform .12s ease, background .15s ease;
  }
  .flag-btn:hover{
    background:var(--flag-bg);
  }
  .flag-btn svg{
    width:18px;
    height:18px;
    stroke:var(--ink-soft);
    fill:none;
    stroke-width:1.8;
    transition:fill .15s ease, stroke .15s ease;
  }
  .flag-btn.active svg{
    fill:var(--flag);
    stroke:var(--flag);
  }
  .flag-btn:active{transform:scale(0.9);}

  .flagged-tag{
    font-size:0.65rem;
    font-weight:700;
    color:var(--flag);
    background:var(--flag-bg);
    border:1px solid var(--flag);
    border-radius:4px;
    padding:1px 5px;
    white-space:nowrap;
    letter-spacing:0.04em;
  }

  .q-body{
    flex:1;
    min-width:0;
  }

  .q-text{
    font-size:0.98rem;
    font-weight:700;
    margin:0 0 12px;
    color:var(--ink);
  }

  .options-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 10px;
  }
  @media (max-width:620px){
    .options-grid{grid-template-columns:1fr;}
  }

  .option{
    display:flex;
    align-items:flex-start;
    gap:8px;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:8px 10px;
    cursor:pointer;
    font-size:0.9rem;
    background:#fff;
    transition:background .15s ease, border-color .15s ease;
    position:relative;
  }
  .option:hover{
    border-color:var(--accent-soft);
  }
  .option .opt-label{
    font-weight:700;
    color:var(--accent);
    flex-shrink:0;
  }
  .option .opt-text{
    flex:1;
  }
  .option .confuse-btn{
    flex-shrink:0;
    background:none;
    border:none;
    cursor:pointer;
    padding:1px 2px;
    margin-left:2px;
    line-height:0;
  }
  .option .confuse-btn svg{
    width:13px;
    height:13px;
    transition:fill .15s ease;
  }
  .option .confuse-btn svg .tri{
    fill:none;
    stroke:#b9b2a0;
    stroke-width:1.4;
  }
  .option .confuse-btn.active svg .tri{
    fill:var(--confuse);
    stroke:var(--confuse);
  }

  .option.selected-wrong{
    background:var(--wrong-bg);
    border-color:var(--wrong-border);
  }
  .option.selected-wrong .opt-text{
    text-decoration:line-through;
    color:#7a3a30;
  }
  .option.selected-correct{
    background:var(--correct-bg);
    border-color:var(--correct-border);
  }
  .option.confused{
    outline:2px dashed var(--confuse);
    outline-offset:1px;
  }

  .answer-inline{
    display:inline-block;
    margin-left:10px;
    font-size:0.8rem;
    font-weight:400;
    padding:2px 9px;
    border-radius:5px;
    background:#fff;
    color:#fff; /* hidden by default: white on white */
    border:1px solid var(--rule);
    transition:color .15s ease, background .15s ease, border-color .15s ease;
    user-select:none;
    vertical-align:middle;
    white-space:nowrap;
  }
  .answer-inline.revealed{
    color:var(--accent);
    background:#fdf6ec;
    border-color:var(--accent-soft);
    font-weight:600;
    user-select:text;
  }
  .answer-inline .ans-key{
    font-weight:700;
  }

  /* ---------- Explanation block ---------- */
  .explain-block{
    margin-top:10px;
  }
  .explain-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid var(--rule);
    background:#fff;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .explain-toggle:hover{
    border-color:var(--accent-soft);
    color:var(--accent);
  }
  .explain-toggle .has-note-tag{
    font-size:0.72rem;
    font-weight:700;
    color:var(--accent);
  }
  .explain-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .explain-toggle.open .chevron{
    transform:rotate(90deg);
  }

  .explain-body{
    display:none;
    margin-top:8px;
  }
  .explain-body.open{
    display:block;
  }
  .explain-textarea{
    width:100%;
    min-height:90px;
    font-family:var(--sans);
    font-size:0.88rem;
    line-height:1.6;
    color:var(--ink);
    background:#fffdf8;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:10px 12px;
    resize:vertical;
    transition:border-color .15s ease;
  }
  .explain-textarea:focus{
    outline:none;
    border-color:var(--accent-soft);
  }
  .explain-status{
    font-size:0.74rem;
    color:#5a9456;
    margin-top:5px;
    height:1em;
    opacity:0;
    transition:opacity .25s ease;
  }
  .explain-status.show{
    opacity:1;
  }

  /* ---------- Official explanation block (built-in, read-only) ---------- */
  .official-block{
    margin-top:8px;
  }
  .official-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid #cfe0d4;
    background:#f3f9f4;
    color:#3f6b3c;
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .official-toggle:hover{
    border-color:#8fbf89;
    background:#e9f4ea;
  }
  .official-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .official-toggle.open .chevron{
    transform:rotate(90deg);
  }
  .official-badge-icon{
    font-size:0.78rem;
  }
  .official-body{
    display:none;
    margin-top:8px;
  }
  .official-body.open{
    display:block;
  }
  .official-content{
    background:#f8fbf8;
    border:1px solid #d9e9da;
    border-left:3px solid #5a9456;
    border-radius:8px;
    padding:14px 16px;
    font-size:0.88rem;
    line-height:1.75;
    color:#2f4a2d;
  }
  .official-content p{
    margin:0 0 8px;
  }
  .official-content p:last-child{
    margin-bottom:0;
  }
  .official-content ul{
    margin:0 0 8px;
    padding-left:1.3em;
  }
  .official-content ul:last-child{
    margin-bottom:0;
  }
  .official-content li{
    margin-bottom:6px;
  }
  .official-content li:last-child{
    margin-bottom:0;
  }
  .official-content strong{
    color:#1f3a1e;
  }
  .official-content em{
    color:#5c6b5a;
  }

  /* modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(30,28,24,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:var(--paper);
    border-radius:10px;
    padding:22px 24px;
    max-width:360px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
    text-align:center;
  }
  .modal-box p{
    font-size:0.92rem;
    margin:0 0 18px;
    color:var(--ink);
  }
  .modal-actions{
    display:flex;
    justify-content:center;
    gap:10px;
  }
  .modal-actions button{
    font-family:var(--sans);
    font-size:0.85rem;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    border:1px solid var(--rule);
    background:#fff;
  }
  .modal-actions button.confirm{
    background:var(--flag);
    border-color:var(--flag);
    color:#fff;
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="title-row">
      <div>
        <h1 class="exam-title">113年公務人員特種考試司法官考試 ‧ 113年專門職業及技術人員高等考試律師考試</h1>
      </div>
    </div>
    <div class="meta-line">綜合法學（公司法、保險法、票據法、證券交易法、強制執行法、法學英文）｜共70題｜每題2分｜考試時間：1小時20分</div>

    <div class="controls-row">
      <div class="filter-tabs">
        <button id="tab-all" class="active">全部題目</button>
        <button id="tab-flagged">已標記</button>
      </div>
      <span class="flag-count">
        <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5" fill="currentColor" stroke="none"/></svg>
        <span id="flag-counter">0</span> 題已標記
      </span>
      <button class="clear-btn" id="clear-all-btn">清除標記</button>
      <button class="export-btn" id="export-flagged-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
        匯出已標記
      </button>
      <button class="export-btn" id="export-all-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
        匯出全部
      </button>
      <button class="submit-btn" id="submit-btn">交卷算分</button>
    </div>

    <div class="score-banner" id="score-banner">
      <span class="score-text" id="score-text"></span>
      <span class="done-tag">本卷已完成</span>
    </div>
  </div>
</header>

<main id="main-content"></main>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <p>確定要清除「全部」旗標標記、作答紀錄、疑惑標記與交卷成績嗎？<br>（已輸入的詳解內容將會保留；題庫大廳的「已完成」徽章也會一併移除）<br>此操作無法復原。</p>
    <div class="modal-actions">
      <button id="modal-cancel">取消</button>
      <button id="modal-confirm" class="confirm">確定清除</button>
    </div>
  </div>
</div>

<script src="exam-complete.js"></script>
<script>
const QUESTIONS = [
{"n":1,"ans":1,"q":"依公司法第22條之1規定，公司應每年定期以電子方式，將內部人之資料申報至臺灣集中保管結算所建置維護之資訊平臺，下列何者非須申報之內部人？","o":["董事、監察人、經理人","董事、監察人、經理人之配偶、未成年子女及為其持有公司股票者","持有已發行股份總數超過10%之股東","出資超過資本總額10%之股東"]},
{"n":2,"ans":2,"q":"依公司法中有關公司登記之規定，下列敘述何者正確？","o":["公司申請設立登記之資本額，應經會計師查核簽證，公司應於申請設立登記時或設立登記後3個月內，檢送經會計師查核簽證之文件","公司應收之股款，股東並未實際繳納，而以申請文件表明收足，公司負責人經法院判決有罪確定。在此判決確定前，公司縱已完成補正，中央主管機關因系爭確定判決仍應撤銷或廢止公司登記","公司負責人犯偽造文書印文罪章之罪辦理增資登記，經法院判決有罪確定後，利害關係人得申請中央主管機關撤銷其增資登記","公司申請變更登記之資本額，無須會計師查核簽證"]},
{"n":3,"ans":3,"q":"X公司持有Y公司已發行股份總數5%的股份，擬參與Y公司經營，正評估以X公司名義或由X公司代表人擔任董事之利弊。依公司法規定，下列敘述何者錯誤？","o":["如X公司擔任Y公司董事，其應指定自然人代表行使職務，而在董事任期內，X公司得隨時改派代表人補足其任期","如X公司代表人甲及乙二人同時當選為Y公司董事時，在董事任期內，X公司得改派丁及戊補足其任期","如Y公司為公開發行股票之公司，X公司代表人甲擔任Y公司董事，X公司在甲之董事任期內將Y公司持股全數轉讓給他人時，甲即喪失其董事資格","如Y公司為公開發行股票之公司，X公司在擔任Y公司董事時，將Y公司持股全數設質，X公司即喪失其董事資格"]},
{"n":4,"ans":0,"q":"A有限公司（下稱A公司）本身進行金融科技產業，欲擴大公司規模，故欲尋覓合作對象，以追求企業合併綜效。下列有關有限公司合併之敘述，何者錯誤？","o":["A公司須經全體股東同意，方可與B有限公司合併","若A公司欲與C股份有限公司進行存續合併，則存續公司必須為C股份有限公司","A公司決議與D有限公司合併後，則應通知各債權人，並指定30日以上期限，聲明債權人得於期限內提出異議","若A公司決議與E有限公司合併卻漏未通知債權人，則不得以其合併對抗債權人"]},
{"n":5,"ans":3,"q":"關於有限公司股東權限之敘述，下列何者正確？","o":["股東按出資多寡比例分配表決權，但得以章程訂定，不論出資多寡，每一股東均有一表決權","有限公司的股東有自由移轉其出資額之權利","在有限公司增資情況，如股東同意該議案，將負等比例承購義務","會計年度終了之會計表冊承認，應經股東表決權過半數之同意"]},
{"n":6,"ans":2,"q":"A有限公司（下稱A公司）有甲、乙、丙、丁及戊共5位股東，各出資新臺幣100萬元，章程規定設置董事3人，董事長1人，由甲、乙、丙當選董事，下列關於A公司董事、董事長之敘述，何者正確？","o":["A公司之董事長應經股東表決權三分之二以上之同意選任之","A公司董事長應經董事全體同意選任之","A公司董事，非有特約，不得向公司請求報酬","A公司若有董事為自己或他人為與公司同類業務之行為，應對全體董事說明其行為之重要內容，並經董事過半數之同意"]},
{"n":7,"ans":1,"q":"關於公司虧損時所得採取行為之相關規範，下列敘述何者錯誤？","o":["董事會為彌補公司虧損，提出減少資本議案，應於股東會開會30日前交監察人查核後，提請股東會決議","公司虧損達實收資本額三分之二時，董事會應於最近一次股東會報告","公司資產顯有不足抵償其所負債務時，除得進入重整程序外，董事會應即聲請宣告破產","公司如最近連續二年有虧損者，原則上不得公開發行新股"]},
{"n":8,"ans":2,"q":"A上市公司（下稱A公司）持有B公司已發行有表決權之股份總數51%，B公司持有C公司已發行有表決權之股份總數49%，並指派代表人當選C公司過半數之董事，A公司對C公司則無持股，C公司對A公司及B公司各持有已發行有表決權之股份總數1%，下列關於收買股份或有無表決權之敘述，依公司法規定及最高法院之見解，何者正確？","o":["B公司得收買A公司之股份","C公司不得收買B公司之股份","C公司持有A公司之1%股份，有表決權","C公司持有B公司之1%股份，無表決權"]},
{"n":9,"ans":3,"q":"關於公司法第214條之股東代表訴訟制度，下列敘述何者正確？","o":["欲行使本條之少數股東權，須為繼續6個月以上，持有已發行股份總數百分之三以上之股東","符合本條規定之股東提起訴訟時，為避免濫訴，應以書面先向董事會請求","為求減低負擔，股東提起代表訴訟時，其裁判費超過新臺幣100萬元部分免收","股東提起代表訴訟時，法院得依聲請為原告選任律師為訴訟代理人"]},
{"n":10,"ans":1,"q":"關於公司法第235條之1股份有限公司員工酬勞分派之規定及其實務見解，下列敘述何者錯誤？","o":["計算員工、董監事酬勞時，應以當年度獲利扣除累積虧損後，再就餘額計算員工、董監事酬勞","公司應於章程訂明以當年度獲利狀況之定額或比率，分派員工酬勞。所謂比率須為固定比例（例如1%），不得為一定區間（例如1-3%）","員工酬勞得以發放現金或股票為之，經董事會特別決議並報告股東會即可","公司董事長兼任員工時，可基於員工身分受員工酬勞之分派"]},
{"n":11,"ans":1,"q":"關於閉鎖性股份有限公司，下列敘述何者錯誤？","o":["股東人數不得超過五十人，亦不得為公開發行股票公司","不得分次發行股份","公司可於證券主管機關許可之證券商經營之股權群眾募資平臺募資","公司股份轉讓之限制應於章程載明"]},
{"n":12,"ans":2,"q":"股票未公開發行之A股份有限公司擁有股東約50人，下列對於該公司董事會與董事之相關敘述，何者錯誤？","o":["該公司得依章程規定不設董事會","董事選舉必須採累積投票制","董事選舉必須採候選人提名制","董事缺額達三分之一時，應於30日內召開股東臨時會補選"]},
{"n":13,"ans":3,"q":"甲公司董事會決議向其大股東A借款8,000萬元，年息百分之十，但目前銀行之企業貸款年息約百分之三。甲公司之章程明訂，公司對外借款超過5,000萬元應經過股東會同意。甲公司監察人B及持股已達2年之股東C，對董事會自行決定且未得到股東會同意，便自行借款的情事均表示不滿，欲制止董事會，下列敘述何者正確？","o":["若股東C未持有甲公司已發行有表決權股份總數之百分之一以上股份，不得自行行使制止請求權","若股東C未持股百分之一以上，應先請求監察人B制止董事會；如監察人B無正當理由不行使，始得由股東C自行制止之","因為本案已經董事會討論並通過，故監察人B、股東C二人皆不得行使制止請求權","監察人B、股東C二人均能立即行使制止請求權，並無何者須優先行使的次序要求"]},
{"n":14,"ans":3,"q":"A股份有限公司（下稱A公司）為一從事食品加工的非公開發行公司，該公司章程規定公司股份總數為100萬股，全數均為普通股，並以每股票面金額新臺幣10元全數發行。目前A公司之實收資本額為新臺幣1,000萬元，其中X股份有限公司（下稱X公司）持有A公司股份35萬股，X公司之從屬公司Y股份有限公司亦持有A公司股份25萬股。其後，A公司為擴大公司規模，打算再發行50萬普通股。新股發行除依法保留總數百分之十的股份由A公司員工承購外，其餘全數由原股東按其原有持股比例認購完畢。依公司法規定，下列敘述何者正確？","o":["A公司此次發行新股只要董事會同意即可，無須經股東會同意","X公司於此次發行新股僅能以現金出資方式認購，不得以A公司事業所需之財產為出資","A公司此次發行新股保留由原股東認購者，A公司得限制其在2年內不得轉讓","A公司不論增資發行新股前後，X公司與A公司之關係屬於控制公司與從屬公司之關係"]},
{"n":15,"ans":0,"q":"A醫院轉投資B有限公司、C股份有限公司、D商號、E有限合夥，均取得有表決權之股份或出資額超過半數。此五家組織中，有幾家彼此間可能構成公司法上之關係企業？","o":["2","3","4","5"]},
{"n":16,"ans":3,"q":"下列關於人壽保險契約之相關規定敘述，何者錯誤？","o":["保險費到期未交付者，除契約另有訂定外，經催告到達後屆30日仍不交付時，保險契約之效力停止","被保險人年齡不實，而其真實年齡已超過保險人所定保險年齡限度者，其契約無效，保險人應退還所繳交保險費","即使契約中已指定受益人，除要保人聲明放棄處分權者外，仍得以契約或遺囑變更之","保險費付足二年以上者，要保人方得以保險契約為質，向保險人借款"]},
{"n":17,"ans":1,"q":"下列關於保險法涉及保險契約訂立之規定，何者錯誤？","o":["人身保險不得為指示式或無記名式","保險契約由代理人訂立者，適用民法之相關規定即可，無庸再行載明代訂之意旨","保險契約由合夥人或共有人中之一人或數人訂立，而其利益及於全體合夥人或共有人者，應載明為全體合夥人或共有人訂立之意旨","保險人得約定保險標的物之一部份，應由要保人自行負擔由危險而生之損失。有此約定時，要保人不得將未經保險之部份，另向他保險人訂立保險契約"]},
{"n":18,"ans":3,"q":"甲以其即將大學畢業之子乙為被保險人向A壽險公司（下稱A公司）投保傷害保險，保險契約條款約定：「被保險人職業變更時應書面通知保險人；未通知者，保險契約自動解除」。乙畢業後參加政府所舉辦的短期電工技職訓練班，未通知保險人A公司，訓練期間與其他學員外出旅遊時，巧遇旅館失火而死亡。試問保險人A公司主張不負保險責任，有無理由？","o":["有理由，被保險人未通知，契約自動解除","有理由，被保險人未通知，保險人仍須行使解除權，契約方解除","無理由，應通知而未通知，保險人僅得請求損害賠償，仍負給付保險金之責","無理由，損害之發生不影響保險人之負擔，保險人仍應全額賠償"]},
{"n":19,"ans":2,"q":"甲以其所有之房屋（廠房兼住家）向A產險公司（下稱A公司）投保火災保險500萬元，並以配偶乙為被保險人向B壽險公司（下稱B公司）投保意外保險1,000萬元。今甲之受僱人丙因工資報酬問題與甲產生糾紛，遂故意縱火，導致廠房全損及乙罹難火場。A公司、B公司分別為保險理賠後，對丙主張保險代位求償，有無理由？","o":["A公司、B公司均有理由","A公司、B公司均無理由","A公司有理由，B公司無理由","A公司無理由，B公司有理由"]},
{"n":20,"ans":3,"q":"甲於民國112年6月1日參加大學同學會，經昔日同窗乙招攬，詳細說明保單相關內容後，決定以自己為被保險人向A保險公司（下稱A公司）投保人壽保險契約，乙於次日將甲填載完成之要保書回傳A公司完成要保程序，並於同日印出繳費單，甲於6月5日於超商繳費完成。甲於6月10日收到A公司所寄發核保通過簡訊，A公司並於6月15日寄出保險單。然甲已於6月12日因意外事故死亡。下列敘述何者正確？","o":["依保險法規定，保險契約應以保險單或暫保單為之。甲死亡時保險契約尚未成立生效，保險人無需為保險給付","保險契約為要物契約，甲於6月5日完成繳費，契約成立生效，保險人應為保險給付","乙為保險公司業務員，為A公司向甲招攬，甲完成要保書回傳並繳費，雙方意思表示合致，契約於6月5日成立生效，保險人應理賠","保險契約為不要式不要物契約，保險人核保時，雙方意思表示已經合致，契約成立生效，保險人應依約給付"]},
{"n":21,"ans":1,"q":"疏浚業者甲以其所有的一艘老抽砂船向產險業者乙投保船舶保險，該船市價及保險金額同為3,000萬元，因船舶老舊且非航行用船，保單特別約定「保險期間船舶航行不得超出臺北港」並約定適用中華民國法。保險期間，甲另外承攬澎湖馬公港疏浚工程，抽砂船駛往馬公港途中於臺中港外海擱淺受損，甲耗費2,000萬元進行船舶救助，另船舶維修費2,500萬元。如依實務判決見解，本案乙保險人責任為何？","o":["主張甲違反特約條款，自違反之時起，保單即刻失效，乙無須理賠","主張甲違反特約條款，乙如於一個月內解除契約，即無須理賠","特約條款顯失公平，應屬無效，乙應賠償保險金額3,000萬元","特約條款顯失公平，應屬無效，並依保險法第33條規定，乙應賠償4,500萬元"]},
{"n":22,"ans":0,"q":"A遊樂場向B保險公司（下稱B公司）投保責任保險。甲於A遊樂場遊玩時，因設施故障而受傷，事故後1個月，A遊樂場破產結束營業。甲求償無門，乃依保險法第94條向B公司為直接請求損害賠償。B公司主張A遊樂場未繳保費且違反遊樂設施定期保養特約條款規定，於事故發生後2週已解除契約，自不負理賠責任。下列關於B公司之主張有無理由之敘述，何者正確？","o":["有理由，因保險契約已經解除，保險人不負理賠責任","無理由，保險契約效力屬B保險公司與A被保險人間之內部關係，不影響受害第三人甲對B保險人之直接請求權","有理由，因A遊樂場未賠付甲之前，損失尚未確實發生，B公司本無須負責","無理由，B公司仍應理賠，理賠後再向已破產的A遊樂場為主張"]},
{"n":23,"ans":0,"q":"依我國保險法之規定，保險業之同業公會為會員之健全經營及維護同業之聲譽，應辦理相關事項。下列敘述何者錯誤？","o":["訂定自律規範並請專家審核後即可提供會員遵循","就會員所經營業務發生紛爭時為必要協調","辦理保險主管機關委託辦理之事項","訂立實務作業規定時得要求會員提供相關資料"]},
{"n":24,"ans":2,"q":"關於未來事項之特約條款，在訂約地為不合法而未履行者，保險契約之效力為何？","o":["因客觀不能而契約無效","不拘束保險人","依然有效","不拘束被保險人"]},
{"n":25,"ans":1,"q":"下列有關保險代理人、保險經紀人與公證人之敘述，何者錯誤？","o":["保險經紀人應以善良管理人之注意義務，為被保險人洽訂保險契約或提供相關服務，並負忠實義務","兼有保險代理人、經紀人、公證人資格者，得同時申領執業證照，但保險代理人與經紀人應擇一申領","銀行得經主管機關許可擇一兼營保險代理人或保險經紀人業務","保險經紀人應經主管機關許可，繳存保證金並投保責任保險與保證保險，領有執業證照後，始得經營或執行業務"]},
{"n":26,"ans":0,"q":"甲簽發發票日為某年5月1日，到期日為同年10月1日，面額20萬元之本票一張交付乙，乙將本票背書交付丙，丙背書交付丁。如乙於該票據背面簽名旁記載免作拒絕證書，丁於同年10月3日請求甲付款，遭甲拒絕，丁遲至次年10月2日始對乙追索，乙對丁有無抗辯事由？","o":["乙對丁有抗辯事由，因追索權時效至次年9月30日止","乙對丁有抗辯事由，因追索權時效至次年10月1日止","乙對丁無抗辯事由，因追索權時效至次年10月3日止","乙對丁有抗辯事由，因丁未遵期為付款提示"]},
{"n":27,"ans":3,"q":"甲簽發本票一張予乙，以清償所欠貨款新臺幣（下同）10萬元，然於簽發之際錯看收據上所載數字，誤填金額為16萬元。乙於票據到期前將該票背書轉讓予善意之丙，購買丙市價約15萬元之設備，該票到期後，丙持以向甲請求付款，下列敘述何者正確？","o":["該票據因金額誤載而無效，甲無須付款","甲可主張該票據所欲清償之債務為10萬元，而得僅支付10萬元，就剩餘之6萬元，丙應向乙請求","因票載金額與實際交易不符，若甲可證明實際債權數額僅10萬元，則丙僅得請求10萬元","票載金額為16萬元，則甲應支付16萬元"]},
{"n":28,"ans":3,"q":"甲未經乙之授權，以乙之名義簽發受款人為丙之本票，丙所執之本票被丁所盜，其後丁偽造丙之簽名轉讓予戊，戊再背書轉讓予善意不知情且有給付對價之己。若己到期不獲付款時，得向何人行使追索權？","o":["甲","乙","丁","戊"]},
{"n":29,"ans":1,"q":"乙執有甲簽發之記名匯票，票載付款人為丙。下列何種情況，乙不得於到期日前行使追索權？","o":["丙拒絕承兌","甲死亡","丙受破產宣告","丙行蹤不明，無從為承兌之提示"]},
{"n":30,"ans":3,"q":"甲因協助A公司介紹一筆生意而可獲得A公司給付之佣金，甲擬以由A公司擔任甲簽發匯票之付款人方式獲得該佣金，為保證將來A公司會承兌該票據，A公司與甲並簽訂書面之契約。甲後來即簽發一紙以A公司為付款人之匯票予乙，並將A公司承諾之事告知乙，乙將該匯票背書轉讓予丙，惟乙之背書附註該背書須待A公司履行承兌之承諾始生效力，丙於到期日持匯票向A公司請求付款，A公司稱因甲所介紹之生意因故未成交，所以拒絕付款，丙得向何人請求票款？","o":["A公司、甲、乙","A公司、甲","A公司、乙","甲、乙"]},
{"n":31,"ans":0,"q":"甲與乙為姐妹，為盡孝道扶養行動不方便之母親丙，決定在臺北市購買一間位於一樓之公寓供丙居住。兩人向銀行貸款時，共同簽發本票並經丙背書予銀行。因房貸之繳款不正常，銀行遂欲以本票行使追索權，此時乙已因病猝逝，財產由其子丁單獨繼承。依據司法實務之見解，得對何人聲請法院裁定後強制執行？","o":["僅甲","僅甲丙","僅甲丁","甲丙丁"]},
{"n":32,"ans":2,"q":"關於本票之背書，下列何種行為，非票據法所許？","o":["以委任取款之目的而為背書","執票人將背書塗銷","背書人記載預備付款人","背書人於票上為禁止轉讓之記載"]},
{"n":33,"ans":3,"q":"甲於民國109年7月1日簽發記名支票一紙予乙，金額為新臺幣100萬元，發票地與付款地均為臺南市，匆忙間，甲漏未記載發票日。下列關於該支票之敘述，何者正確？","o":["以實際發票日為發票日","以乙提示付款日為發票日","該支票視為見票即付","該支票無效"]},

{"n":35,"ans":2,"q":"依票據法之規定，下列有關支票之敘述，何者正確？","o":["支票在票載發票日前，執票人為付款之提示，付款人應於見票時無條件付款","支票發票人應照支票文義擔保支票付款，其付款責任與匯票承兌人相同","支票發票地與付款地均為新北市，如發票日後七日執票人不為付款之提示，對於發票人以外之前手，喪失追索權","支票、匯票、本票發票時，發票日及到期日均為絕對必要記載事項"]},
{"n":36,"ans":2,"q":"A股份有限公司（下稱A公司）為一家從事食品加工之上市公司，並依法設置審計委員會。最近，A公司擬召開審計委員會，討論年度財務報告等事宜。依證券交易法之規定，下列敘述何者錯誤？","o":["A公司因已設置審計委員會，所以無須再設置監察人","A公司審計委員會得決議請公司相關部門經理人員、內部稽核人員、會計師、法律顧問或其他人員列席會議及提供相關必要之資訊。但討論及表決時應離席","審計委員會之召集，應載明召集事由，於三日前通知委員會各獨立董事成員。但有緊急情事者，不在此限","A公司如有正當理由致審計委員會無法召開時，年度財務報告等事項應以全體董事三分之二以上同意行之。但年度財務報告事項仍應由獨立董事成員出具同意意見"]},
{"n":37,"ans":3,"q":"A公司為一家從事醫療器材製造的上市公司，該公司設有薪資報酬委員會。甲最近剛被選任為A公司薪資報酬委員會成員，由於甲是首次擔任薪資報酬委員會成員，因此想要了解下列有關薪資報酬委員會之敘述，何者錯誤？","o":["薪資報酬委員會成員由董事會決議委任之，其人數不得少於三人","薪資報酬委員會得經決議，委任律師、會計師或其他專業人員，就行使職權有關之事項為必要之查核或提供諮詢，其費用由公司負擔","A公司董事會通過之薪資報酬如優於薪資報酬委員會之建議，除應就差異情形及原因於董事會議事錄載明外，並應於董事會通過之即日起算二日內於主管機關指定之資訊申報網站辦理公告申報","薪資報酬委員會應至少每年召開四次，並於薪資報酬委員會組織規程中訂明之"]},

{"n":40,"ans":2,"q":"公開發行公司募集無擔保轉換公司債，依證券交易法令，原則上其額度限制為何？","o":["不得逾全部資產減去全部負債餘額之50%","不得逾全部資產減去全部負債之餘額","不得逾全部資產減去全部負債餘額之200%","不得逾全部資產減去全部負債餘額之400%"]},
{"n":41,"ans":1,"q":"依證券交易法發行股票公司之董事、監察人、經理人或持有公司股份超過股份總額10%之股東，依證券交易法之規定對其股票轉讓之限制，下列敘述何者錯誤？","o":["向主管機關申報生效後，得向非特定人為之","依主管機關所定持有期間及每一交易日得轉讓數量比例，於向主管機關申報之日起3日後，得向符合主管機關所定條件之特定人為轉讓","於向主管機關申報之日起3日內，向符合主管機關所定條件之特定人為之","該股票轉讓方式之限制，亦適用董事之配偶與未成年子女"]},
{"n":42,"ans":2,"q":"依據證券交易法第22條第3項及「發行人募集與發行有價證券處理準則」之規定，下列何者為公開招募？","o":["發起人於公司成立前，對非特定人招募股票之行為","發行公司於發行前，對非特定人招募股票之行為","有價證券持有人為出售其所持有之股票，而對非特定人招募之行為","公開發行公司對特定人招募股票之行為"]},
{"n":43,"ans":2,"q":"下列何者為證券交易法所稱之發行人？","o":["A上市公司之總經理甲","以發起設立方式設立B股份有限公司之發起人乙","募集發行新股之C股份有限公司","募集發行新股之D股份有限公司之董事長丙"]},
{"n":44,"ans":1,"q":"A公司為一家生產車用電池的上市公司，甲為該公司的獨立董事。近期，A公司擬討論內部稽核主管之任免事宜。依證券交易法之規定，下列敘述何者錯誤？","o":["A公司所設置之獨立董事，人數不得少於三人","甲在獨立董事任期中若轉讓超過選任當時所持有之A公司股份數額二分之一時，其獨立董事當然解任","A公司獨立董事均解任時，公司應自事實發生之日起六十日內，召開股東臨時會補選之","如有正當理由致審計委員會無法召開時，內部稽核主管之任免應以全體董事三分之二以上同意行之"]},
{"n":45,"ans":0,"q":"A上市公司（下稱A公司）總經理甲於今年3月初買進自家公司上市股票100張，並於同年5月中將其全數賣出，共獲利新臺幣200萬元。A公司的股東乙認為甲的行為違反證券交易法短線交易之規定，公司應積極主張其權利。下列敘述何者錯誤？","o":["A公司應請求甲將其利益歸於公司，此一請求權自獲得利益之日起1年間不行使而消滅","A公司不行使歸入權時，不限持股多寡，任何股東皆得以30日之限期，請求董事行使之；逾期不行使時，請求之股東得為公司行使此一請求權","董事不為公司行使歸入權以致A公司受損害時，對公司負連帶賠償之責","甲之行為並無刑事責任"]},
{"n":46,"ans":2,"q":"甲執命乙給付金錢之確定判決，聲請強制執行乙對A地所有權之應有部分；乙之債權人丙就該應有部分有抵押權，然未聲明參與分配或聲請強制執行；丁為A地共有人，乙之承租人戊於查封前已占用A地。下列何種情形不得依強制執行法第12條規定聲請或聲明異議？","o":["執行法院定期112年8月15日第一次拍賣，拍賣公告記載「拍定後點交」，戊以拍賣公告記載錯誤為由，聲請更正記載為「拍定後不點交」","執行法院定期112年8月10日第一次拍賣，拍賣公告於同年7月29日揭示在法院公告欄，乙以執行法院公告時間距離拍賣期日不足法定最短天數為由聲明異議","A地應有部分拍定收足價金後，執行法院逕行核發權利移轉證書予拍定人，丁以其未獲通知是否優先承買為由聲明異議","A地應有部分拍定收足價金後，執行法院作成分配表定期113年2月5日分配，並於同年月1日將分配表繕本送達丙，丙以送達時間距離分配期日不足法定最短天數為由聲明異議"]},
{"n":47,"ans":2,"q":"有關執行名義之種類，下列敘述，何者正確？","o":["我國法院撤銷暴利行為之判決確定者，得為執行名義","我國法院經宣告假執行之租金給付判決，遭上級審廢棄者，仍得為執行名義","我國公證人就一定數額之違約金債務載明應逕受強制執行之公證書，得為執行名義","日本法院之貨款給付判決確定者，得逕為執行名義"]},
{"n":48,"ans":0,"q":"甲於民國112年12月12日持乙簽發發票日109年7月7日，面額新臺幣200萬元之支票，聲請法院對乙核發支付命令獲准，嗣於113年3月4日持該支付命令聲請對乙為強制執行。下列敘述，何者正確？","o":["倘甲之債權經執行後未獲足額清償，得依強制執行法第27條規定，聲請執行法院核發債權憑證","乙抗辯甲之票款給付請求權已罹於消滅時效期間，並於甲聲請支付命令前已拒絕給付票款，得依強制執行法第14條第1項規定，於強制執行程序終結前，提起債務人異議之訴，以排除強制執行程序","乙提起債務人異議之訴後，受訴法院應依強制執行法第18條第2項規定，以職權裁定乙不須供擔保而停止強制執行","基於支付命令之即時確定，甲聲請強制執行不須檢附支付命令之確定證明書"]},
{"n":49,"ans":1,"q":"甲對乙有貨款債權新臺幣（下同）500萬元，取得確定勝訴判決後，聲請法院強制執行乙所有之市價1,000萬元A地。該地業經乙設定最高限額700萬元抵押權予丙，以擔保丙對乙尚未屆清償期之借款債權。下列敘述，何者錯誤？","o":["丙無執行名義，且未聲明參與分配，執行法院仍應通知丙參與分配","丙為保護其期限利益，得拒絕參與分配，而主張拍定後不得塗銷其抵押權設定登記","丙於A地拍定後始以500萬元抵押借款債權聲明參與分配，執行法院仍應將丙申報之債權金額列入分配，並得優先受償","執行法院通知丙參與分配，丙未聲明參與分配，執行法院仍應將丙之700萬元債權金額列入分配，並得優先受償"]},

};

</script>
<script>
(function(){
  "use strict";

  const LS_FLAG     = "exam113_comp_flags";
  const LS_SELECTED = "exam113_comp_selected";
  const LS_CONFUSE  = "exam113_comp_confuse";
  const LS_EXPLAIN  = "exam113_comp_explain";
  const LS_SUBMIT   = "exam113_comp_submit";

  const EXAM_TITLE   = "113司律一試_綜合法學(二)_公司";
  const EXAM_SUBJECT = "綜合法學（公司法、保險法、票據法、證券交易法、強制執行法、法學英文）";

  function loadJSON(key, fallback){
    try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
    catch(e){ return fallback; }
  }
  function saveJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

  let flags       = loadJSON(LS_FLAG, {});
  let selected    = loadJSON(LS_SELECTED, {});
  let confused    = loadJSON(LS_CONFUSE, {});
  let explainText = loadJSON(LS_EXPLAIN, {});
  let submitState = loadJSON(LS_SUBMIT, null);

  let currentFilter = "all";
  let openExplain   = new Set();
  let openOfficial  = new Set();

  const main         = document.getElementById("main-content");
  const flagCounterEl= document.getElementById("flag-counter");
  const tabAll       = document.getElementById("tab-all");
  const tabFlagged   = document.getElementById("tab-flagged");
  const scoreBanner  = document.getElementById("score-banner");
  const scoreTextEl  = document.getElementById("score-text");

  const OPT_LABELS    = ["A","B","C","D"];
  const POINTS_PER_Q  = 2;

  function updateFlagCounter(){
    const count = Object.keys(flags).filter(k => flags[k]).length;
    flagCounterEl.textContent = count;
  }

  function escapeHTML(str){
    return String(str)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  function buildOptionHTML(qn, idx, text, isCorrect){
    const selKey = String(qn);
    const isSelected = selected[selKey] === idx;
    const confKey = qn + "_" + idx;
    const isConfused = !!confused[confKey];

    let cls = "option";
    if(isSelected){
      cls += isCorrect ? " selected-correct" : " selected-wrong";
    }
    if(isConfused){ cls += " confused"; }

    return `
      <div class="${cls}" data-qn="${qn}" data-idx="${idx}" data-correct="${isCorrect ? '1':'0'}">
        <span class="opt-label">${OPT_LABELS[idx]}</span>
        <span class="opt-text">${escapeHTML(text)}</span>
        <button class="confuse-btn ${isConfused ? 'active':''}" data-qn="${qn}" data-idx="${idx}" title="標記為疑惑選項" aria-label="標記疑惑">
          <svg viewBox="0 0 16 16"><path class="tri" d="M8 3 L13.5 12.5 L2.5 12.5 Z"/></svg>
        </button>
      </div>
    `;
  }

  function buildExplainHTML(qn){
    const key = String(qn);
    const text = explainText[key] || "";
    const hasNote = text.trim().length > 0;
    const isOpen = openExplain.has(key);

    return `
      <div class="explain-block" data-qn="${qn}">
        <button class="explain-toggle ${isOpen ? 'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen ? '收合詳解' : '顯示詳解'}</span>
          ${hasNote ? '<span class="has-note-tag">（已有詳解）</span>' : ''}
        </button>
        <div class="explain-body ${isOpen ? 'open':''}">
          <textarea class="explain-textarea" data-qn="${qn}" placeholder="在此輸入詳解…">${escapeHTML(text)}</textarea>
          <div class="explain-status" data-qn="${qn}">✓ 已自動儲存</div>
        </div>
      </div>
    `;
  }

  function buildOfficialExplainHTML(qn){
    const key = String(qn);
    const content = (typeof OFFICIAL_EXPLANATIONS !== "undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
    if(!content) return "";

    const isOpen = openOfficial.has(key);

    return `
      <div class="official-block" data-qn="${qn}">
        <button class="official-toggle ${isOpen ? 'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen ? '收合參考擬答' : '顯示參考擬答'}</span>
        </button>
        <div class="official-body ${isOpen ? 'open':''}">
          <div class="official-content">${content}</div>
        </div>
      </div>
    `;
  }

  function buildQuestionHTML(item){
    const qn = item.n;
    const isFlagged = !!flags[qn];
    const isRevealed = selected[String(qn)] !== undefined && selected[String(qn)] !== null;
    const correctLabel = OPT_LABELS[item.ans];

    const optionsHTML = item.o.map((text, idx) => buildOptionHTML(qn, idx, text, idx === item.ans)).join("");

    return `
      <article class="q-card ${isFlagged ? 'flagged':''}" id="q-${qn}" data-qn="${qn}">
        <div class="q-row">
          <div class="q-leftbar">
            <span class="q-num">${qn}</span>
            <button class="flag-btn ${isFlagged ? 'active':''}" data-qn="${qn}" title="標記為容易出錯" aria-label="標記旗標">
              <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5"/></svg>
            </button>
            ${isFlagged ? '<span class="flagged-tag">易錯</span>' : ''}
          </div>
          <div class="q-body">
            <p class="q-text">${escapeHTML(item.q)}<span class="answer-inline ${isRevealed ? 'revealed':''}" data-qn="${qn}">正確答案：<span class="ans-key">(${correctLabel})</span></span></p>
            <div class="options-grid">
              ${optionsHTML}
            </div>
            ${buildOfficialExplainHTML(qn)}
            ${buildExplainHTML(qn)}
          </div>
        </div>
      </article>
    `;
  }

  function render(){
    const list = QUESTIONS.filter(item => {
      if(currentFilter === "flagged") return !!flags[item.n];
      return true;
    });

    if(list.length === 0){
      main.innerHTML = `<div class="empty-state">目前沒有已標記的題目。複習時點擊每題左側的旗幟圖示即可加入標記。</div>`;
      return;
    }

    main.innerHTML = list.map(buildQuestionHTML).join("");
  }

  function setFilter(f){
    currentFilter = f;
    tabAll.classList.toggle("active", f === "all");
    tabFlagged.classList.toggle("active", f === "flagged");
    render();
  }

  function renderScoreBanner(){
    if(submitState && submitState.done){
      scoreBanner.classList.add("show");
      scoreTextEl.innerHTML = `本次成績：${submitState.score} 分（共${submitState.correctCount}／${submitState.total}題答對，每題${POINTS_PER_Q}分） <span class="score-detail">交卷時間：${submitState.tsLabel}</span>`;
    }else{
      scoreBanner.classList.remove("show");
    }
  }

  // ---- Event delegation (click) ----
  main.addEventListener("click", function(e){
    const flagBtn = e.target.closest(".flag-btn");
    if(flagBtn){
      const qn = flagBtn.dataset.qn;
      flags[qn] = !flags[qn];
      if(!flags[qn]) delete flags[qn];
      saveJSON(LS_FLAG, flags);
      updateFlagCounter();
      render();
      return;
    }

    const confBtn = e.target.closest(".confuse-btn");
    if(confBtn){
      e.stopPropagation();
      const qn = confBtn.dataset.qn;
      const idx = confBtn.dataset.idx;
      const key = qn + "_" + idx;
      confused[key] = !confused[key];
      if(!confused[key]) delete confused[key];
      saveJSON(LS_CONFUSE, confused);
      render();
      return;
    }

    const officialToggle = e.target.closest(".official-toggle");
    if(officialToggle){
      const qn = officialToggle.dataset.qn;
      if(openOfficial.has(qn)){ openOfficial.delete(qn); }
      else{ openOfficial.add(qn); }
      render();
      return;
    }

    const explainToggle = e.target.closest(".explain-toggle");
    if(explainToggle){
      const qn = explainToggle.dataset.qn;
      if(openExplain.has(qn)){ openExplain.delete(qn); }
      else{ openExplain.add(qn); }
      render();
      if(openExplain.has(qn)){
        const ta = main.querySelector(`.explain-textarea[data-qn="${qn}"]`);
        if(ta) ta.focus();
      }
      return;
    }

    const optEl = e.target.closest(".option");
    if(optEl){
      const qn = optEl.dataset.qn;
      const idx = parseInt(optEl.dataset.idx, 10);
      const key = String(qn);
      if(selected[key] === idx){ delete selected[key]; }
      else{ selected[key] = idx; }
      saveJSON(LS_SELECTED, selected);
      render();
      return;
    }
  });

  // ---- Textarea debounced auto-save ----
  const debounceTimers = {};
  main.addEventListener("input", function(e){
    const ta = e.target.closest(".explain-textarea");
    if(!ta) return;
    const qn = ta.dataset.qn;
    if(debounceTimers[qn]) clearTimeout(debounceTimers[qn]);
    debounceTimers[qn] = setTimeout(() => {
      explainText[qn] = ta.value;
      if(!ta.value.trim()) delete explainText[qn];
      saveJSON(LS_EXPLAIN, explainText);

      const statusEl = main.querySelector(`.explain-status[data-qn="${qn}"]`);
      if(statusEl){
        statusEl.classList.add("show");
        clearTimeout(statusEl._hideTimer);
        statusEl._hideTimer = setTimeout(() => statusEl.classList.remove("show"), 1800);
      }

      const toggleBtn = main.querySelector(`.explain-toggle[data-qn="${qn}"]`);
      if(toggleBtn){
        const hasNote = (explainText[qn] || "").trim().length > 0;
        let tagEl = toggleBtn.querySelector(".has-note-tag");
        if(hasNote && !tagEl){
          tagEl = document.createElement("span");
          tagEl.className = "has-note-tag";
          tagEl.textContent = "（已有詳解）";
          toggleBtn.appendChild(tagEl);
        }else if(!hasNote && tagEl){
          tagEl.remove();
        }
      }
    }, 800);
  });

  tabAll.addEventListener("click", () => setFilter("all"));
  tabFlagged.addEventListener("click", () => setFilter("flagged"));

  // ---- Clear all modal ----
  const modal = document.getElementById("confirm-modal");
  document.getElementById("clear-all-btn").addEventListener("click", () => { modal.classList.add("show"); });
  document.getElementById("modal-cancel").addEventListener("click", () => { modal.classList.remove("show"); });
  document.getElementById("modal-confirm").addEventListener("click", () => {
    flags = {}; selected = {}; confused = {}; submitState = null;
    saveJSON(LS_FLAG, flags);
    saveJSON(LS_SELECTED, selected);
    saveJSON(LS_CONFUSE, confused);
    localStorage.removeItem(LS_SUBMIT);
    if(typeof clearExamComplete === "function"){ clearExamComplete(); }
    updateFlagCounter();
    renderScoreBanner();
    render();
    modal.classList.remove("show");
  });
  modal.addEventListener("click", (e) => { if(e.target === modal) modal.classList.remove("show"); });

  // ---- Submit / scoring ----
  function gradeExam(){
    let correctCount = 0;
    QUESTIONS.forEach(item => {
      const sel = selected[String(item.n)];
      if(sel !== undefined && sel === item.ans) correctCount++;
    });
    const total = QUESTIONS.length;
    const score = correctCount * POINTS_PER_Q;
    const now = new Date();
    const tsLabel = now.getFullYear() + "/" + String(now.getMonth()+1).padStart(2,"0") + "/" + String(now.getDate()).padStart(2,"0") +
      " " + String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
    submitState = { done:true, score, correctCount, total, ts: now.getTime(), tsLabel };
    saveJSON(LS_SUBMIT, submitState);
    renderScoreBanner();
    window.scrollTo({top:0, behavior:"smooth"});
    if(typeof reportExamComplete === "function"){
      reportExamComplete({ score, total, correctCount });
    }
  }
  document.getElementById("submit-btn").addEventListener("click", gradeExam);

  // ---- Export ----
  const SYMBOL_LEGEND = "符號圖例：✓ = 我選對的選項｜✗ = 我選錯的選項｜▲ = 標記為疑惑的選項｜▶ 正確答案：括號內為正解代號";

  function pad2(n){ return String(n).padStart(2,"0"); }
  function todayStamp(){
    const d = new Date();
    return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
  }

  function officialHtmlToPlainText(html){
    if(!html) return "";
    let text = html;
    text = text.replace(/<li[^>]*>/gi, "・");
    text = text.replace(/<\/li>/gi, "\n");
    text = text.replace(/<p[^>]*>/gi, "");
    text = text.replace(/<\/p>/gi, "\n");
    text = text.replace(/<\/?(ul|strong|em)[^>]*>/gi, "");
    text = text.replace(/<[^>]+>/g, "");
    text = text.replace(/&nbsp;/g, " ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');
    text = text.split("\n").map(l => l.trim()).filter(l => l.length > 0).join("\n");
    return text;
  }

  function buildExportText(list, scopeLabel){
    const now = new Date();
    const dateLabel = now.getFullYear() + "/" + pad2(now.getMonth()+1) + "/" + pad2(now.getDate());

    let wrongCount = 0, confusedCount = 0, explainedCount = 0, officialCount = 0;
    const lines = [];
    lines.push(`試卷標題：${EXAM_TITLE}`);
    lines.push(`科目：${EXAM_SUBJECT}`);
    lines.push(`匯出範圍：${scopeLabel}`);
    lines.push(`匯出日期：${dateLabel}`);
    lines.push(SYMBOL_LEGEND);
    lines.push("=".repeat(48));
    lines.push("");

    list.forEach(item => {
      const qn = item.n;
      const key = String(qn);
      const selIdx = selected[key];
      const hasSelection = selIdx !== undefined && selIdx !== null;
      const isWrong = hasSelection && selIdx !== item.ans;
      if(isWrong) wrongCount++;

      let qConfused = false;
      lines.push(`第 ${qn} 題`);
      lines.push(item.q);
      item.o.forEach((text, idx) => {
        const isConf = !!confused[qn + "_" + idx];
        if(isConf) qConfused = true;
        let mark = "　";
        if(hasSelection && idx === selIdx){ mark = (idx === item.ans) ? "✓" : "✗"; }
        else if(isConf){ mark = "▲"; }
        lines.push(`${mark} (${OPT_LABELS[idx]}) ${text}`);
      });
      if(qConfused) confusedCount++;

      lines.push(`▶ 正確答案：(${OPT_LABELS[item.ans]})`);

      const officialHtml = (typeof OFFICIAL_EXPLANATIONS !== "undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
      if(officialHtml){
        officialCount++;
        lines.push(officialHtmlToPlainText(officialHtml));
      }

      const note = (explainText[key] || "").trim();
      if(note){ explainedCount++; lines.push("詳解："); lines.push(note); }

      lines.push("-".repeat(48));
      lines.push("");
    });

    lines.push("=".repeat(48));
    lines.push(`統計：共 ${list.length} 題｜已標記 ${list.filter(it => !!flags[it.n]).length} 題｜答錯 ${wrongCount} 題｜含疑惑選項 ${confusedCount} 題｜有參考擬答 ${officialCount} 題｜有詳解 ${explainedCount} 題`);

    return lines.join("\n");
  }

  function downloadText(filename, content){
    const blob = new Blob([content], {type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  document.getElementById("export-flagged-btn").addEventListener("click", () => {
    const list = QUESTIONS.filter(item => !!flags[item.n]);
    if(list.length === 0){ alert("目前沒有已標記的題目可匯出。"); return; }
    const text = buildExportText(list, "已標記弱點題");
    downloadText(`${EXAM_TITLE}_已標記弱點題_${todayStamp()}.txt`, text);
  });

  document.getElementById("export-all-btn").addEventListener("click", () => {
    const text = buildExportText(QUESTIONS, "全部題目");
    downloadText(`${EXAM_TITLE}_全部題目_${todayStamp()}.txt`, text);
  });

  // ---- init ----
  updateFlagCounter();
  renderScoreBanner();
  render();
})();
</script>
