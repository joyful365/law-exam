<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>114年司律一試 — 綜合法學（一）憲法‧行政法‧國際公法‧國際私法 練習卷</title>
<style>
  :root{
    --paper:#faf8f3;
    --paper-dim:#f3efe6;
    --ink:#2b2b28;
    --ink-soft:#5c5850;
    --rule:#d9d2c2;
    --accent:#8a5a2b;
    --accent-soft:#caa874;
    --flag:#b3422f;
    --flag-bg:#fbe9e5;
    --correct-bg:#dcecd8;
    --correct-border:#5a9456;
    --wrong-bg:#f6d9d4;
    --wrong-border:#b3422f;
    --confuse:#c98a2c;
    --serif: "Noto Serif TC", "Source Han Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-dim);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Sticky Header ---------- */
  header.site-header{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--paper);
    border-bottom:2px solid var(--ink);
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .header-inner{
    max-width:1000px;
    margin:0 auto;
    padding:14px 20px 12px;
  }
  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .exam-title{
    font-family:var(--serif);
    font-size:1.25rem;
    font-weight:700;
    letter-spacing:0.02em;
    margin:0;
  }
  .exam-sub{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin:2px 0 0;
  }
  .meta-line{
    font-size:0.78rem;
    color:var(--ink-soft);
    margin-top:4px;
  }

  .controls-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
    padding-top:10px;
    border-top:1px solid var(--rule);
  }
  .filter-tabs{
    display:flex;
    gap:6px;
  }
  .filter-tabs button{
    font-family:var(--sans);
    font-size:0.85rem;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid var(--rule);
    background:var(--paper);
    color:var(--ink);
    cursor:pointer;
    transition:all .15s ease;
  }
  .filter-tabs button.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }
  .filter-tabs button:hover:not(.active){
    border-color:var(--accent);
    color:var(--accent);
  }
  .status-cluster{
    display:flex;
    align-items:center;
    gap:14px;
    font-size:0.82rem;
    color:var(--ink-soft);
  }
  .flag-count{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-weight:600;
    color:var(--flag);
  }
  .flag-count svg{width:13px;height:13px;}
  .clear-btn{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:6px 12px;
    border-radius:6px;
    border:1px solid var(--flag);
    background:var(--paper);
    color:var(--flag);
    cursor:pointer;
    transition:all .15s ease;
  }
  .clear-btn:hover{
    background:var(--flag);
    color:#fff;
  }

  .toolbar-row2{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--rule);
  }
  .export-group{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .export-btn{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:6px 12px;
    border-radius:6px;
    border:1px solid var(--accent-soft);
    background:#fff;
    color:var(--accent);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:5px;
  }
  .export-btn:hover{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .export-btn svg{width:13px;height:13px;}

  .submit-btn{
    font-family:var(--sans);
    font-size:0.85rem;
    font-weight:700;
    padding:7px 18px;
    border-radius:6px;
    border:1px solid #3f6b3c;
    background:#4f7d4a;
    color:#fff;
    cursor:pointer;
    transition:all .15s ease;
  }
  .submit-btn:hover{
    background:#3f6b3c;
  }

  /* ---------- Score Banner ---------- */
  .score-banner{
    display:none;
    background:#fdf6ec;
    border:1.5px solid var(--accent-soft);
    border-radius:8px;
    padding:10px 16px;
    margin-top:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
  }
  .score-banner.show{display:flex;}
  .score-banner .score-text{
    font-size:0.95rem;
    font-weight:700;
    color:var(--accent);
  }
  .score-banner .score-detail{
    font-size:0.78rem;
    color:var(--ink-soft);
    font-weight:400;
  }
  .score-banner .done-tag{
    font-size:0.72rem;
    font-weight:700;
    color:#3f6b3c;
    background:#e3efe1;
    border:1px solid #8fbf89;
    border-radius:4px;
    padding:2px 8px;
  }

  /* ---------- Main content ---------- */
  main{
    max-width:1000px;
    margin:0 auto;
    padding:24px 20px 80px;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    font-size:0.95rem;
  }

  .q-card{
    background:var(--paper);
    border:1px solid var(--rule);
    border-radius:10px;
    margin-bottom:16px;
    padding:16px 18px 16px 14px;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .q-card.flagged{
    border-color:var(--flag);
    box-shadow:0 0 0 1px var(--flag) inset;
    background:linear-gradient(180deg, var(--flag-bg) 0%, var(--paper) 55px);
  }

  .q-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
  }

  .q-leftbar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    flex-shrink:0;
    width:46px;
    padding-top:1px;
  }

  .q-num{
    font-family:var(--serif);
    font-weight:700;
    font-size:1.1rem;
    color:var(--ink);
    line-height:1;
  }

  .flag-btn{
    background:none;
    border:none;
    cursor:pointer;
    padding:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    transition:transform .12s ease, background .15s ease;
  }
  .flag-btn:hover{
    background:var(--flag-bg);
  }
  .flag-btn svg{
    width:18px;
    height:18px;
    stroke:var(--ink-soft);
    fill:none;
    stroke-width:1.8;
    transition:fill .15s ease, stroke .15s ease;
  }
  .flag-btn.active svg{
    fill:var(--flag);
    stroke:var(--flag);
  }
  .flag-btn:active{transform:scale(0.9);}

  .flagged-tag{
    font-size:0.65rem;
    font-weight:700;
    color:var(--flag);
    background:var(--flag-bg);
    border:1px solid var(--flag);
    border-radius:4px;
    padding:1px 5px;
    white-space:nowrap;
    letter-spacing:0.04em;
  }

  .q-body{
    flex:1;
    min-width:0;
  }

  .q-text{
    font-size:0.98rem;
    font-weight:700;
    margin:0 0 12px;
    color:var(--ink);
  }

  .options-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 10px;
  }
  @media (max-width:620px){
    .options-grid{grid-template-columns:1fr;}
  }

  .option{
    display:flex;
    align-items:flex-start;
    gap:8px;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:8px 10px;
    cursor:pointer;
    font-size:0.9rem;
    background:#fff;
    transition:background .15s ease, border-color .15s ease;
    position:relative;
  }
  .option:hover{
    border-color:var(--accent-soft);
  }
  .option .opt-label{
    font-weight:700;
    color:var(--accent);
    flex-shrink:0;
  }
  .option .opt-text{
    flex:1;
  }
  .option .confuse-btn{
    flex-shrink:0;
    background:none;
    border:none;
    cursor:pointer;
    padding:1px 2px;
    margin-left:2px;
    line-height:0;
  }
  .option .confuse-btn svg{
    width:13px;
    height:13px;
    transition:fill .15s ease;
  }
  .option .confuse-btn svg .tri{
    fill:none;
    stroke:#b9b2a0;
    stroke-width:1.4;
  }
  .option .confuse-btn.active svg .tri{
    fill:var(--confuse);
    stroke:var(--confuse);
  }

  .option.selected-wrong{
    background:var(--wrong-bg);
    border-color:var(--wrong-border);
  }
  .option.selected-wrong .opt-text{
    text-decoration:line-through;
    color:#7a3a30;
  }
  .option.selected-correct{
    background:var(--correct-bg);
    border-color:var(--correct-border);
  }
  .option.confused{
    outline:2px dashed var(--confuse);
    outline-offset:1px;
  }

  .answer-inline{
    display:inline-block;
    margin-left:10px;
    font-size:0.8rem;
    font-weight:400;
    padding:2px 9px;
    border-radius:5px;
    background:#fff;
    color:#fff; /* hidden by default: white on white */
    border:1px solid var(--rule);
    transition:color .15s ease, background .15s ease, border-color .15s ease;
    user-select:none;
    vertical-align:middle;
    white-space:nowrap;
  }
  .answer-inline.revealed{
    color:var(--accent);
    background:#fdf6ec;
    border-color:var(--accent-soft);
    font-weight:600;
    user-select:text;
  }
  .answer-inline .ans-key{
    font-weight:700;
  }

  /* ---------- Explanation block ---------- */
  .explain-block{
    margin-top:10px;
  }
  .explain-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid var(--rule);
    background:#fff;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .explain-toggle:hover{
    border-color:var(--accent-soft);
    color:var(--accent);
  }
  .explain-toggle .has-note-tag{
    font-size:0.72rem;
    font-weight:700;
    color:var(--accent);
  }
  .explain-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .explain-toggle.open .chevron{
    transform:rotate(90deg);
  }

  .explain-body{
    display:none;
    margin-top:8px;
  }
  .explain-body.open{
    display:block;
  }
  .explain-textarea{
    width:100%;
    min-height:90px;
    font-family:var(--sans);
    font-size:0.88rem;
    line-height:1.6;
    color:var(--ink);
    background:#fffdf8;
    border:1.5px solid var(--rule);
    border-radius:8px;
    padding:10px 12px;
    resize:vertical;
    transition:border-color .15s ease;
  }
  .explain-textarea:focus{
    outline:none;
    border-color:var(--accent-soft);
  }
  .explain-status{
    font-size:0.74rem;
    color:#5a9456;
    margin-top:5px;
    height:1em;
    opacity:0;
    transition:opacity .25s ease;
  }
  .explain-status.show{
    opacity:1;
  }

  /* ---------- Official explanation block (built-in, read-only) ---------- */
  .official-block{
    margin-top:8px;
  }
  .official-toggle{
    font-family:var(--sans);
    font-size:0.8rem;
    padding:5px 12px;
    border-radius:6px;
    border:1px solid #cfe0d4;
    background:#f3f9f4;
    color:#3f6b3c;
    cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .official-toggle:hover{
    border-color:#8fbf89;
    background:#e9f4ea;
  }
  .official-toggle .chevron{
    font-size:0.7rem;
    transition:transform .15s ease;
  }
  .official-toggle.open .chevron{
    transform:rotate(90deg);
  }
  .official-badge-icon{
    font-size:0.78rem;
  }
  .official-body{
    display:none;
    margin-top:8px;
  }
  .official-body.open{
    display:block;
  }
  .official-content{
    background:#f8fbf8;
    border:1px solid #d9e9da;
    border-left:3px solid #5a9456;
    border-radius:8px;
    padding:14px 16px;
    font-size:0.88rem;
    line-height:1.75;
    color:#2f4a2d;
  }
  .official-content p{
    margin:0 0 8px;
  }
  .official-content p:last-child{
    margin-bottom:0;
  }
  .official-content ul{
    margin:0 0 8px;
    padding-left:1.3em;
  }
  .official-content ul:last-child{
    margin-bottom:0;
  }
  .official-content li{
    margin-bottom:6px;
  }
  .official-content li:last-child{
    margin-bottom:0;
  }
  .official-content strong{
    color:#1f3a1e;
  }
  .official-content em{
    color:#5c6b5a;
  }

  /* modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(30,28,24,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:var(--paper);
    border-radius:10px;
    padding:22px 24px;
    max-width:360px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
    text-align:center;
  }
  .modal-box p{
    font-size:0.92rem;
    margin:0 0 18px;
    color:var(--ink);
  }
  .modal-actions{
    display:flex;
    justify-content:center;
    gap:10px;
  }
  .modal-actions button{
    font-family:var(--sans);
    font-size:0.85rem;
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    border:1px solid var(--rule);
    background:#fff;
  }
  .modal-actions button.confirm{
    background:var(--flag);
    border-color:var(--flag);
    color:#fff;
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="title-row">
      <div>
        <h1 class="exam-title">114年公務人員特種考試司法官考試 ‧ 114年專門職業及技術人員高等考試律師考試</h1>
        <p class="exam-sub">綜合法學（一）憲法‧行政法‧國際公法‧國際私法 — 第一試試題（單一選擇題，全75題）</p>
      </div>
    </div>
    <div class="meta-line">考試日期：114年（西元2025年）｜類科：各類科｜每題2分，共75題｜本練習卷供考後自我複習使用</div>

    <div class="controls-row">
      <div class="filter-tabs">
        <button id="tab-all" class="active">全部題目</button>
        <button id="tab-flagged">已標記</button>
      </div>
      <div class="status-cluster">
        <span class="flag-count">
          <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5" fill="currentColor" stroke="none"/></svg>
          <span id="flag-counter">0</span> 題已標記
        </span>
        <button class="clear-btn" id="clear-all-btn">清除全部標記</button>
      </div>
    </div>

    <div class="toolbar-row2">
      <div class="export-group">
        <button class="export-btn" id="export-flagged-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
          匯出已標記
        </button>
        <button class="export-btn" id="export-all-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 19h16"/></svg>
          匯出全部
        </button>
      </div>
      <button class="submit-btn" id="submit-btn">交卷算分</button>
    </div>

    <div class="score-banner" id="score-banner">
      <span class="score-text" id="score-text"></span>
      <span class="done-tag">本卷已完成</span>
    </div>
  </div>
</header>

<main id="main-content"></main>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <p>確定要清除「全部」旗標標記、作答紀錄、疑惑標記與交卷成績嗎？<br>（已輸入的詳解內容將會保留；題庫大廳的「已完成」徽章也會一併移除）<br>此操作無法復原。</p>
    <div class="modal-actions">
      <button id="modal-cancel">取消</button>
      <button id="modal-confirm" class="confirm">確定清除</button>
    </div>
  </div>
</div>

<script src="exam-complete.js"></script>
<script>
const QUESTIONS = [
{"n":1,"ans":0,"q":"憲法本文及增修條文之下列何種規定，得導出我國有民主國之性質？","o":["總統及立法院均由人民直接選舉產生","總統公布法律、發布命令，須經行政院院長之副署","國家重要事項須經行政院院會議決","國家權力劃分為五權，分設五院行使之"]},
{"n":2,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，關於憲法第155條：「人民之老弱殘廢，無力生活，……國家應予以適當之扶助與救濟」，下列敘述何者錯誤？","o":["租稅優惠為國家得採取保障人民生存與生活之扶助措施之一","國家保障視障者之工作權屬特別重要公共利益","憲法特別著重弱勢者之保障，第155條即為例證之一","對身心障礙者優惠性差別待遇之合憲性，應採寬鬆之合理性審查"]},
{"n":3,"ans":1,"q":"依司法院解釋意旨及憲法法庭裁判，關於政黨之敘述，下列何者錯誤？","o":["政黨應服膺自由民主憲政秩序","政黨與其他團體受憲法保障與限制之程度無平等原則之適用","國家應致力於建立並確保複數政黨得以自由形成發展與公平參與選舉之法治環境","國家得對政黨之財產權加以更多限制或給予政黨補助金"]},
{"n":4,"ans":3,"q":"有關家庭暴力防治法中之保護令，依司法院解釋意旨及憲法法庭裁判，下列敘述何者錯誤？","o":["涉及人身自由之限制，應以法律定之","法律已就人身之處置為明文規定者，得透過具體明確之授權，委由主管機關執行之","有關人身自由限制之決定，得由法院依法定程序以裁定為之","民事保護令並不涉及人身自由之限制"]},
{"n":5,"ans":0,"q":"下列何者非屬釋憲實務對於宗教自由保障之意旨？","o":["宗教結社屬宗教自由之絕對保障","國家考試不得基於人民之特定信仰給與加分優待","國家不得基於人民之特定信仰為理由予以不利益","不許人民以宗教理由免除服兵役義務"]},
{"n":6,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，關於大學自治之敘述，下列何者錯誤？","o":["為避免學術自由受國家不當干預，立法機關僅得在合理之範圍內對大學事務加以規範","大學為確保學位之授予具備一定之水準，得於合理及必要之範圍內，訂定有關取得學位之資格條件","審理大學學生提起行政爭訟事件，應本於維護大學自治之原則，對大學之專業判斷予以適度之尊重","大學法明定大學應設教務處、學生事務處、總務處之內部組織，限制大學之自主組織權而與保障大學自治之意旨相牴觸"]},
{"n":7,"ans":0,"q":"關於生命權保障，下列敘述何者錯誤？","o":["我國憲法對生命權之保障依據，依司法院解釋意旨及憲法法庭裁判，應係憲法第22條其他自由權利的保障範圍","公民及政治權利國際公約規定，任何被判處死刑的人應有權請求赦免或減刑，但赦免法未有類似規定，使被判處死刑的人有權請求獲得赦免","法律規定不得對未滿18歲之人處以死刑，符合兒童權利公約之精神","公民及政治權利國際公約規定，未廢除死刑之國家，非犯情節最重大之罪，不得科處死刑"]},
{"n":8,"ans":3,"q":"有關平等原則，下列敘述何者錯誤？","o":["人民無權主張不法之平等","行政機關依裁量基準而形成之慣例，發生間接對外效力，屬於平等原則之內涵","平等原則可以導出行政機關須受行政慣例之自我拘束","夜市攤販甲因逃漏營業稅而應予補稅，甲有權請求稅務機關要求其他夜市攤販補稅"]},
{"n":9,"ans":0,"q":"關於訴訟權保障，下列敘述何者錯誤？","o":["訴訟救濟由何種法院審理，為訴訟權保障之核心內容，非屬立法形成自由","受刑事有罪判決之被告，應有上訴救濟之機會，屬於訴訟權保障之核心內容","直接審理、言詞辯論、對審及辯護制度係本於正當法律程序之原則","有權利即有救濟，權利受公權力侵害者，皆享有訴訟救濟之基本權"]},
{"n":10,"ans":1,"q":"計程車駕駛人觸犯法定之罪，經法院判決有期徒刑以上之刑，吊扣或廢止其執業登記，依司法院解釋意旨及憲法法庭裁判，係對於何種自由之限制？","o":["遷徙自由","職業選擇自由之主觀條件","職業選擇自由之客觀條件","職業自由之執行方式"]},
{"n":11,"ans":0,"q":"關於服兵役之義務，下列敘述何者錯誤？","o":["甲男因宗教信仰而不願使用武器，向主管機關申請獲准服替代役，故甲男因此免除服兵役之義務","中華民國男子依法有服兵役之義務，係立法者鑒於男女之生理上差異，所為之合理差別待遇","為防衛國家之安全，在實施徵兵制之國家，即規定人民有服兵役之義務","因有痼疾不堪服役者，得依法律規定免除服兵役之義務"]},
{"n":12,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，憲法第22條規定之基本權利，下列何者受絕對保障？","o":["原住民之身分認同權","原住民依循文化傳承從事狩獵活動","個人自主控制其個人資料之資訊隱私權","人民內在精神活動之思想自由"]},
{"n":13,"ans":1,"q":"依司法院解釋意旨及憲法法庭裁判，關於人民健康權之敘述，下列何者錯誤？","o":["國家對於健康權負有最低限度之保護義務","公務員之值勤與健康權無涉","旨在保障人民生理及心理機能之完整性，不受任意侵害","健康權為憲法第22條所保障之基本權利"]},
{"n":14,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，何者非屬憲法上之制度性保障？","o":["學術自由","人身自由","地方自治","一般行動自由"]},
{"n":15,"ans":0,"q":"下列何者之任命無須經立法院同意？","o":["行政院政務委員","審計長","考試委員","監察委員"]},
{"n":16,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，立法院若長期、消極不行使監察委員人事同意權，下列敘述何者正確？","o":["此乃政治問題，非司法院大法官審查範圍","立法院於何時行使人事同意權，純屬國會自治事項，並不違憲","應許總統行使緊急處分權，先行任命監察委員，以免影響憲政體制之正常運行","如致監察院無從行使職權、發揮功能，憲政制度之完整遭受破壞，即為憲法所不許"]},
{"n":17,"ans":1,"q":"依憲法訴訟法規定，有關人民得聲請憲法法庭為宣告裁判違憲之程序，下列敘述何者錯誤？","o":["聲請書應記載確定終局裁判所適用之法規範或該裁判違憲之情形，及所涉憲法條文或憲法上權利","對於適用大法庭裁定見解之不利確定終局裁判，不得聲請裁判憲法審查","凡案件具憲法重要性，或為貫徹聲請人基本權利所必要者，憲法法庭得受理之","聲請應於不利確定終局裁判送達後6個月之不變期間內為之"]},
{"n":18,"ans":3,"q":"關於審計長之敘述，下列何者正確？","o":["審計長由監察院院長提名，經立法院同意任命之","審計長由總統提名，經監察院同意後任命之","審計長完成決算審核後，至遲應於3個月內向立法院提出審核報告","依職務性質，審計長不隨執政黨更迭而進退"]},
{"n":19,"ans":3,"q":"依司法院解釋意旨及憲法法庭裁判，下列何者並非憲法上法官？","o":["司法院大法官","懲戒法院法官","智慧財產及商業法院法官","臺灣高雄地方檢察署檢察官"]},
{"n":20,"ans":2,"q":"依司法院解釋意旨及憲法法庭裁判，關於地方自治受憲法制度性保障之敘述，下列何者錯誤？","o":["省、縣、直轄市作為地方自治團體之資格，源自憲法本文之規定","在不侵犯核心領域之範圍內，法律對地方自治權予以限制，尚不違反制度性保障之意旨","本於制度性保障，縣及直轄市就其轄內之所有事物，享有自行規劃及決定之立法與執行權","為落實制度性保障意旨，縣及直轄市之自治權遭受監督機關侵害時，得循法律途徑救濟"]},
{"n":21,"ans":0,"q":"關於行政法之法源，下列敘述何者正確？","o":["自治條例雖無須特定法律之授權，仍可限制人民權利","總統發布之緊急命令，乃是位階等同於法規命令之成文法源","大法庭制度施行後，法官審判時即不得再參考判例及決議","行政程序法施行後，基於依法行政原則，習慣法已失其法源地位"]},
{"n":22,"ans":3,"q":"環保機關查獲地下油槽滲漏污染地下水，通知負責人限期改善，否則依法處罰，惟在限期改善期限屆至前，即對油槽之負責人裁處罰鍰。關於環保機關之裁罰行為，下列敘述何者正確？","o":["違反比例原則","裁罰處分無效","基於維護公益並未違法","違反誠實信用原則"]},
{"n":23,"ans":1,"q":"依據學說與司法實務見解，對於不確定法律概念是否具有判斷餘地，下列敘述何者錯誤？","o":["考試成績之評定，閱卷委員應有判斷餘地，但若試題屬簡答題且評分標準已客觀明確，即無判斷餘地","學校依據性別平等教育法就校園性別事件組成之調查小組，其調查報告對於性騷擾之事實認定屬於判斷餘地，法院應受拘束","行政機關就其事項雖具有判斷餘地，但若有出於與事物無關之考量之情事，法院仍得介入審查","獨立委員會所作成的評價決定具有判斷餘地，行政法院之審查應受到限制，但涉及人民基本權利屬性的判斷，仍應提高審查密度"]},
{"n":24,"ans":3,"q":"行政機關依職權訂定裁量基準，其所屬機關在處理具體個案時認為個案情形特殊，未依此裁量基準作成個案裁量決定，有關此個案裁量決定，下列敘述何者正確？","o":["即使具體個案情況特殊，所屬機關仍須遵守裁量基準","裁量基準為行政指導準則，對所屬機關具事實拘束力","裁量本屬個案決定，故具通案性質之裁量基準係供下屬參考用","為達成具體個案之公平正義，此裁量可依個案特殊情形而定"]},
{"n":25,"ans":2,"q":"下列何者不發生行政法之法律關係？","o":["人民因亂丟垃圾而受主管機關裁處罰鍰","行政機關與人民締結契約，授予人民行使公權力之權限","政府採購案之得標廠商與採購機關所訂定之採購契約","地方政府之垃圾車於執行職務時撞傷人民"]},
{"n":26,"ans":2,"q":"下列行政機關之委員，何者不受依法獨立行使職權之保障？","o":["中央選舉委員會","公務人員保障暨培訓委員會","金融監督管理委員會","國家運輸安全調查委員會"]},
{"n":27,"ans":3,"q":"組織法規修正後，甲機關之某項職掌移由乙機關管轄時，下列敘述何者錯誤？","o":["若相關行政法規仍規定甲機關為管轄機關，且甲機關仍存續時，甲機關與乙機關得聯名公告變更管轄之事項","若甲機關被裁撤，其中部分職掌由乙機關承受，但相關行政法規仍載明甲機關為管轄機關，得由乙機關單獨公告變更管轄之事項","關於機關管轄變更之公告，原則上自公告之日起算至第3日起發生移轉管轄權之效力","若甲機關尚有1件已受理之申請案，甲機關雖然存續但已不再具有本案管轄權，則甲機關原則上仍得繼續處理本案"]},
{"n":28,"ans":1,"q":"建築法規定，非縣政府所在地之鄉、鎮，適用本法之地區，非供公眾使用之建築物或雜項工作物，得委由鄉、鎮公所依規定核發執照。若鄉、鎮公所欲就核發此執照之事項形成相關規定，應以下列何種規範為之？","o":["自治規則","委辦規則","委託規則","自律規則"]},
{"n":29,"ans":3,"q":"教育部委託大學入學考試中心辦理大學入學考試事務，該中心所為之行政處分，當事人如有不服，應向何機關提起訴願？","o":["行政院","教育部高等教育司","大學入學考試中心","教育部"]},
{"n":30,"ans":1,"q":"下列何者適用或準用公務人員保障法之規定？","o":["政務官","公營事業依法任用之人員","公立學校聘任之教師","民選公職人員"]},
{"n":31,"ans":2,"q":"關於給付行政之概念，下列敘述何者錯誤？","o":["給付行政是指提供人民給付、服務或給與其他利益的行政作用","行政機關對於給付行政的實施有較大之選擇自由，得以公法型態或私法型態為之","凡是給付行政涉及金錢或財務給予者，縱無預算作為依據，亦得為給付行政","行政機關事後廢棄給付行政的具體處分時，應考量相對人的信賴利益"]},

{"n":33,"ans":2,"q":"甲工廠向乙行政機關請領裝設先進環保設備之補助，乙機關慮及，若甲未將環保設備實際用於生產過程，得立即追回該補助，並避免因此產生補償責任，乙機關應如何處置最為妥適？","o":["直接作成發放補助之處分，並在確認甲未實際運用設備時，撤銷該行政處分","直接作成發放補助之處分，並在確認甲未實際運用設備時，廢止該行政處分","作成發放補助之處分，並於該處分中，附加「甲應將設備運用於生產過程」之附款；在確認甲未實際運用設備時，溯及廢止該行政處分","作成發放補助之處分，並於該處分中，附加「甲應將設備運用於生產過程」之附款，否則嗣後將向行政法院訴請返還該補助"]},
{"n":34,"ans":3,"q":"關於行政處分性質之敘述，下列何者正確？","o":["判定役男甲體位為免役體位，係形成處分","核准外國人乙歸化為中華民國國民，係確認處分","任命丙為公務人員，係下命處分","撤銷丁建築執照發放，係形成處分"]},
{"n":35,"ans":0,"q":"下列何者非屬行政處分之附款？","o":["交通主管機關核發小型車普通駕駛執照，註記不得駕駛聯結車、大客車與大貨車","建築主管機關核發建築執照，註記須向機關提供合法廢土棄置場所之證明後，始得開工","農業主管機關核定同意農地設置太陽能發電設備，但核定書內敘明，若未依核定計畫內容設置，得廢止之","主管機關核准餐廳經營之營業許可，但註明須設置噪音污染防制設備"]},
{"n":36,"ans":1,"q":"人民如與A直轄市之原住民族事務主管機關締結行政契約後，下列何機關於該行政契約關係外行使公權力，有補償規定之適用？","o":["內政部","A直轄市地政主管機關","原住民族委員會","A直轄市山地原住民區之區公所"]},
{"n":37,"ans":3,"q":"關於行政契約之法律效果，下列敘述何者錯誤？","o":["行政機關與人民以行政契約約定國家考試之錄取決定，該行政契約無效","行政契約若締約機關欠缺事務管轄權而構成重大明顯之瑕疵者，該行政契約無效","行政機關與人民締結之行政契約，未依行政程序法規定以書面方式為之，該行政契約無效","行政機關與人民締結侵害第三人權利之行政契約，若締約前未經該第三人書面同意，該行政契約無效"]},
{"n":38,"ans":0,"q":"甲使用特定建築物經營商業，違反建築法中建築物不得變更使用之法定義務，同時甲所經營之商業項目，未向主管機關申領營利事業登記證，也違反商業登記法中商業登記之作為義務。就甲於本案所應受之行政罰，下列敘述何者正確？","o":["本案共存在兩項違法行為，應依建築法與商業登記法分別裁處行政罰","本案僅存在單一違法行為，屬於想像競合從一重處斷，故應以建築法裁處行政罰","本案僅存在單一違法行為，不作為義務應優先於作為義務，故應以建築法裁處行政罰","本案僅存在單一違法行為，主要違法目的在於違規經營商業，故應以商業登記法裁處行政罰"]},
{"n":39,"ans":1,"q":"關於行政罰與刑罰之敘述，下列何者錯誤？","o":["與刑法有別，行政罰法對於共同違法行為，並不區分共同正犯、教唆或幫助者","行為非出於故意或過失者，不予處罰，過失行為之處罰，以有特別規定者為限","不得因不知法律或法規而免除刑事或行政處罰責任。但按其情節，得減輕或免除其刑或處罰","行政罰法以處罰違反行政法上義務為限"]},
{"n":40,"ans":2,"q":"關於公物，下列敘述何者錯誤？","o":["公物之所有權人得為私人","公物得依事實行為而提供公用","公務所必需之公物，得為行政執行之標的物","公物得為自然山域或水域"]},
{"n":41,"ans":1,"q":"關於行政程序法之代理人規定，下列敘述何者錯誤？","o":["代理權之授與，及於該行政程序有關之全部程序行為。但申請之撤回，非受特別授權，不得為之","代理人有二人以上者，為避免個別代理行為之矛盾產生，故必須以共同代理方式為之","代理人與當事人間有基於信任之契約關係，故代理人經本人同意後，始得委任他人為複代理人","代理權不因本人死亡或其行政程序行為能力喪失而消滅，法定代理有變更或行政機關經裁併或變更者亦同"]},
{"n":42,"ans":2,"q":"下列何者非屬行政處分？","o":["交通警察在十字路口以手勢指揮交通","海巡人員以向海面開槍之方式，命越界捕魚之船隻退離","道路管理機關在既成道路上鋪設柏油","衛生主管機關以通知單要求特定人於指定日期，讓公務員進入其住居所噴灑藥劑，撲滅病媒蚊"]},
{"n":43,"ans":3,"q":"依行政程序法、訴願法及行政訴訟法規定，關於寄存送達之敘述，下列何者正確？","o":["行政程序及訴願之寄存送達，自送達完畢時即發生效力","訴願及行政訴訟之寄存送達，自送達完畢時即發生效力","行政程序及訴願之寄存送達，自寄存之日起，經10日發生效力","訴願及行政訴訟之寄存送達，自寄存之日起，經10日發生效力"]},
{"n":44,"ans":0,"q":"關於政府資訊公開法規定之敘述，下列何者正確？","o":["與人民權益攸關之施政、措施及其他有關之政府資訊，不待國民申請，原則上即應主動公開","國民申請提供政府資訊，以主張或維護其法律上利益有必要者為要件","國民申請提供之政府資訊包含有侵害個人隱私之部分時，全部均不得提供","申請提供政府資訊遭到拒絕而不服者，不得單獨就該拒絕決定提起行政救濟"]},
{"n":45,"ans":2,"q":"有關行政執行法對於將公法上金錢給付義務人予以管收之要件，下列何者錯誤？","o":["執行機關不得在命義務人提供擔保、限期履行前，即向法院聲請裁定管收","管收要件包含義務人有逃匿之虞，或其可能履行義務，卻故不履行，或為虛偽財產報告或拒絕報告","義務人經通知不到場而受拘提後，才能予以管收，如義務人自行到場接受調查者，不得予以管收","義務人如因管收難以維持家計或罹患疾病無法治療，應逕予停止管收，無須聲請法院裁定"]},
{"n":46,"ans":3,"q":"A公司在其工廠旁違法搭建了一處臨時倉庫，經主管機關查獲後，依建築法相關規定，命令A公司於30日內自行拆除該違建，並於處分書中明確告知逾期不履行將予以強制執行。A公司逾期未拆除，且未提出任何異議。關於此類行為義務之強制執行，下列敘述何者正確？","o":["主管機關可直接派員拆除該違建，並將拆除費用加計行政成本全額向A公司追償","主管機關應先對A公司處以怠金，若A公司仍不履行，方可進行強制拆除","主管機關應向法院聲請強制執行，由法院執行處負責拆除該違建","主管機關可委託第三人代為拆除該違建，並將拆除費用估計後，命A公司預先繳納"]},
{"n":47,"ans":0,"q":"下列何者非屬確認訴訟之標的？","o":["確認道路交通安全規則無效","確認當事人是否屬於某公法人之會員","確認某筆土地是否具有公用地役關係","確認當事人是否具有中華民國國籍"]},
{"n":48,"ans":3,"q":"依司法實務見解，公立大學依法解聘其教師甲，並議決1年不得聘任為教師。甲對上開解聘及1年不得聘任為教師不服而提起救濟時，下列敘述何者正確？","o":["甲就解聘，得向教育部提起訴願","甲就解聘，得以教育部為被告，提起確認聘任法律關係存在之訴","甲就1年不得聘任為教師，得提起確認聘任法律關係存在之訴","甲就1年管制期間，得以教育部為原處分機關，提起訴願"]},
{"n":49,"ans":2,"q":"人民甲與行政機關締結行政契約後，甲因情事變更，向行政機關申請調整契約內容，但行政機關函覆「本案不符情事重大變更之法定要件」，拒絕調整。依最高行政法院實務見解，甲應如何提起行政訴訟？","o":["提起課予義務訴訟，請求法院判命行政機關作成同意調整之行政處分","提起一般確認訴訟，請求法院為確認情事變更法律關係存在之判決","提起一般給付訴訟，請求法院判命行政機關為同意調整之意思表示","提起撤銷訴訟，並請求法院為增、減給付或變更其他原有效果之判決"]},
{"n":50,"ans":2,"q":"下列何者非屬應適用律師強制代理之事件或案件？","o":["高等行政法院管轄之環境保護、土地爭議之第一審通常訴訟程序事件","都市計畫審查程序事件","人民聲請憲法法庭就法規範及裁判憲法審查之案件","人民向最高行政法院提起之事件"]},
{"n":51,"ans":3,"q":"關於審判權之爭議，下列敘述何者正確？","o":["行政法院對人民提起之行政訴訟事件，認無審判權而屬於刑事法院之審判權時，得逕予裁定駁回其訴","民事法院認無審判權移送行政法院，行政法院亦認其無審判權，應聲請大法官就審判權爭議作成統一解釋","依現行制度，難以區分法律關係屬於公法或私法時，當事人可以合意定審判權之歸屬，受理之法院受其拘束，不得再依職權審查審判權之有無","行政法院受理訴訟認無審判權，以裁定移送民事法院審理，該裁定確定後，民事法院認其亦無審判權，應裁定停止訴訟程序，並向最高法院請求指定有審判權之管轄法院"]},
{"n":52,"ans":0,"q":"因作業疏失，甲行政機關誤撥付款項予乙人民，下列敘述何者正確？","o":["甲對乙雖因撥款錯誤之行政事實行為而取得對乙之不當得利返還請求權，但尚不得作成下命處分命乙返還","甲得作成書面行政處分，限期命乙返還","甲機關得逕行移送行政執行","甲須向普通法院訴請乙返還所受領之不當得利"]},
{"n":53,"ans":3,"q":"人民於下列何種情形之下得請求損失補償？","o":["被違規行駛之垃圾車撞傷","因為跌入未設警告標誌之馬路坑洞而受傷","因為搭乘臺灣鐵路公司之火車出軌而受傷","主管機關依法徵收前已埋設地下設施物，妨礙土地所有權人之權利行使"]},
{"n":54,"ans":2,"q":"行政機關對甲作成行政處分，但處分書中未記明理由，如無依法得不記明理由之情事，關於行政機關之補正，下列敘述何者錯誤？","o":["甲無向原處分機關請求補正之權利，僅得提起行政爭訟請求撤銷原處分","僅有原處分機關可以補正處分理由，其上級機關不得為之","只要在行政訴訟事實審言詞辯論終結前補正處分理由，均屬適法","補正理由雖不足以支持原處分之合法性，亦不影響補正之效力"]},
{"n":55,"ans":3,"q":"依行政程序法規定，有關聽證之敘述，下列何者正確？","o":["非經法規明文規定，行政機關不得舉行聽證","聽證，必要時得舉行預備聽證；但聽證終結後，行政機關不得再為聽證","聽證主持人，不論行政機關首長或其指定人員擔任，均應具備法制專長","不服依聽證作成之行政處分，其行政救濟程序，免除訴願及其先行程序"]},
{"n":56,"ans":0,"q":"關於國際法上禁反言原則，下列敘述何者正確？","o":["通常是指若因自身之行為致他方信賴並依循，即不得再為相反之主張致他方受損害","在領土判決中常成為判斷領域主權歸屬的最重要因素","國家元首於聯合國大會發表關於主權範圍之一次性聲明，他國得據以主張禁反言原則","禁反言原則已成為習慣國際法原則"]},
{"n":57,"ans":3,"q":"關於國際法上之非自治領土，下列敘述何者錯誤？","o":["非自治領土人民有權主張人民自決權","聯合國託管理事會已停止運作","聯合國憲章並未要求會員須承認非自治領土獨立","目前世界上已無非自治領土"]},
{"n":58,"ans":3,"q":"關於國際法上徵收外國人或公司財產之國際責任，下列敘述何者錯誤？","o":["地主國徵收外國公司財產給予之補償是否「適當」，得由徵收國片面規定或裁量","地主國對於徵收之補償，在形式上必須符合「適時、合宜與有效」原則","地主國得與被徵收公司所屬國明文約定排除「窮盡當地救濟」原則之適用","「窮盡當地救濟」原則並非習慣國際法原則，除非兩國明文規定為行使外交保護要件，否則不應適用"]},
{"n":59,"ans":2,"q":"甲國為經濟社會文化權利國際公約（ICESCR）之締約國。於甲國就業之移工A，認其健康權遭甲國恣意侵害而欠缺有效救濟，遂以個人名義向經濟社會文化權利委員會提出申訴而未獲受理。下列何者為不受理之可能理由？","o":["經濟社會文化權利委員會無權受理個人申訴案","經濟社會文化權利委員會僅受理工會或團體申訴","甲國未加入經濟社會文化權利國際公約議定書","移工A並非甲國公民，不符合申訴人適格"]},
{"n":60,"ans":3,"q":"關於國際太空法原則，下列敘述何者錯誤？","o":["依據月球條約，月球屬於人類共同遺產","月球條約關於月球之條款，亦適用於太陽系內地球以外之其他星體","依據外太空條約，一國不論是為本國或他國從事發射活動，發射國均須對所造成其他國家之損害負責","拯救條約之締約國對墜落其領土境內具危險性之太空客體，應與發射國共同行使搜救之指揮監督權"]},
{"n":61,"ans":2,"q":"關於聯合國海洋法公約之解釋與適用爭端，下列敘述何者正確？","o":["涉及訴訟時，爭端締約國僅得選擇由國際海洋法法庭解決相關爭端","涉及調解時，爭端締約國僅得從調解員名單中指定人選進行調解","締約國得以書面聲明就海域劃界事項不接受強制爭端解決程序","沿海國有義務將專屬經濟區內生物資源主權權利事項交付強制爭端解決程序"]},
{"n":62,"ans":0,"q":"關於國際地役，下列敘述何者正確？","o":["兩國依條約約定在其中一國領土境內設置核子廢棄物儲存設施，屬於一種國際地役","若甲國領土被乙國繼承時，原本丙國依條約取得通行甲國領土之地役權，當然終止","在國際地役權存續期間，供役範圍之領土主權發生暫時移轉之效果","駐在國外館之不可侵犯權屬於一種國際地役"]},
{"n":63,"ans":2,"q":"關於條約在我國國內法上的地位，下列敘述何者正確？","o":["憲法明文規定條約具有國內法的效力","符合憲法規定所締結之條約，其位階高於法律","名稱為條約或公約而附有批准條款者，應送立法院審議","我國與國際組織間締結之書面協定，雖直接涉及人民權利義務，仍無須送立法院審議"]},
{"n":64,"ans":3,"q":"關於領土割讓後，被割讓領土上人民之國籍歸屬，下列敘述何者正確？","o":["被割讓領土之人民於喪失讓與國國籍後，當然取得受讓國國籍","被割讓領土之人民繼續保有讓與國國籍，不當然取得受讓國國籍","被割讓領土之人民繼續保有讓與國國籍，並當然取得受讓國國籍而擁有雙重國籍","被割讓領土之人民，通常被賦予取得受讓國國籍或保有讓與國國籍之擇一權利"]},
{"n":65,"ans":2,"q":"關於國際組織，下列敘述何者正確？","o":["國際組織成立後須向聯合國秘書處為登記，始取得國際法主體之地位","國際組織之多數決議，對所有會員國均生直接之拘束力","國際組織所享有之權能，不以該組織章程明文規定者為限","基於主權平等原則，所有國際組織之決議投票均為票票等值，無權重差異"]},
{"n":66,"ans":0,"q":"下列何者非屬涉外民事事件？","o":["我國人甲於新竹向我國人乙購買一輛德國製之汽車，後因該買賣契約是否成立生效於我國法院進行訴訟","我國人甲於日本向我國人乙購買一棟位於新竹之房屋，後因該買賣契約是否成立生效於我國法院進行訴訟","我國人甲在臺南開車不慎，撞傷日本人乙，乙於我國法院對甲提起訴訟，請求侵權行為之損害賠償","我國人甲在日本收養日本人乙，收養後甲、乙長期居住於我國，關於該收養是否成立生效於我國法院進行訴訟"]},
{"n":67,"ans":2,"q":"關於當事人本國法之認定，下列敘述何者正確？","o":["當事人有多數國籍時，應適用其住所地法","當事人有多數國籍，而其中之一為我國國籍時，應以我國法為其本國法","當事人無國籍，且住所不明時，應適用其居所地法","當事人無國籍時，應適用其關係最切之法律"]},
{"n":68,"ans":2,"q":"下列何者不屬於外國公司之內部事項？","o":["公司董事之選任方式及程序","董事對外代表公司之職權範圍","董事與其他公司簽訂買賣契約","公司修訂章程限定董事之權限"]},
{"n":69,"ans":0,"q":"A國人甲在B國擁有一處莊園，與乙在C國簽訂受讓該莊園之書面契約，並約定該契約以D國法為準據法，然而該契約未經公證。A國、B國以及C國均未規定不動產買賣契約應經公證，而D國法律則規定不動產買賣契約經公證方能生效。下列敘述何者正確？","o":["該契約有效，係因買賣不動產之法律行為方式可依行為地C國法","該契約有效，係因買賣不動產之法律行為方式可依物之所在地B國法","該契約無效，係因買賣不動產之法律行為方式應依該契約之準據法D國法","該契約無效，係因買賣不動產之法律行為方式應符合行為地C國法與該契約之準據法D國法"]},
{"n":70,"ans":2,"q":"住在加州之美國人甲以新臺幣100萬元向住在臺北之我國人乙購買20公噸之鳳梨。關於鳳梨品質有瑕疵之爭議，甲與乙買賣鳳梨契約之法律適用，下列敘述何者正確？","o":["若甲與乙以電話約定以美國法為準據法，因僅有口頭約定而未有書面，故應認為甲與乙未明示合意應適用之法律","若甲與乙之買賣契約有「以美國加州法院為管轄法院」之合意管轄條款，故而可以認為甲與乙有以美國法為準據法之合意","若甲與乙未明示合意應適用之法律，應推定締約時乙之住所地法，即我國法為關係最切之法律，而以之為準據法","若甲與乙合意以日本法為準據法，則該合意為無效"]},
{"n":71,"ans":1,"q":"A國人甲男與B國人乙女在我國相識結婚，並育有一子丙（具A國籍），三人一起定居於臺中市。不料，多年後甲、乙感情生變，甲向臺灣臺中地方法院訴請裁判離婚。訴訟中，針對離婚後應由何人擔任未成年子女丙之親權人一事，我國法院應如何適用法律？","o":["本案應定性為離婚之效力問題，依夫妻共同住所地法之我國法","本案應定性為親子間法律關係之問題，依子女本國法之A國法","本案應定性為監護之問題，依受監護人本國法之A國法","本案應定性為扶養之問題，依關係最切地法之我國法"]},
{"n":72,"ans":2,"q":"我國人甲女在德國留學時與德國人乙男結婚，婚後甲、乙定居我國，爾後甲向我國法院起訴請求判決與乙離婚，乙在起訴後搭機返回德國。關於準據法之決定及其理由，下列敘述何者正確？","o":["德國法。甲、乙在德國結婚，關係最切之法為德國法","德國法。德國法院有管轄權，故準據法為德國法","我國法。起訴時之共同住所地國為我國","我國法。起訴時關係最切之法為我國法"]},
{"n":73,"ans":3,"q":"A國人甲與B國人乙結婚多年，居住於臺北，生活困頓，時常爭吵，之後協議離婚。離婚後1個月，乙女發現已懷胎4個月，5個月後產下一子丙，下列敘述何者正確？","o":["關於丙之身分，僅得依出生時其母之本國法，即B國法為婚生子女時，丙為婚生子女","丙出生時，甲、乙兩人已經離婚，關於丙之身分僅得依婚姻關係消滅時其母之本國法，方能符合兩性平等保障女性之思潮","關於子女之身分，近代國際私法之思維多有藉累積適用多數國家之法律，儘量承認子女婚生之趨勢","關於丙之身分，若依甲、乙婚姻關係消滅時甲之本國法，即A國法之規定為婚生子女時，則丙為婚生子女"]},
{"n":74,"ans":2,"q":"我國人甲與A國人乙為夫妻，甲起訴請求離婚，並合併請求乙給付贍養費。乙抗辯依A國法，夫妻離婚不得請求贍養費，僅得請求婚姻破裂之補償。下列敘述何者正確？","o":["贍養費為離婚後財產上之請求，應依夫妻財產制之選法規則","離婚後贍養費之請求，應依扶養事件之選法規則","離婚後贍養費之請求，應依離婚效力之選法規則","A國法規定不得請求贍養費，僅得依侵權行為之選法規則"]},
{"n":75,"ans":2,"q":"中華民國國民甲與A國人乙，因為給付買賣價金糾紛，經過A國法院判命甲應給付乙買賣價金100萬元及懲罰性賠償金1,000萬元。乙持該確定判決向中華民國法院聲請強制執行，下列敘述何者錯誤？","o":["A國與中華民國雖無外交承認，但若A國法院沒有不承認中華民國法院判決之情形，符合民事訴訟法第402條第1項第4款之要件","A國懲罰性賠償金之判決，性質上屬於民事判決，仍然具有外國判決承認之適格","乙可直接持A國判決為執行名義，在我國聲請強制執行","為判決之A國法院是否有國際管轄權，按民事訴訟法第402條第1項第1款之規定，依中華民國法律定之"]},

const OFFICIAL_EXPLANATIONS = {

"1": "<p><strong>【解析】</strong></p><ul><li>民主國原則的核心在於「國民主權」，即國家權力必須源自於人民。</li><li><strong>(A) 正確</strong>：總統及立法院均由人民透過定期選舉直接產生，直接體現民意授權與民主正當性，得導出我國為民主國之性質。</li><li><strong>(B) 錯誤</strong>：總統公布法律、發布命令須經行政院長之副署，體現的是「權責相符」原則與內閣制之特徵。</li><li><strong>(C) 錯誤</strong>：國家重要事項須經行政院院會議決，屬於行政體系內部之決策程序規範。</li><li><strong>(D) 錯誤</strong>：國家權力劃分為五權分設五院，屬於「權力分立」原則，主要在防範政府權力濫用。</li></ul>",

"2": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：透過租稅優惠減輕弱勢負擔，確實為國家保障人民生存之扶助措施之一。</li><li><strong>(B) 錯誤（敘述正確）</strong>：依釋字第649號解釋，保障視障者等弱勢群體之工作權，屬於特別重要之公共利益。</li><li><strong>(C) 錯誤（敘述正確）</strong>：憲法第155條明文規定國家對老弱殘廢無力生活者應予扶助，為保護弱勢之例證。</li><li><strong>(D) 正確（敘述錯誤）</strong>：對身心障礙者、原住民等弱勢群體之「優惠性差別待遇」（Affirmative Action），因涉及社會資源之重分配與平等權之保障，依釋憲實務（如釋字第719號等）應採取「中度審查」（實質關聯性審查），而非僅採寬鬆之合理性審查。</li></ul>",

"3": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：依憲法增修條文第5條，政黨之目的或其行為，不得危害中華民國之存在或自由民主之憲政秩序。</li><li><strong>(B) 正確（敘述錯誤）</strong>：政黨亦屬人民結社自由之範疇，政黨與其他團體之間仍有平等原則之適用。國家雖得基於政黨高度公共性之「事務本質」為合理之差別待遇，但絕非「無平等原則之適用」。</li><li><strong>(C) 錯誤（敘述正確）</strong>：依釋憲實務，國家負有確保複數政黨得以自由形成與公平競爭法治環境之義務。</li><li><strong>(D) 錯誤（敘述正確）</strong>：政黨因肩負參與民主政治形成之任務，具高度公共性，國家得以法律（如政黨法、黨產條例）對其財產為更多限制，或依法給予政黨補助金。</li></ul>",

"4": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：涉及人身自由之限制，應符合憲法第8條及法律保留原則。</li><li><strong>(B) 錯誤（敘述正確）</strong>：法律若有明文規定，可透過明確授權委由主管機關或警察機關執行。</li><li><strong>(C) 錯誤（敘述正確）</strong>：依正當法律程序，限制人身自由之決定得由法院依法定程序以裁定為之。</li><li><strong>(D) 正確（敘述錯誤）</strong>：民事保護令（如命相對人遷出住居所、遠離特定場所等）在實質上已構成對人民居住與遷徙自由，甚至廣義行動自由（人身自由）的限制。</li></ul>",

"5": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確（敘述非釋憲意旨）</strong>：憲法保障之宗教自由中，僅個人內心之「內在信仰自由」屬於絕對保障；而「宗教結社」屬外在之宗教行為，因涉及社會公眾領域與公共利益，為「相對保障」，國家得依法定條件予以限制（參釋字第573號等）。</li><li><strong>(B) 錯誤（敘述屬實）</strong>：為維持國家宗教中立原則，國家考試不得依特定信仰給予加分優待。</li><li><strong>(C) 錯誤（敘述屬實）</strong>：基於平等原則，國家不得因特定信仰給予人民不利益。</li><li><strong>(D) 錯誤（敘述屬實）</strong>：依釋字第490號解釋，人民服兵役之義務優於外在宗教行為之保障，不得以宗教信仰為由拒絕服兵役。</li></ul>",

"6": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：為避免干預學術自由，立法機關對大學事務僅得於合理範圍內為適度規範。</li><li><strong>(B) 錯誤（敘述正確）</strong>：大學為確保學位水準，自訂取得學位之資格條件，屬大學自治範疇。</li><li><strong>(C) 錯誤（敘述正確）</strong>：法院審理大學行政爭訟事件，對其學術與專業考量（判斷餘地）應予適度尊重（參釋字第462號）。</li><li><strong>(D) 正確（敘述錯誤）</strong>：釋字第450號雖宣告大學法強制設立特定單位違憲，但若大學法僅明定教務、學務、總務等基本行政處室，旨在建立大學正常運作之基礎框架與共通需求，並未過度干預實質之教學與研究核心，尚不違反大學自治之保障意旨。</li></ul>",

"7": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確（敘述錯誤）</strong>：依釋字第476號等解釋意旨，「生命權」雖未於憲法本文中明文列舉，但大法官已明示其屬於憲法第15條「生存權」之核心保障範疇，而非歸入第22條之概括基本權。</li><li><strong>(B) 錯誤（敘述正確）</strong>：《公民與政治權利國際公約》（ICCPR）第6條賦予被判死刑者請求赦免之權利，但我國現行赦免法尚無人民主動請求獲得赦免之相關程序。</li><li><strong>(C) 錯誤（敘述正確）</strong>：未滿18歲者不得判處死刑，符合《兒童權利公約》（CRC）之保護精神。</li><li><strong>(D) 錯誤（敘述正確）</strong>：ICCPR規定未廢除死刑之國家，僅限於「情節最重大之罪」方得科處死刑。</li></ul>",

"8": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：行政法上平等原則之核心內涵之一，即為人民不得主張「不法之平等」。</li><li><strong>(B) 錯誤（敘述正確）</strong>：行政機關之行政慣例產生「行政自我拘束力」，為平等原則（相同事件應為相同處理）之體現。</li><li><strong>(C) 錯誤（敘述正確）</strong>：同上，行政自我拘束原則可由平等原則導出。</li><li><strong>(D) 正確（敘述錯誤）</strong>：基於「不法之平等不得主張」之法理，處於違法狀態之攤販甲，無權以平等原則為由，要求稅務機關必須對其他違法攤販開罰或補稅，亦不得以此免除自身責任。</li></ul>",

"9": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確（敘述錯誤）</strong>：訴訟權保障之核心在於「有權利即有救濟」。至於具體案件究竟應由普通法院或行政法院審理，以及審級制度應如何設計，原則上屬於「立法形成自由」，並非訴訟權之核心內容（參釋字第736號等）。</li><li><strong>(B) 錯誤（敘述正確）</strong>：受刑事有罪判決之被告，至少應享有一次上訴救濟之機會，此為訴訟權保障之核心（參釋字第752號）。</li><li><strong>(C) 錯誤（敘述正確）</strong>：直接審理、言詞辯論等制度設計，皆為正當法律程序之基本要求。</li><li><strong>(D) 錯誤（敘述正確）</strong>：權利受公權力侵害即得向法院尋求救濟，為憲法第16條訴訟權之基本精神。</li></ul>",

"10": "<p><strong>【解析】</strong></p><ul><li>依釋字第584號及第749號解釋，對於職業自由之限制可分為三階層審查：</li><li><strong>(A) 錯誤</strong>：吊扣或廢止執業登記限制的是職業自由，而非遷徙自由。</li><li><strong>(B) 正確</strong>：因「觸犯特定刑責（前科）」而限制其執業，是基於駕駛人個人的素行、品德等因素作出的限制。這類與個人特質相關，且經由個人主觀努力可改變或具備之條件，屬於「職業選擇自由之主觀條件」限制。</li><li><strong>(C) 錯誤</strong>：客觀條件限制是指非個人努力所能掌控之條件（如計程車牌照之總量管制）。</li><li><strong>(D) 錯誤</strong>：職業執行方式限制，通常指針對營業時間、地點、收費標準等所作之規範，尚不涉及剝奪從業資格。</li></ul>",

"11": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確（敘述錯誤）</strong>：依據釋字第490號解釋精神及《替代役實施條例》，因宗教信仰等因素申請服替代役，僅是將服役之「方式」由武裝軍事役轉為替代性之社會役，甲男仍是在履行國家之兵役義務，並非「免除」服兵役之義務。</li><li><strong>(B) 錯誤（敘述正確）</strong>：釋字第490號解釋明言，僅對男子徵兵係立法者鑒於男女生理差異及社會角色等因素所為之合理差別待遇，不違憲。</li><li><strong>(C) 錯誤（敘述正確）</strong>：實施徵兵制之國家，基於防衛國家安全之目的，課予人民服兵役之義務。</li><li><strong>(D) 錯誤（敘述正確）</strong>：依《兵役法》規定，因身心障礙或痼疾不堪服役者，得經判定為免役體位，免除服兵役義務。</li></ul>",

"12": "<p><strong>【解析】</strong></p><ul><li><strong>(A)、(B)、(C) 錯誤</strong>：原住民之身分認同權、狩獵活動（釋字第803號）、個人之資訊隱私權（釋字第603號）均屬憲法第22條保障之基本權利，但皆為「相對保障」，國家得基於重大或正當之公共利益，符合比例原則下以法律予以限制。</li><li><strong>(D) 正確</strong>：依釋字第567號等解釋意旨，人民內在精神活動之「思想自由」屬於憲法上之「絕對保障」核心，國家不得以任何理由予以侵害或限制。</li></ul>",

"13": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：健康權為憲法第22條保障之基本權利，國家對此負有最低限度之保護義務。</li><li><strong>(B) 正確（敘述錯誤）</strong>：依釋字第785號解釋，公務員之服勤時間及休假制度攸關其身心健康，故公務員之值勤與「健康權」有密切關涉，國家應制定合理之工時與休息框架。</li><li><strong>(C) 錯誤（敘述正確）</strong>：健康權之核心旨在保障人民生理及心理機能之完整性，不受任意侵害。</li><li><strong>(D) 錯誤（敘述正確）</strong>：健康權係憲法第22條概括條款所保障之基本權利。</li></ul>",

"14": "<p><strong>【解析】</strong></p><ul><li>憲法上之「制度性保障」係指憲法對特定制度（如地方自治、大學自治、訴訟制度等）設立客觀的價值秩序保障，立法者不得將該制度之核心內涵予以掏空或廢除。</li><li><strong>(A) 錯誤（具有制度保障）</strong>：學術自由包含大學自治之制度性保障（釋字第380、450號）。</li><li><strong>(B) 錯誤（具有制度保障）</strong>：人身自由亦具有客觀價值秩序，並透過提審制度等形成制度性保障（釋字第392號）。</li><li><strong>(C) 錯誤（具有制度保障）</strong>：地方自治受憲法制度性保障（釋字第498號）。</li><li><strong>(D) 正確（非制度保障）</strong>：一般行動自由（憲法第22條）主要作為個人防禦國家不當干預之「主觀權利」（主觀防禦權），不具備傳統「制度性保障」之客觀體制特性。</li></ul>",

"15": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：行政院政務委員由行政院院長提請總統任命之，無須經立法院同意（憲法第56條）。</li><li><strong>(B) 錯誤</strong>：審計長由總統提名，經立法院同意任命之（憲法第104條）。</li><li><strong>(C) 錯誤</strong>：考試委員由總統提名，經立法院同意任命之（憲法增修條文第6條）。</li><li><strong>(D) 錯誤</strong>：監察委員由總統提名，經立法院同意任命之（憲法增修條文第7條）。</li></ul>",

"16": "<p><strong>【解析】</strong></p><ul><li>依釋字第632號解釋意旨：</li><li><strong>(A)、(B) 錯誤</strong>：監察院為憲法所設置之國家最高監察機關，立法院對監察委員之人事同意權，不僅是權力也是義務。若立法院長期消極不行使，導致監察院實質停擺，屬違憲行為，絕非單純之國會自治或不審查之政治問題。</li><li><strong>(C) 錯誤</strong>：憲法並無賦予總統利用緊急處分權先行任命監察委員之規定，此非解決機制。</li><li><strong>(D) 正確</strong>：立法院消極不行使同意權，致監察院無從行使職權、發揮功能，憲政制度之完整遭受破壞，即為憲法所不許。</li></ul>",

"17": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：憲法訴訟法規定聲請書應依法記載違憲情形及所涉法規範與權利。</li><li><strong>(B) 正確（敘述錯誤）</strong>：依憲法訴訟法之實務與法理，最高法院或最高行政法院之「大法庭裁定」具有統一法律見解之實質拘束力，屬於確定終局裁判所適用之法規範。因此，當事人若受不利之確定終局裁判，且該裁判適用了有違憲疑義之大法庭裁定見解，當然得向憲法法庭聲請法規範及裁判憲法審查。</li><li><strong>(C) 錯誤（敘述正確）</strong>：憲法訴訟法第61條規定，案件具憲法重要性，或為貫徹聲請人基本權利所必要者，憲法法庭得受理之。</li><li><strong>(D) 錯誤（敘述正確）</strong>：人民聲請法規範及裁判憲法審查，應於不利確定終局裁判送達後六個月之不變期間內為之（憲法訴訟法第59條）。</li></ul>",

"18": "<p><strong>【解析】</strong></p><ul><li><strong>(A)、(B) 錯誤</strong>：審計長應由「總統」提名，經「立法院」同意任命之（憲法第104條）。</li><li><strong>(C) 錯誤</strong>：審計長應於行政院提出決算後三個月內，依法完成其審核，並提出審核報告於立法院（憲法第105條）。並非在「完成決算審核後」的3個月內。</li><li><strong>(D) 正確</strong>：審計權之行使具有高度獨立性與超然性，依《審計部組織法》規定審計長任期六年，不因執政黨更迭（政黨輪替）而進退，藉此保障其獨立行使職權。</li></ul>",

"19": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：司法院大法官行使解釋憲法與統一解釋法律等職權，實質上即屬憲法上之法官。</li><li><strong>(B)、(C) 錯誤</strong>：懲戒法院法官、智慧財產及商業法院法官均隸屬於司法院轄下之法院系統，行使審判權，屬憲法第80條所保障之法官。</li><li><strong>(D) 正確</strong>：依釋字第392號解釋意旨，檢察機關隸屬於行政院法務部，檢察官於刑事訴訟程序中擔任公訴人角色，本質上屬「廣義之司法機關/司法官」及「行政官」，並非憲法第80條及第81條所稱之狹義「法官」（法院）。</li></ul>",

"20": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：省、縣等地方自治團體之地位源自憲法本文第11章。</li><li><strong>(B) 錯誤（敘述正確）</strong>：法律對地方自治權之限制，只要不侵犯其「核心領域」（如人事、財政之基本自主權），尚不違反制度性保障。</li><li><strong>(C) 正確（敘述錯誤）</strong>：地方自治團體僅針對「地方自治事項」享有自行規劃及決定之立法與執行權。至於國防、外交、全國性司法等「中央專屬事項」，以及中央「委辦事項」，地方自治團體並無自行規劃及決定之立法權。</li><li><strong>(D) 錯誤（敘述正確）</strong>：為保障自治權，當地方自治團體受中央或上級監督機關侵害時，得依法提起訴願或行政訴訟等法律途徑救濟（參釋字第527、553號等）。</li></ul>",

"21": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《地方制度法》第28條規定，創設、剝奪或限制地方自治團體居民之權利義務者，應以「自治條例」定之。基於地方自治之核心精神與因地制宜之需求，自治條例只要不牴觸憲法、法律或基於法律授權之法規命令，即使無特定中央法律之具體授權，亦得依法定程序制定並限制人民權利（參釋字第738號意旨）。</li><li><strong>(B) 錯誤</strong>：總統發布之緊急命令為暫時替代法律之效力，位階等同於法律甚至得暫時凍結部分法律，並非法規命令。</li><li><strong>(C) 錯誤</strong>：大法庭制度施行後，以往之判例與決議雖停止適用其原有效力，但法官於審判時仍得將其視為法理或一般實務見解予以參考。</li><li><strong>(D) 錯誤</strong>：行政程序法施行後，習慣法（如行政慣例產生之行政自我拘束）若符合法定要件，仍具有行政法上之不文法源地位。</li></ul>",

"22": "<p><strong>【解析】</strong></p><ul><li><strong>(A)、(B)、(C) 錯誤，(D) 正確</strong>：依《行政程序法》第8條規定：「行政行為，應以誠實信用之方法為之，並應保護人民正當合理之信賴。」環保機關既已作成限期改善之通知，給予當事人合理之改善時間，卻在期限屆至前即對其裁處罰鍰，此舉違背了機關自身所設的期限承諾，破壞了人民對該期限的合理信賴，構成違反「誠實信用原則」。</li></ul>",

"23": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：考試成績之評定具高度屬人性與專業性，閱卷委員原則上享有判斷餘地；但若為客觀明確之簡答題且評分標準無爭議，則無判斷餘地。</li><li><strong>(B) 正確（敘述錯誤）</strong>：依最高行政法院實務見解，校園性別事件調查小組對於「性騷擾事實之認定」，屬於客觀歷史事實之調查與確認，須依證據法則判斷。這類事實認定並非高度屬人性、專業性之價值判斷，因此「不具有判斷餘地」，行政法院對其事實認定有完全之審查權，不受該調查報告之拘束。</li><li><strong>(C) 錯誤（敘述正確）</strong>：行政機關雖有判斷餘地，但若有出於錯誤事實、與事物無關之考量（不當聯結）或違反一般公認之價值判斷標準等瑕疵，法院仍得介入審查。</li><li><strong>(D) 錯誤（敘述正確）</strong>：獨立委員會之評價決定通常具判斷餘地，但若涉及人民重大基本權利，法院之審查密度會相應提高。</li></ul>",

"24": "<p><strong>【解析】</strong></p><ul><li><strong>(A)、(B)、(C) 錯誤，(D) 正確</strong>：行政機關訂定之「裁量基準」性質上屬行政規則，雖基於平等原則與行政自我拘束原則對下級機關產生外部效力，但其本質仍是為通案所設之標準。當具體個案之事實情況顯然有別於通案，而屬於「特殊情形」時，行政機關必須行使「合義務之裁量」，針對個案特殊性為不同之決定，以追求個案之公平正義；若不論個案差異一律僵化適用裁量基準，反而會構成「怠於行使裁量」之違法。</li></ul>",

"25": "<p><strong>【解析】</strong></p><ul><li>我國司法實務對政府採購事件採取「雙階理論」：</li><li><strong>(A) 發生行政法關係</strong>：行政機關裁處罰鍰為典型之公權力行使（下命處分）。</li><li><strong>(B) 發生行政法關係</strong>：締結授予公權力之契約屬於「行政契約」。</li><li><strong>(C) 不發生行政法關係</strong>：政府採購案在「決標前」之招標、審標、決標程序屬公法爭議；但「決標後」，得標廠商與採購機關所訂定之採購契約，性質上屬於「私法契約」（民事買賣、承攬等），發生私法上之法律關係，如有爭議應尋民事訴訟途徑解決。</li><li><strong>(D) 發生行政法關係</strong>：執行職務撞傷人民涉及《國家賠償法》，為公法上之損害賠償關係。</li></ul>",

"26": "<p><strong>【解析】</strong></p><ul><li>「獨立機關」係指依法律獨立行使職權，自主運作，除法律另有規定外，不受其他機關指揮監督之合議制機關（《中央行政機關組織基準法》第3條）。</li><li>(A) 中央選舉委員會屬獨立機關。</li><li>(B) 公務人員保障暨培訓委員會（保訓會）委員依其組織法規定，獨立行使職權。</li><li><strong>(C) 金融監督管理委員會（金管會）依其組織法，屬於行政院轄下一般之「二級行政機關」，並非受獨立行使職權保障之獨立機關。</strong></li><li>(D) 國家運輸安全調查委員會屬獨立機關。</li></ul>",

"27": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：依《行政程序法》第11條第2項規定，由甲機關與乙機關聯名公告。</li><li><strong>(B) 錯誤（敘述正確）</strong>：依《行政程序法》第11條第3項規定，若原管轄機關被裁撤，由承受其業務之機關（乙機關）單獨公告。</li><li><strong>(C) 錯誤（敘述正確）</strong>：依《行政程序法》第11條第4項，原則上自公告之日起算至第三日起發生效力。</li><li><strong>(D) 正確（敘述錯誤）</strong>：依《行政程序法》第18條規定，行政機關因法規或事實之變更而喪失管轄權時，應將案件「移送」有管轄權之機關，並通知當事人。甲機關既已喪失管轄權，即不得繼續處理該已受理之申請案。</li></ul>",

"28": "<p><strong>【解析】</strong></p><ul><li>依《地方制度法》之規定：鄉（鎮、市）公所辦理中央法律（如《建築法》）授權之核發執照業務，性質上屬於辦理上級機關交辦之「委辦事項」。針對委辦事項，地方自治團體之行政機關所訂定之相關自治法規，稱為「委辦規則」。</li></ul>",

"29": "<p><strong>【解析】</strong></p><ul><li>依《行政程序法》第16條規定，行政機關得依法規將其權限之一部分，委託民間團體或個人辦理。受託行使公權力之私人，在委託範圍內視同行政機關。</li><li>而依《訴願法》第10條明文規定：「依法受中央或地方機關委託行使公權力之團體或個人，以其團體或個人名義所為之行政處分，其訴願之管轄，向原委託機關提起訴願。」本案受託對象為大學入學考試中心，原委託機關為「教育部」，故應向教育部提起訴願。</li></ul>",

"30": "<p><strong>【解析】</strong></p><ul><li>依《公務人員保障法》之規定：</li><li>(A) 政務官：除少數特例外（如因公涉訟輔助），原則上不適用公務人員保障法。</li><li><strong>(B) 公營事業依法任用之人員：依《公務人員保障法》第102條第1款規定，準用該法之規定。</strong></li><li>(C) 公立學校聘任之教師：適用《教師法》之相關保障機制。</li><li>(D) 民選公職人員：非屬依法任用之常業公務員，不適用該法。</li></ul>",

"31": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：給付行政係指國家提供人民金錢給付、勞務服務或基礎設施等利益之行政作用。</li><li><strong>(B) 錯誤（敘述正確）</strong>：給付行政原則上不直接干預人民自由權利，機關得視情況選擇以「公法型態」（如發放津貼之行政處分）或「私法型態」（如提供助學貸款之行政契約/私法契約）為之。</li><li><strong>(C) 正確（敘述錯誤）</strong>：依「法律保留原則」（特別是預算法律保留），凡涉及國家公帑之給付行政，即便無須嚴格之作用法授權，亦「必須」有立法院通過之預算作為合法依據，無預算即不得擅為金錢給付。</li><li><strong>(D) 錯誤（敘述正確）</strong>：廢止合法的授益處分（給付行政），依《行政程序法》第126條等相關規定，應考量相對人正當合理之信賴利益並給予補償。</li></ul>",

"32": "<p><strong>【解析】</strong></p><ul><li>依《行政程序法》第159條第2項第2款規定，上級機關為協助下級機關或屬官統一解釋法令、認定事實、及行使裁量權，而訂頒之解釋性規定及裁量基準，性質上屬於「行政規則」。內政部針對法規所為之統一解釋，即屬此類解釋性行政規則。</li></ul>",

"33": "<p><strong>【解析】</strong></p><ul><li>若行政機關欲確保人民履行特定義務（將設備用於生產），且希望在人民違約時能順利收回補助並免除「信賴保護/損失補償」之責任，最佳作法為附加「保留廢止權」或「負擔」之附款。</li><li>依《行政程序法》第123條，授予利益之合法行政處分，若「原處分保留廢止權」或「附負擔而未履行」時，得由原處分機關依職權廢止之；且依第125條，廢止得溯及既往使其失效。如此一來，因甲未履行附款義務，其信賴即不值得保護，乙機關即可順利追回補助而無須負擔補償責任。選項 (C) 依法理及實務操作最為妥適。</li></ul>",

"34": "<p><strong>【解析】</strong></p><ul><li>行政處分依其法律效果，可分為「下命處分」、「確認處分」及「形成處分」。形成處分係指「設定、變更或消滅」特定法律關係之處分。</li><li><strong>(A) 錯誤</strong>：判定免役體位，是對人民身體狀況符合免役法定要件之「確認」，屬確認處分。</li><li><strong>(B) 錯誤</strong>：核准歸化係賦予外國人我國國籍，設定新的權利義務關係，屬形成處分。</li><li><strong>(C) 錯誤</strong>：任命公務人員係設定國家與人民間之公法上職務關係，屬形成處分（非下命處分）。</li><li><strong>(D) 正確</strong>：撤銷建築執照係「消滅」原已存在之建築許可法律關係，屬於形成處分。</li></ul>",

"35": "<p><strong>【解析】</strong></p><ul><li>行政處分之「附款」係指行政機關在法律許可之裁量範圍內，附加於行政處分主要內容之額外規定（如條件、負擔、保留廢止權等）。</li><li><strong>(A) 正確（非屬附款）</strong>：小型車普通駕駛執照依法本來就只能駕駛小型車，不得駕駛聯結車、大客車等。此註記僅是對《道路交通安全規則》等既有法令限制之「重申」或「教示」，並非行政機關行使裁量權所額外附加之限制，故不屬行政處分之附款。</li><li><strong>(B)、(C)、(D) 錯誤</strong>：均屬機關依其裁量，要求相對人履行特定作為或保留機關權限之合法附款（如負擔、保留廢止權）。</li></ul>",

"36": "<p><strong>【解析】</strong></p><ul><li>依《行政程序法》第145條第1項規定：「行政契約當事人之一方為人民者，其締約後，因『締約機關所屬公法人之其他機關』於契約關係外行使公權力，致相對人履行契約義務時，顯增費用或受其他重大不利益者，人民得向締約機關請求補償其因此所受之損失。」</li><li>本案締約機關為「A直轄市」之原住民族事務主管機關，其所屬之公法人為「A直轄市」。因此，必須是同屬於「A直轄市」之其他機關行使公權力才有本條適用。</li><li>(A) 內政部：屬中央機關（中華民國公法人）。</li><li><strong>(B) A直轄市地政主管機關：同屬於「A直轄市」公法人之其他機關，有補償規定之適用。</strong></li><li>(C) 原住民族委員會：屬中央機關。</li><li>(D) A直轄市山地原住民區之區公所：依《地方制度法》，直轄市山地原住民區為「獨立之地方自治團體（獨立公法人）」，與A直轄市屬不同公法人。</li></ul>",

"37": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：依《行政程序法》第135條，性質上不得締約者不得為行政契約（國家考試錄取屬依法令應為之單方處分），違反者無效。</li><li><strong>(B) 錯誤（敘述正確）</strong>：締約機關欠缺管轄權且具重大明顯瑕疵，依準用規定屬無效。</li><li><strong>(C) 錯誤（敘述正確）</strong>：依《行政程序法》第139條，行政契約未以書面為之者，無效。</li><li><strong>(D) 正確（敘述錯誤）</strong>：依《行政程序法》第140條第1項規定，行政契約依約定內容履行將侵害第三人之權利者，應經該第三人書面同意，「始生效力」。亦即，未經第三人同意前，該契約為「效力未定」，而非自始絕對「無效」。</li></ul>",

"38": "<p><strong>【解析】</strong></p><ul><li>依司法院釋字第503號解釋意旨及《行政罰法》第25條規定：「數行為違反同一或不同行政法上義務之規定者，分別處罰之。」</li><li>本案中，甲「違規使用建築物（違反建築法）」以及「未辦理商業登記即營業（違反商業登記法）」分屬兩種不同的行為態樣，且兩部法律所欲保護的法益完全不同（一為建築公共安全，一為商業交易秩序），故應認定為「數行為」違反數個行政法上義務，應依兩部法律分別裁處行政罰。</li></ul>",

"39": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：刑法區分正犯、教唆犯、幫助犯；但《行政罰法》第14條對於共同實施違反行政法上義務之行為者，不作此區分，均依其行為情節分別處罰之。</li><li><strong>(B) 正確（敘述錯誤）</strong>：依《行政罰法》第7條第1項規定：「違反行政法上義務之行為非出於故意或過失者，不予處罰。」只要行為人有過失即應受行政罰，此與刑法第12條第2項「過失行為之處罰，以有特別規定者為限」之原則不同。行政罰法對於過失之處罰「不以有特別明文規定為限」。</li><li><strong>(C) 錯誤（敘述正確）</strong>：依《行政罰法》第8條，不得因不知法規而免除責任，但得按情節減輕或免除。</li><li><strong>(D) 錯誤（敘述正確）</strong>：行政罰旨在制裁過去違反行政法上義務之行為。</li></ul>",

"40": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：公物之所有權可歸屬於私人（如私有土地成為具有公用地役關係之既成道路）。</li><li><strong>(B) 錯誤（敘述正確）</strong>：公物可因長期之事實行為或習慣而成立（例如事實上提供公眾通行之道路）。</li><li><strong>(C) 正確（敘述錯誤）</strong>：基於維護公共利益、確保國家行政機能正常運作之法理，國家或地方自治團體「公務所必需之財產（公物）」（如辦公廳舍、警備車輛等），依法「不得」作為強制執行之標的物。</li><li><strong>(D) 錯誤（敘述正確）</strong>：公物不限於人工設施，自然山林、河川等天然公物亦屬之。</li></ul>",

"41": "<p><strong>【解析】</strong></p><ul><li>依《行政程序法》第24條規定：</li><li>(A) 正確：代理權之授與及於該行政程序有關之全部程序行為。但申請之撤回，非受特別授權，不得為之。</li><li><strong>(B) 錯誤：該條第2項明文規定：「代理人有二人以上者，均得單獨代理當事人。」因此不以共同代理為限，各代理人得單獨行使代理權。若代理行為有矛盾時，行政機關得由本人確認或依法理處理，但法規上並未要求必須共同代理。</strong></li><li>(C) 正確：代理人經本人同意，始得委任他人為複代理人。</li><li>(D) 正確：代理權不因本人死亡或其行政程序行為能力喪失而消滅。</li></ul>",

"42": "<p><strong>【解析】</strong></p><ul><li>行政處分須為對外發生「法律效果」之單方行政行為。</li><li>(A) 屬行政處分：警察以手勢指揮交通，屬於對不特定多數人之一般處分（下命處分）。</li><li>(B) 屬行政處分：海巡人員開槍示警命退離，亦屬以事實行為之方式表現之下命處分（一般處分）。</li><li><strong>(C) 非屬行政處分：在既成道路上鋪設柏油，單純為改變物理現狀之「事實行為」，並不直接對人民發生設立、變更或消滅權利義務之法律效果。</strong></li><li>(D) 屬行政處分：要求特定人於特定日期容忍公務員進入屋內噴藥，係課予人民「容忍義務」之下命處分。</li></ul>",

"43": "<p><strong>【解析】</strong></p><ul><li>關於「寄存送達」之生效時點，各法規有不同之設計：</li><li>1. 行政程序法：依最高行政法院相關決議與實務見解，依《行政程序法》第74條所為之寄存送達，於「寄存之日」即發生送達效力。</li><li>2. 訴願法及行政訴訟法：依《訴願法》第47條第3項準用《行政訴訟法》第73條第3項之規定，寄存送達自寄存之日起，「經10日」發生效力。</li><li>綜合以上，選項(D)為正確敘述。</li></ul>",

"44": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《政府資訊公開法》第7條規定，與人民權益攸關之施政、措施及其他有關之政府資訊，應主動公開。</li><li><strong>(B) 錯誤</strong>：依同法第9條，具有中華民國國籍並在中華民國設籍之國民及其設立之本國法人、團體，得申請提供政府資訊。並「不以」主張或維護其法律上利益有必要者為限。</li><li><strong>(C) 錯誤</strong>：依同法第18條第2項之「分離原則」，政府資訊中若有部分涉及隱私等限制公開事項，應僅就該部分隱匿，其餘部分仍應提供。</li><li><strong>(D) 錯誤</strong>：機關拒絕提供政府資訊之決定，性質上屬於行政處分，人民當然得就該拒絕決定單獨提起訴願及行政訴訟。</li></ul>",

"45": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《行政執行法》第17條第2項，義務人具備法定事由時，執行機關得命其提供相當擔保，限期履行；逾期不履行且不提供擔保，始得聲請管收。</li><li><strong>(B) 正確</strong>：此為《行政執行法》第17條規定之管收法定事由。</li><li><strong>(C) 錯誤</strong>：依實務見解及條文規定，即使義務人未受拘提而「自行到場」，只要調查後發現其符合管收之法定要件（如顯有履行義務之可能而故不履行、有隱匿財產之虞等），執行機關仍得向法院聲請管收，並非以「受拘提」為絕對前提。</li><li><strong>(D) 正確</strong>：依同法第21條，義務人因管收難以維持家計或罹患疾病無法治療者，執行處應逕予停止管收，無須聲請法院裁定。</li></ul>",

"46": "<p><strong>【解析】</strong></p><ul><li>拆除違建屬於「可代替之作為義務」（亦即別人幫忙做也能達成相同行政目的之義務）。</li><li>對於可代替之作為義務，依《行政執行法》第27條及第29條規定，應採取「代履行」之方法強制執行。執行機關得委託第三人或指定人員代為履行，其所生之費用由義務人負擔；且執行機關得估計該代履行費用，作成行政處分命義務人「預先繳納」。選項(D)最符合現行法制之執行程序。</li></ul>",

"47": "<p><strong>【解析】</strong></p><ul><li>依《行政訴訟法》第6條規定，確認訴訟之標的僅限於三種：1. 確認「行政處分」無效；2. 確認公法上「法律關係」成立或不成立；3. 確認已執行完畢或消滅之行政處分為違法。</li><li><strong>(A) 錯誤（非屬確認標的）</strong>：「道路交通安全規則」屬於法規命令，並非行政處分，人民不得直接以法規命令本身為標的提起確認無效之訴（法規範審查須循其他途徑）。</li><li>(B)、(C)、(D) 均屬確認「公法上法律關係」存否之訴訟標的。</li></ul>",

"48": "<p><strong>【解析】</strong></p><ul><li>依據最高行政法院近期實務見解（如106年庭長法官聯席會議及相關大法庭裁定）：</li><li>1. 公立大學與教師之間為「行政契約（聘任契約）」關係。學校將教師「解聘」，性質上屬於單方終止行政契約之意思表示，並非行政處分。</li><li>2. 然而，依《教師法》相關規定，議決「1年（或特定期間）不得聘任為教師」，將剝奪該教師於一定期間內在全國各級學校任教之資格。此項全國性之管制效果，須經「教育部」核准始生效力，實質上屬於由教育部對外發生效力之「行政處分」。</li><li>因此，甲對該1年管制期間不服，應以「教育部」為原處分機關，提起訴願及撤銷訴訟救濟。</li></ul>",

"49": "<p><strong>【解析】</strong></p><ul><li>依《行政程序法》第147條規定，行政契約締結後，因情事重大變更，非當時所得預料，且依原約定顯失公平者，當事人之一方得請求他方「為適當之調整」；如他方拒絕調整，當事人得終止契約。</li><li>若人民請求行政機關調整契約內容遭到拒絕，因「調整行政契約內容」之同意本身屬於契約上之「意思表示」，而非行政處分，故人民應向行政法院提起「一般給付訴訟」，請求法院判命行政機關為同意調整契約內容之意思表示。</li></ul>",

"50": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：依《行政訴訟法》第49條之1，高等行政法院管轄之環境保護、土地爭議第一審通常訴訟，強制律師代理。</li><li><strong>(B) 正確</strong>：依同法第237條之31，都市計畫審查程序事件，強制律師代理。</li><li><strong>(D) 正確</strong>：依同法規定，向最高行政法院提起之上訴等事件（法律審），強制律師代理。</li><li><strong>(C) 錯誤（非屬強制）</strong>：依《憲法訴訟法》之規定，人民聲請憲法法庭為法規範及裁判憲法審查，於「聲請程序」階段，並未明文強制要求必須委任律師為代理人（僅於憲法法庭行「言詞辯論」時，始有強制委任律師或法學教授之規定）。</li></ul>",

"51": "<p><strong>【解析】</strong></p><ul><li>針對法院間審判權之積極與消極衝突，現行《法院組織法》及《行政訴訟法》已有新修正規定：</li><li><strong>(A) 錯誤</strong>：依《行政訴訟法》第12條之2規定，行政法院認其無審判權者，應依職權以「裁定移送」至有審判權之管轄法院，不得逕予裁定駁回。</li><li><strong>(B) 錯誤</strong>：依現行法制，受移送之法院若亦認其無審判權，不得再向憲法法庭（原大法官）聲請統一解釋，而是應向其所屬之終審法院請求指定管轄。</li><li><strong>(C) 錯誤</strong>：審判權之歸屬屬於法定事項，涉及國家司法權之分配與公益，當事人不得合意定之；法院亦必須依職權審查自身有無審判權。</li><li><strong>(D) 正確</strong>：依《法院組織法》第7條之3第2項規定，行政法院裁定移送民事法院審理後，民事法院（受移送法院）若認其亦無審判權時，應裁定停止訴訟程序，並向「最高法院」請求指定有審判權之管轄法院。</li></ul>",

"52": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：機關誤撥款項屬於「行政事實行為」。因此產生的公法上不當得利，除非法律有明文授權行政機關可以作成下命處分要求返還（例如《行政程序法》第127條第3項針對「授予利益之行政處分」撤銷或廢止後的返還，明文規定得以書面行政處分命其返還），否則行政機關基於單純事實行為產生之不當得利，無權逕自作成下命處分，僅能向行政法院提起「一般給付訴訟」請求返還。</li><li><strong>(B) 錯誤</strong>：承上，因無法律明文授權，甲機關不得以書面行政處分限期命乙返還。</li><li><strong>(C) 錯誤</strong>：因甲機關無合法之執行名義（合法之下命處分或法院判決），故不得逕行移送行政執行。</li><li><strong>(D) 錯誤</strong>：甲與乙之間為「公法上」之不當得利關係，應向「行政法院」提起訴訟，而非普通法院。</li></ul>",

"53": "<p><strong>【解析】</strong></p><ul><li>「損失補償」係指國家基於公益之需要，合法行使公權力，致人民財產權或生命、身體等遭受「特別犧牲」時，國家給予之財產上填補。</li><li><strong>(A)、(B) 錯誤</strong>：垃圾車違規撞傷人，以及馬路未設警告標誌之坑洞致人受傷，均屬於國家行使公權力「違法」或公共設施設置管理「有欠缺」所造成之損害，應適用《國家賠償法》請求「損害賠償」。</li><li><strong>(C) 錯誤</strong>：搭乘臺鐵火車出軌受傷，屬於私法上旅客運送契約之違約損害賠償，或民法上之侵權行為損害賠償。</li><li><strong>(D) 正確</strong>：主管機關「依法（合法）」徵收前埋設地下設施物，導致土地所有權人無法正常使用土地，構成對財產權之特別犧牲，依釋字第400號、第440號等解釋意旨及相關法規（如《大眾捷運法》），人民得請求「損失補償」。</li></ul>",

"54": "<p><strong>【解析】</strong></p><ul><li>依《行政程序法》第114條規定：</li><li><strong>(A) 錯誤（敘述正確）</strong>：行政處分理由之補正屬於行政機關之職權，法規並未賦予當事人主動請求機關補正之權利，當事人若不服僅能提起行政爭訟請求撤銷。</li><li><strong>(B) 錯誤（敘述正確）</strong>：補正瑕疵必須由「原處分機關」為之，上級機關或其他機關不得代為補正理由。</li><li><strong>(C) 正確（敘述錯誤）</strong>：依第114條第2項規定，行政處分未記明理由之補正，僅得於「訴願程序終結前」為之；得不經訴願程序者，僅得於「向行政法院起訴前」為之。若拖到「行政訴訟事實審言詞辯論終結前」才補正，程序上已屬違法，無法治癒原處分之瑕疵。</li><li><strong>(D) 錯誤（敘述正確）</strong>：補正程序之完成與補正之實質內容是否足以支持處分合法性是兩回事；機關完成補正程序即生補正效力，至於理由是否充分，交由救濟機關（訴願機關或法院）作實質審查。</li></ul>",

"55": "<p><strong>【解析】</strong></p><ul><li>依《行政程序法》聽證之相關規定：</li><li><strong>(A) 錯誤</strong>：依第107條規定，行政機關作成行政處分，除法規明文規定應舉行聽證外，「行政機關認為有舉行聽證之必要者」，亦得依職權舉行聽證。</li><li><strong>(B) 錯誤</strong>：依第110條規定，聽證終結後，決定作成前，行政機關認為必要時，「得再為聽證」。</li><li><strong>(C) 錯誤</strong>：法規並未明文限制聽證主持人必須具備「法制專長」，僅規定由機關首長或其指定人員擔任。</li><li><strong>(D) 正確</strong>：依第109條明文規定：「不服依聽證作成之行政處分者，其行政救濟程序，免除訴願及其先行程序。」這是為了避免程序重複，因為聽證程序本身已具備高度嚴謹之準司法程序性質，故賦予當事人直接向行政法院提起行政訴訟之權利。</li></ul>",

"56": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 正確</strong>：國際法上之「禁反言原則」（Estoppel）係指一國若因其聲明、行為或不作為，使他國產生合理之信賴並依循行事，該國嗣後即不得再提出與先前行為相反之主張，以免致他國受損害。</li><li><strong>(B) 錯誤</strong>：在領土主權爭端中，判斷歸屬之最重要因素通常為「有效控制」（effectivités）及「條約」，禁反言原則多屬輔助性質。</li><li><strong>(C) 錯誤</strong>：單方聲明雖可能對國家產生拘束力，但要構成「禁反言」，必須具備他國「因信賴該聲明而採取行動並可能受損」之要件，單純的一次性聲明不當然讓他人得據以主張禁反言。</li><li><strong>(D) 錯誤</strong>：在國際法法源中，禁反言原則通常被歸類為《國際法院規約》第38條第1項第3款之「一般法律原則」（general principles of law），而非習慣國際法。</li></ul>",

"57": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：依聯合國實務與國際法，非自治領土人民享有人民自決權。</li><li><strong>(B) 錯誤（敘述正確）</strong>：隨著最後一個託管地帛琉於1994年獨立，聯合國託管理事會已完成歷史任務並中止運作。</li><li><strong>(C) 錯誤（敘述正確）</strong>：《聯合國憲章》第73條要求管理國協助非自治領土發展自治能力，但並未直接強制規定必須立即承認其獨立。</li><li><strong>(D) 正確（敘述錯誤）</strong>：目前世界上並非已無非自治領土。依聯合國特別委員會之名單，目前全球仍有17個非自治領土（如西撒哈拉、關島、百慕達等）。</li></ul>",

"58": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（選項敘述有其脈絡，但在本題選最錯者）</strong>：開發中國家基於「卡爾沃主義」及聯合國大會決議（如《各國經濟權利和義務憲章》），常主張徵收補償是否適當應依地主國國內法決定；雖已開發國家反對，但在國際實務上確有此一學說與實踐。</li><li><strong>(B) 錯誤（敘述正確）</strong>：此為已開發國家普遍主張之「赫爾原則」（Hull Formula），即補償須符合「適時、合宜與有效」（prompt, adequate, and effective）。</li><li><strong>(C) 錯誤（敘述正確）</strong>：窮盡當地救濟原則為權利保護之要件，國家間當然可以透過雙邊投資條約（BIT）等明文約定排除適用，例如允許投資人直接將爭端提交國際仲裁（如ICSID）。</li><li><strong>(D) 正確（敘述錯誤）</strong>：「窮盡當地救濟原則」（Exhaustion of local remedies）是國際法上根深蒂固的「習慣國際法原則」。外國人在地主國受害時，必須先窮盡該國所有有效的行政與司法救濟途徑，其本國始得對該地主國行使外交保護。此原則不待兩國明文約定即有適用。</li></ul>",

"59": "<p><strong>【解析】</strong></p><ul><li><strong>(A)、(B) 錯誤</strong>：經濟社會文化權利委員會「有權」受理個人申訴案，且申訴主體不限於工會或團體，個人亦得為之。</li><li><strong>(C) 正確</strong>：《經濟社會文化權利國際公約》本約最初並無個人申訴機制，該機制是透過後續簽署的《經濟社會文化權利國際公約任擇議定書》（Optional Protocol to the ICESCR）所建立。如果甲國僅是公約締約國，但「未加入」該議定書，委員會即無權受理針對甲國之個人申訴。</li><li><strong>(D) 錯誤</strong>：國際人權公約之保障對象原則上及於締約國管轄範圍內之所有個人（包含移工、外國人），不以該國公民為限。</li></ul>",

"60": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤（敘述正確）</strong>：依《月球條約》第11條，月球及其自然資源為人類共同遺產。</li><li><strong>(B) 錯誤（敘述正確）</strong>：依《月球條約》第1條，該條約關於月球的規定亦適用於太陽系內地球以外的其他天體。</li><li><strong>(C) 錯誤（敘述正確）</strong>：依《外太空條約》第7條，發射國對其太空客體在地球表面或對飛行中之航空器所造成之損害，負有絕對之國際賠償責任。</li><li><strong>(D) 正確（敘述錯誤）</strong>：依《營救太空人、送回太空人及歸還射入外太空之客體協定》（拯救條約）第5條規定，締約國若發現其領土內墜落具危險性之太空客體，得通知發射國；發射國應立即採取有效措施消除危險，但此措施必須「在該締約國（即領土主權國）之指揮與監督下」進行。因為事涉地主國之領土主權與安全，並非由發射國與地主國「共同行使」指揮監督權。</li></ul>",

"61": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：依《聯合國海洋法公約》（UNCLOS）第287條規定，締約國於簽署或批准時，得自由選擇國際海洋法法庭（ITLOS）、國際法院（ICJ）或仲裁法庭等作為解決爭端之機制，並非僅能選擇國際海洋法法庭。</li><li><strong>(B) 錯誤</strong>：進行調解時，雙方得合意選定調解員，並非絕對僅能從既有之調解員名單中指定。</li><li><strong>(C) 正確</strong>：依《聯合國海洋法公約》第298條規定，締約國得以書面聲明，對於「海域劃界」、「歷史性海灣或所有權」、軍事活動等特定類型之爭端，不接受公約規定之強制爭端解決程序（即所謂的「選擇性例外」）。</li><li><strong>(D) 錯誤</strong>：依公約第297條第3項，沿海國關於專屬經濟區內生物資源之主權權利（如決定可捕量、捕撈能力等）的爭端，原則上「無義務」交付強制爭端解決程序。</li></ul>",

"62": "<p><strong>【解析】</strong></p><ul><li>「國際地役」（International Servitude）係指一國基於條約或習慣，對其領土主權作某種永久或長期之限制，以供另一國或多國享有特定利益之制度。</li><li><strong>(A) 正確</strong>：兩國透過條約，約定於其中一國領土境內設置核子廢棄物儲存設施供他國使用，屬於典型之國際地役（對供役國領土主權之限制）。</li><li><strong>(B) 錯誤</strong>：國際地役具有「對物權」之性質（隨土地移轉），當供役國發生國家繼承（領土割讓或滅失）時，該地役權通常仍繼續存續，不當然終止。</li><li><strong>(C) 錯誤</strong>：國際地役僅是對供役國「領土主權之限制」或「管轄權之部分讓渡」，領土之根本主權並未發生移轉。</li><li><strong>(D) 錯誤</strong>：駐在國外館之不可侵犯權係基於《維也納外交關係公約》之「外交特權與豁免」，旨在確保外交職務之遂行，非屬領土使用權限性質之國際地役。</li></ul>",

"63": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：我國憲法本文並未明文規定條約與國內法之確切位階關係（例如究竟是高於法律或等同法律），實務與學說上多數認為經立法院審議通過之條約，其位階等同於國內法律。</li><li><strong>(B) 錯誤</strong>：如上所述，經立法院通過之條約，原則上與法律位階相同（後法優於前法、特別法優於普通法），並非當然高於法律。</li><li><strong>(C) 正確</strong>：依《條約締結法》第8條規定，條約案具有「附有批准條款者」等法定情形時，主辦機關應報請行政院核轉立法院審議。</li><li><strong>(D) 錯誤</strong>：依《條約締結法》規定，協定之內容若直接涉及人民之權利義務者，仍應送立法院審議（或視情況送立法院查照）。</li></ul>",

"64": "<p><strong>【解析】</strong></p><ul><li>在現代國際法與國家實踐中，當領土發生割讓時，為尊重人權與避免製造無國籍人，被割讓領土上之居民並不會被強迫強制變更國籍。</li><li><strong>(A)、(B)、(C) 錯誤，(D) 正確</strong>：現代國際法通例會賦予被割讓地人民「國籍選擇權」（Right of Option）。人民通常得於一定期限內，選擇取得受讓國之新國籍，或選擇保留讓與國之舊國籍（選擇保留舊國籍者，通常會被要求遷出該被割讓之領土）。</li></ul>",

"65": "<p><strong>【解析】</strong></p><ul><li><strong>(A) 錯誤</strong>：《聯合國憲章》第102條雖規定條約應向秘書處登記，但這僅是為了能於聯合國機關（如國際法院）援引該條約之要件。國際組織之國際法主體地位，係源自其設立條約之生效與客觀事實，非以向聯合國登記為生效要件。</li><li><strong>(B) 錯誤</strong>：多數國際組織（如聯合國大會）之決議，性質上屬於「建議」，對會員國並無直接之法律強制拘束力（聯合國安理會依憲章第七章所為之決議除外）。</li><li><strong>(C) 正確</strong>：依據國際法院（ICJ）在「聯合國人員執行職務受害賠償案」（Reparation for Injuries case）之諮詢意見，國際組織除了享有章程明文賦予之權力外，為達成其宗旨與執行職務，亦享有「隱含權力」（Implied Powers）。</li><li><strong>(D) 錯誤</strong>：並非所有國際組織皆採「票票等值」。例如國際貨幣基金組織（IMF）或世界銀行（World Bank），即依會員國認繳之份額大小，採取「加權投票制」（Weighted Voting）。</li></ul>",

"66": "<p><strong>【解析】</strong></p><ul><li>所謂「涉外民事事件」，係指民事法律關係之主體、客體或發生法律事實等要素中，具有「涉外因素」（如當事人之一方為外國人、行為地在外國、財產所在地在外國等），而有引發國際私法（衝突法）適用之可能。</li><li><strong>(A) 正確（非屬涉外事件）</strong>：我國人甲與我國人乙在我國境內買賣汽車。本案之主體（均為國人）、行為地與訴訟地（均在臺灣）皆無涉外因素。「德國製」僅是該動產之物理製造地與品質描述，並非引起法律衝突之涉外連結點，故為純粹之國內民事事件。</li><li>(B) 屬涉外事件：買賣行為地在日本。</li><li>(C) 屬涉外事件：當事人一方乙為日本人。</li><li>(D) 屬涉外事件：收養行為地在日本，且被收養人為日本人。</li></ul>",

"67": "<p><strong>【解析】</strong></p><ul><li>依我國《涉外民事法律適用法》（下稱涉外法）第2條規定關於當事人本國法之決定：</li><li><strong>(A) 錯誤</strong>：當事人有多數國籍時，依其關係最切之國籍定其本國法。</li><li><strong>(B) 錯誤</strong>：當事人有多數國籍而其中之一為中華民國國籍者，依中華民國法律為其本國法。</li><li><strong>(C) 正確</strong>：當事人無國籍時，適用其住所地法；住所不明時，適用其「居所地法」。</li><li><strong>(D) 錯誤</strong>：當事人無國籍時，優先適用住所地法，而非直接適用關係最切之法。</li></ul>",

"68": "<p><strong>【解析】</strong></p><ul><li>外國法人之「內部事項」，依《涉外法》第13條，應適用該法人之屬人法（本國法），這通常包括法人之設立、性質、權利能力、組織內部關係（如董事選任）、股東或社員之權利義務等。</li><li><strong>(A)、(B)、(D) 錯誤</strong>：董事之選任、職權範圍之劃定、修改章程等，均屬公司之內部治理結構與組織運作，為內部事項。</li><li><strong>(C) 正確</strong>：董事「對外與其他公司簽訂買賣契約」，性質上屬於對外發生債權債務關係之「外部交易行為（商業行為）」。該買賣契約之效力應依一般涉外契約之選法規則（《涉外法》第20條等，如當事人合意或關係最切地法）來決定準據法，非屬公司內部事項。</li></ul>",

"69": "<p><strong>【解析】</strong></p><ul><li>本題測驗「法律行為方式（形式要件）」之準據法。依《涉外法》第17條規定：「法律行為之方式，依該行為所應適用之法律。但依行為地法所定之方式者，亦為有效。」（此即「場所支配行為」原則之體現）。</li><li>本案中，買賣契約之準據法為D國法（實質要件），而行為地為C國。雖然該契約之準據法（D國法）要求必須公證，但依《涉外法》第17條但書規定，只要該行為符合「行為地法（C國法）」所定之方式（即無須公證之書面即可），其形式即為有效。因此，(A)為正確選項。</li></ul>",

"70": "<p><strong>【解析】</strong></p><ul><li>依《涉外法》第20條規定：「法律行為發生債之關係者，其成立及效力，依當事人意思定其應適用之法律。當事人無明示之意思或其明示之意思依所定應適用之法律無效時，依關係最切之法律。」同條第2項規定：「法律行為所生之債務中有特徵性者，以負擔該特徵性債務之當事人行為時之住所地法，推定為關係最切之法律。」</li><li><strong>(A) 錯誤</strong>：國際私法上當事人合意選擇準據法，並不以「書面」為限，口頭明示亦可成立有效之合意。</li><li><strong>(B) 錯誤</strong>：「合意管轄（選定法院）」與「合意準據法（選定法律）」是兩個獨立的概念，選擇了加州法院，不等於自動明示合意適用加州法。</li><li><strong>(C) 正確</strong>：雙方若未明示選擇準據法，應推定特徵性債務人（即交付貨物之一方，出賣人乙）之住所地法（臺北，即我國法）為關係最切之法律。</li><li><strong>(D) 錯誤</strong>：基於「當事人意思自治原則」，甲與乙完全可以合意選擇與本約定毫無關聯之第三國法（如日本法）為準據法，該合意合法有效。</li></ul>",

"71": "<p><strong>【解析】</strong></p><ul><li>涉外民事事件之「定性」及準據法選擇，應依我國《涉外民事法律適用法》（下稱涉外法）之規定。</li><li>關於離婚後應由何人擔任未成年子女之親權人（監護權歸屬），性質上屬於「父母與子女間之法律關係」，而非單純的離婚效力或一般監護問題。</li><li>依《涉外法》第55條規定：「父母與子女間之法律關係，依子女之本國法。」本案中，未成年子女丙具有A國國籍，因此關於親權人之決定，應定性為親子間法律關係，並適用子女之本國法，即A國法。</li></ul>",

"72": "<p><strong>【解析】</strong></p><ul><li>關於離婚之準據法，依《涉外法》第50條規定，離婚及其效力，若雙方無明示合意適用之法律，則依序適用：</li><li>1. 夫妻共同之本國法。</li><li>2. 無共同之本國法時，依共同之住所地法。</li><li>3. 無共同之住所地時，依與夫妻婚姻關係最切之法律。</li><li>本案中，甲女為我國人，乙男為德國人，雙方「無共同之本國法」；且婚後甲、乙定居我國，故「起訴時之共同住所地國為我國」。因此，應適用起訴時之共同住所地法，即我國法為準據法。</li></ul>",

"73": "<p><strong>【解析】</strong></p><ul><li>本題測驗「婚生子女身分」之認定準據法。</li><li>依《涉外法》第52條第1項規定：「子女之身分，依出生時其母之夫之本國法為婚生子女者，為婚生子女。婚姻關係於子女出生前已消滅者，依婚姻關係消滅時其夫之本國法為婚生子女者，為婚生子女。」</li><li><strong>(A)、(B) 錯誤</strong>：涉外法第52條原則上係以「夫之本國法」作為認定婚生子女身分之連結點。</li><li><strong>(C) 錯誤</strong>：現代國際私法雖有保護子女之趨勢，但我國現行法係採固定連結點（夫之本國法），並非直接累積適用多國法律。</li><li><strong>(D) 正確</strong>：丙出生時，甲、乙之婚姻關係已經消滅，依《涉外法》第52條第1項後段規定，應依「婚姻關係消滅時其夫（甲）之本國法（即A國法）」來判斷。若依A國法規定為婚生子女，丙即為婚生子女。</li></ul>",

"74": "<p><strong>【解析】</strong></p><ul><li>在國際私法之定性上，夫妻離婚後關於「贍養費」之請求，屬於因離婚而衍生之法律效果。</li><li>依我國司法實務及通說見解，離婚後之贍養費給付義務，並非一般的扶養義務，亦非單純的夫妻財產制分配或侵權行為，而是「離婚效力」之一部分。因此，離婚贍養費之請求應依《涉外法》第50條關於「離婚之效力」的選法規則來決定準據法。</li></ul>",

"75": "<p><strong>【解析】</strong></p><ul><li>本題測驗外國法院判決在我國之承認與執行。</li><li><strong>(A) 錯誤（敘述正確）</strong>：依《民事訴訟法》第402條第1項第4款之「相互承認（互惠原則）」要件，即使兩國無正式外交關係，只要A國法院在實務上並無不承認我國法院判決之情形，即符合要件。</li><li><strong>(B) 錯誤（敘述正確）</strong>：外國判決之懲罰性賠償金本質上仍屬民事金錢給付判決，仍具備請求承認與執行之適格（至於是否違反我國公序良俗，為另一層次之審查問題）。</li><li><strong>(C) 正確（敘述錯誤）</strong>：依《強制執行法》第4條之1第1項規定：「依外國法院確定判決聲請強制執行者，以該判決經中華民國法院以判決宣示許可其執行者為限。」因此，乙不能「直接」持外國判決聲請強制執行，必須先向我國法院提起「許可執行之訴」，獲得勝訴確定後，始得為執行名義。</li><li><strong>(D) 錯誤（敘述正確）</strong>：審查外國法院有無國際管轄權時（《民訴法》第402條第1項第1款），應依「中華民國之法律（即我國管轄權法則）」來客觀判定。</li></ul>"
};

</script>
<script>
(function(){
  "use strict";

  const LS_FLAG = "exam114_gov_flags";
  const LS_SELECTED = "exam114_gov_selected";
  const LS_CONFUSE = "exam114_gov_confuse";
  const LS_EXPLAIN = "exam114_gov_explain";   // { qn: "text" }
  const LS_SUBMIT  = "exam114_gov_submit";    // { done:true, score:Number, total:Number, ts:Number }

  const EXAM_TITLE = "114司律一試_憲法、行政法、國際公法、國際私法";
  const EXAM_SUBJECT = "綜合法學（一）憲法‧行政法‧國際公法‧國際私法";

  function loadJSON(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  function saveJSON(key, val){
    localStorage.setItem(key, JSON.stringify(val));
  }

  let flags = loadJSON(LS_FLAG, {});       // { qn: true }
  let selected = loadJSON(LS_SELECTED, {}); // { qn: optIndex }
  let confused = loadJSON(LS_CONFUSE, {});  // { "qn_optIndex": true }
  let explainText = loadJSON(LS_EXPLAIN, {}); // { qn: "text" }
  let submitState = loadJSON(LS_SUBMIT, null); // null | {done,score,total,ts}

  let currentFilter = "all"; // 'all' | 'flagged'
  let openExplain = new Set(); // qn (string) currently expanded — not persisted
  let openOfficial = new Set(); // qn (string) for built-in official explanation — not persisted

  const main = document.getElementById("main-content");
  const flagCounterEl = document.getElementById("flag-counter");
  const tabAll = document.getElementById("tab-all");
  const tabFlagged = document.getElementById("tab-flagged");
  const scoreBanner = document.getElementById("score-banner");
  const scoreTextEl = document.getElementById("score-text");

  const OPT_LABELS = ["A","B","C","D"];
  const POINTS_PER_Q = 2;

  function updateFlagCounter(){
    const count = Object.keys(flags).filter(k => flags[k]).length;
    flagCounterEl.textContent = count;
  }

  function escapeHTML(str){
    return String(str)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  function buildOptionHTML(qn, idx, text, isCorrect){
    const selKey = String(qn);
    const isSelected = selected[selKey] === idx;
    const confKey = qn + "_" + idx;
    const isConfused = !!confused[confKey];

    let cls = "option";
    if(isSelected){
      cls += isCorrect ? " selected-correct" : " selected-wrong";
    }
    if(isConfused){
      cls += " confused";
    }

    return `
      <div class="${cls}" data-qn="${qn}" data-idx="${idx}" data-correct="${isCorrect ? '1':'0'}">
        <span class="opt-label">${OPT_LABELS[idx]}</span>
        <span class="opt-text">${text}</span>
        <button class="confuse-btn ${isConfused ? 'active':''}" data-qn="${qn}" data-idx="${idx}" title="標記為疑惑選項" aria-label="標記疑惑">
          <svg viewBox="0 0 16 16"><path class="tri" d="M8 3 L13.5 12.5 L2.5 12.5 Z"/></svg>
        </button>
      </div>
    `;
  }

  function buildExplainHTML(qn){
    const key = String(qn);
    const text = explainText[key] || "";
    const hasNote = text.trim().length > 0;
    const isOpen = openExplain.has(key);

    return `
      <div class="explain-block" data-qn="${qn}">
        <button class="explain-toggle ${isOpen ? 'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen ? '收合詳解' : '顯示詳解'}</span>
          ${hasNote ? '<span class="has-note-tag">（已有詳解）</span>' : ''}
        </button>
        <div class="explain-body ${isOpen ? 'open':''}">
          <textarea class="explain-textarea" data-qn="${qn}" placeholder="在此輸入詳解…">${escapeHTML(text)}</textarea>
          <div class="explain-status" data-qn="${qn}">✓ 已自動儲存</div>
        </div>
      </div>
    `;
  }

  function buildOfficialExplainHTML(qn){
    const key = String(qn);
    const content = (typeof OFFICIAL_EXPLANATIONS !== "undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
    if(!content) return "";

    const isOpen = openOfficial.has(key);

    return `
      <div class="official-block" data-qn="${qn}">
        <button class="official-toggle ${isOpen ? 'open':''}" data-qn="${qn}">
          <span class="chevron">▶</span>
          <span class="toggle-label">${isOpen ? '收合參考擬答' : '顯示參考擬答'}</span>
        </button>
        <div class="official-body ${isOpen ? 'open':''}">
          <div class="official-content">${content}</div>
        </div>
      </div>
    `;
  }

  function buildQuestionHTML(item){
    const qn = item.n;
    const isFlagged = !!flags[qn];
    const isRevealed = selected[String(qn)] !== undefined && selected[String(qn)] !== null;
    const correctLabel = OPT_LABELS[item.ans];

    const optionsHTML = item.o.map((text, idx) => buildOptionHTML(qn, idx, text, idx === item.ans)).join("");

    return `
      <article class="q-card ${isFlagged ? 'flagged':''}" id="q-${qn}" data-qn="${qn}">
        <div class="q-row">
          <div class="q-leftbar">
            <span class="q-num">${qn}</span>
            <button class="flag-btn ${isFlagged ? 'active':''}" data-qn="${qn}" title="標記為容易出錯" aria-label="標記旗標">
              <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h11l-3 4 3 4H5"/></svg>
            </button>
            ${isFlagged ? '<span class="flagged-tag">易錯</span>' : ''}
          </div>
          <div class="q-body">
            <p class="q-text">${item.q}<span class="answer-inline ${isRevealed ? 'revealed':''}" data-qn="${qn}">正確答案：<span class="ans-key">(${correctLabel})</span></span></p>
            <div class="options-grid">
              ${optionsHTML}
            </div>
            ${buildOfficialExplainHTML(qn)}
            ${buildExplainHTML(qn)}
          </div>
        </div>
      </article>
    `;
  }

  function render(){
    const list = QUESTIONS.filter(item => {
      if(currentFilter === "flagged") return !!flags[item.n];
      return true;
    });

    if(list.length === 0){
      main.innerHTML = `<div class="empty-state">目前沒有已標記的題目。複習時點擊每題左側的旗幟圖示即可加入標記。</div>`;
      return;
    }

    main.innerHTML = list.map(buildQuestionHTML).join("");
    // Focus restoration is intentionally skipped: textarea edits are saved via
    // input listener without triggering a full render (see delegation below).
  }

  function setFilter(f){
    currentFilter = f;
    tabAll.classList.toggle("active", f === "all");
    tabFlagged.classList.toggle("active", f === "flagged");
    render();
  }

  function renderScoreBanner(){
    if(submitState && submitState.done){
      scoreBanner.classList.add("show");
      const pct = submitState.total > 0 ? Math.round((submitState.score / (submitState.total * POINTS_PER_Q)) * 1000) / 10 : 0;
      scoreTextEl.innerHTML = `本次成績：${submitState.score} 分（共${submitState.correctCount}／${submitState.total}題答對，每題${POINTS_PER_Q}分） <span class="score-detail">交卷時間：${submitState.tsLabel}</span>`;
    }else{
      scoreBanner.classList.remove("show");
    }
  }

  // ---- Event delegation (click) ----
  main.addEventListener("click", function(e){
    // Flag button
    const flagBtn = e.target.closest(".flag-btn");
    if(flagBtn){
      const qn = flagBtn.dataset.qn;
      flags[qn] = !flags[qn];
      if(!flags[qn]) delete flags[qn];
      saveJSON(LS_FLAG, flags);
      updateFlagCounter();
      render();
      return;
    }

    // Confuse triangle button (must check before generic option click)
    const confBtn = e.target.closest(".confuse-btn");
    if(confBtn){
      e.stopPropagation();
      const qn = confBtn.dataset.qn;
      const idx = confBtn.dataset.idx;
      const key = qn + "_" + idx;
      confused[key] = !confused[key];
      if(!confused[key]) delete confused[key];
      saveJSON(LS_CONFUSE, confused);
      render();
      return;
    }

    // Official explanation toggle button (built-in, read-only)
    const officialToggle = e.target.closest(".official-toggle");
    if(officialToggle){
      const qn = officialToggle.dataset.qn;
      if(openOfficial.has(qn)){
        openOfficial.delete(qn);
      }else{
        openOfficial.add(qn);
      }
      render();
      return;
    }

    // Explain toggle button
    const explainToggle = e.target.closest(".explain-toggle");
    if(explainToggle){
      const qn = explainToggle.dataset.qn;
      if(openExplain.has(qn)){
        openExplain.delete(qn);
      }else{
        openExplain.add(qn);
      }
      render();
      // focus the textarea after opening
      if(openExplain.has(qn)){
        const ta = main.querySelector(`.explain-textarea[data-qn="${qn}"]`);
        if(ta) ta.focus();
      }
      return;
    }

    // Option click (toggle selection / reveal answer)
    const optEl = e.target.closest(".option");
    if(optEl){
      const qn = optEl.dataset.qn;
      const idx = parseInt(optEl.dataset.idx, 10);
      const key = String(qn);

      if(selected[key] === idx){
        // toggle off
        delete selected[key];
      }else{
        selected[key] = idx;
      }
      saveJSON(LS_SELECTED, selected);
      render();
      return;
    }
  });

  // ---- Event delegation (textarea input, debounced auto-save) ----
  const debounceTimers = {}; // qn -> timeout id
  main.addEventListener("input", function(e){
    const ta = e.target.closest(".explain-textarea");
    if(!ta) return;
    const qn = ta.dataset.qn;

    if(debounceTimers[qn]) clearTimeout(debounceTimers[qn]);
    debounceTimers[qn] = setTimeout(() => {
      explainText[qn] = ta.value;
      if(!ta.value.trim()) delete explainText[qn];
      saveJSON(LS_EXPLAIN, explainText);

      // show "已自動儲存" status without re-rendering (avoid losing focus)
      const statusEl = main.querySelector(`.explain-status[data-qn="${qn}"]`);
      if(statusEl){
        statusEl.classList.add("show");
        clearTimeout(statusEl._hideTimer);
        statusEl._hideTimer = setTimeout(() => statusEl.classList.remove("show"), 1800);
      }

      // update the "(已有詳解)" tag in place without full re-render
      const toggleBtn = main.querySelector(`.explain-toggle[data-qn="${qn}"]`);
      if(toggleBtn){
        const hasNote = (explainText[qn] || "").trim().length > 0;
        let tagEl = toggleBtn.querySelector(".has-note-tag");
        if(hasNote && !tagEl){
          tagEl = document.createElement("span");
          tagEl.className = "has-note-tag";
          tagEl.textContent = "（已有詳解）";
          toggleBtn.appendChild(tagEl);
        }else if(!hasNote && tagEl){
          tagEl.remove();
        }
      }
    }, 800);
  });

  tabAll.addEventListener("click", () => setFilter("all"));
  tabFlagged.addEventListener("click", () => setFilter("flagged"));

  // ---- Clear all modal ----
  const modal = document.getElementById("confirm-modal");
  document.getElementById("clear-all-btn").addEventListener("click", () => {
    modal.classList.add("show");
  });
  document.getElementById("modal-cancel").addEventListener("click", () => {
    modal.classList.remove("show");
  });
  document.getElementById("modal-confirm").addEventListener("click", () => {
    flags = {};
    selected = {};
    confused = {};
    submitState = null;
    saveJSON(LS_FLAG, flags);
    saveJSON(LS_SELECTED, selected);
    saveJSON(LS_CONFUSE, confused);
    localStorage.removeItem(LS_SUBMIT);

    // 同步移除題庫大廳／分類頁的「已完成」徽章紀錄
    if(typeof clearExamComplete === "function"){
      clearExamComplete();
    }

    updateFlagCounter();
    renderScoreBanner();
    render();
    modal.classList.remove("show");
  });
  modal.addEventListener("click", (e) => {
    if(e.target === modal) modal.classList.remove("show");
  });

  // ---- Submit / scoring ----
  function gradeExam(){
    let correctCount = 0;
    QUESTIONS.forEach(item => {
      const sel = selected[String(item.n)];
      if(sel !== undefined && sel === item.ans) correctCount++;
    });
    const total = QUESTIONS.length;
    const score = correctCount * POINTS_PER_Q;
    const now = new Date();
    const tsLabel = now.getFullYear() + "/" + String(now.getMonth()+1).padStart(2,"0") + "/" + String(now.getDate()).padStart(2,"0") +
      " " + String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");

    submitState = { done:true, score, correctCount, total, ts: now.getTime(), tsLabel };
    saveJSON(LS_SUBMIT, submitState);
    renderScoreBanner();
    window.scrollTo({top:0, behavior:"smooth"});

    // 回報完成狀態給題庫大廳／分類頁顯示「已完成」徽章
    if(typeof reportExamComplete === "function"){
      reportExamComplete({ score, total, correctCount });
    }
  }

  document.getElementById("submit-btn").addEventListener("click", gradeExam);

  // ---- Export ----
  const SYMBOL_LEGEND = "符號圖例：✓ = 我選對的選項｜✗ = 我選錯的選項｜▲ = 標記為疑惑的選項｜▶ 正確答案：括號內為正解代號";

  function pad2(n){ return String(n).padStart(2,"0"); }
  function todayStamp(){
    const d = new Date();
    return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
  }

  function officialHtmlToPlainText(html){
    if(!html) return "";
    let text = html;
    // <li> -> "・" 條列符號 + 換行
    text = text.replace(/<li[^>]*>/gi, "・");
    text = text.replace(/<\/li>/gi, "\n");
    // <p> -> 換行區隔
    text = text.replace(/<p[^>]*>/gi, "");
    text = text.replace(/<\/p>/gi, "\n");
    // <ul>/<em>/<strong> 等標籤直接移除，但保留內容
    text = text.replace(/<\/?(ul|strong|em)[^>]*>/gi, "");
    // 移除其餘未預期的標籤
    text = text.replace(/<[^>]+>/g, "");
    // 還原常見 HTML 實體
    text = text.replace(/&nbsp;/g, " ").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');
    // 清理多餘空行
    text = text.split("\n").map(l => l.trim()).filter(l => l.length > 0).join("\n");
    return text;
  }

  function buildExportText(list, scopeLabel){
    const now = new Date();
    const dateLabel = now.getFullYear() + "/" + pad2(now.getMonth()+1) + "/" + pad2(now.getDate());

    let wrongCount = 0, confusedCount = 0, explainedCount = 0, officialCount = 0;

    const lines = [];
    lines.push(`試卷標題：${EXAM_TITLE}`);
    lines.push(`科目：${EXAM_SUBJECT}`);
    lines.push(`匯出範圍：${scopeLabel}`);
    lines.push(`匯出日期：${dateLabel}`);
    lines.push(SYMBOL_LEGEND);
    lines.push("=".repeat(48));
    lines.push("");

    list.forEach(item => {
      const qn = item.n;
      const key = String(qn);
      const selIdx = selected[key];
      const hasSelection = selIdx !== undefined && selIdx !== null;
      const isWrong = hasSelection && selIdx !== item.ans;
      if(isWrong) wrongCount++;

      let qConfused = false;

      lines.push(`第 ${qn} 題`);
      lines.push(item.q);
      item.o.forEach((text, idx) => {
        const isConf = !!confused[qn + "_" + idx];
        if(isConf) qConfused = true;
        let mark = "　"; // default: no symbol, keep alignment
        if(hasSelection && idx === selIdx){
          mark = (idx === item.ans) ? "✓" : "✗";
        }else if(isConf){
          mark = "▲";
        }
        lines.push(`${mark} (${OPT_LABELS[idx]}) ${text}`);
      });
      if(qConfused) confusedCount++;

      lines.push(`▶ 正確答案：(${OPT_LABELS[item.ans]})`);

      const officialHtml = (typeof OFFICIAL_EXPLANATIONS !== "undefined") ? OFFICIAL_EXPLANATIONS[key] : null;
      if(officialHtml){
        officialCount++;
        lines.push(officialHtmlToPlainText(officialHtml));
      }

      const note = (explainText[key] || "").trim();
      if(note){
        explainedCount++;
        lines.push("詳解：");
        lines.push(note);
      }

      lines.push("-".repeat(48));
      lines.push("");
    });

    lines.push("=".repeat(48));
    lines.push(`統計：共 ${list.length} 題｜已標記 ${list.filter(it => !!flags[it.n]).length} 題｜答錯 ${wrongCount} 題｜含疑惑選項 ${confusedCount} 題｜有參考擬答 ${officialCount} 題｜有詳解 ${explainedCount} 題`);

    return lines.join("\n");
  }

  function downloadText(filename, content){
    const blob = new Blob([content], {type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  document.getElementById("export-flagged-btn").addEventListener("click", () => {
    const list = QUESTIONS.filter(item => !!flags[item.n]);
    if(list.length === 0){
      alert("目前沒有已標記的題目可匯出。");
      return;
    }
    const text = buildExportText(list, "已標記弱點題");
    downloadText(`${EXAM_TITLE}_已標記弱點題_${todayStamp()}.txt`, text);
  });

  document.getElementById("export-all-btn").addEventListener("click", () => {
    const text = buildExportText(QUESTIONS, "全部題目");
    downloadText(`${EXAM_TITLE}_全部題目_${todayStamp()}.txt`, text);
  });

  // ---- init ----
  updateFlagCounter();
  renderScoreBanner();
  render();
})();
</script>
</body>
</html>
