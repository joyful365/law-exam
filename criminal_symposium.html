<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刑事法 - 高院座談會</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #FDFCFB 0%, #F2EFE9 100%); color: #595757; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #FFFFFF; width: 100%; max-width: 600px; padding: 40px 30px; border-radius: 8px; box-shadow: 0 12px 24px rgba(140,130,115,0.08); text-align: center; position: relative; }
        .container::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 4px; background-color: #81b29a; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #999; font-size: 14px; background: #F9F9F9; padding: 6px 12px; border-radius: 6px; border: 1px solid #EEE; }
        h1 { margin: 0; font-size: 20px; color: #333; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 10px; }

        /* 每一行：星星 + 連結並排 */
        .entry-row { display: flex; align-items: center; gap: 8px; }
        .star-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 0 2px; opacity: 0.2; transition: opacity 0.15s, transform 0.15s; flex-shrink: 0; line-height: 1; }
        .star-btn:active { transform: scale(1.35); }
        .star-btn.starred { opacity: 1; }

        a.menu-btn { flex: 1; display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background-color: #FAFAFA; color: #595757; text-decoration: none; border-radius: 6px; border-left: 4px solid #81b29a; font-size: 15px; transition: 0.2s; }
        a.menu-btn:hover { background-color: #F0F7F4; transform: translateX(2px); }
        a.menu-btn.starred-link { border-left-color: #c9a84c; background-color: #fffdf5; }

        .year-divider { margin-top: 25px; margin-bottom: 12px; font-size: 14px; color: #81b29a; font-weight: bold; text-align: left; border-bottom: 1px dashed #EBE8E1; padding-bottom: 5px; letter-spacing: 1.5px; }
        .placeholder { color: #ccc; font-size: 14px; padding: 10px 0; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="case_criminal_law.html" class="back-btn">🔙 上一頁</a>
        <h1>高院座談會目錄</h1>
        <div style="width:60px"></div>
    </div>

    <div id="listRoot"></div>
</div>

<script>
// ════════════════════════════════════════════════
//  📌 每次新增座談會，只需在對應年份的 entries 加一行：
//  { label: '顯示名稱', file: '檔案名稱.html' }
//  file 為 null 表示製作中（灰色佔位）
// ════════════════════════════════════════════════
const CATALOG = [
    {
        year: '114 年度',
        entries: [
            { label: '114年刑事類提案 第1號 (違建沒收)', file: 'case_criminal_symp_114_01.html' },
            { label: '114年刑事類提案 第2號 (定執行刑一事不再理)', file: 'case_criminal_symp_114_02.html' },
        ]
    },
    {
        year: '113 年度',
        entries: [
            { label: '113年刑事類提案 (持續更新中)', file: null },
        ]
    },
    {
        year: '112 年度',
        entries: [
            { label: '112年刑事類提案 第1號 (關聯客體沒收)', file: 'case_criminal_symp_112_01.html' },
            { label: '112年刑事類提案 第2號', file: null },
        ]
    },
];
// ════════════════════════════════════════════════

const STAR_KEY = 'symp_index_stars';
function loadStars() { try { return JSON.parse(localStorage.getItem(STAR_KEY)) || {}; } catch { return {}; } }
function saveStars(s) { localStorage.setItem(STAR_KEY, JSON.stringify(s)); }

function toggleStar(id, btn, link) {
    const stars = loadStars();
    const nowStarred = !btn.classList.contains('starred');
    btn.classList.toggle('starred', nowStarred);
    if (link) link.classList.toggle('starred-link', nowStarred);
    stars[id] = nowStarred;
    saveStars(stars);
}

(function render() {
    const root = document.getElementById('listRoot');
    const stars = loadStars();

    CATALOG.forEach(group => {
        const divider = document.createElement('div');
        divider.className = 'year-divider';
        divider.textContent = group.year;
        root.appendChild(divider);

        const ul = document.createElement('ul');
        group.entries.forEach((entry, idx) => {
            const li = document.createElement('li');

            if (!entry.file) {
                li.innerHTML = `<div class="placeholder">📄 ${entry.label}（製作中）</div>`;
            } else {
                const id = entry.file; // 用檔名當唯一 key
                const isStarred = !!stars[id];

                const row = document.createElement('div');
                row.className = 'entry-row';

                // 星星按鈕
                const starBtn = document.createElement('button');
                starBtn.className = 'star-btn' + (isStarred ? ' starred' : '');
                starBtn.textContent = '⭐';
                starBtn.title = '標記重要';

                // 連結
                const a = document.createElement('a');
                a.href = entry.file;
                a.className = 'menu-btn' + (isStarred ? ' starred-link' : '');
                a.innerHTML = `<span>${entry.label}</span>`;
                // 點星星事件
                starBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    toggleStar(id, starBtn, a);
                });

                row.appendChild(starBtn);
                row.appendChild(a);
                li.appendChild(row);
            }

            ul.appendChild(li);
        });
        root.appendChild(ul);
    });
})();
</script>

<script src="category-badge.js"></script>
</body>
</html>
