<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刑事法 - 高院座談會</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #FDFCFB 0%, #F2EFE9 100%);
            color: #595757;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 560px;       /* 手機預設寬度 */
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 12px 24px rgba(140,130,115,0.08);
            text-align: center;
            position: relative;
        }
        /* 桌面版：加寬、字體放大 */
        @media (min-width: 768px) {
            .container {
                max-width: 820px;
                padding: 48px 48px;
                font-size: 1.08em;
            }
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 4px;
            background-color: #81b29a;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            text-decoration: none;
            color: #999;
            font-size: 14px;
            background: #F9F9F9;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #EEE;
        }
        h1 { margin: 0; font-size: 20px; color: #333; }

        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 10px; }

        /* 每行：連結佔滿左側，星星固定在最右 */
        .entry-row {
            display: flex;
            align-items: center;
            gap: 0;
        }
        a.menu-btn {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 14px 20px;
            background-color: #FAFAFA;
            color: #595757;
            text-decoration: none;
            border-radius: 6px 0 0 6px;   /* 左側圓角 */
            border-left: 4px solid #81b29a;
            border-top: 1px solid #F0F0F0;
            border-bottom: 1px solid #F0F0F0;
            font-size: 15px;
            transition: 0.2s;
            min-width: 0;                   /* 讓 flex 可以收縮 */
        }
        a.menu-btn span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        a.menu-btn:hover { background-color: #F0F7F4; }
        a.menu-btn.starred-link {
            border-left-color: #c9a84c;
            background-color: #fffdf5;
        }

        /* 星星：貼在連結右側，視覺上像同一個元素 */
        .star-btn {
            background: #FAFAFA;
            border: none;
            border-top: 1px solid #F0F0F0;
            border-bottom: 1px solid #F0F0F0;
            border-right: 1px solid #F0F0F0;
            border-radius: 0 6px 6px 0;    /* 右側圓角 */
            font-size: 16px;
            cursor: pointer;
            padding: 0 14px;
            height: 100%;
            min-height: 50px;
            opacity: 0.25;
            transition: opacity 0.15s, transform 0.15s, background 0.15s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }
        .star-btn:hover { opacity: 0.6; background: #F5F5F0; }
        .star-btn:active { transform: scale(1.3); }
        .star-btn.starred { opacity: 1; background: #fffdf5; }

        .year-divider {
            margin-top: 25px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #81b29a;
            font-weight: bold;
            text-align: left;
            border-bottom: 1px dashed #EBE8E1;
            padding-bottom: 5px;
            letter-spacing: 1.5px;
        }
        .placeholder {
            color: #ccc;
            font-size: 14px;
            padding: 10px 0;
            text-align: left;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="case_criminal_law.html" class="back-btn">🔙 上一頁</a>
        <h1>高院座談會目錄</h1>
        <div style="width:60px"></div>
    </div>

    <div id="listRoot"></div>
</div>

<script>
const CATALOG = [
    {
        year: '114 年度',
        entries: [
            { label: '114刑事座談01_違建得沒收', file: 'case_criminal_symp_114_01.html' },
            { label: '114刑事座談02_定執行刑一事不再理', file: 'case_criminal_symp_114_02.html' },
            { label: '114刑事座談03_聚眾施強暴特定人', file: 'case_criminal_symp_114_03.html' },
            { label: '114刑事座談04_強制罪法人客體', file: 'case_criminal_symp_114_04.html' },
            { label: '114刑事座談05_詐欺洗錢第二層帳戶罪數', file: 'case_criminal_symp_114_05.html' },
            { label: '114刑事座談06_訴訟詐欺虛偽陳述即足', file: 'case_criminal_symp_114_06.html' },
            { label: '114刑事座談07_詐欺車手先進先出', file: 'case_criminal_symp_114_07.html' },
            { label: '114刑事座談08_理專特別背信罪', file: 'case_criminal_symp_114_08.html' },
            { label: '114刑事座談10_個資訴訟利用', file: 'case_criminal_symp_114_10.html' },
            { label: '114刑事座談12_取簿手洗錢罪', file: 'case_criminal_symp_114_12.html' },
            { label: '114刑事座談13_1元匯款洗錢未遂', file: 'case_criminal_symp_114_13.html' },
            { label: '114刑事座談14_詐欺危害條例44條未遂', file: 'case_criminal_symp_114_14.html' },
            { label: '114刑事座談17_辯護人閱卷重製', file: 'case_criminal_symp_114_17.html' },
            { label: '114刑事座談18_檢察官未到場辯護人得否閱覽全部卷證', file: 'case_criminal_symp_114_18.html' },
            { label: '114刑事座談19_偵查中羈押審查應否排除違法取得之證據', file: 'case_criminal_symp_114_19.html' },

            
        ]
    },
    {
        year: '113 年度',
        entries: [
            { label: '113刑事座談02_犯罪客體屬「供犯罪所用之物」，得宣告沒收', file: 'case_criminal_symp_113_02.html' },
            { label: '113年刑事類提案 (持續更新中)', file: null },
        ]
    },
    {
        year: '112 年度',
        entries: [
            { label: '112年刑事類提案 第1號 (關聯客體沒收)', file: 'case_criminal_symp_112_01.html' },
            { label: '112年刑事類提案 第2號', file: null },
        ]
    },
];

const STAR_KEY = 'symp_index_stars';
function loadStars() { try { return JSON.parse(localStorage.getItem(STAR_KEY)) || {}; } catch { return {}; } }
function saveStars(s) { localStorage.setItem(STAR_KEY, JSON.stringify(s)); }

function toggleStar(id, btn, link) {
    const stars = loadStars();
    const nowStarred = !btn.classList.contains('starred');
    btn.classList.toggle('starred', nowStarred);
    if (link) link.classList.toggle('starred-link', nowStarred);
    stars[id] = nowStarred;
    saveStars(stars);
}

(function render() {
    const root = document.getElementById('listRoot');
    const stars = loadStars();

    CATALOG.forEach(group => {
        const divider = document.createElement('div');
        divider.className = 'year-divider';
        divider.textContent = group.year;
        root.appendChild(divider);

        const ul = document.createElement('ul');
        group.entries.forEach(entry => {
            const li = document.createElement('li');

            if (!entry.file) {
                li.innerHTML = `<div class="placeholder">${entry.label}（製作中）</div>`;
            } else {
                const id = entry.file;
                const isStarred = !!stars[id];

                const row = document.createElement('div');
                row.className = 'entry-row';

                const a = document.createElement('a');
                a.href = entry.file;
                a.className = 'menu-btn' + (isStarred ? ' starred-link' : '');
                a.innerHTML = `<span>${entry.label}</span>`;

                const starBtn = document.createElement('button');
                starBtn.className = 'star-btn' + (isStarred ? ' starred' : '');
                starBtn.textContent = '⭐';
                starBtn.title = '標記重要';

                starBtn.addEventListener('click', e => {
                    e.preventDefault();
                    toggleStar(id, starBtn, a);
                });

                row.appendChild(a);
                row.appendChild(starBtn);
                li.appendChild(row);
            }

            ul.appendChild(li);
        });
        root.appendChild(ul);
    });
})();
</script>

<script src="category-badge.js"></script>
</body>
</html>
