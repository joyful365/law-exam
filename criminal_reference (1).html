<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刑事法 - 具參考價值裁判</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #FDFCFB 0%, #F2EFE9 100%); color: #595757; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #FFFFFF; width: 100%; max-width: 600px; padding: 40px 30px; border-radius: 8px; box-shadow: 0 12px 24px rgba(140,130,115,0.08); text-align: center; position: relative; }
        .container::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 4px; background-color: #81b29a; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #999; font-size: 14px; background: #F9F9F9; padding: 6px 12px; border-radius: 6px; border: 1px solid #EEE; }
        h1 { margin: 0; font-size: 20px; color: #333; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin-bottom: 10px; }
        a.menu-btn { display: flex; justify-content: space-between; align-items: center; padding: 14px 20px; background-color: #FAFAFA; color: #595757; text-decoration: none; border-radius: 6px; border-left: 4px solid #81b29a; font-size: 15px; transition: 0.2s; }
        a.menu-btn:hover { background-color: #F0F7F4; transform: translateX(2px); }
        a.menu-btn.is-read { border-left-color: #38a169; background-color: #f0faf4; }
        .year-divider { margin-top: 25px; margin-bottom: 12px; font-size: 14px; color: #81b29a; font-weight: bold; text-align: left; border-bottom: 1px dashed #EBE8E1; padding-bottom: 5px; letter-spacing: 1.5px; }
        .entry-label { display: flex; align-items: center; gap: 8px; }
        .read-badge { font-size: 12px; background: #c6f6d5; color: #276749; padding: 2px 7px; border-radius: 10px; font-weight: 600; display: none; }
        .read-badge.visible { display: inline-block; }
        .progress-wrap { margin: 0 0 18px; text-align: left; }
        .progress-label { font-size: 13px; color: #999; margin-bottom: 5px; }
        .progress-bar-bg { background: #EBE8E1; border-radius: 10px; height: 8px; }
        .progress-bar { background: #81b29a; border-radius: 10px; height: 8px; width: 0%; transition: width 0.4s; }
        .placeholder { color: #ccc; font-size: 14px; padding: 10px 0; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <a href="case_criminal_law.html" class="back-btn">🔙 上一頁</a>
        <h1>刑事法具參目錄</h1>
        <div style="width:60px"></div>
    </div>

    <div class="progress-wrap">
        <div class="progress-label" id="progressLabel">讀取中…</div>
        <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div id="listRoot"></div>
</div>

<script>
// ════════════════════════════════════════════════
//  📌 只需要維護這個清單！
//  每次新增一份具參，在對應年份的 entries 陣列
//  加一行 { label, file, key } 即可，其他全自動。
//
//  label : 顯示在目錄的名稱
//  file  : HTML 檔案名稱（放同一資料夾）
//  key   : 該 HTML 裡 DONE_KEY 的值
//          （規則：read_年份_月份，如 read_114_13）
//  若 file 為 null，表示尚未製作，會顯示為灰色佔位符
// ════════════════════════════════════════════════
const CATALOG = [
    {
        year: '114 年度',
        entries: [
            { label: '114年度 (10-12月) 刑事具參', file: '114年度_10-12月_刑事具參.html', key: 'read_114_1012' },
            { label: '114年度 (7-9月) 刑事具參',   file: '114年度_7-9月_刑事具參.html',   key: 'read_114_79'   },
            { label: '114年度 (4-6月) 刑事具參',   file: '114年度_4-6月_刑事具參.html',   key: 'read_114_46'   },
            { label: '114年度 (1-3月) 刑事具參',   file: '114年度_1-3月_刑事具參.html',   key: 'read_114_13'   },
        ]
    },
    {
        year: '113 年度',
        entries: [
            { label: '113年度 (3月) 刑事具參',  file: '113年度_3月_刑事具參_v7.html', key: 'read_113_3' },
            { label: '113年度 (1月) 刑事具參',  file: null, key: null },
        ]
    },
    {
        year: '112 年度',
        entries: [
            { label: '112年度 (11月) 刑事具參', file: null, key: null },
        ]
    },
];
// ════════════════════════════════════════════════

(function render() {
    const root = document.getElementById('listRoot');
    let totalKeyed = 0, readCount = 0;

    CATALOG.forEach(group => {
        // 年份標題
        const divider = document.createElement('div');
        divider.className = 'year-divider';
        divider.textContent = group.year;
        root.appendChild(divider);

        const ul = document.createElement('ul');

        group.entries.forEach(entry => {
            const li = document.createElement('li');

            if (!entry.file) {
                // 尚未製作：灰色佔位
                li.innerHTML = `<div class="placeholder">📄 ${entry.label}（製作中）</div>`;
            } else {
                const isRead = entry.key && localStorage.getItem(entry.key) === '1';
                if (entry.key) { totalKeyed++; if (isRead) readCount++; }

                const a = document.createElement('a');
                a.href = entry.file;
                a.className = 'menu-btn' + (isRead ? ' is-read' : '');

                const badge = isRead
                    ? `<span class="read-badge visible">已讀</span>`
                    : `<span class="read-badge"></span>`;

                a.innerHTML = `
                    <div class="entry-label">
                        <span>${entry.label}</span>
                        ${badge}
                    </div>
                    <span>📄</span>`;
                li.appendChild(a);
            }
            ul.appendChild(li);
        });

        root.appendChild(ul);
    });

    // 進度條
    const pct = totalKeyed > 0 ? Math.round(readCount / totalKeyed * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent =
        `閱讀進度：${readCount} / ${totalKeyed} 份（${pct}%）`;
})();
</script>
</body>
</html>
