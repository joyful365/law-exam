<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>114年地方特考四等｜法學知識與英文 複習卷</title>
<style>
  :root{
    --paper:#faf7f0;
    --paper-line:#e4dcc8;
    --ink:#262220;
    --ink-soft:#5c5650;
    --stamp-red:#a32f2f;
    --stamp-red-soft:#c4504f;
    --seal-gold:#9c7a2e;
    --flag-bg:#fff3dc;
    --flag-border:#c98a2b;
    --correct-tint:#eef3ea;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:var(--paper);
    background-image:
      repeating-linear-gradient(0deg, transparent 0px, transparent 27px, var(--paper-line) 27px, var(--paper-line) 28px);
    color:var(--ink);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei","Helvetica Neue",Arial,sans-serif;
    line-height:1.6;
    padding-bottom:80px;
  }

  /* ============ STICKY TOP WRAP ============ */
  .sticky-top-wrap{
    position:sticky;
    top:0;
    z-index:60;
    background:var(--paper);
    box-shadow:0 2px 8px rgba(0,0,0,.05);
  }

  /* ============ HEADER ============ */
  header{
    position:relative;
    max-width:880px;
    margin:0 auto;
    padding:18px 28px 14px;
    border-bottom:3px double var(--ink);
  }
  .exam-meta-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:12px;
  }
  .exam-title{
    font-size:1.15rem;
    font-weight:800;
    letter-spacing:.04em;
    margin:0 0 4px;
  }
  .exam-sub{
    font-size:.84rem;
    color:var(--ink-soft);
    margin:1px 0;
  }
  .exam-sub b{ color:var(--ink); font-weight:600; }

  .seal{
    flex-shrink:0;
    width:54px;
    height:54px;
    border:2.5px solid var(--stamp-red);
    border-radius:7px;
    color:var(--stamp-red);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:.8rem;
    letter-spacing:.12em;
    writing-mode:vertical-rl;
    transform:rotate(2deg);
    opacity:.85;
    user-select:none;
  }

  /* ============ CONTROL BAR ============ */
  .controlbar{
    max-width:880px;
    margin:0 auto;
    background:var(--paper);
    border-bottom:1px solid var(--paper-line);
    padding:12px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .tabs{
    display:flex;
    gap:6px;
    background:#f0ead9;
    border:1px solid var(--paper-line);
    border-radius:10px;
    padding:4px;
  }
  .tab-btn{
    border:none;
    background:transparent;
    padding:8px 18px;
    font-size:.92rem;
    font-weight:600;
    color:var(--ink-soft);
    border-radius:7px;
    cursor:pointer;
    transition:background .15s, color .15s;
    font-family:inherit;
  }
  .tab-btn.active{
    background:var(--ink);
    color:var(--paper);
  }
  .flag-counter{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:.9rem;
    color:var(--ink-soft);
  }
  .flag-counter .num{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:26px;
    height:26px;
    padding:0 6px;
    background:var(--flag-bg);
    border:1px solid var(--flag-border);
    color:#8a5a14;
    border-radius:7px;
    font-weight:700;
  }
  .reset-btn{
    border:1px solid var(--paper-line);
    background:transparent;
    color:var(--ink-soft);
    font-size:.82rem;
    padding:7px 12px;
    border-radius:7px;
    cursor:pointer;
    font-family:inherit;
  }
  .reset-btn:hover{ background:#f0ead9; }

  .export-group{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .export-btn{
    border:1px solid var(--seal-gold);
    background:#fffefb;
    color:#7a5f24;
    font-size:.82rem;
    font-weight:600;
    padding:7px 14px;
    border-radius:7px;
    cursor:pointer;
    font-family:inherit;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:background .15s, color .15s;
  }
  .export-btn:hover{
    background:var(--seal-gold);
    color:#fff;
  }
  .export-btn svg{
    width:13px;
    height:13px;
    flex-shrink:0;
  }

  /* ============ QUESTION LIST ============ */
  main{
    max-width:880px;
    margin:0 auto;
    padding:22px 28px 0;
  }

  .passage-block{
    background:#fffefb;
    border:1px solid var(--paper-line);
    border-left:4px solid var(--seal-gold);
    border-radius:6px;
    padding:16px 20px;
    margin:26px 0 16px;
    font-size:.92rem;
    color:var(--ink-soft);
    white-space:pre-line;
  }
  .passage-label{
    font-size:.78rem;
    font-weight:700;
    color:var(--seal-gold);
    letter-spacing:.08em;
    margin-bottom:8px;
    text-transform:uppercase;
  }

  .qcard{
    position:relative;
    display:flex;
    align-items:flex-start;
    gap:14px;
    background:#fffefb;
    border:1px solid var(--paper-line);
    border-radius:8px;
    padding:16px 18px;
    margin-bottom:14px;
    transition:border-color .15s, box-shadow .15s, background .15s;
  }
  .qcard.revealed{
    background:#fffdf7;
  }
  .qcard.flagged{
    border-color:var(--flag-border);
    background:linear-gradient(0deg, var(--flag-bg) 0%, #fffefb 14%);
    box-shadow:inset 3px 0 0 var(--flag-border);
  }
  .qcard.hidden-by-filter{ display:none; }

  .qnum{
    flex-shrink:0;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#f0ead9;
    color:var(--ink);
    font-weight:700;
    font-size:.88rem;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:1px;
    user-select:none;
  }
  .qcard.flagged .qnum{
    background:var(--flag-border);
    color:#fff;
  }

  .flag-btn{
    flex-shrink:0;
    width:34px;
    height:34px;
    border-radius:8px;
    border:1px solid var(--paper-line);
    background:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:1px;
    transition:background .15s, border-color .15s, transform .1s;
    padding:0;
  }
  .flag-btn:hover{ transform:scale(1.06); }
  .flag-btn svg{
    width:16px; height:16px;
    stroke:#b8ad94;
    fill:none;
    stroke-width:2;
    transition:stroke .15s, fill .15s;
  }
  .flag-btn.active{
    background:var(--flag-border);
    border-color:var(--flag-border);
  }
  .flag-btn.active svg{
    stroke:#fff;
    fill:#fff;
  }

  .qbody{ flex:1; min-width:0; }

  .qtext{
    font-size:.98rem;
    font-weight:600;
    margin:0 0 10px;
    color:var(--ink);
  }

  .opts-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px 14px;
  }
  .opt-row{
    display:flex;
    align-items:flex-start;
    gap:7px;
    font-size:.88rem;
    color:#3a3530;
    padding:5px 8px 5px 4px;
    border-radius:5px;
    border:1px dashed transparent;
    cursor:pointer;
    transition:background .12s, border-color .12s;
  }
  .opt-row:hover{
    background:#f5f0e2;
  }
  .opt-letter{
    flex-shrink:0;
    font-weight:700;
    color:var(--ink-soft);
    width:18px;
  }
  .opt-text{ flex:1; }

  .opt-doubt-btn{
    flex-shrink:0;
    border:none;
    background:transparent;
    cursor:pointer;
    padding:2px;
    display:flex;
    align-items:center;
    justify-content:center;
    width:18px;
    height:18px;
    margin-top:1px;
  }
  .opt-doubt-btn svg{
    width:11px;
    height:11px;
    fill:#cbc1a8;
    transition:fill .12s;
  }
  .opt-doubt-btn:hover svg{ fill:#9c7a2e; }
  .opt-doubt-btn.active svg{ fill:#c98a2b; }

  .opt-row.doubt{
    border-color:#c98a2b;
    border-style:dashed;
  }

  .opt-row.my-wrong{
    background:#fbe6e6;
    border-color:transparent;
  }
  .opt-row.my-wrong .opt-text{
    text-decoration:line-through;
    color:#8a3a3a;
  }
  .opt-row.my-correct{
    background:#e3f1e3;
    border-color:transparent;
  }
  .opt-row.my-correct .opt-text{
    color:#2e6b34;
    font-weight:600;
  }
  .opt-row.my-wrong.doubt, .opt-row.my-correct.doubt{
    border-style:dashed;
  }

  .answer-row{
    margin-top:12px;
    padding-top:10px;
    border-top:1px dashed var(--paper-line);
    display:flex;
    align-items:center;
    gap:10px;
    font-size:.88rem;
  }
  .answer-label{
    color:var(--ink-soft);
    flex-shrink:0;
  }
  .answer-value{
    font-weight:800;
    font-size:1rem;
    padding:2px 10px;
    border-radius:5px;
    user-select:all;
    /* hidden by default: white text on white/paper-matching bg */
    color:#ffffff;
    background:#ffffff;
    transition:color .12s, background .12s;
  }
  .qcard.revealed .answer-value{
    color:#fff;
    background:var(--stamp-red);
  }
  .reveal-hint{
    margin-left:auto;
    font-size:.76rem;
    color:#c2b896;
    font-style:italic;
    user-select:none;
  }
  .qcard.revealed .reveal-hint{ display:none; }

  /* ============ EXPLANATION BLOCK ============ */
  .explain-toggle{
    margin-top:10px;
    border:none;
    background:transparent;
    color:var(--seal-gold);
    font-size:.84rem;
    font-weight:600;
    padding:4px 0;
    cursor:pointer;
    font-family:inherit;
    display:inline-flex;
    align-items:center;
    gap:5px;
  }
  .explain-toggle:hover{ text-decoration:underline; }
  .explain-toggle .chev{
    display:inline-block;
    transition:transform .15s;
    font-size:.78rem;
  }
  .explain-toggle.open .chev{ transform:rotate(90deg); }
  .explain-has-badge{
    color:#8a8478;
    font-weight:400;
    font-size:.8rem;
    margin-left:2px;
  }

  .explain-wrap{
    display:none;
    margin-top:8px;
  }
  .explain-wrap.open{ display:block; }

  .explain-status{
    display:block;
    min-height:18px;
    margin-top:5px;
    font-size:.78rem;
    color:#5c8a5f;
    opacity:0;
    transition:opacity .25s;
  }
  .explain-status.show{ opacity:1; }

  .explain-textarea{
    width:100%;
    min-height:84px;
    resize:vertical;
    background:#fbf8ef;
    border:1px solid var(--paper-line);
    border-radius:6px;
    padding:10px 12px;
    font-family:inherit;
    font-size:.86rem;
    color:var(--ink);
    line-height:1.6;
    box-sizing:border-box;
  }
  .explain-textarea:focus{
    outline:none;
    border-color:var(--seal-gold);
    background:#fffefb;
  }
  .explain-textarea::placeholder{
    color:#b8ad94;
  }

  /* ============ SUBMIT BUTTON ============ */
  .submit-btn{
    border:1px solid var(--stamp-red);
    background:var(--stamp-red);
    color:#fff;
    font-size:.86rem;
    font-weight:700;
    padding:8px 18px;
    border-radius:7px;
    cursor:pointer;
    font-family:inherit;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:background .15s, box-shadow .15s, transform .1s;
    letter-spacing:.03em;
  }
  .submit-btn:hover{
    background:var(--stamp-red-soft);
  }
  .submit-btn:active{ transform:scale(.97); }
  .submit-btn svg{ width:14px; height:14px; flex-shrink:0; }

  /* ============ RESULT MODAL ============ */
  .result-overlay{
    position:fixed;
    inset:0;
    background:rgba(38,34,32,.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:200;
    padding:20px;
  }
  .result-overlay.open{ display:flex; }
  .result-modal{
    background:var(--paper);
    border-radius:14px;
    max-width:480px;
    width:100%;
    max-height:86vh;
    overflow-y:auto;
    box-shadow:0 18px 50px rgba(0,0,0,.3);
    border:1px solid var(--paper-line);
    padding:28px 26px 24px;
    position:relative;
  }
  .result-close{
    position:absolute;
    top:14px; right:14px;
    width:30px; height:30px;
    border-radius:8px;
    border:1px solid var(--paper-line);
    background:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink-soft);
    font-size:1rem;
    line-height:1;
  }
  .result-close:hover{ background:#f0ead9; }
  .result-title{
    font-size:1.05rem;
    font-weight:800;
    margin:0 0 4px;
    text-align:center;
  }
  .result-sub{
    font-size:.82rem;
    color:var(--ink-soft);
    text-align:center;
    margin:0 0 18px;
  }
  .result-score-circle{
    width:128px;
    height:128px;
    border-radius:50%;
    margin:0 auto 18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    border:6px solid var(--seal-gold);
    background:#fffefb;
  }
  .result-score-circle .score-num{
    font-size:2rem;
    font-weight:800;
    color:var(--ink);
    line-height:1;
  }
  .result-score-circle .score-label{
    font-size:.72rem;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .result-stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-bottom:18px;
  }
  .result-stat{
    text-align:center;
    background:#fffefb;
    border:1px solid var(--paper-line);
    border-radius:8px;
    padding:10px 4px;
  }
  .result-stat .stat-num{
    font-size:1.15rem;
    font-weight:800;
  }
  .result-stat.correct .stat-num{ color:#2e6b34; }
  .result-stat.wrong .stat-num{ color:#8a3a3a; }
  .result-stat.blank .stat-num{ color:var(--ink-soft); }
  .result-stat .stat-label{
    font-size:.74rem;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .result-wrong-list{
    font-size:.82rem;
    color:var(--ink-soft);
    background:#fffefb;
    border:1px solid var(--paper-line);
    border-radius:8px;
    padding:10px 14px;
    margin-bottom:18px;
    max-height:120px;
    overflow-y:auto;
  }
  .result-wrong-list b{ color:var(--ink); }
  .result-actions{
    display:flex;
    gap:10px;
  }
  .result-actions button{
    flex:1;
    padding:10px 12px;
    border-radius:8px;
    font-size:.86rem;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    border:1px solid var(--paper-line);
    background:#fff;
    color:var(--ink);
  }
  .result-actions .btn-primary{
    border-color:var(--stamp-red);
    background:var(--stamp-red);
    color:#fff;
  }
  .result-actions .btn-primary:hover{ background:var(--stamp-red-soft); }
  .result-actions button:not(.btn-primary):hover{ background:#f0ead9; }
  .result-report-status{
    text-align:center;
    font-size:.76rem;
    color:#a89f8c;
    margin-top:12px;
  }

  @media (max-width: 620px){
    .opts-grid{ grid-template-columns:1fr; }
    header{ padding:14px 18px 12px; }
    .controlbar{ padding:10px 18px; }
    main{ padding:18px 18px 0; }
    .seal{ display:none; }
    .export-group{ width:100%; justify-content:flex-start; flex-wrap:wrap; }
    .flag-counter{ width:100%; flex-wrap:wrap; }
    .result-stats{ grid-template-columns:1fr 1fr 1fr; }
    .result-actions{ flex-direction:column; }
  }

  footer{
    max-width:880px;
    margin:36px auto 0;
    padding:18px 28px 0;
    text-align:center;
    font-size:.8rem;
    color:#a89f8c;
    border-top:1px solid var(--paper-line);
  }
</style>
</head>
<body>

<div class="sticky-top-wrap">
<header>
  <div class="exam-meta-row">
    <div>
      <p class="exam-title">114年特種考試地方政府公務人員及離島地區公務人員考試</p>
      <p class="exam-sub"><b>等別</b>：四等考試　｜　<b>類科</b>：各類科</p>
      <p class="exam-sub"><b>科目</b>：法學知識與英文（包括中華民國憲法、法學緒論、英文）</p>
      <p class="exam-sub"><b>題數</b>：50 題　｜　點選任一選項即顯示答案，或反白答案欄查看</p>
    </div>
    <div class="seal">複習用卷</div>
  </div>
</header>

<div class="controlbar">
  <div class="tabs">
    <button class="tab-btn active" data-filter="all">全部題目</button>
    <button class="tab-btn" data-filter="flagged">已標記</button>
  </div>
  <div class="export-group">
    <button class="export-btn" id="exportFlaggedBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>
      匯出已標記
    </button>
    <button class="export-btn" id="exportAllBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>
      匯出全部
    </button>
  </div>
  <div class="flag-counter">
    已標記 <span class="num" id="flagCount">0</span> 題
    <button class="reset-btn" id="resetBtn">清除全部標記</button>
  </div>
  <button class="submit-btn" id="submitExamBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    交卷並計算成績
  </button>
</div>
</div>

<main id="quizRoot"></main>

<footer>本頁僅供個人複習使用</footer>

<!-- ============ RESULT MODAL ============ -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-modal">
    <button class="result-close" id="resultCloseBtn" aria-label="關閉">✕</button>
    <p class="result-title">交卷完成</p>
    <p class="result-sub" id="resultSubLine">114年地方特考四等｜法學知識與英文</p>

    <div class="result-score-circle">
      <span class="score-num" id="resultScoreNum">0</span>
      <span class="score-label">分（滿分100）</span>
    </div>

    <div class="result-stats">
      <div class="result-stat correct">
        <div class="stat-num" id="statCorrect">0</div>
        <div class="stat-label">答對</div>
      </div>
      <div class="result-stat wrong">
        <div class="stat-num" id="statWrong">0</div>
        <div class="stat-label">答錯</div>
      </div>
      <div class="result-stat blank">
        <div class="stat-num" id="statBlank">0</div>
        <div class="stat-label">未作答</div>
      </div>
    </div>

    <div class="result-wrong-list" id="resultWrongList"></div>

    <div class="result-actions">
      <button id="resultReviewBtn">回頭檢視答案</button>
      <button class="btn-primary" id="resultCloseBtn2">關閉</button>
    </div>

    <p class="result-report-status" id="resultReportStatus"></p>
  </div>
</div>

<script>
const QUESTIONS = [

    }

    const card = document.createElement("div");
    card.className = "qcard";
    card.dataset.n = item.n;
    if(flags[item.n]) card.classList.add("flagged");

    const optsHtml = item.opts.map((opt,i) =>
      `<div class="opt-row" data-idx="${i}">
        <span class="opt-letter">${LETTERS[i]}.</span>
        <span class="opt-text">${escapeHtml(opt)}</span>
        <button class="opt-doubt-btn" type="button" title="標記為疑惑選項" aria-label="標記疑惑">
          <svg viewBox="0 0 12 12"><polygon points="6,1 11,10 1,10"/></svg>
        </button>
      </div>`
    ).join("");

    card.innerHTML = `
      <div class="qnum">${item.n}</div>
      <button class="flag-btn ${flags[item.n] ? "active" : ""}" title="標記為容易出錯" aria-label="標記題目">
        <svg viewBox="0 0 24 24"><path d="M5 3v18M5 4h12l-3 4 3 4H5"/></svg>
      </button>
      <div class="qbody">
        <p class="qtext">${item.n}. ${escapeHtml(item.q)}</p>
        <div class="opts-grid">${optsHtml}</div>
        <div class="answer-row">
          <span class="answer-label">正確答案：</span>
          <span class="answer-value">${item.ans}</span>
          <span class="reveal-hint">點選任一選項即顯示答案</span>
        </div>
        <button class="explain-toggle" type="button"><span class="chev">▶</span><span class="toggle-label">顯示詳解</span><span class="explain-has-badge" style="display:none;">（已有詳解）</span></button>
        <div class="explain-wrap">
          <textarea class="explain-textarea" placeholder="在此輸入詳解…"></textarea>
          <span class="explain-status"></span>
        </div>
      </div>
    `;

    // populate saved explanation text
    const textarea = card.querySelector(".explain-textarea");
    const explainBadge = card.querySelector(".explain-has-badge");
    const explainStatus = card.querySelector(".explain-status");
    textarea.value = explanations[item.n] || "";
    if(textarea.value.trim() !== ""){
      explainBadge.style.display = "inline";
    }

    // (answer reveal is now triggered only by selecting an option — see opt-row handler below)

    const flagBtn = card.querySelector(".flag-btn");
    flagBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const n = item.n;
      flags[n] = !flags[n];
      saveFlags(flags);
      card.classList.toggle("flagged", !!flags[n]);
      flagBtn.classList.toggle("active", !!flags[n]);
      updateFlagCount();
      applyFilter();
    });

    const explainToggle = card.querySelector(".explain-toggle");
    const explainWrap = card.querySelector(".explain-wrap");
    const toggleLabel = card.querySelector(".toggle-label");
    explainToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      const isOpen = explainWrap.classList.toggle("open");
      explainToggle.classList.toggle("open", isOpen);
      toggleLabel.textContent = isOpen ? "收合詳解" : "顯示詳解";
    });

    let saveTimer = null;
    let statusHideTimer = null;
    textarea.addEventListener("input", () => {
      clearTimeout(saveTimer);
      explainStatus.classList.remove("show");
      saveTimer = setTimeout(() => {
        explanations[item.n] = textarea.value;
        saveExplanations(explanations);
        explainBadge.style.display = textarea.value.trim() !== "" ? "inline" : "none";
        explainStatus.textContent = "✓ 已自動儲存";
        explainStatus.classList.add("show");
        clearTimeout(statusHideTimer);
        statusHideTimer = setTimeout(() => {
          explainStatus.classList.remove("show");
        }, 2000);
      }, 800);
    });

    // ---- option rows: my-answer marking + doubt marking ----
    const correctIdx = LETTERS.indexOf(item.ans);
    const optRows = card.querySelectorAll(".opt-row");
    optRows.forEach(row => {
      const idx = parseInt(row.dataset.idx, 10);

      // apply saved doubt state
      const doubtKey = item.n + "-" + idx;
      const doubtBtn = row.querySelector(".opt-doubt-btn");
      if(doubts[doubtKey]){
        row.classList.add("doubt");
        doubtBtn.classList.add("active");
      }

      // apply saved my-answer state
      if(myAnswers[item.n] === idx){
        row.classList.add(idx === correctIdx ? "my-correct" : "my-wrong");
        card.classList.add("revealed");
      }

      row.addEventListener("mousedown", (e) => {
        if(e.target.closest(".opt-doubt-btn")) return;
        e.stopPropagation();
        const n = item.n;
        const wasSelected = myAnswers[n] === idx;

        // clear previous selection visuals on this question
        optRows.forEach(r => r.classList.remove("my-correct","my-wrong"));

        if(wasSelected){
          delete myAnswers[n];
          card.classList.remove("revealed");
        }else{
          myAnswers[n] = idx;
          row.classList.add(idx === correctIdx ? "my-correct" : "my-wrong");
          card.classList.add("revealed");
        }
        saveMyAnswers(myAnswers);
      });

      doubtBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        if(doubts[doubtKey]){
          delete doubts[doubtKey];
          row.classList.remove("doubt");
          doubtBtn.classList.remove("active");
        }else{
          doubts[doubtKey] = true;
          row.classList.add("doubt");
          doubtBtn.classList.add("active");
        }
        saveDoubts(doubts);
      });
    });

    root.appendChild(card);
  });

  updateFlagCount();
  applyFilter();
}

function applyFilter(){
  const cards = document.querySelectorAll(".qcard");
  cards.forEach(card => {
    const n = card.dataset.n;
    const show = currentFilter === "all" || !!flags[n];
    card.classList.toggle("hidden-by-filter", !show);
  });
  // hide passage blocks with no visible questions when filtering flagged
  document.querySelectorAll(".passage-block").forEach(block => {
    let sib = block.nextElementSibling;
    let anyVisible = false;
    while(sib && sib.classList.contains("qcard")){
      if(!sib.classList.contains("hidden-by-filter")) anyVisible = true;
      sib = sib.nextElementSibling;
    }
    block.style.display = (currentFilter === "flagged" && !anyVisible) ? "none" : "";
  });
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    applyFilter();
  });
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if(confirm("確定要清除所有標記嗎？此動作無法復原。")){
    flags = {};
    saveFlags(flags);
    render();
  }
});

// ============ EXPORT ============
const EXAM_TITLE = "114年特種考試地方政府公務人員及離島地區公務人員考試";
const EXAM_SUBJECT = "法學知識與英文（包括中華民國憲法、法學緒論、英文）";
const EXAM_NAME_FOR_FILE = "114地方特考四等法學知識與英文";

function pad2(n){ return n < 10 ? "0" + n : String(n); }

function todayStr(){
  const d = new Date();
  return d.getFullYear() + pad2(d.getMonth()+1) + pad2(d.getDate());
}

function buildExportText(scope){
  // scope: "all" | "flagged"
  const list = QUESTIONS.filter(item => scope === "all" || !!flags[item.n]);
  const scopeLabel = scope === "all" ? "全部題目" : "已標記弱點題";

  const lines = [];
  lines.push("═".repeat(40));
  lines.push(EXAM_TITLE);
  lines.push("科目：" + EXAM_SUBJECT);
  lines.push("匯出範圍：" + scopeLabel);
  lines.push("匯出日期：" + new Date().toLocaleDateString("zh-TW", {year:"numeric",month:"2-digit",day:"2-digit"}));
  lines.push("");
  lines.push("符號圖例：✗ 我選錯的選項　✓ 我選對的選項　▲ 標記為疑惑的選項");
  lines.push("═".repeat(40));
  lines.push("");

  let wrongCount = 0;
  let doubtQuestionCount = 0;
  let explainCount = 0;

  list.forEach(item => {
    const correctIdx = LETTERS.indexOf(item.ans);
    const myIdx = myAnswers.hasOwnProperty(item.n) ? myAnswers[item.n] : null;
    const isWrong = myIdx !== null && myIdx !== correctIdx;
    if(isWrong) wrongCount++;

    let hasDoubtInQuestion = false;

    lines.push("第 " + item.n + " 題");
    lines.push(item.q);
    lines.push("");

    item.opts.forEach((opt, idx) => {
      const isDoubt = !!doubts[item.n + "-" + idx];
      if(isDoubt) hasDoubtInQuestion = true;
      let mark = "　"; // default blank (full-width space for alignment)
      if(myIdx === idx){
        mark = (idx === correctIdx) ? "✓" : "✗";
      }
      let line = mark + " (" + LETTERS[idx] + ") " + opt;
      if(isDoubt) line += "　▲";
      lines.push(line);
    });

    if(hasDoubtInQuestion) doubtQuestionCount++;

    lines.push("");
    lines.push("▶ 正確答案：(" + item.ans + ")");

    const explainText = (explanations[item.n] || "").trim();
    if(explainText){
      explainCount++;
      lines.push("詳解：" + explainText);
    }else{
      lines.push("詳解：尚無詳解");
    }

    lines.push("");
    lines.push("─".repeat(40));
    lines.push("");
  });

  const flaggedInList = list.filter(item => !!flags[item.n]).length;

  lines.push("【統計】");
  lines.push("共 " + list.length + " 題");
  lines.push("已標記 " + flaggedInList + " 題");
  lines.push("答錯 " + wrongCount + " 題");
  lines.push("含疑惑選項 " + doubtQuestionCount + " 題");
  lines.push("有詳解 " + explainCount + " 題");

  return lines.join("\n");
}

function downloadTextFile(filename, text){
  const blob = new Blob([text], {type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById("exportFlaggedBtn").addEventListener("click", () => {
  const flaggedCount = Object.values(flags).filter(Boolean).length;
  if(flaggedCount === 0){
    alert("目前尚未標記任何題目，請先標記弱點題後再匯出。");
    return;
  }
  const text = buildExportText("flagged");
  const filename = EXAM_NAME_FOR_FILE + "_已標記弱點題_" + todayStr() + ".txt";
  downloadTextFile(filename, text);
});

document.getElementById("exportAllBtn").addEventListener("click", () => {
  const text = buildExportText("all");
  const filename = EXAM_NAME_FOR_FILE + "_全部題目_" + todayStr() + ".txt";
  downloadTextFile(filename, text);
});

// ============ 交卷算分 ============
const TOTAL_QUESTIONS = QUESTIONS.length;
const POINTS_PER_QUESTION = 100 / TOTAL_QUESTIONS;

function gradeExam(){
  let correct = 0, wrong = 0, blank = 0;
  const wrongList = [];

  QUESTIONS.forEach(item => {
    const correctIdx = LETTERS.indexOf(item.ans);
    const hasAnswer = myAnswers.hasOwnProperty(item.n);
    if(!hasAnswer){
      blank++;
      return;
    }
    if(myAnswers[item.n] === correctIdx){
      correct++;
    }else{
      wrong++;
      wrongList.push({
        n: item.n,
        myAnswer: LETTERS[myAnswers[item.n]],
        correctAnswer: item.ans
      });
    }
  });

  const score = Math.round(correct * POINTS_PER_QUESTION * 100) / 100;

  return {
    examId: EXAM_NAME_FOR_FILE,
    examTitle: EXAM_TITLE,
    examSubject: EXAM_SUBJECT,
    totalQuestions: TOTAL_QUESTIONS,
    correctCount: correct,
    wrongCount: wrong,
    blankCount: blank,
    score: score,
    scoreMax: 100,
    flaggedCount: Object.values(flags).filter(Boolean).length,
    wrongList: wrongList,
    answeredAt: new Date().toISOString()
  };
}

function renderResultModal(result){
  document.getElementById("resultScoreNum").textContent = result.score;
  document.getElementById("statCorrect").textContent = result.correctCount;
  document.getElementById("statWrong").textContent = result.wrongCount;
  document.getElementById("statBlank").textContent = result.blankCount;
  document.getElementById("resultSubLine").textContent =
    EXAM_TITLE + "｜" + EXAM_SUBJECT;

  const wrongListEl = document.getElementById("resultWrongList");
  if(result.wrongList.length === 0 && result.blankCount === 0){
    wrongListEl.innerHTML = "🎉 全部答對，恭喜！";
  }else{
    const parts = [];
    if(result.wrongList.length > 0){
      const wrongNums = result.wrongList.map(w => "<b>" + w.n + "</b>").join("、");
      parts.push("答錯題號：" + wrongNums);
    }
    if(result.blankCount > 0){
      const blankNums = QUESTIONS
        .filter(item => !myAnswers.hasOwnProperty(item.n))
        .map(item => "<b>" + item.n + "</b>")
        .join("、");
      parts.push("未作答題號：" + blankNums);
    }
    wrongListEl.innerHTML = parts.join("<br>");
  }

  document.getElementById("resultReportStatus").textContent = "";
  document.getElementById("resultOverlay").classList.add("open");
}

function closeResultModal(){
  document.getElementById("resultOverlay").classList.remove("open");
}

/**
 * 將交卷結果回報給題庫大廳（外層頁面）。
 * 相容三種情境：
 * 1. 本頁面是被題庫大廳以 iframe 嵌入 -> 透過 postMessage 通知 parent
 * 2. 本頁面與題庫大廳同一個 window（例如由大廳用 window.open 開啟，且大廳把
 *    reportExamComplete 掛在 window.opener 上）-> 直接呼叫 opener 的函式
 * 3. 全域（window）已經存在 reportExamComplete 函式 -> 直接呼叫
 * 任一管道都找不到時，僅在 console 留下記錄，不影響頁面其餘功能。
 */
function reportExamComplete(result){
  let reported = false;
  const statusEl = document.getElementById("resultReportStatus");

  // 情境 3：全域已掛載 reportExamComplete
  try{
    if(typeof window.reportExamComplete === "function" && window.reportExamComplete !== reportExamComplete){
      window.reportExamComplete(result);
      reported = true;
    }
  }catch(e){ console.warn("reportExamComplete (global) failed:", e); }

  // 情境 2：開啟者視窗（window.opener）掛有 reportExamComplete
  try{
    if(window.opener && typeof window.opener.reportExamComplete === "function"){
      window.opener.reportExamComplete(result);
      reported = true;
    }
  }catch(e){ console.warn("reportExamComplete (opener) failed:", e); }

  // 情境 1：以 iframe 嵌入題庫大廳 -> postMessage 給 parent
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage({
        type: "examComplete",
        source: "exam-page",
        payload: result
      }, "*");
      reported = true;
    }
  }catch(e){ console.warn("reportExamComplete (postMessage) failed:", e); }

  if(statusEl){
    statusEl.textContent = reported
      ? "✓ 已將成績回報給題庫大廳"
      : "（未偵測到題庫大廳，成績僅顯示於本頁）";
  }
  console.log("[examComplete]", result);
  return reported;
}

function submitExam(){
  const answeredCount = Object.keys(myAnswers).length;
  const unanswered = TOTAL_QUESTIONS - answeredCount;

  if(unanswered > 0){
    const ok = confirm(
      "尚有 " + unanswered + " 題未作答，確定要交卷嗎？\n（未作答題目將計為錯誤）"
    );
    if(!ok) return;
  }else{
    const ok = confirm("確定要交卷並計算成績嗎？");
    if(!ok) return;
  }

  const result = gradeExam();
  renderResultModal(result);
  reportExamComplete(result);
}

document.getElementById("submitExamBtn").addEventListener("click", submitExam);
document.getElementById("resultCloseBtn").addEventListener("click", closeResultModal);
document.getElementById("resultCloseBtn2").addEventListener("click", closeResultModal);
document.getElementById("resultOverlay").addEventListener("click", (e) => {
  if(e.target.id === "resultOverlay") closeResultModal();
});
document.getElementById("resultReviewBtn").addEventListener("click", () => {
  closeResultModal();
  // 切換到「全部題目」分頁，方便使用者逐題檢視已揭示的答案
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelector('.tab-btn[data-filter="all"]').classList.add("active");
  currentFilter = "all";
  applyFilter();
  window.scrollTo({top: 0, behavior: "smooth"});
});

render();
</script>
